.nav-item:hover{background:var(--hover)}
.nav-item.active{background:var(--primary-soft);color:var(--primary);font-weight:600}
.nav-item.overview{font-weight:600;margin-bottom:4px}
.nav-children{padding-left:14px;border-left:1px solid var(--border);margin-left:12px}
.nav-group-label{font-size:11px;font-weight:600;color:var(--text-muted);

.sidebar-footer{margin-top:auto;padding-top:16px;border-top:1px solid var(--border);
  font-size:11px;color:var(--text-muted);text-align:center}

.content h1{font-size:28px;font-weight:700;margin-bottom:8px;line-height:1.3}
.content h2{font-size:22px;font-weight:600;margin:32px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border)}

.content pre{background:#1e293b;color:#e2e8f0;border-radius:var(--radius);padding:16px;

.content pre code{background:none;padding:0;font-size:13px;line-height:1.6;color:inherit}
.content table{border-collapse:collapse;width:100%;margin:16px 0}
.content th,.content td{border:1px solid var(--border);padding:8px 12px;text-align:left;font-size:14px}
.content th{background:var(--sidebar-bg);font-weight:600}
.content img{max-width:100%;border-radius:var(--radius)}

var PAGES = {"app-api":"# app — api\n\n# API Module Documentation\n\nThe `app/api` module is the central HTTP interface for Papermark's backend. It handles document view tracking, authentication flows, cron jobs, integrations, webhooks, and support utilities. This module acts as the entry point for all client-server communication and external service callbacks.\n\n## Architecture Overview\n\nThe module is organized by functional area, with each route file responsible for a specific domain. Most routes interact with Prisma for database operations, Redis for rate limiting and sessions, and various email/integration libraries.\n\n```mermaid\nflowchart LR\n    subgraph \"Request Sources\"\n        Client[Browser/Client]\n        Cron[Cron Services<br/>QStash/Upstash]\n        External[External Services<br/>Slack/Documenso]\n    end\n\n    subgraph \"API Routes\"\n        Views[Views API<br/>Document & Dataroom]\n        Auth[Auth API<br/>Email Verification]\n        Cron[Scheduled Jobs<br/>Digest/Domain/Welcome]\n        Webhooks[Webhooks<br/>Signing/Callback]\n        Utilities[OG/Features/Help]\n    end\n\n    subgraph \"Core Libraries\"\n        DB[(Prisma DB)]\n        Redis[(Redis)]\n        Email[Email Libs]\n        Auth[Auth Libs]\n        Storage[Storage/File]\n    end\n\n    Client --> Views\n    Client --> Auth\n    Cron --> Cron\n    External --> Webhooks\n    Client --> Utilities\n\n    Views --> DB\n    Views --> Redis\n    Views --> Email\n    Views --> Auth\n    Cron --> DB\n    Cron --> Redis\n    Cron --> Email\n```\n\n## Route Categories\n\n### View Recording (`/api/views`, `/api/views-dataroom`)\n\nThese are the most critical routes, handling document and dataroom access. They implement layered security with multiple verification mechanisms.\n\n**Document Views (`/api/views/route.ts`)**\n- Records a view when a visitor accesses a document link\n- Supports both paginated PDFs and single-file documents\n- Handles multiple file types: PDF, images, videos, spreadsheets, ZIPs, and links\n\n**Dataroom Views (`/api/views-dataroom/route.ts`)**\n- Records views for datarooms (document collections)\n- Handles two view types: `DATAROOM_VIEW` (room-level) and `DOCUMENT_VIEW` (individual document)\n- Manages dataroom sessions with fingerprinting\n\n**Access Control Flow**\n\nBoth view routes implement a consistent access control pipeline:\n\n```mermaid\nsequenceDiagram\n    participant Client\n    participant API as View API\n    participant Prisma as DB\n    participant Redis as Rate Limit\n    participant Email as Email Service\n\n    Client->>API: POST view request\n    API->>Prisma: Fetch link settings\n    API->>Redis: Check rate limits\n    API->>Prisma: Validate OTP/Token\n    \n    alt Email Protected\n        API->>Email: Send OTP code\n        Client->>API: Submit OTP\n        API->>Prisma: Verify OTP\n    end\n    \n    alt Password Protected\n        API->>API: Decrypt & compare password\n    end\n    \n    alt Agreement Required\n        API->>Prisma: Check agreement response\n    end\n    \n    API->>Prisma: Create/update viewer\n    API->>Prisma: Create view record\n    API->>Redis: Create session token\n    API->>Client: Return document/pages\n```\n\n**Session Management**\n\nView routes create session tokens stored in HTTP-only cookies:\n\n```typescript\n// Session cookie naming convention\n`pm_ls_${linkId}`    // Link session (document views)\n`pm_drs_${linkId}`   // Dataroom session (dataroom views)\n`pm_drs_flag_${...}` // Session flag for dataroom paths\n```\n\nSessions expire after 23 hours and include fingerprinting based on request headers (User-Agent, Accept-Language, etc.) to help detect session sharing.\n\n**On-Demand Page Fetching (`/api/views/pages/route.ts`)**\n\nReturns signed URLs for specific document pages. Clients initially receive 10 pages centered around the requested start page; additional pages are fetched on-demand through this endpoint. Supports both standard view sessions and preview sessions.\n\n### Authentication (`/api/auth/verify-code`)\n\nHandles email-based login verification using time-limited codes.\n\n**Rate Limiting**\n- 5 attempts per email per minute\n- 10 attempts per IP per minute\n\n**Verification Flow**\n1. Client submits email + 10-character code\n2. Atomically fetch and delete the code (prevents race conditions)\n3. Return callback URL on success\n4. Return 401 on invalid/expired code\n\n```typescript\n// Code identifier format in Redis/database\n`otp:${linkId}:${email}`      // OTP verification\n`link-verification:${linkId}:${teamId}:${email}` // Long-term token\n```\n\n### Cron Jobs\n\nAll cron routes verify incoming requests using Upstash QStash signatures when running on Vercel (`VERCEL=1`). This prevents unauthorized job execution.\n\n**Domain Management (`/api/cron/domains`)**\n- Verifies domain ownership daily via DNS checks\n- Sends escalating reminder emails for invalid domains:\n  - Day 1: First reminder\n  - Day 14: Second reminder\n  - Day 28: Final warning\n  - Day 30: Automatic deletion (if no links have views)\n\n```mermaid\nflowchart TD\n    Start[Domain Check] --> Valid{Verified?}\n    Valid -->|Yes| Skip[Log status change]\n    Valid -->|No| Age{Days Invalid?}\n    Age -->|\"< 14\"| Wait[No action]\n    Age -->|14-27| First[Send first reminder]\n    Age -->|28-29| Second[Send second reminder]\n    Age -->|30+| Delete{Has views?}\n    Delete -->|No views| Remove[Delete domain + notify]\n    Delete -->|Has views| Flag[Flag for manual review]\n```\n\n**Dataroom Digests (`/api/cron/dataroom-digest`)**\n- Daily: Processes daily digest emails for datarooms\n- Weekly: Processes weekly digest emails\n- Runs for up to 5 minutes per invocation\n\n**Welcome Email (`/api/cron/welcome-user`)**\n- Triggered via QStash when a new user registers\n- Sends welcome email via Resend\n- Subscribes user to mailing list\n\n**Year in Review (`/api/cron/year-in-review`)**\n- Runs hourly to process year-in-review email queue\n- Generates personalized OG images with user statistics\n\n### Integrations\n\n**Slack OAuth (`/api/integrations/slack/oauth/*`)**\n- `authorize`: Generates Slack installation URL for team\n- `callback`: Handles OAuth callback, exchanges code for tokens, stores encrypted credentials\n\n```typescript\n// State parameter flow\n1. Generate random state string\n2. Store in Redis: `slack:install:state:${state}` → teamId\n3. Redirect to Slack with state\n4. On callback, validate state from Redis\n5. Exchange code for tokens\n6. Store encrypted tokens via installIntegration()\n```\n\n### Webhooks\n\n**Signing Webhooks (`/api/webhooks/signing`)**\n- Receives events from Documenso signing service\n- Handles `DOCUMENT_SIGNED` and `DOCUMENT_COMPLETED` events\n- Updates agreement response status\n- Mirrors signed documents to storage\n\n**Callback Webhooks (`/api/webhooks/callback`)**\n- Receives delivery status callbacks from QStash\n- Records webhook events for audit/debugging\n\n### Utilities\n\n**Open Graph Images (`/api/og/*`)**\n- `route.tsx`: Generic Papermark OG image with title\n- `yir/route.tsx`: Year-in-review personalized OG image with statistics\n\n**Feature Flags (`/api/feature-flags`)**\n- Edge runtime for fast global access\n- Returns team-specific feature flags\n\n**Help Center (`/api/help`)**\n- Proxies to marketing site help articles\n- Supports query parameter filtering\n\n**CSP Reports (`/api/csp-report`)**\n- Receives Content Security Policy violation reports\n- Logs for security monitoring\n\n## Key Patterns\n\n### Rate Limiting\n\nAll public-facing routes implement rate limiting via Redis:\n\n| Route | Limit | Window | Key Pattern |\n|-------|-------|--------|-------------|\n| Verify Code | 5 | 1 minute | `verify_code:{email}` |\n| Verify Code (IP) | 10 | 1 minute | `verify_code:ip:{ip}` |\n| Send OTP | 1 | 30 seconds | `send-otp:{linkId}:{email}` |\n| Send OTP (IP) | 10 | 1 minute | `send-otp:{ip}` |\n| Verify OTP | 10 | 1 minute | `verify-otp:{ip}` |\n| Page Fetch | 60 | 1 minute | `view-pages:{viewId}` |\n\n### Input Validation\n\nRoutes use Zod schemas for request validation:\n\n```typescript\n// Common patterns\nz.string().email()           // Email fields\nz.string().cuid()            // Database IDs\nz.number().int().positive()  // Page numbers\nz.array(z.number())          // Batch operations\n```\n\n### Error Handling\n\nConsistent error response structure:\n\n```typescript\n// Success\nNextResponse.json({ /* data */ }, { status: 200 })\n\n// Validation errors\nNextResponse.json({ error: \"Message\" }, { status: 400 })\n\n// Rate limited\nNextResponse.json({ error: \"Too many attempts\", retryAfter: 60 }, { status: 429 })\n\n// Server errors\nNextResponse.json({ error: \"Internal error\" }, { status: 500 })\n```\n\n### Session Fingerprinting\n\nDataroom sessions include fingerprinting to detect unauthorized sharing:\n\n```typescript\n// Headers collected for fingerprinting\n- x-forwarded-for / x-real-ip\n- user-agent\n- accept-language\n- accept-encoding\n```\n\nFingerprint is hashed and stored with session. Comparison on subsequent requests can flag suspicious activity.\n\n## Security Considerations\n\n### Atomic Operations\n\nLogin code verification uses atomic fetch-and-delete to prevent TOCTOU (time-of-check-time-of-use) race conditions:\n\n```typescript\n// Instead of separate read then delete (race-prone)\nconst code = await getCode(email, code)\nawait deleteCode(email, code)\n\n// Use atomic operation\nconst loginCodeData = await fetchAndDeleteLoginCodeData(email, code)\n```\n\n### Password Handling\n\nPasswords support two formats:\n1. **Hashed**: Using `checkPassword()` for bcrypt comparison\n2. **Encrypted**: For backwards compatibility, using `decryptEncryptedPassword()`\n\n### Block Lists\n\nGlobal block lists override all other access controls. Denied access attempts are reported for security monitoring.\n\n### Cookie Security\n\nSession cookies use strict security settings:\n\n```typescript\n{\n  httpOnly: true,      // No JS access\n  secure: true,        // HTTPS only in production\n  sameSite: \"strict\",  // CSRF protection (dataroom)\n  sameSite: \"lax\",     // CSRF protection (document links)\n  path: \"/\",\n  expires: new Date(expiration)\n}\n```\n\n## Dependencies\n\n### External Services\n- **Upstash Redis**: Rate limiting, session storage\n- **QStash**: Cron job scheduling and verification\n- **Resend**: Email delivery\n- **Vercel Functions**: Edge runtime, `waitUntil` for background tasks\n\n### Internal Libraries\n- **Prisma**: Database ORM\n- **lib/auth**: Session management, fingerprinting, preview sessions\n- **lib/emails**: Email templates and sending\n- **lib/signing**: Agreement and signature handling\n- **lib/tracking**: View recording to analytics\n- **lib/files**: File storage and URL signing","app-app":"# app — app\n\n# Root Layout (`app/layout.tsx`)\n\nThe root layout is the foundation of every page in this Next.js application. In the App Router architecture, this component wraps all other pages and UI, making it the single entry point for the document's HTML structure.\n\n## Purpose\n\nThis module serves three essential functions:\n\n1. **Document Shell** — Provides the `<html>` and `<body>` wrapper that wraps every page in the application\n2. **SEO Metadata** — Configures page title, description, Open Graph tags, and Twitter Card data for search engines and social sharing\n3. **Global Styles** — Imports the application's global CSS stylesheet\n\n## Key Components\n\n### Metadata Configuration\n\nThe `metadata` export tells browsers, search engines, and social platforms how to display and index the site:\n\n```typescript\nexport const metadata: Metadata = {\n  metadataBase: new URL(\"https://www.papermark.com\"),\n  title: \"Papermark | The Open Source DocSend Alternative\",\n  description: data.description,\n  openGraph: { /* social media preview data */ },\n  twitter: { /* Twitter Card data */ },\n};\n```\n\nThis metadata is inherited by all pages unless they export their own `metadata` object to override specific values.\n\n### Font Loading\n\n```typescript\nconst inter = Inter({ subsets: [\"latin\"] });\n```\n\nUses `next/font/google` to load the Inter typeface. This approach is preferred over `<link>` tags because:\n\n- Fonts are automatically self-hosted at build time, eliminating external requests\n- Font files are automatically optimized (subsetting, swapping)\n- Layout shift is prevented through automatic size adjustment\n\n### Global Styles\n\n```typescript\nimport \"@/styles/globals.css\";\n```\n\nThe `@/` alias points to the `src/` directory. All styles defined in `globals.css` apply to every page in the application.\n\n## Robots.txt\n\nLocated at `app/robots.txt`, this file controls which paths search engine crawlers may access:\n\n```\nUser-Agent: *\nDisallow: /register\nDisallow: /verify/\nDisallow: /auth/\nDisallow: /unsubscribe\n```\n\nThese paths are excluded from indexing:\n- `/register` — Registration forms should not be indexed\n- `/verify/` — Email verification flows\n- `/auth/` — Authentication endpoints\n- `/unsubscribe` — Email unsubscribe pages\n\n## Component Signature\n\n```typescript\nexport default function RootLayout({\n  children,\n}: {\n  children: React.ReactNode;\n})\n```\n\nThe `children` prop receives whatever page component matches the current route. Next.js injects the appropriate page content here automatically.\n\n## Relationship to the Rest of the Application\n\nThe root layout is referenced by Next.js automatically — there is no manual import anywhere. The framework expects exactly one layout file at the `app/` directory root to wrap all routes.\n\nEvery page in the `app/` directory (and its subdirectories) renders inside the `<body>` of this layout. Pages can export their own `metadata` objects to customize their title, description, or other head elements while still inheriting the base configuration.\n\n## Customizing Metadata Per Page\n\nIndividual pages can override metadata values:\n\n```typescript\n// app/about/page.tsx\nexport const metadata = {\n  title: \"About Papermark\",\n  description: \"Learn about our mission\",\n};\n\nexport default function AboutPage() { ... }\n```\n\nThe page's metadata will be merged with the root layout's metadata, with page-level values taking precedence.","app-auth":"# app — (auth)\n\n# Auth Module (`app/(auth)`)\n\nThe `(auth)` route group in Papermark handles all authentication-related pages and flows. This module provides user login, registration, email verification, SAML/SSO, invitation acceptance, and email change confirmation.\n\n## Architecture Overview\n\nThe module uses Next.js 14's App Router with a root layout that wraps all auth pages in providers. Client/server component separation is used throughout for optimal performance.\n\n```mermaid\ngraph TB\n    subgraph \"(auth) Module\"\n        Layout[\"layout.tsx<br/>SessionProvider + ThemeProvider + Toaster\"]\n        \n        Login[\"login/<br/>Multi-method auth\"]\n        Register[\"register/<br/>User signup\"]\n        EmailVerify[\"auth/email/<br/>Magic link verification\"]\n        EmailChange[\"auth/confirm-email-change/[token]/<br/>Email change confirmation\"]\n        SAML[\"auth/saml/<br/>SSO callback\"]\n        Invite[\"verify/invitation/<br/>Team invitation\"]\n    end\n    \n    Layout --> Login\n    Layout --> Register\n    Layout --> EmailVerify\n    Layout --> EmailChange\n    Layout --> SAML\n    Layout --> Invite\n    \n    Login -->|\"Magic link\"| EmailVerify\n    Register -->|\"Magic link\"| EmailVerify\n    Login -->|\"SAML SSO\"| SAML\n    EmailChange -.->|\"/account/general\"| Other[\"App Pages\"]\n```\n\n## Root Layout\n\n**`app/(auth)/layout.tsx`** provides the provider wrapper for all auth routes:\n\n```tsx\nexport default function Layout({ children }: { children: React.ReactNode }) {\n  return (\n    <SessionProvider>\n      <ThemeProvider attribute=\"class\" defaultTheme=\"light\" enableSystem>\n        <main>\n          <Toaster closeButton richColors theme=\"system\" />\n          <div>{children}<\/div>\n        <\/main>\n      <\/ThemeProvider>\n    <\/SessionProvider>\n  );\n}\n```\n\n**Providers:**\n\n- `SessionProvider` — NextAuth session context for `useSession()` and `getServerSession()`\n- `ThemeProvider` — Light/dark theme switching\n- `Toaster` — Sonner toast notifications for auth events (success/error feedback)\n\n## Authentication Methods\n\nThe module supports five authentication methods:\n\n| Method | Provider | Flow |\n|--------|----------|------|\n| Email Magic Link | NextAuth `email` provider | POST to `/api/auth/callback/email` with signed token |\n| Google OAuth | NextAuth `google` provider | OAuth 2.0 redirect flow |\n| LinkedIn OAuth | NextAuth `linkedin` provider | OAuth 2.0 redirect flow |\n| Passkey | Hanko Passkeys | WebAuthn/FIDO2 assertion |\n| SAML SSO | Jackson + NextAuth `saml-idp` | IdP-initiated or SP-initiated SSO |\n\n## Login Flow (`app/(auth)/login/`)\n\nThe login page supports all authentication methods with a split-screen layout featuring branding and testimonials.\n\n### Key Features\n\n**1. Magic Link Email Authentication**\n```tsx\nsignIn(\"email\", {\n  email: emailValidation.data,\n  redirect: false,\n  callbackUrl: next,\n}).then((res) => {\n  if (res?.ok && !res?.error) {\n    // Store email for verification page\n    sessionStorage.setItem(\"pendingVerificationEmail\", email);\n    router.push(\"/auth/email\");\n  }\n});\n```\n\nThe email is stored in `sessionStorage` so the verification page can pre-fill it without requiring re-entry.\n\n**2. OAuth Providers**\n```tsx\nsignIn(\"google\", { callbackUrl: next });  // or \"linkedin\"\n```\n\n**3. Passkey Authentication**\n```tsx\nsignInWithPasskey({\n  tenantId: process.env.NEXT_PUBLIC_HANKO_TENANT_ID as string,\n});\n```\n\n**4. SSO Enforcement**\nWhen the `?error=require-saml-sso` query parameter is present, the page displays an alert blocking regular login methods and highlights the SSO button:\n\n```tsx\nconst isSSORequired = authError === \"require-saml-sso\";\n```\n\n**5. Last Used Method Persistence**\nThe `useLastUsed` hook remembers the user's last authentication method and displays a subtle indicator on that button.\n\n## Email Verification Flow (`app/(auth)/auth/email/`)\n\nHandles verification of magic link login codes after the user clicks the link in their email.\n\n### Flow\n\n1. User clicks magic link in email → redirected to `/auth/email?token=xxx`\n2. The `email` param is extracted (via catch-all route `[[...params]]`) or email is retrieved from `sessionStorage`\n3. User enters the 10-character verification code\n4. POST to `/api/auth/verify-code` validates the code\n5. On success, redirect to `callbackUrl` (originally the `next` param from login)\n\n### State Handling\n\n```tsx\nconst [isExpired, setIsExpired] = useState(false);\n// ...\nif (response.status === 410 || data.error?.includes(\"expired\")) {\n  setIsExpired(true);\n  // Show \"Code Expired\" UI with link to request new code\n}\n```\n\nExpired or invalid codes display a dedicated UI with a button to return to login.\n\n## Email Change Confirmation (`app/(auth)/auth/confirm-email-change/[token]/`)\n\nWhen a user requests an email change, they receive a link containing a signed token. This page completes the change.\n\n### Server-Side Verification (`page.tsx`)\n\nThe `VerifyEmailChange` component performs async verification:\n\n```tsx\nconst VerifyEmailChange = async ({ params: { token } }: PageProps) => {\n  // 1. Find token in database\n  const tokenFound = await prisma.verificationToken.findUnique({\n    where: { token: hashToken(token) },\n  });\n  \n  // 2. Check token exists and not expired\n  if (!tokenFound || tokenFound.expires < new Date()) return <NotFound />;\n  \n  // 3. Verify user is logged in as token owner\n  const session = await getSession();\n  if (!session) redirect(`/login?next=/auth/confirm-email-change/${token}`);\n  if (tokenUserId !== currentUserId) return <NotFound />;\n  \n  // 4. Retrieve pending change data from Redis\n  const data = await redis.get(`email-change-request:user:${tokenUserId}`);\n  \n  // 5. Execute the email change\n  await prisma.user.update({ where: { id: tokenUserId }, data: { email: data.newEmail } });\n  \n  // 6. Async cleanup and notifications via waitUntil\n  waitUntil(Promise.all([\n    deleteRequest(tokenFound),  // Remove token + Redis data\n    subscribe(data.newEmail),   // Add new email to mailing list\n    sendEmail({ /* notify old email */ }),  // Confirmation to old email\n  ]));\n  \n  return <ConfirmEmailChangePageClient />;\n};\n```\n\n### Client-Side Session Refresh (`page-client.tsx`)\n\nAfter the email change succeeds, the client component refreshes the session:\n\n```tsx\nuseEffect(() => {\n  if (status !== \"authenticated\") return;\n  \n  async function updateSession() {\n    hasUpdatedSession.current = true;\n    await update();  // Refresh NextAuth session with new email\n    toast.success(\"Email update successful!\");\n    router.replace(\"/account/general\");\n  }\n  \n  updateSession();\n}, [status, update]);\n```\n\nUses a ref (`hasUpdatedSession`) to prevent double-updates during React strict mode.\n\n## SAML/SSO Callback (`app/(auth)/auth/saml/`)\n\nHandles IdP-initiated SSO flows where Jackson (the SAML service) redirects users after processing the SAML response.\n\n### Distinction from SP-Initiated SSO\n\n```tsx\n/**\n * SAML Callback Page\n *\n * This page handles IdP-initiated SSO flow:\n * 1. User clicks the app tile in their IdP dashboard\n * 2. Jackson processes the SAML response and redirects here with a `code`\n * 3. We exchange the code via the `saml-idp` CredentialsProvider\n *\n * SP-initiated SSO (user clicks \"Continue with SSO\" on login page) is handled\n * entirely by NextAuth's OAuth flow via the `saml` provider — it never hits this page.\n */\n```\n\nThe callback expects a `code` query parameter from Jackson:\n\n```tsx\nuseEffect(() => {\n  const code = searchParams?.get(\"code\");\n  if (code) {\n    signIn(\"saml-idp\", { code, redirect: false })\n      .then((result) => {\n        if (result?.ok) {\n          router.push(\"/dashboard\");\n        } else {\n          setStatus(\"error\");\n        }\n      });\n  }\n}, [searchParams, router]);\n```\n\n## Invitation Acceptance (`app/(auth)/verify/invitation/`)\n\nAllows users to accept team invitations via a signed JWT token.\n\n### Token Verification\n\n```tsx\nconst payload = verifyJWT(jwtToken);\n// Returns: { verification_url, teamId, token, email, expiresAt }\n```\n\nThe `verification_url` contains the actual NextAuth callback URL. The JWT is validated server-side before rendering the invitation UI.\n\n### States\n\n| State | UI |\n|-------|-----|\n| Valid invitation | Accept button + expiration warning |\n| Expired | \"Invitation Expired\" message |\n| Revoked | \"Invitation No Longer Available\" message |\n\n### URL Cleanup\n\n`CleanUrlOnExpire` removes the token from the URL after detection:\n\n```tsx\nuseEffect(() => {\n  if (shouldClean && typeof window !== \"undefined\") {\n    const url = new URL(window.location.href);\n    url.search = \"\";\n    window.history.replaceState({}, \"\", url.toString());\n  }\n}, [shouldClean]);\n```\n\nThis prevents token leakage via browser history.\n\n## Invitation Flow (`app/(auth)/verify/page.tsx`)\n\nA legacy redirect page that forwards to the new email verification flow:\n\n```tsx\nexport default async function VerifyPage() {\n  redirect(\"/auth/email\");\n}\n```\n\n## Key Dependencies\n\n| Dependency | Purpose |\n|------------|---------|\n| `next-auth/react` | Session management, OAuth flows |\n| `@teamhanko/passkeys-next-auth-provider` | Passkey/WebAuthn authentication |\n| `sonner` | Toast notifications |\n| `@/lib/prisma` | Database access for tokens/users |\n| `@/lib/redis` | Cache for pending email changes |\n| `@/lib/resend` | Email sending (confirmation, notifications) |\n| `@/ee/features/security/sso` | SSO login component |\n| `date-fns` | Date formatting for invitation expiry |\n\n## Security Considerations\n\n1. **Token Hashing** — Verification tokens are hashed before database lookup\n2. **Session Validation** — Email change requires matching authenticated user\n3. **Redis TTL** — Email change requests expire automatically\n4. **URL Token Cleanup** — Invitation tokens removed from browser history\n5. **waitUntil** — Email notifications sent after response to avoid blocking","app-ee":"# app — (ee)\n\n# Enterprise Edition (EE) API Module\n\nThe `app/(ee)` route group contains enterprise-grade API routes for the Papermark platform. These endpoints power advanced features including AI-powered document Q&A, SAML/SSO authentication, SCIM user provisioning, dataroom freeze/archive functionality, visitor FAQ access, and visitor document uploads.\n\n---\n\n## Feature Areas Overview\n\nThis module is organized into distinct domains, each serving a specific enterprise use case:\n\n| Domain | Route Pattern | Purpose |\n|--------|---------------|---------|\n| **AI Chat** | `/api/ai/chat/*` | Document Q&A with streaming responses |\n| **AI Vector Store** | `/api/ai/store/*` | Document indexing and retrieval |\n| **SAML Auth** | `/api/auth/saml/*` | SSO authentication flows |\n| **SCIM Sync** | `/api/scim/v2.0/*` | Automated user provisioning |\n| **Dataroom Freeze** | `/api/teams/*/datarooms/*/freeze/*` | Immutable archive generation |\n| **FAQs** | `/api/faqs` | Visitor FAQ access |\n| **Link Uploads** | `/api/links/*/upload` | Visitor document submissions |\n\n---\n\n## AI Chat & Vector Store\n\n### Overview\n\nThe AI feature enables users to ask questions about documents and datarooms using natural language. It leverages vector embeddings for semantic search and streams responses in real-time.\n\n### Endpoints\n\n| Method | Path | Purpose |\n|--------|------|---------|\n| `POST` | `/api/ai/chat` | Create a new chat session |\n| `GET` | `/api/ai/chat` | List chats (filtered by user/viewer) |\n| `GET` | `/api/ai/chat/[chatId]` | Get chat details with messages |\n| `DELETE` | `/api/ai/chat/[chatId]` | Delete a chat |\n| `POST` | `/api/ai/chat/[chatId]/messages` | Send message, receive streaming response |\n| `GET` | `/api/ai/store/teams/[teamId]` | Get team vector store info |\n| `POST` | `/api/ai/store/teams/[teamId]/documents/[documentId]` | Index a document |\n| `DELETE` | `/api/ai/store/teams/[teamId]/documents/[documentId]` | Remove document from index |\n| `POST` | `/api/ai/store/teams/[teamId]/datarooms/[dataroomId]` | Index all dataroom documents |\n| `GET` | `/api/ai/store/runs/[runId]` | Poll Trigger.dev run status |\n\n### Authentication Model\n\nThe AI chat system supports dual authentication:\n\n1. **Internal users**: Authenticated via NextAuth session (`getServerSession`)\n2. **External viewers**: Authenticated via dataroom session tokens (`viewerId`, `linkId`, `viewId`)\n\nBoth flows validate:\n- Team membership via `prisma.userTeam`\n- Feature flag enabled (`getFeatureFlags({ teamId })`)\n- Team-level `agentsEnabled` flag\n- Document/dataroom-level `agentsEnabled` flag\n\n### Document Indexing Flow\n\n```mermaid\nsequenceDiagram\n    participant Client\n    participant API\n    participant Prisma\n    participant Trigger.dev\n    participant OpenAI\n\n    Client->>API: POST /api/ai/store/teams/[teamId]/documents/[documentId]\n    API->>Prisma: Verify team membership & feature flags\n    API->>Prisma: Get document with primary version\n    API->>Prisma: Get/create team vector store\n    \n    alt Has fileId (already processed)\n        API->>Trigger.dev: Trigger addFileToVectorStoreTask\n    else Needs processing\n        API->>Trigger.dev: Trigger processDocumentForAITask\n    end\n    \n    Trigger.dev->>OpenAI: Upload to vector store\n    API->>Client: Return runId for polling\n    \n    loop Polling\n        Client->>API: GET /api/ai/store/runs/[runId]\n        API->>Trigger.dev: runs.retrieve(runId)\n        API->>Client: Status update\n    end\n```\n\n### Chat Message Flow\n\n```mermaid\nsequenceDiagram\n    participant Client\n    participant API\n    participant validateChatAccess\n    participant sendMessage\n    participant AI\n\n    Client->>API: POST /api/ai/chat/[chatId]/messages\n    API->>API: Validate request body\n    API->>validateChatAccess: Check user/viewer access\n    API->>Prisma: Get chat with vectorStoreId\n    API->>API: Check feature flags\n    API->>sendMessage: Send to AI with context\n    \n    alt First message (no title)\n        API->>generateChatTitle: Create chat title\n    end\n    \n    sendMessage->>AI: Query vector store + generate response\n    API->>Client: Stream response chunks\n    API->>Client: Send references section\n```\n\n### Supported Content Types\n\nDocument indexing supports: PDF, Excel, JPEG, PNG, WebP (defined in `SUPPORTED_AI_CONTENT_TYPES`).\n\n---\n\n## SAML/SSO Authentication\n\n### Overview\n\nSAML-based Single Sign-On allows enterprise teams to authenticate users through their identity provider (IdP). This module integrates with [Jackson](https://github.com/boxyhq/jackson) for SAML 2.0 handling.\n\n### Endpoints\n\n| Method | Path | Purpose |\n|--------|------|---------|\n| `GET/POST` | `/api/auth/saml/authorize` | Initiate SAML auth flow |\n| `POST` | `/api/auth/saml/callback` | Handle IdP response |\n| `POST` | `/api/auth/saml/token` | Exchange SAML assertion for tokens |\n| `GET` | `/api/auth/saml/userinfo` | Get user info from token |\n| `POST` | `/api/auth/saml/verify` | Check if team has SSO configured |\n\n### Team SAML Endpoints\n\n| Method | Path | Purpose |\n|--------|------|---------|\n| `GET` | `/api/teams/[teamId]/saml` | List SAML connections |\n| `POST` | `/api/teams/[teamId]/saml` | Create SAML connection |\n| `PATCH` | `/api/teams/[teamId]/saml` | Update SSO enforcement |\n| `DELETE` | `/api/teams/[teamId]/saml` | Delete SAML connection |\n\n### SAML Configuration Flow\n\n1. Admin provides metadata (raw XML, URL, or encoded)\n2. System validates and creates connection via Jackson\n3. Domain is extracted from metadata or provided explicitly\n4. SSO can be enforced to require SAML login for team members\n\n### Domain Validation\n\nThe system rejects public email domains (gmail.com, outlook.com, etc.) for SSO configuration. It validates:\n- Domain format with regex\n- Generic domain detection\n- IdP metadata hints (excluding known generic IdP hosts)\n\n### Authentication Flow\n\n```mermaid\nsequenceDiagram\n    participant User\n    participant App\n    participant Jackson\n    participant IdP\n\n    User->>App: GET /api/auth/saml/authorize?teamId=xxx\n    App->>Jackson: oauthController.authorize()\n    Jackson->>IdP: Redirect to IdP\n    IdP->>User: Show login page\n    User->>IdP: Enter credentials\n    IdP->>Jackson: POST /api/auth/saml/callback\n    Jackson->>App: Redirect with SAML response\n    App->>Jackson: oauthController.samlResponse()\n    Jackson->>App: Return tokens\n    App->>User: Session established\n```\n\n---\n\n## SCIM Directory Sync\n\n### Overview\n\nSCIM 2.0 integration automates user provisioning from enterprise identity providers (Azure AD, Okta, etc.) to Papermark. User lifecycle events sync automatically to team memberships.\n\n### Endpoint\n\n| Method | Path | Purpose |\n|--------|------|---------|\n| `GET/POST/PUT/PATCH/DELETE` | `/api/scim/v2.0/[directory]` | SCIM resource operations |\n\n### Supported Events\n\n| Event | Action |\n|-------|--------|\n| `user.created` | Create user, add to team |\n| `user.updated` | Update user attributes; handle activation/deactivation |\n| `user.deleted` | Remove from team |\n| `user.updated` (active=false) | Deactivate user (same as delete) |\n| `group.*` | Logged but no action (future roadmap) |\n\n### Plan Requirements\n\nSCIM requires:\n- Team plan: `datarooms-premium`, `datarooms-unlimited`, or legacy variants\n- Team SSO enabled\n\n### User Lifecycle Handling\n\nThe system handles Azure AD's `active` field normalization (can be boolean or string):\n- `active: true` → Ensure user is on team\n- `active: false` → Remove from team, orphan links to owner\n- No `active` change → Update name/attributes only\n\n### Directory Management\n\n| Method | Path | Purpose |\n|--------|------|---------|\n| `GET` | `/api/teams/[teamId]/directory-sync` | List SCIM directories |\n| `POST` | `/api/teams/[teamId]/directory-sync` | Create directory connection |\n| `DELETE` | `/api/teams/[teamId]/directory-sync` | Delete directory connection |\n\n---\n\n## Dataroom Freeze\n\n### Overview\n\nFreeze creates an immutable snapshot archive of a dataroom at a point in time. This is critical for legal/compliance workflows requiring audit trails.\n\n### Endpoints\n\n| Method | Path | Purpose |\n|--------|------|---------|\n| `POST` | `/api/teams/[teamId]/datarooms/[id]/freeze/send-token` | Send OTP to admin |\n| `POST` | `/api/teams/[teamId]/datarooms/[id]/freeze` | Execute freeze (requires OTP) |\n| `GET` | `/api/teams/[teamId]/datarooms/[id]/freeze/monitor-token` | Get token for monitoring progress |\n| `POST` | `/api/teams/[teamId]/datarooms/[id]/freeze/retry-archive` | Retry failed archive generation |\n| `GET` | `/api/teams/[teamId]/datarooms/[id]/freeze/download` | Get signed download URL |\n\n### Freeze Workflow\n\n```mermaid\nsequenceDiagram\n    participant Admin\n    participant API\n    participant Trigger.dev\n    participant S3\n\n    Admin->>API: POST /freeze/send-token\n    API->>Admin: Email OTP\n\n    Admin->>API: POST /freeze (with OTP)\n    API->>API: Verify OTP, rate limit check\n    API->>Prisma: Set isFrozen=true, archive links\n    API->>Trigger.dev: Trigger dataroomFreezeArchiveTask\n    API->>Admin: Return runId + monitor token\n\n    Trigger.dev->>Trigger.dev: Build folder structure\n    Trigger.dev->>S3: Upload archive\n    Trigger.dev->>Prisma: Store archive URL\n```\n\n### Security Measures\n\n1. **OTP verification**: 6-digit code, 10-minute expiry, 5/min rate limit\n2. **Role requirement**: Only ADMIN and MANAGER can freeze\n3. **Plan gate**: Requires Data Rooms Plus or higher\n4. **Link archival**: All existing links are automatically archived\n\n### Rollback on Failure\n\nIf archive generation fails after the freeze is committed:\n1. Dataroom state is reverted (`isFrozen=false`)\n2. Archived links are restored\n3. Error is returned to client\n\n---\n\n## Visitor FAQ Access\n\n### Endpoint\n\n| Method | Path | Purpose |\n|--------|------|---------|\n| `GET` | `/api/faqs` | List published FAQs for visitors |\n\n### Query Parameters\n\n- `linkId`: Required. The dataroom link ID.\n- `dataroomId`: Required. The dataroom ID.\n- `documentId`: Optional. Filter to specific document's FAQs.\n\n### Visibility Model\n\nFAQs support three visibility modes:\n1. **PUBLIC_DATAROOM**: Visible across the entire dataroom\n2. **PUBLIC_LINK**: Visible only for a specific link\n3. **PUBLIC_DOCUMENT**: Visible only for a specific document\n\nThe API returns FAQs matching any of these conditions.\n\n### Authentication\n\nVisitors must have a valid dataroom session (verified via `verifyDataroomSession`).\n\n---\n\n## Visitor Document Uploads\n\n### Endpoints\n\n| Method | Path | Purpose |\n|--------|------|---------|\n| `GET` | `/api/links/[id]/upload` | List visitor's previous uploads |\n| `POST` | `/api/links/[id]/upload` | Upload a new document |\n\n### Upload Flow\n\n1. Verify dataroom session and link permissions\n2. Validate `enableUpload` is true on link\n3. Create document via `processDocument`\n4. Add to dataroom (respecting folder restrictions)\n5. Track upload in `DocumentUpload` table\n6. Trigger notifications (with debounce/cancellation logic)\n\n### Folder Restrictions\n\n- **No restriction**: Admin selected 0 folders → visitor uploads anywhere valid\n- **Restricted**: Admin selected folders → uploads go to first allowed folder if visitor's choice isn't allowed\n\n### Notification Debouncing\n\nUses cancel-and-retrigger pattern:\n1. Cancel existing pending notifications\n2. Accumulate document IDs from cancelled runs\n3. Trigger new notification with batched uploads\n\n---\n\n## Shared Patterns\n\n### Authentication Helpers\n\nAll routes use consistent authentication patterns:\n\n```typescript\n// Internal users\nconst session = await getServerSession(authOptions);\nconst userId = (session.user as CustomUser).id;\n\n// Verify team membership\nconst userTeam = await prisma.userTeam.findUnique({\n  where: { userId_teamId: { userId, teamId } },\n});\n\n// External viewers\nconst dataroomSession = await verifyDataroomSession(req, linkId, dataroomId);\n```\n\n### Feature Flags\n\nMost enterprise features check:\n1. Team-level feature flags via `getFeatureFlags({ teamId })`\n2. Entity-level enable flags (document.agentsEnabled, dataroom.agentsEnabled)\n3. Team plan restrictions\n\n### Error Responses\n\nRoutes consistently return:\n- `401 Unauthorized`: Missing or invalid authentication\n- `403 Forbidden`: Valid auth but insufficient permissions/plan\n- `404 Not Found`: Resource doesn't exist\n- `500 Internal Server Error`: Unexpected errors\n\n### External Dependencies\n\n| Service | Purpose |\n|---------|---------|\n| **Jackson** | SAML 2.0 SSO, SCIM 2.0 |\n| **Trigger.dev** | Background task processing |\n| **AWS S3** | Document storage, archive files |\n| **Redis** | Rate limiting |\n| **Resend** | Email delivery (freeze OTP) |\n| **Prisma** | Database access |\n| **OpenAI** | Vector embeddings, chat completions |\n\n### Jackson Initialization\n\nThe SAML routes import `jackson` from `@/lib/jackson`, which initializes the Jackson instance with database connection. Routes include workarounds for crypto module bundling:\n\n```typescript\n// Fix tree-shaking of jose crypto primitives\nimport * as jose from \"jose\";\nimport * as openidClient from \"openid-client\";\nvoid [jose, openidClient];\n```\n\n### Rate Limiting\n\nFreeze endpoints implement rate limiting via Redis:\n- OTP sending: 3 requests per minute per user\n- OTP verification: 5 attempts per minute per user\n\n---\n\n## Database Models\n\nKey Prisma models used across this module:\n\n| Model | Usage |\n|-------|-------|\n| `Chat` | AI chat sessions |\n| `Viewer` | External dataroom viewers |\n| `Link` | Shareable dataroom/document links |\n| `Team` | Teams with vectorStoreId, agentsEnabled |\n| `Document` | Documents with agentsEnabled |\n| `Dataroom` | Datarooms with vectorStoreId, isFrozen |\n| `UserTeam` | Team membership with roles |\n| `VerificationToken` | OTP codes for freeze |\n| `DocumentUpload` | Track visitor uploads |\n\n---\n\n## Security Considerations\n\n1. **SSO domain validation**: Prevents misconfiguration with public email domains\n2. **OTP protection**: Freezes require time-limited, rate-limited verification\n3. **Plan gates**: Enterprise features restricted by subscription tier\n4. **Link archival**: Freezing automatically protects by archiving all links\n5. **Data pseudonymization**: SCIM logs use hashed email addresses","app":"# app\n\n# App Module (`app`)\n\nThe `app` module is the root of Papermark's Next.js application, containing all pages, layouts, and API routes. It uses Next.js 14's App Router with route groups for logical separation.\n\n## Sub-Modules\n\n| Module | Purpose |\n|--------|---------|\n| [`app/app`](app/app.md) | Root layout with HTML shell, metadata, and global styles |\n| [`app/(auth)`](app/(auth).md) | Authentication pages: login, register, email verification, SAML/SSO |\n| [`app/(ee)`](app/(ee).md) | Enterprise API routes: AI chat, SCIM provisioning, dataroom freeze |\n| [`app/api`](app/api.md) | Core API endpoints: views, webhooks, integrations, cron jobs |\n\n## How They Connect\n\n```mermaid\nflowchart TB\n    subgraph \"app/app\"\n        RootLayout[\"layout.tsx<br/>Providers + HTML Shell\"]\n    end\n\n    subgraph \"app/(auth)\"\n        AuthPages[\"Login, Register, Verify...\"]\n    end\n\n    subgraph \"app/api\"\n        APIRoutes[\"Views, Webhooks,<br/>Integrations, Cron\"]\n    end\n\n    subgraph \"app/(ee)\"\n        EEAPIs[\"AI Chat, SCIM, SAML,<br/>Dataroom Archive\"]\n    end\n\n    RootLayout --> AuthPages\n    Client --> APIRoutes\n    Client --> EEAPIs\n    ExternalServices --> APIRoutes\n```\n\n## Key Cross-Module Workflows\n\n### Authentication Flow\n1. User visits [`app/(auth)`](app/(auth).md) pages (login, register)\n2. SAML/SSO requests route through [`app/(ee)`](app/(ee).md) → `/api/auth/saml/*`\n3. Session state flows through root layout's providers in [`app/app`](app/app.md)\n\n### Enterprise User Provisioning\n1. SCIM requests hit [`app/(ee)`](app/(ee).md) → `/api/v2.0/directory`\n2. User data persists via internal service calls\n3. Enterprise admins manage via authenticated API routes\n\n### Document View Tracking\n1. View events POST to [`app/api`](app/api.md) → `/api/views-dataroom`\n2. Dataroom session verified through auth utilities\n3. Fingerprint collection identifies returning visitors\n\n### Domain-Based Workflows\n1. Access requests POST to `/api/[entryLinkId]/access`\n2. Workflow engine evaluates conditions (including domain checks)\n3. Domain verification handled via `/api/domains/*` routes\n\n## Architecture Notes\n\n- **Route Groups**: Parentheses `(auth)` and `(ee)` organize routes without affecting URL paths\n- **Provider Pattern**: Auth, theme, and toast providers live in the root layout\n- **Server/Client Separation**: API routes use server components; UI pages mix both\n- **Rate Limiting**: API routes integrate Redis for throttling","components-account":"# components — account\n\n# Account Components Module\n\nThe `components/account` module provides user account management UI components for the application's account settings pages. It handles profile display, avatar uploads, and email subscription preferences.\n\n## Components Overview\n\n```mermaid\ngraph TD\n    AccountHeader --> NavMenu\n    UploadAvatar --> FileUpload\n    UploadAvatar --> Button\n    UpdateMailSubscribe --> Switch\n    \n    GeneralPage[pages/account/general.tsx] --> AccountHeader\n    GeneralPage --> UploadAvatar\n    GeneralPage --> UpdateMailSubscribe\n    \n    SecurityPage[pages/account/security.tsx] --> AccountHeader\n```\n\n## AccountHeader\n\nRenders the page header for account sections with a title, description, and navigation tabs.\n\n**Props:** None (self-contained)\n\n**Features:**\n- Displays \"User Account\" heading with \"Manage your profile\" subtitle\n- Renders `NavMenu` with links to `/account/general` and `/account/security`\n- Responsive spacing that adapts across breakpoints (mb-4 on mobile, mb-12 on large screens)\n\n**Usage:** Imported by both the General and Security account pages to provide consistent page structure.\n\n```tsx\nimport { AccountHeader } from \"@/components/account/account-header\";\n\n// In a page component:\n<AccountHeader />\n```\n\n## UpdateMailSubscribe\n\nA toggle switch component that allows users to opt in or out of product update emails. Uses optimistic updates to provide immediate UI feedback while the request processes.\n\n**Exports:** `UpdateMailSubscribe` (named) and `default` (same component)\n\n**Features:**\n- Optimistic UI updates via `useOptimisticUpdate` hook\n- Toast notifications for loading, success, and error states\n- API calls: `POST /api/user/subscribe` to subscribe, `DELETE /api/user/subscribe` to unsubscribe\n\n**Data shape:**\n\n```ts\n{\n  subscribed: boolean;  // true = subscribed, false = unsubscribed\n}\n```\n\n**Integration:** Calls `useOptimisticUpdate` hook which handles the request lifecycle and toast notifications automatically.\n\n## UploadAvatar\n\nA form component for uploading and updating user profile pictures.\n\n**Props:**\n\n| Prop | Type | Required | Description |\n|------|------|----------|-------------|\n| `title` | `string` | Yes | Card title displayed in header |\n| `description` | `string` | Yes | Card description text |\n| `helpText` | `string \\| ReactNode` | No | Helper text shown in footer |\n| `buttonText` | `string` | No | Button label (defaults to \"Save Changes\") |\n\n**Features:**\n- Integrates with NextAuth session via `useSession`\n- Supports image preview before upload\n- Image processing: resizes to 160×160 pixels, max 2MB file size\n- Automatically updates session after successful upload\n- Uses `convertDataUrlToFile` and `uploadImage` utilities from `@/lib/utils`\n- PATCH request to `/api/account` with the uploaded image URL\n\n**Upload flow:**\n\n```mermaid\nsequenceDiagram\n    User->>UploadAvatar: Select image file\n    UploadAvatar->>FileUpload: Display preview\n    User->>UploadAvatar: Click Save\n    UploadAvatar->>convertDataUrlToFile: Convert to Blob\n    UploadAvatar->>uploadImage: Upload to storage\n    UploadAvatar->>API: PATCH /api/account\n    UploadAvatar->>useSession: Call update()\n    API-->>UploadAvatar: Success\n    UploadAvatar->>User: Show success toast\n```\n\n**Client-side:** Component is marked with `\"use client\"` directive because it uses hooks (`useState`, `useEffect`, `useSession`) and browser APIs.\n\n## Integration with Account Pages\n\n### General Page (`pages/account/general.tsx`)\n\nThe general account page typically renders:\n\n```tsx\nimport { AccountHeader } from \"@/components/account/account-header\";\nimport UploadAvatar from \"@/components/account/upload-avatar\";\nimport UpdateMailSubscribe from \"@/components/account/update-subscription\";\n\nexport default function GeneralPage() {\n  return (\n    <>\n      <AccountHeader />\n      <UploadAvatar\n        title=\"Profile Picture\"\n        description=\"Update your avatar\"\n        helpText=\"JPG, PNG or GIF. Max 2MB.\"\n        buttonText=\"Save Avatar\"\n      />\n      <UpdateMailSubscribe />\n    <\/>\n  );\n}\n```\n\n### Security Page (`pages/account/security.tsx`)\n\nThe security page renders the header with navigation:\n\n```tsx\nimport { AccountHeader } from \"@/components/account/account-header\";\n\nexport default function SecurityPage() {\n  return <AccountHeader />;\n}\n```\n\n## Dependencies\n\n| Component | External Dependencies | Internal Dependencies |\n|-----------|----------------------|----------------------|\n| `AccountHeader` | — | `NavMenu` |\n| `UpdateMailSubscribe` | `useOptimisticUpdate` | `Switch` |\n| `UploadAvatar` | `useSession`, `uploadImage`, `convertDataUrlToFile`, `toast` | `Button`, `Card*`, `FileUpload` |\n\n## API Endpoints Used\n\n| Endpoint | Method | Purpose |\n|----------|--------|---------|\n| `/api/user/subscribe` | POST | Subscribe to emails |\n| `/api/user/subscribe` | DELETE | Unsubscribe from emails |\n| `/api/account` | PATCH | Update profile image |","components-agreements":"# components — agreements\n\n# Agreements Module\n\nThe `components/agreements/` module provides UI components for displaying and managing agreements, including a card component for listing agreements and an embedded editor for authoring signing templates via Documenso.\n\n## Overview\n\n```mermaid\ngraph TB\n    subgraph \"Agreement Card\"\n        AC[AgreementCard] --> ARS[AgreementResponsesSection]\n        AC --> DM[DropdownMenu Actions]\n        AC --> AD[AlertDialog Delete Confirmation]\n    end\n\n    subgraph \"Signing Template Editor\"\n        STA[SigningTemplateAuthoring] --> DEU[EmbedUpdateEnvelope V2]\n    end\n\n    AC --> UAR[useAgreementResponses]\n    AC --> UT[useTeam Context]\n    ARS --> TTS[TimestampTooltip]\n    ARS --> DS[downloadSignedAgreement]\n```\n\n## Components\n\n### AgreementCard\n\nThe primary component for displaying a single agreement within a list or grid. It handles presentation, user interactions, and orchestrates data fetching for signing-related responses.\n\n```typescript\ninterface AgreementCardProps {\n  agreement: AgreementWithLinksCount;\n  onDelete: (id: string) => void;\n  onEdit: (agreement: AgreementWithLinksCount) => void;\n}\n```\n\n**Visual Structure:**\n- Icon badge (FileSignatureIcon for signing agreements, FileTextIcon for standard)\n- Agreement name and last updated timestamp\n- Link count indicator\n- Expand/collapse toggle for signing agreements (shows signed NDAs)\n- Actions dropdown menu\n\n**Key Behaviors:**\n\n| Behavior | Condition | Result |\n|----------|-----------|--------|\n| Disable Edit | `signingProvider === \"DOCUMENSO\"` AND has responses | Tooltip explains why; click prevented |\n| Show Signed Section | `isSigningAgreement === true` AND `isExpanded === true` | Fetches and displays responses |\n| Download Available | `isSigningAgreement === false` | Direct download via API |\n| Delete Confirmation | Always available | Shows AlertDialog with warning about references |\n\n**Action Handlers:**\n\n- **handleDelete**: Calls `PUT /api/teams/${teamId}/agreements/${agreement.id}` to soft-delete, then invokes `onDelete` callback\n- **handleDownload**: Fetches agreement content, extracts filename from `Content-Disposition` header, triggers browser download\n- **handleDownloadResponse**: Builds signed agreement URL via `buildTeamSignedAgreementDownloadUrl()` and initiates download with sanitized filename\n\n**State Management:**\n- `showDeleteDialog`: Controls AlertDialog visibility\n- `isExpanded`: Toggles the signed responses section\n- `agreement` props are stable via `memo()` wrapper\n\n### AgreementResponsesSection\n\nSubcomponent that renders the list of signed NDA responses when expanded. Handles loading, error, and empty states.\n\n```typescript\ninterface AgreementResponsesSectionProps {\n  loading: boolean;\n  error: boolean;\n  responses: AgreementResponseSummary[];\n  onDownload: (response: AgreementResponseSummary) => void | Promise<void>;\n}\n```\n\n**Display Logic:**\n- **Loading**: Shows two skeleton rows\n- **Error**: Shows destructive error message\n- **Empty**: Informational message explaining the flow\n- **Populated**: Table with signer info, source link, timestamps, and download action\n\n**Response Metadata Extraction:**\nThe component normalizes data from potentially inconsistent response shapes:\n\n```\nSigner Label: view.viewerName → view.viewerEmail → signerName → signerEmail → \"Signed before opening link\"\nSource: link.name → \"Link #${last5Chars}\" → \"Unknown link\"\nContext: dataroom.name → document.name → (none)\nSigned At: signedAt → completedAt → createdAt → \"—\"\n```\n\nOrphan responses (signed but not associated with a view) display a distinct message.\n\n### SigningTemplateAuthoring\n\nWraps Documenso's `EmbedUpdateEnvelopeV2` component with project-specific configuration for the signing template editor.\n\n```typescript\ninterface SigningTemplateAuthoringProps {\n  host: string;\n  presignToken: string;\n  externalId?: string | null;\n  envelopeId: string;\n  onEnvelopeSaved: (envelopeId: string) => void;\n}\n```\n\n**Configuration:**\n- **CSS Variables**: Customized to match the application's design system using HSL values\n- **CSS Overrides**: Removes border-radius and shadows for seamless integration\n- **Feature Flags**: Limits functionality to field configuration only, disabling uploads and title editing\n\n**Event Guard:**\nA 3-second guard (`INITIAL_EMBED_EVENT_GUARD_MS`) prevents handling the `onEnvelopeUpdated` event that fires during editor initialization. Only subsequent events (actual saves) trigger the `onEnvelopeSaved` callback.\n\n```typescript\nuseEffect(() => {\n  const timer = window.setTimeout(() => {\n    canHandleEnvelopeUpdatedRef.current = true;\n  }, INITIAL_EMBED_EVENT_GUARD_MS);\n  return () => window.clearTimeout(timer);\n}, []);\n```\n\n## Data Dependencies\n\n| Hook/Function | Source | Purpose |\n|---------------|--------|---------|\n| `useTeam()` | `@/context/team-context` | Access `currentTeam.id` for API calls |\n| `useAgreementResponses(agreementId)` | `@/lib/swr/use-agreement-responses` | Fetch signed response data |\n| `downloadSignedAgreement()` | `@/lib/signing/download` | Handle signed PDF download |\n| `buildTeamSignedAgreementDownloadUrl()` | `@/lib/signing/download` | Construct download URLs |\n\n## API Interactions\n\n| Action | Endpoint | Method |\n|--------|----------|--------|\n| Delete Agreement | `/api/teams/${teamId}/agreements/${agreementId}` | PUT |\n| Download Agreement | `/api/teams/${teamId}/agreements/${agreementId}/download` | POST |\n| Signed Agreement | `/api/teams/${teamId}/agreements/${agreementId}/responses/${responseId}/download` | GET (via URL builder) |\n\n## Usage Example\n\n```tsx\nimport AgreementCard from \"@/components/agreements/agreement-card\";\n\nfunction AgreementList({ agreements, onDelete, onEdit }) {\n  return (\n    <div className=\"space-y-4\">\n      {agreements.map((agreement) => (\n        <AgreementCard\n          key={agreement.id}\n          agreement={agreement}\n          onDelete={onDelete}\n          onEdit={onEdit}\n        />\n      ))}\n    <\/div>\n  );\n}\n```","components-ai-elements":"# components — ai-elements\n\n# AI Elements Components\n\nThe `ai-elements` module provides a composable, headless-style component library for building AI chat interfaces. It handles the full lifecycle of a conversation: message display, branching response navigation, user input with file attachments, and streaming text rendering.\n\n## Overview\n\nThis module is organized into four component groups:\n\n| File | Purpose |\n|------|---------|\n| `conversation.tsx` | Scrollable conversation container with auto-scroll and empty state |\n| `message.tsx` | Message display, streaming responses, branching navigation, attachments |\n| `prompt-input.tsx` | User input form with textarea, attachments, voice, menus |\n| `shimmer.tsx` | Animated shimmer effect for loading states |\n\n## Conversation Components\n\nThe conversation layer provides a sticky-bottom scrolling container that automatically follows new content, similar to a terminal or chat log.\n\n### Conversation\n\n```tsx\n<Conversation className=\"h-[500px]\">\n  <ConversationContent>\n    {/* messages */}\n  <\/ConversationContent>\n  <ConversationScrollButton />\n<\/Conversation>\n```\n\nUses `use-stick-to-bottom` under the hood. The container:\n- Sticks to the bottom on initial load (`initial=\"smooth\"`)\n- Resizes smoothly as content changes\n- Exposes `isAtBottom` and `scrollToBottom` via React Context\n\n### ConversationScrollButton\n\nA floating button that appears when the user scrolls away from the bottom. Clicking it smoothly scrolls back to the latest message.\n\n## Message Components\n\n### Message\n\n```tsx\n<Message from=\"user\">\n  <MessageContent>Hello<\/MessageContent>\n  <MessageActions>\n    <MessageAction tooltip=\"Copy\">...<\/MessageAction>\n  <\/MessageActions>\n<\/Message>\n```\n\nThe `from` prop determines alignment and styling:\n- `user` — Right-aligned, secondary background\n- `assistant` (or any other role) — Left-aligned\n\n### MessageResponse\n\nWraps the `streamdown` library to render streaming AI responses. It's memoized to avoid re-renders as tokens arrive:\n\n```tsx\n<MessageResponse>\n  {streamText}\n<\/MessageResponse>\n```\n\n### Message Branching\n\nWhen an AI response has multiple interpretation branches (e.g., different ways to continue a response), the `MessageBranch*` components handle navigation:\n\n```tsx\n<MessageBranch defaultBranch={0} onBranchChange={(i) => console.log(i)}>\n  <MessageBranchContent>\n    <div>Branch A content<\/div>\n    <div>Branch B content<\/div>\n  <\/MessageBranchContent>\n  <MessageToolbar>\n    <MessageBranchSelector from=\"assistant\">\n      <MessageBranchPrevious />\n      <MessageBranchPage />\n      <MessageBranchNext />\n    <\/MessageBranchSelector>\n  <\/MessageToolbar>\n<\/MessageBranch>\n```\n\nThe context provider tracks `currentBranch`, `totalBranches`, and navigation functions. Branch navigation wraps around (last → first, first → last).\n\n### MessageAttachments\n\n```tsx\n<MessageAttachments>\n  <MessageAttachment data={filePart} onRemove={() => {}} />\n<\/MessageAttachments>\n```\n\nRenders file attachments. Images display as thumbnails; other files show a paperclip icon. The `onRemove` callback is optional.\n\n## Prompt Input Components\n\n### Architecture\n\nThe prompt input supports two modes:\n\n1. **Self-managed mode** — `PromptInput` owns all state locally\n2. **Provider mode** — `PromptInputProvider` lifts state upward for cross-component access\n\n```tsx\n// Self-managed\n<PromptInput onSubmit={handleSubmit}>\n  <PromptInputHeader>\n    <PromptInputAttachments>\n      {(file) => <PromptInputAttachment data={file} />}\n    <\/PromptInputAttachments>\n  <\/PromptInputHeader>\n  <PromptInputBody>\n    <PromptInputTextarea />\n  <\/PromptInputBody>\n  <PromptInputFooter>\n    <PromptInputTools>...<\/PromptInputTools>\n    <PromptInputSubmit />\n  <\/PromptInputFooter>\n<\/PromptInput>\n```\n\n```tsx\n// Provider mode\n<PromptInputProvider initialInput=\"...\">\n  <PromptInput onSubmit={handleSubmit}>...<\/PromptInput>\n  {/* Other components can access via hooks */}\n<\/PromptInputProvider>\n```\n\n### PromptInputProvider\n\nLifts `textInput` and `attachments` state to a context. Useful when child components (like action menus) need to manipulate the input without prop drilling.\n\n### File Handling\n\nFiles are stored as `FileUIPart` objects with generated blob URLs. On submit, blob URLs are converted to data URLs before being passed to `onSubmit`:\n\n```tsx\nonSubmit({ text, files })  // files contain data URLs, not blob URLs\n```\n\nThe `PromptInputAttachments` render prop receives each file and must render `PromptInputAttachment` components.\n\n### Submit Behavior\n\n- **Enter** submits (unless Shift+Enter or IME composition is active)\n- **Backspace** on an empty textarea removes the last attachment\n- **Paste** detects image files and adds them as attachments\n- **Drag-and-drop** works on the form (or document if `globalDrop` is true)\n- Files are validated against `accept`, `maxFiles`, and `maxFileSize` props\n- Error callbacks receive structured error objects with `code` and `message`\n\n### Speech Input\n\n`PromptInputSpeechButton` wraps the Web Speech API. When activated:\n- Listens continuously for speech\n- Appends final transcripts to the textarea\n- Calls `onTranscriptionChange` for external sync\n\n```tsx\n<PromptInputSpeechButton textareaRef={textareaRef} />\n```\n\n## Shimmer\n\n```tsx\n<Shimmer duration={2} spread={2}>\n  Generating response...\n<\/Shimmer>\n```\n\nCreates an animated shimmer effect over text using CSS `background-position` animation and `motion/react`. The `spread` prop scales with text length for consistent visual effect.\n\n## Integration with `ai` SDK\n\nThese components work with the `ai` SDK's `UIMessage` type:\n\n```tsx\nimport type { UIMessage } from \"ai\";\n\n<Message from={message.role as UIMessage[\"role\"]}>\n```\n\nThe `FileUIPart` type from `ai` is used throughout for attachment data structures.\n\n## Component Hierarchy\n\n```\nConversation\n├── ConversationContent\n│   └── [messages]\n│       ├── Message\n│       │   ├── MessageContent\n│       │   │   └── MessageResponse (streaming)\n│       │   ├── MessageAttachments\n│       │   │   └── MessageAttachment\n│       │   ├── MessageActions\n│       │   │   └── MessageAction (with optional Tooltip)\n│       │   └── MessageToolbar\n│       │       ├── MessageBranch\n│       │       │   ├── MessageBranchContent\n│       │       │   └── MessageBranchSelector\n│       │       │       ├── MessageBranchPrevious\n│       │       │       ├── MessageBranchPage\n│       │       │       └── MessageBranchNext\n│       │       └── [other toolbar items]\n│       └── ConversationEmptyState\n└── ConversationScrollButton\n\nPromptInput (or PromptInputProvider > PromptInput)\n├── PromptInputHeader\n│   └── PromptInputAttachments (render prop)\n│       └── PromptInputAttachment\n│           └── PromptInputHoverCard\n├── PromptInputBody\n│   └── PromptInputTextarea\n├── PromptInputFooter\n│   ├── PromptInputTools\n│   │   ├── PromptInputButton\n│   │   ├── PromptInputActionMenu\n│   │   └── PromptInputSpeechButton\n│   └── PromptInputSubmit\n└── PromptInputSelect (model selector)\n```\n\n## Key Patterns\n\n**Context duality**: `usePromptInputAttachments` and `usePromptInputController` work in both provider and non-provider modes by checking provider context first, then falling back to local context.\n\n**Branch navigation**: Wraps around cyclically. The `MessageBranchContext` tracks all branches and exposes navigation callbacks to child components.\n\n**Blob URL lifecycle**: Files are created as blob URLs for preview. On submit, they're converted to data URLs. On removal or unmount, `URL.revokeObjectURL()` is called to prevent memory leaks.","components-analytics":"# components — analytics\n\n# Analytics Components Module\n\nThe `components/analytics` module provides a suite of UI components for displaying analytics data on the dashboard. It handles document views, link analytics, visitor tracking, and time range selection with built-in sorting, pagination, and export functionality.\n\n## Architecture Overview\n\nThe module consists of two categories: a reusable card wrapper and data visualization components. All data-fetching components integrate with the team context and billing system to enforce feature restrictions.\n\n```mermaid\ngraph TB\n    subgraph \"Analytics Module\"\n        AC[AnalyticsCard]\n        DVC[DashboardViewsChart]\n        TR[TimeRangeSelect]\n        DT[DocumentsTable]\n        LT[LinksTable]\n        VT[ViewsTable]\n        VST[VisitorsTable]\n    end\n    \n    subgraph \"External Dependencies\"\n        TeamCtx[useTeam]\n        BillingHook[usePlan]\n        API[/api/analytics]\n    end\n    \n    DT --> TeamCtx\n    LT --> TeamCtx\n    VT --> TeamCtx\n    VST --> TeamCtx\n    TR --> TeamCtx\n    \n    DT --> BillingHook\n    LT --> BillingHook\n    VT --> BillingHook\n    VST --> BillingHook\n    \n    DT --> API\n    LT --> API\n    VT --> API\n    VST --> API\n```\n\n## AnalyticsCard\n\n**File:** `analytics-card.tsx`\n\nA reusable card container that provides consistent styling for analytics sections. It includes a header with a title, optional column headers for tabular data, and an optional icon.\n\n### Props\n\n| Prop | Type | Description |\n|------|------|-------------|\n| `title` | `string` | Card heading text |\n| `icon` | `ReactNode` | Optional icon displayed in the header |\n| `columnHeaders` | `{ label: string; width?: string }[]` | Optional column headers for tables |\n| `children` | `ReactNode` | Card content |\n| `className` | `string` | Additional CSS classes for the card wrapper |\n| `contentClassName` | `string` | Additional CSS classes for the content area |\n\n### Usage Example\n\n```tsx\n<AnalyticsCard\n  title=\"Top Documents\"\n  columnHeaders={[\n    { label: \"Views\", width: \"w-20\" },\n    { label: \"Last Viewed\", width: \"w-32\" }\n  ]}\n>\n  <DocumentsTable startDate={startDate} endDate={endDate} />\n<\/AnalyticsCard>\n```\n\n## DashboardViewsChart\n\n**File:** `dashboard-views-chart.tsx`\n\nA responsive bar chart component that displays document view counts over time. It adapts its display granularity based on the selected time range.\n\n### Props\n\n| Prop | Type | Description |\n|------|------|-------------|\n| `timeRange` | `TimeRange` | One of `\"24h\"`, `\"7d\"`, `\"30d\"`, or `\"custom\"` |\n| `data` | `{ date: string; views: number }[]` | View data points |\n| `startDate` | `Date` | Custom range start date |\n| `endDate` | `Date` | Custom range end date |\n\n### Adaptive Time Grouping\n\nThe chart automatically adjusts aggregation based on the time range:\n\n| Time Range | Aggregation | Display Format |\n|------------|-------------|----------------|\n| `24h` | Hourly slots | `h:mm aa` (e.g., \"3:00 PM\") |\n| `7d` | Daily slots | `EEE, MMM d` (e.g., \"Mon, Jan 15\") |\n| `30d` | Daily slots | `MMM d` (e.g., \"Jan 15\") |\n| `custom` (≤30 days) | Daily slots | `MMM d` |\n| `custom` (31-365 days) | Weekly slots | `MMM d` |\n| `custom` (>365 days) | Monthly slots | `MMM yyyy` |\n\n### Bar Size Calculation\n\nBar width adjusts to maintain readability across different data densities:\n\n```typescript\nconst barSize = useMemo(() => {\n  if (timeRange === \"24h\") return 14;\n  if (timeRange === \"7d\") return 32;\n  if (timeRange === \"30d\") return 16;\n  if (totalDays > 365) return 32;\n  if (totalDays > 30) return 22;\n  return 16;\n}, [...]);\n```\n\n## TimeRangeSelect\n\n**File:** `time-range-select.tsx`\n\nA dropdown component combining preset time ranges with a calendar picker for custom date ranges.\n\n### Time Range Options\n\n| Value | Label | Description |\n|-------|-------|-------------|\n| `\"24h\"` | Last 24 hours | Shows hourly data |\n| `\"7d\"` | Last 7 days | Shows daily data |\n| `\"30d\"` | Last 30 days | Shows daily data |\n| `\"custom\"` | Custom Date | Opens calendar for arbitrary range |\n\n### Props\n\n```typescript\ninterface TimeRangeSelectProps {\n  value: TimeRange;\n  onChange: (value: TimeRange) => void;\n  customRange: CustomRange;\n  setCustomRange: (range: CustomRange) => void;\n  onCustomRangeComplete?: (range: CustomRange) => void;\n  slug: React.MutableRefObject<boolean>;\n  isPremium?: boolean;\n}\n```\n\n### Premium Gating\n\nNon-premium users are restricted to viewing data from the last 30 days. The `isPremium` prop controls:\n\n- Whether the custom date picker is available\n- The `disabled` state for dates beyond 30 days ago in the calendar\n- Display of the upgrade prompt in the dropdown\n\n```typescript\n// Minimum date for non-premium users\nconst minDate = isPremium ? undefined : subDays(new Date(), 30);\n```\n\n## Table Components\n\nAll four table components (`DocumentsTable`, `LinksTable`, `ViewsTable`, `VisitorsTable`) share a common architecture built on TanStack Table.\n\n### Common Features\n\n- **Sorting**: Click column headers to toggle ascending/descending order\n- **Pagination**: Built-in pagination via `DataTablePagination`\n- **Export**: CSV export with paywall for free users\n- **Data Fetching**: SWR-based fetching with `keepPreviousData: true`\n- **Empty States**: Informative messages when no data exists\n\n### DocumentsTable\n\n**File:** `documents-table.tsx`\n\nDisplays analytics for individual documents.\n\n| Column | Description |\n|--------|-------------|\n| Documents | Link to the document with name |\n| Views | Total view count |\n| Avg Duration | Average time spent viewing |\n| Last Viewed | Relative time with UTC/local tooltip |\n\n```typescript\ninterface Document {\n  id: string;\n  name: string;\n  views: number;\n  avgDuration: string;\n  lastViewed: Date | null;\n}\n```\n\n### LinksTable\n\n**File:** `links-table.tsx`\n\nDisplays analytics for shared links.\n\n| Column | Description |\n|--------|-------------|\n| Links | Link name with URL and copy button |\n| Document | Associated document name (linkable) |\n| Views | Total view count |\n| Avg Duration | Average time spent |\n| Last Viewed | Relative time |\n\nThe component includes a `CopyButton` sub-component that copies the URL to clipboard with toast feedback.\n\n### ViewsTable\n\n**File:** `views-table.tsx`\n\nDisplays individual view records with rich metadata.\n\n| Column | Description |\n|--------|-------------|\n| Recent Views | Viewer email with status badges |\n| Document | Document name (linkable) |\n| Link | Link name |\n| Time Spent | Formatted duration |\n| Completion | Gauge showing completion percentage |\n| Last Viewed | Relative timestamp |\n\n**Status Badges** (displayed next to viewer email):\n\n| Badge | Icon | Meaning |\n|-------|------|---------|\n| Verified | `BadgeCheckIcon` | Identity verified |\n| Internal | `BadgeInfoIcon` | Team member |\n| Agreement | `FileBadgeIcon` | Signed agreement |\n| Downloaded | `DownloadCloudIcon` | Downloaded document |\n| Dataroom | `ServerIcon` | Accessed via dataroom |\n| Feedback | `ThumbsUp/DownIcon` | Feedback response |\n\n```typescript\ninterface View {\n  id: string;\n  viewerEmail: string | null;\n  documentName: string;\n  linkName: string;\n  viewedAt: Date;\n  totalDuration: number;\n  completionRate: number;\n  verified?: boolean;\n  internal?: boolean;\n  agreementResponse?: any;\n  downloadedAt?: Date;\n  dataroomId?: string;\n  feedbackResponse?: any;\n}\n```\n\n### VisitorsTable\n\n**File:** `visitors-table.tsx`\n\nDisplays aggregated visitor statistics.\n\n| Column | Description |\n|--------|-------------|\n| Visitor | Avatar, name, verified badge, document count |\n| Total Views | Number of views by this visitor |\n| Total Time Spent | Cumulative time across all views |\n| Last Active | Relative last activity time |\n\n```typescript\ninterface Visitor {\n  email: string;\n  viewerId: string | null;\n  totalViews: number;\n  lastActive: Date;\n  uniqueDocuments: number;\n  verified: boolean;\n  totalDuration: number;\n  viewerName?: string | null;\n}\n```\n\n## Common Patterns\n\n### API Data Fetching\n\nAll table components follow the same SWR pattern:\n\n```typescript\nconst interval = router.query.interval || \"7d\";\nconst { data } = useSWR<DataType>(\n  teamInfo?.currentTeam?.id\n    ? `/api/analytics?type=${type}&interval=${interval}&teamId=${teamInfo.currentTeam.id}${interval === \"custom\" ? `&startDate=${format(startDate, \"MM-dd-yyyy\")}&endDate=${format(endDate, \"MM-dd-yyyy\")}` : \"\"}`\n    : null,\n  fetcher,\n  {\n    keepPreviousData: true,\n    revalidateOnFocus: false,\n  }\n);\n```\n\n### Export Flow\n\nEach table includes an `UpgradeOrExportButton` that conditionally renders either an export button or an upgrade prompt:\n\n```typescript\nconst UpgradeOrExportButton = () => {\n  if (isFree && !isTrial) {\n    return (\n      <UpgradeButton\n        text=\"Export\"\n        clickedPlan={PlanEnum.Pro}\n        trigger=\"dashboard_documents_export\"\n        variant=\"outline\"\n        size=\"sm\"\n      />\n    );\n  }\n  return (\n    <Button variant=\"outline\" size=\"sm\" onClick={handleExport}>\n      <Download className=\"!size-4\" />\n      Export\n    <\/Button>\n  );\n};\n```\n\n### Subscription Paused Warning\n\nWhen a team's subscription is paused, `ViewsTable` and `VisitorsTable` display a warning banner for hidden views:\n\n```tsx\n{isPaused && hiddenFromPause > 0 && (\n  <div className=\"flex ... border-orange-200 bg-orange-50 ...\">\n    <AlertTriangleIcon className=\"inline-block h-4 w-4 text-orange-500\" />\n    {hiddenFromPause} view{hiddenFromPause !== 1 ? \"s\" : \"\"} occurred\n    after your team was paused...\n  <\/div>\n)}\n```\n\n## Integration Points\n\n### Team Context (`useTeam`)\n\nAll table components access the current team ID via `useTeam()` to filter analytics data:\n\n```typescript\nconst teamInfo = useTeam();\nconst teamId = teamInfo?.currentTeam?.id;\n```\n\n### Billing Context (`usePlan`)\n\nThe `usePlan()` hook provides plan status for gating features:\n\n```typescript\nconst { isTrial, isFree, isPaused } = usePlan();\n```\n\n### Upstream Components\n\nThe module is consumed by the dashboard page, which wraps tables in `AnalyticsCard` components:\n\n```tsx\n// In pages/dashboard.tsx\n<AnalyticsCard title=\"Page Views\" icon={<BarChart3 className=\"h-4 w-4\" />}>\n  <DashboardViewsChart timeRange={timeRange} data={viewsData} />\n<\/AnalyticsCard>\n\n<AnalyticsCard\n  title=\"Top Documents\"\n  columnHeaders={[{ label: \"Views\" }, { label: \"Last Viewed\" }]}\n>\n  <DocumentsTable startDate={startDate} endDate={endDate} />\n<\/AnalyticsCard>\n```\n\n### API Endpoint\n\nAll components fetch from `/api/analytics` with query parameters:\n\n| Parameter | Values | Description |\n|-----------|--------|-------------|\n| `type` | `documents`, `links`, `views`, `visitors` | Data type |\n| `interval` | `24h`, `7d`, `30d`, `custom` | Time range |\n| `teamId` | Team UUID | Filter by team |\n| `startDate` | `MM-dd-yyyy` | Custom range start |\n| `endDate` | `MM-dd-yyyy` | Custom range end |","components-billing":"# components — billing\n\n# Billing Components Module\n\nThe `components/billing` module provides a suite of React components for managing subscription billing, plan upgrades, and seat management in Papermark. These components interface with Stripe through backend API routes to handle the full lifecycle of team subscriptions.\n\n## Module Architecture\n\nThe billing module is organized around two primary concerns: **plan upgrades** (new customers or changing plans) and **subscription management** (existing customers modifying their active subscription).\n\n```mermaid\nflowchart TD\n    subgraph \"Entry Points (Triggers)\"\n        AddDocumentModal --> UpgradePlanModal\n        AddDataroomModal --> UpgradePlanModal\n        LinksTable --> UpgradePlanModal\n        NavMain --> UpgradePlanModal\n        BlockingModal --> UpgradePlanModal\n    end\n\n    subgraph \"Core Components\"\n        UpgradePlanModal --> PlanSelector\n        UpgradePlanModal --> FeatureItem\n        UpgradePlanModal --> StartDataRoomTrialButton\n        UpgradePlanModal --> UnlimitedPlanModal\n        UpgradePlanContainer --> CancellationModal\n    end\n\n    subgraph \"Supporting Components\"\n        AddSeatModal\n        ProBanner\n        ProAnnualBanner\n        YearlyUpgradeBanner\n        PlanBadge\n    end\n\n    subgraph \"External Services\"\n        UpgradePlanModal --> StripeClient\n        AddSeatModal --> StripeClient\n    end\n\n    subgraph \"API Routes\"\n        StripeClient -->|POST| billing_manage[\"/api/teams/{id}/billing/manage\"]\n        StripeClient -->|POST| billing_upgrade[\"/api/teams/{id}/billing/upgrade\"]\n    end\n```\n\n## Key Components\n\n### UpgradePlanModal\n\nThe primary upgrade interface, used throughout the application wherever users encounter feature gates. It displays plan comparison cards and handles checkout flows for both new and existing customers.\n\n**Key features:**\n\n- Displays two adjacent plan cards based on the `clickedPlan` prop\n- Supports monthly/yearly toggle with savings display\n- Uses `getPlanFeatures()` from `@/ee/stripe/constants` for plan feature lists\n- Handles two distinct checkout paths:\n  - **Existing customers** → `POST /api/teams/{teamId}/billing/manage` with `upgradePlan: true`\n  - **New customers** → `POST /api/teams/{teamId}/billing/upgrade` for Stripe Checkout session\n- Provides optional `hideItems` prop to exclude specific features from display (useful when upselling around a particular feature gap)\n- Includes inline links to the `UnlimitedPlanModal` for Data Rooms plans\n- Integrates with `StartDataRoomTrialButton` to offer trial access\n\n```tsx\n// Usage from various trigger points in the codebase\n<UpgradePlanModal\n  clickedPlan={PlanEnum.Business}\n  trigger=\"add_document_dropdown\"\n>\n  <Button>Upgrade<\/Button>\n<\/UpgradePlanModal>\n```\n\nThe `trigger` prop is passed to analytics for tracking which upgrade CTAs convert best.\n\n### UpgradePlanContainer\n\nA card-based component for the billing settings page that displays the current plan and provides contextual action buttons based on subscription state:\n\n| State | Actions |\n|-------|---------|\n| Free plan | \"Upgrade\" button |\n| Cancelled | \"Reactivate subscription\" |\n| Paused | \"Unpause subscription\" + \"Cancel\" in menu |\n| Active | \"Cancel subscription\" + \"Change plan\" + billing menu |\n\nThe component fetches billing cycle dates (`startsAt`, `endsAt`) and displays them alongside any applied discounts. It also renders pause/cancellation dates when relevant.\n\n### AddSeatModal\n\nA dialog for adding team seats to an existing subscription. Key behavior:\n\n- Calculates `totalSeatsAfterUpdate` by adding quantity to current `limits.users`\n- Validates against `minQuantity` from the plan's price ID\n- POSTs to `/api/teams/{teamId}/billing/manage` with `addSeat: true` and the target `quantity`\n- Redirects to Stripe's hosted billing portal for the update\n\n```tsx\n// Calculation flow\nconst priceId = getPriceIdFromPlan({ planSlug, isOld, period });\nconst minQuantity = getQuantityFromPriceId(priceId);\nconst totalSeatsAfterUpdate = limits.users + quantity;\n```\n\n### UnlimitedPlanModal\n\nA standalone modal for the \"Data Rooms Unlimited\" plan—designed as a premium option with no user/storage/data room limits. Features:\n\n- Monthly/yearly toggle with 35% savings badge\n- Shows plan features from `getPlanFeatures(PlanEnum.DataRoomsUnlimited, { period })`\n- Checkout flow differs for existing customers vs new (similar pattern to UpgradePlanModal)\n\n### Banner Components\n\nThree banner components display contextual upgrade prompts:\n\n- **ProBanner**: Promotes Business plan upgrade with a single CTA\n- **ProAnnualBanner**: Promotes switching from monthly to yearly Pro (only shows for Pro customers)\n- **YearlyUpgradeBanner**: A floating, animated banner (right side of viewport) showing the next plan tier with yearly pricing and savings\n\nAll banners respect cookie-based dismissal, storing `hideXxxBanner` cookies that persist for 7 days.\n\n## Data Flow\n\n### Checkout Flow (New Customers)\n\n```mermaid\nsequenceDiagram\n    participant UI as UpgradePlanModal\n    participant API as /api/teams/{id}/billing/upgrade\n    participant Stripe as Stripe API\n\n    UI->>API: POST with priceId\n    API->>Stripe: Create Checkout Session\n    Stripe-->>API: sessionId\n    API-->>UI: { id: sessionId }\n    UI->>UI: stripe.redirectToCheckout({ sessionId })\n    Note over UI: User completes payment on Stripe\n```\n\n### Subscription Management (Existing Customers)\n\n```mermaid\nsequenceDiagram\n    participant UI as UpgradePlanContainer/Modal\n    participant API as /api/teams/{id}/billing/manage\n    participant Stripe as Stripe Billing Portal\n\n    UI->>API: POST with type, priceId, upgradePlan, etc.\n    API->>Stripe: Create/Update Subscription or Portal Session\n    API-->>UI: { url }\n
