Both pages use identical layout patterns:\n\n```\n┌─────────────────────────────────────────┐\n│ AppLayout                               │\n│  ┌───────────────────────────────────┐  │\n│  │ Header Section                    │  │\n│  │ - Title (\"All visitors\" / email)  │  │\n│  │ - Description text                │  │\n│  │ - Avatar (detail page only)       │  │\n│  └───────────────────────────────────┘  │\n│  ┌───────────────────────────────────┐  │\n│  │ Separator                         │  │\n│  └───────────────────────────────────┘  │\n│  ┌───────────────────────────────────┐  │\n│  │ Content Section                   │  │\n│  │ - Tabs (list page)                │  │\n│  │ - Search (visitors tab)           │  │\n│  │ - Table (contacts or documents)   │  │\n│  └───────────────────────────────────┘  │\n└─────────────────────────────────────────┘\n```","pages-workflows":"# pages — workflows\n\n# Workflows Pages Module\n\n## Overview\n\nThis module provides the routing layer for the workflows feature using Next.js Pages Router. It consists of three page components that serve as thin wrappers, delegating rendering to feature components located in `@/ee/features/workflows/pages/`.\n\n## File Structure\n\n```\npages/workflows/\n├── [id].tsx    → Dynamic route for individual workflow details\n├── index.tsx   → Route for workflow overview/list\n└── new.tsx     → Route for creating new workflows\n```\n\n## Routes\n\n| Route | File | Component Rendered | Purpose |\n|-------|------|-------------------|---------|\n| `/workflows` | `index.tsx` | `WorkflowOverview` | Display all workflows |\n| `/workflows/new` | `new.tsx` | `WorkflowNew` | Create a new workflow |\n| `/workflows/[id]` | `[id].tsx` | `WorkflowDetail` | View/edit specific workflow |\n\n## Architecture Pattern\n\nThis module follows the **delegation pattern** for Next.js pages:\n\n```mermaid\nflowchart LR\n    subgraph Pages Router\n        A[\"pages/workflows/\"]\n    end\n    \n    subgraph Feature Components\n        B[\"WorkflowOverview\"]\n        C[\"WorkflowNew\"]\n        D[\"WorkflowDetail\"]\n    end\n    \n    A -->|imports & renders| B\n    A -->|imports & renders| C\n    A -->|imports & renders| D\n```\n\nThe pages directory handles:\n- **Route matching** via Next.js file conventions\n- **Dynamic segment extraction** (the `id` parameter in `[id].tsx`)\n- **Component delegation** to the actual feature implementation\n\n## Usage\n\n### Workflow Overview (`/`)\n\nThe root workflows page displays all available workflows and provides navigation to individual workflows or the creation flow.\n\n### Create New Workflow (`/new`)\n\nDisplays the workflow creation interface. After successful creation, users are typically redirected to the detail view of the newly created workflow.\n\n### Workflow Detail (`/[id]`)\n\nUses a dynamic route where `id` corresponds to the workflow's unique identifier. This page handles viewing and potentially editing an existing workflow.\n\n## Relationship to Feature Module\n\nThe pages in this module are intentionally minimal—they exist solely to satisfy Next.js routing requirements. All business logic, UI components, and state management live in the `@/ee/features/workflows/pages/` directory:\n\n```\n@/ee/features/workflows/pages/\n├── WorkflowDetail.tsx\n├── WorkflowOverview.tsx\n└── WorkflowNew.tsx\n```\n\nThis separation allows the feature components to be:\n- Reused outside the pages context if needed\n- Tested independently from routing\n- Developed without modifying route files\n\n## TypeScript\n\nAll files use standard Next.js page component typing. The wrapped components (`WorkflowDetail`, `WorkflowOverview`, `WorkflowNew`) handle all prop and state management internally.","prisma-migrations":"# prisma — migrations\n\n# Prisma Migrations Module\n\n## Overview\n\nThis module contains the database schema migrations for the application, managed by Prisma with PostgreSQL as the underlying database. The migrations define the complete data model for a document sharing and dataroom management platform.\n\nThe schema has evolved through 75+ migrations starting from September 2023, progressively adding features like team management, datarooms, viewer authentication, feedback systems, AI integrations, workflows, and SSO support.\n\n## Core Entities\n\n### Authentication & Users\n\nThe authentication layer uses NextAuth.js-compatible tables:\n\n- **User** — Core user account with email, name, image, and Stripe subscription tracking\n- **Account** — OAuth provider accounts linked to users\n- **Session** — Active user sessions\n- **VerificationToken** — Email verification tokens\n\nUsers belong to Teams via the **UserTeam** junction table, which tracks roles (`ADMIN`, `MANAGER`, `MEMBER`, `DATAROOM_MEMBER`) and membership status.\n\n### Documents\n\nThe document subsystem stores PDFs and other files with versioning:\n\n```mermaid\nerDiagram\n    Document ||--o{ DocumentVersion : has\n    DocumentVersion ||--o{ DocumentPage : contains\n    DocumentPage ||--o{ DocumentAnnotation : has\n    Document ||--o{ Link : shared_via\n    Document ||--o{ View : viewed_in\n```\n\n- **Document** — Main document record with metadata, storage type (S3 or Vercel Blob), and folder assignment\n- **DocumentVersion** — Versioned copies with file references, page counts, and orientation\n- **DocumentPage** — Individual page data with embedded links, metadata, and page links\n- **DocumentAnnotation** — Team annotations on documents with images\n\n### Sharing Links\n\nThe **Link** table is the primary mechanism for sharing documents:\n\n| Feature | Fields |\n|---------|--------|\n| Access Control | `password`, `allowList`, `denyList`, `emailAuthenticated`, `emailProtected` |\n| Security | `enableScreenshotProtection`, `enableWatermark`, `watermarkConfig`, `enableAgreement` |\n| Notifications | `enableNotification`, `enableFeedback`, `enableQuestion` |\n| Customization | `enableCustomMetatag`, `metaTitle`, `metaDescription`, `metaImage`, `metaFavicon`, `showBanner`, `welcomeMessage` |\n| Tracking | `linkType` (`DOCUMENT_LINK`, `DATAROOM_LINK`, `WORKFLOW_LINK`) |\n\nLinks can be organized with **LinkPreset** templates and tagged with **Tag**/**TagItem**.\n\n### Data Rooms\n\n**Datarooms** provide structured document access with folder hierarchies:\n\n```mermaid\nerDiagram\n    Team ||--o{ Dataroom : contains\n    Dataroom ||--o{ DataroomDocument : holds\n    Dataroom ||--o{ DataroomFolder : contains\n    DataroomFolder ||--o| DataroomFolder : parent_folder\n    DataroomDocument ||--o| DataroomFolder : in_folder\n    DataroomDocument }o--|| Document : references\n    Dataroom ||--o| DataroomBrand : has_branding\n    Dataroom ||--o{ Viewer : invited_viewers\n    Dataroom ||--o{ ViewerGroup : has_groups\n    ViewerGroup ||--o{ ViewerGroupMembership : contains\n    ViewerGroup ||--o{ ViewerGroupAccessControls : controls\n```\n\nKey dataroom features:\n- **DataroomBrand** — Customizable branding with logo, banner, colors, welcome message\n- **Viewer management** — Invite viewers, assign to groups with granular permissions\n- **PermissionGroup** / **ViewerGroup** — Control view/download access per item\n- **Introduction pages** and **FAQ items** for viewer guidance\n- **Freeze** capability to archive dataroom state\n\n### Analytics & Views\n\nEvery document or dataroom view is recorded:\n\n- **View** — Tracks viewer, timestamps, page navigation, download activity\n- **Reaction** — Page-level reactions (emoji type per page)\n- **Feedback** / **FeedbackResponse** — Viewer feedback submissions\n- **CustomFieldResponse** — Lead capture form data\n\nViews support `viewType` (`DOCUMENT_VIEW`, `DATAROOM_VIEW`) and track download metadata including `downloadType` (`SINGLE`, `BULK`, `FOLDER`).\n\n### Agreements & E-Signing\n\nDocuments can require agreement before access:\n\n- **Agreement** — Agreement content with signing provider support (legacy or Documenso)\n- **AgreementResponse** — Tracks who agreed and signing status\n\n### Conversations & Q&A\n\nThe system supports contextual conversations tied to documents or datarooms:\n\n```mermaid\nerDiagram\n    Conversation ||--o{ ConversationParticipant : has\n    Conversation ||--o{ ConversationView : tracked_in\n    ConversationParticipant }o--|| User : user\n    ConversationParticipant }o--|| Viewer : viewer\n    ConversationView }o--|| View : in_view\n    Conversation ||--o{ Message : contains\n    Message }o--|| User : sent_by_user\n    Message }o--|| Viewer : sent_by_viewer\n```\n\n- **Conversation** — Thread with visibility modes (`PRIVATE`, `PUBLIC_LINK`, etc.)\n- **Message** — Individual messages from users or viewers\n- **DataroomFaqItem** — Frequently asked questions generated from conversations\n\n### Teams & Organizations\n\n- **Team** — Organization with billing (Stripe), limits (JSONB), SSO configuration\n- **Invitation** — Team invite tokens\n- **Brand** — Organization-wide branding settings\n- **Webhook** — Outbound webhooks for events\n- **SentEmail** — Email history tracking\n\n### AI & Integrations\n\n- **Chat** / **ChatMessage** — AI chat on documents/datarooms using vector stores\n- **Conversation** — AI-powered Q&A context\n- **Integration** / **InstalledIntegration** — Third-party integrations\n- **Webhook** — Event subscriptions\n\n### API & Authentication\n\n- **RestrictedToken** — API tokens with scopes (`apis.all`, `apis.read`)\n- **OAuthClient** — OAuth 2.0 client applications\n- **OAuthClientApproval** — User authorizations for clients\n- **OAuthRecord** — OAuth grant records\n- **IncomingWebhook** — Inbound webhook endpoints\n\n### SSO/SCIM\n\nEnterprise teams support SAML-based SSO via Jackson:\n\n- **jackson_index** — Key mapping for OAuth/SAML\n- **jackson_store** — Encrypted credential storage\n- **jackson_ttl** — Token expiration tracking\n\nTeams have `slug`, `ssoEnabled`, `ssoEmailDomain`, and `ssoEnforcedAt` fields.\n\n### Document Uploads\n\nViewers can upload documents in datarooms:\n\n- **DocumentUpload** — Uploaded file records\n- **PendingDocumentUpload** — Pre-signed upload tokens\n\n### Tasks & Request Lists\n\nDatarooms support task assignment workflows:\n\n- **TaskList** — Grouped task collections\n- **Task** — Individual tasks with status, due dates\n- **TaskAssignment** — Assigned to viewers, groups, links, or emails\n- **TaskActivity** — Audit log of task changes\n\n## Schema Patterns\n\n### Nullable Foreign Keys\n\nMany foreign keys use `ON DELETE SET NULL` allowing soft ownership changes. For example, `Document.ownerId` references `User` but can be null when ownership transfers to teams.\n\n### Soft Deletes\n\nLinks support soft deletion via `deletedAt` timestamp, enabling recovery or audit trails.\n\n### Hierarchical Indexing\n\nDataroom folders use `hierarchicalIndex` (string prefix) for efficient tree queries without recursive CTEs.\n\n### Enums\n\nKey enums in the schema:\n- `Role`: `ADMIN`, `MANAGER`, `MEMBER`, `DATAROOM_MEMBER`\n- `LinkType`: `DOCUMENT_LINK`, `DATAROOM_LINK`, `WORKFLOW_LINK`\n- `ViewType`: `DOCUMENT_VIEW`, `DATAROOM_VIEW`\n- `DownloadType`: `SINGLE`, `BULK`, `FOLDER`\n- `ExecutionStatus`: `PENDING`, `IN_PROGRESS`, `COMPLETED`, `FAILED`, `BLOCKED`\n- `FaqStatus`: `DRAFT`, `PUBLISHED`, `ARCHIVED`\n\n## Relationship Summary\n\n```mermaid\nerDiagram\n    Team ||--o{ UserTeam : has_members\n    UserTeam ||--o| User : member\n    Team ||--o{ Document : documents\n    Team ||--o{ Dataroom : datarooms\n    Team ||--o{ Brand : branding\n    Team ||--o{ LinkPreset : link_templates\n    Team ||--o{ Webhook : webhooks\n    \n    Document ||--o{ DocumentVersion : versions\n    DocumentVersion ||--o{ DocumentPage : pages\n    \n    Dataroom ||--o{ DataroomDocument : documents\n    Dataroom ||--o{ DataroomFolder : folders\n    Dataroom ||--o{ Viewer : viewers\n    Dataroom ||--o{ ViewerGroup : groups\n    \n    Link ||--o{ View : views\n    Link ||--o| Document : shares\n    Link ||--o| Dataroom : shares\n    \n    View ||--o{ Feedback : feedback\n    View ||--o{ Reaction : reactions\n    View ||--o| Viewer : by_viewer\n```\n\n## Migration History Highlights\n\n| Period | Major Features |\n|--------|---------------|\n| 2023 Q4 | Core tables, document versions, datarooms, teams |\n| 2024 Q1-Q2 | View analytics, branding, feedback, reactions |\n| 2024 Q3-Q4 | Folder hierarchies, FAQ, conversations, watermarks |\n| 2025 | SSO/SCIM, workflows, API tokens, OAuth, tasks |\n| 2026 | Advanced layouts, language settings, confidential views |","prisma-prisma":"# prisma — prisma\n\n# Prisma Database Migrations\n\nThis module handles database schema migrations for the Papermark application using Prisma ORM. It provides both manual migration procedures and an automated shell script to synchronize the database schema with changes in `schema.prisma`.\n\n## Overview\n\nPrisma migrations allow you to evolve your database schema over time in a controlled, versioned manner. When you modify the `schema.prisma` file, you need to generate and apply a migration to update your database structure without losing data or creating drift between your schema definition and actual database state.\n\n## Key Components\n\n### `schema.prisma`\n\nThe Prisma schema file defines your database models, relations, and configuration. Changes to this file trigger the need for migrations.\n\n### `migrations/` Directory\n\nContains timestamped migration folders (e.g., `20240408000000_add_model/`) each with a `migration.sql` file that captures the SQL changes to apply.\n\n### `add-migration.sh`\n\nAn automated script that creates a new migration folder, generates the migration SQL diff, and applies the migration in one command.\n\n## Usage\n\n### Automated Migration (Recommended)\n\nUse the `add-migration.sh` script for a streamlined workflow:\n\n```bash\n./add-migration.sh --name <migration_name> --user <database_user>\n```\n\n**Parameters:**\n\n| Parameter | Required | Description |\n|-----------|----------|-------------|\n| `--name` | Yes | Descriptive name for the migration (e.g., `add_user_table`) |\n| `--user` | Yes | PostgreSQL database user for the shadow database connection |\n\n**Example:**\n\n```bash\n./add-migration.sh --name add_user_preferences --user papermark_user\n```\n\nThe script:\n\n1. Generates a timestamped migration name (format: `YYYYMMDD000000_<name>`)\n2. Creates the migration directory under `prisma/migrations/`\n3. Runs `prisma migrate diff` to generate the SQL changes\n4. Executes `prisma migrate resolve --applied` to mark the migration as applied\n\n### Manual Migration Process\n\nFor manual control, follow these steps:\n\n1. **Create the migration folder:**\n\n   ```bash\n   mkdir -p prisma/migrations/YYYYMMDD000000_<migration_name>\n   ```\n\n2. **Generate the migration SQL:**\n\n   ```bash\n   prisma migrate diff \\\n       --from-migrations prisma/migrations \\\n       --to-schema-datamodel prisma/schema.prisma \\\n       --shadow-database-url \"postgresql://<USER>@localhost:5432/papermark-shadow-db\" \\\n       --script > prisma/migrations/YYYYMMDD000000_<migration_name>/migration.sql\n   ```\n\n3. **Apply the migration:**\n\n   ```bash\n   prisma migrate resolve --applied YYYYMMDD000000_<migration_name>\n   ```\n\n## Prerequisites\n\n### 1. Global Prisma Installation\n\nThe migration workflow requires Prisma to be installed globally, not via `npx`:\n\n```bash\nnpm install -g prisma\n```\n\nUsing `npx prisma` will not work correctly for these migration operations.\n\n### 2. Shadow Database\n\nA shadow database is required for Prisma Migrate to detect schema differences. This must be a separate database instance to prevent accidental data loss during migration generation.\n\n**Connection format:**\n\n```\npostgresql://<USER>@localhost:5432/papermark-shadow-db\n```\n\nEnsure the shadow database is accessible and separate from your primary development database.\n\n## Understanding Migration Drift\n\nWhen Prisma reports \"Drift detected,\" it means your database schema has diverged from the migration history. This can occur when:\n\n- Manual database changes were made outside of Prisma migrations\n- A previous migration failed mid-execution\n- The migration history table became corrupted\n\nThe `add-migration.sh` script uses `prisma migrate diff` with the `--from-migrations` flag, which compares against your recorded migration history rather than assuming the database is in sync.\n\n## Error Handling\n\nThe script validates required parameters and exits with descriptive error messages:\n\n- Missing `--name`: Prompts with usage instructions\n- Missing `--user`: Prompts with usage instructions\n- Directory creation failure: Reports failure and exits\n- Migration generation failure: Reports failure and exits\n- Migration application failure: Reports failure and exits\n\n## Relationship to Schema Changes\n\nThis module is the bridge between code changes in `schema.prisma` and database schema updates. Any time you add, modify, or remove models, fields, relations, or enums in the schema file, you must run a migration to apply those changes to the actual database.","prisma-schema":"# prisma — schema\n\n# Prisma Schema — Document Sharing Platform\n\nThis Prisma schema defines the data model for Papermark, a document sharing and collaboration platform. The schema supports multi-tenant document management, secure link sharing, viewer tracking, datarooms, AI-powered chat, conversation threads, and task/request list workflows.\n\n## Architecture Overview\n\nThe schema is organized into logical feature domains, each in its own file:\n\n| File | Purpose |\n|------|---------|\n| `schema.prisma` | Core models: User, Team, View, Viewer, Chat |\n| `team.prisma` | Team membership and roles |\n| `document.prisma` | Document storage and versioning |\n| `link.prisma` | Link sharing and presets |\n| `dataroom.prisma` | Virtual data rooms with folders, branding, and request lists |\n| `conversation.prisma` | Threaded conversations and FAQ system |\n| `annotation.prisma` | Document annotations with attached images |\n| `workflow.prisma` | Email routing based on visitor attributes |\n| `notification.prisma` | User notification preferences |\n| `oauth.prisma` | OAuth 2.0 client and token management |\n| `integration.prisma` | Third-party integration registry |\n| `jackson.prisma` | SAML/SCIM tables (managed by BoxyHQ Jackson) |\n\n## Core Entities\n\n### Team\n\n`Team` is the top-level tenant. All resources belong to a team:\n\n```prisma\nmodel Team {\n  id            String    @id @default(cuid())\n  name          String\n  slug          String?   @unique  // For SSO login (e.g., \"acme\")\n  plan          String    @default(\"free\")\n  stripeId      String?   @unique\n  ssoEnabled    Boolean   @default(false)\n  ssoEmailDomain String?  @unique  // Enforced SSO domain\n  // ... relations to documents, users, datarooms, links, etc.\n}\n```\n\n### User\n\n`User` represents internal team members. Authentication is handled via NextAuth (`Account`, `Session`, `VerificationToken`).\n\n```prisma\nmodel User {\n  id             String    @id @default(cuid())\n  email          String?   @unique\n  teams          UserTeam[]\n  documents      Document[]\n  restrictedTokens RestrictedToken[]  // API keys\n  // ... per-feature relations\n}\n```\n\n### Viewer\n\n`Viewer` represents external visitors who access shared links:\n\n```prisma\nmodel Viewer {\n  id        String   @id @default(cuid())\n  email     String\n  dataroomId String?  // Optionally scoped to a dataroom\n  teamId    String\n  views     View[]\n  groups    ViewerGroupMembership[]\n  // ... per-feature relations\n}\n```\n\nThe unique constraint `@@unique([teamId, email])` prevents duplicate viewer records across a team.\n\n## Document Storage\n\n```mermaid\nerDiagram\nDocument ||--o{ DocumentVersion : \"versions\"\nDocumentVersion ||--o{ DocumentPage : \"pages\"\nDocument ||--o{ Folder : \"folder\"\nFolder ||--o{ Folder : \"childFolders\"\nDocument ||--o{ DocumentUpload : \"uploads\"\n```\n\n### Document Model\n\n```prisma\nmodel Document {\n  id                   String    @id @default(cuid())\n  name                 String\n  file                 String    // S3/blob URL\n  originalFile         String?   // Original format (pptx, xlsx)\n  contentType          String?   // MIME type\n  storageType          DocumentStorageType @default(VERCEL_BLOB)\n  numPages             Int?\n  ownerId              String?\n  owner                User?     @relation(...)\n  teamId               String\n  folderId             String?\n  folder               Folder?   @relation(...)\n  versions             DocumentVersion[]\n  datarooms            DataroomDocument[]\n  annotations          DocumentAnnotation[]\n  tags                 TagItem[]\n}\n```\n\n### Version Control\n\n`DocumentVersion` stores versioned file variants:\n\n```prisma\nmodel DocumentVersion {\n  id                String    @id @default(cuid())\n  versionNumber     Int\n  documentId        String\n  file              String\n  isPrimary         Boolean   @default(false)\n  vectorStoreFileId String?   // For AI search\n  pages             DocumentPage[]\n  hasPages          Boolean   @default(false)\n}\n```\n\nUnique constraint `@@unique([versionNumber, documentId])` ensures sequential versioning.\n\n### Folder Structure\n\nFolders use materialized paths for hierarchical queries:\n\n```prisma\nmodel Folder {\n  path       String  // e.g., \"/sales/q4/proposals\"\n  parentId   String?\n  documents  Document[]\n  childFolders Folder[] @relation(\"SubFolders\")\n}\n```\n\nUnique constraint `@@unique([teamId, path])` enforces path uniqueness per team.\n\n## Link Sharing\n\nLinks are the primary mechanism for sharing documents and datarooms:\n\n```prisma\nmodel Link {\n  id          String    @id @default(cuid())\n  linkType    LinkType  @default(DOCUMENT_LINK)\n  documentId  String?\n  dataroomId  String?\n  url         String?   @unique  // Generated shareable URL\n  slug        String?   // Pretty URL slug\n  domainId    String?\n  domain      Domain?   @relation(...)\n  domainSlug  String?   // Persisted even if domain deleted\n  \n  // Access control\n  password          String?\n  allowList         String[]\n  denyList          String[]\n  emailProtected    Boolean  @default(true)\n  \n  // Features\n  enableWatermark   Boolean  @default(false)\n  watermarkConfig   Json?\n  enableAgreement   Boolean  @default(false)\n  enableConversation Boolean @default(false)\n  enableAIAgents    Boolean?\n  \n  // Group-based access\n  audienceType      LinkAudienceType @default(GENERAL)\n  groupId           String?\n  group             ViewerGroup?     @relation(...)\n  \n  // Granular permissions\n  permissionGroupId String?\n  permissionGroup   PermissionGroup? @relation(...)\n  \n  views      View[]\n  conversations Conversation[]\n  teamId     String?\n  team       Team?   @relation(...)\n}\n```\n\n### Link Presets\n\n`LinkPreset` allows teams to define reusable link configurations:\n\n```prisma\nmodel LinkPreset {\n  name            String\n  teamId          String\n  isDefault       Boolean @default(false)\n  // All the same fields as Link for defaults\n  enableWatermark Boolean? @default(false)\n  watermarkConfig Json?\n  // ... etc\n}\n```\n\n## Datarooms\n\nDatarooms are virtual data rooms that aggregate multiple documents:\n\n```mermaid\nerDiagram\nDataroom ||--o{ DataroomDocument : \"documents\"\nDataroom ||--o{ DataroomFolder : \"folders\"\nDataroomFolder ||--o{ DataroomFolder : \"childFolders\"\nDataroomFolder ||--o{ DataroomDocument : \"documents\"\nDataroom ||--o{ ViewerGroup : \"viewerGroups\"\nDataroom ||--o{ DataroomBrand : \"brand\"\nDataroom ||--o{ Link : \"links\"\n```\n\n### Dataroom Model\n\n```prisma\nmodel Dataroom {\n  id           String  @id @default(cuid())\n  pId          String  @unique  // Public ID: \"dr_1234\"\n  name         String\n  internalName String?  // Private alias\n  \n  // Features\n  conversationsEnabled Boolean @default(false)\n  faqEnabled           Boolean  // via faqItems relation\n  agentsEnabled        Boolean @default(false)\n  requestListEnabled   Boolean @default(false)\n  allowBulkDownload    Boolean @default(true)\n  \n  // Display\n  introductionEnabled  Boolean @default(false)\n  introductionContent  Json?   // TipTap JSON\n  showLastUpdated      Boolean @default(true)\n  \n  // Frozen state\n  isFrozen             Boolean @default(false)\n  frozenAt             DateTime?\n  freezeArchiveUrl     String?\n  \n  // Default strategies\n  defaultPermissionStrategy     DefaultPermissionStrategy @default(INHERIT_FROM_PARENT)\n  defaultGroupPermissionStrategy DefaultPermissionStrategy @default(INHERIT_FROM_PARENT)\n  defaultShowBanner             Boolean @default(true)\n  \n  teamId      String\n  documents   DataroomDocument[]\n  folders     DataroomFolder[]\n  links       Link[]\n  viewers     Viewer[]\n  viewerGroups ViewerGroup[]\n  brand       DataroomBrand?\n  taskLists   TaskList[]\n  faqItems    DataroomFaqItem[]\n  chats       Chat[]\n}\n```\n\n### Permission Strategy\n\nThe `DefaultPermissionStrategy` enum controls how new documents are scoped:\n\n```prisma\nenum DefaultPermissionStrategy {\n  INHERIT_FROM_PARENT  // New items inherit parent permissions\n  ASK_EVERY_TIME       // Require explicit permission assignment\n  HIDDEN_BY_DEFAULT    // New items hidden until explicitly made visible\n}\n```\n\n### Dataroom Branding\n\n```prisma\nmodel DataroomBrand {\n  logo                          String?\n  banner                        String?\n  brandColor                    String?\n  accentColor                   String?\n  accentButtonColor             String?\n  \n  // Layout\n  cardLayout            String  @default(\"LIST\")\n  showFolderTree        Boolean @default(true)\n  viewerLayoutPreset    String  @default(\"STANDARD\")\n  viewerHeaderStyle     String  @default(\"DEFAULT\")\n  \n  // Custom link preview (OG tags)\n  customLinkPreviewEnabled Boolean @default(false)\n  linkPreviewTitle         String?\n  linkPreviewImage         String?\n  \n  // Language override\n  defaultLanguage String @default(\"en\")  // BCP-47\n  \n  dataroomId String @unique\n  dataroom   Dataroom @relation(...)\n}\n```\n\n## View Tracking\n\n`View` records each document/dataroom access:\n\n```prisma\nmodel View {\n  id           String    @id @default(cuid())\n  linkId       String\n  link         Link      @relation(...)\n  documentId   String?\n  dataroomId   String?\n  viewerEmail  String?\n  viewerName   String?\n  verified     Boolean   @default(false)\n  viewedAt     DateTime  @default(now())\n  downloadedAt DateTime?\n  downloadType DownloadType?  // SINGLE, BULK, FOLDER\n  viewType     ViewType @default(DOCUMENT_VIEW)\n  viewerId     String?\n  viewer       Viewer?   @relation(...)\n  groupId      String?\n  group        ViewerGroup? @relation(...)\n  \n  // Responses\n  feedbackResponse    FeedbackResponse?\n  agreementResponse   AgreementResponse?\n  customFieldResponse CustomFieldResponse?\n  \n  // Relations\n  reactions      Reaction[]\n  messages       Message[]\n  taskActivities TaskActivity[]\n  uploadedDocuments DocumentUpload[]\n}\n```\n\n## Access Control\n\n### Viewer Groups\n\nViewer groups manage permissions for sets of viewers:\n\n```prisma\nmodel ViewerGroup {\n  id        String  @id @default(cuid())\n  name      String\n  domains   String[]  // Allowed email domains\n  allowAll  Boolean @default(false)  // Accept any email\n  \n  dataroomId String\n  teamId     String\n  \n  accessControls ViewerGroupAccessControls[]\n  members        ViewerGroupMembership[]\n  links          Link[]\n}\n\nmodel ViewerGroupAccessControls {\n  itemId   String\n  itemType ItemType  // DATAROOM_DOCUMENT, DATAROOM_FOLDER\n  canView     Boolean @default(true)\n  canDownload Boolean @default(false)\n}\n```\n\n### Permission Groups\n\nFor link-level permissions:\n\n```prisma\nmodel PermissionGroup {\n  dataroomId String\n  accessControls PermissionGroupAccessControls[]\n  links       Link[]\n}\n\nmodel PermissionGroupAccessControls {\n  itemId   String\n  itemType ItemType\n  canView             Boolean @default(true)\n  canDownload         Boolean @default(false)\n  canDownloadOriginal Boolean @default(false)\n}\n```\n\n## Conversations & FAQ\n\n### Threaded Conversations\n\n```prisma\nmodel Conversation {\n  visibilityMode ConversationVisibility @default(PRIVATE)\n  // PUBLIC_LINK, PUBLIC_GROUP, PUBLIC_DOCUMENT, PUBLIC_DATAROOM\n  \n  dataroomId          String\n  dataroomDocumentId  String?  // Optional document context\n  documentPageNumber  Int?\n  linkId              String?\n  viewerGroupId       String?\n  \n  participants ConversationParticipant[]\n  messages     Message[]\n  views        ConversationView[]  // All views that accessed this conversation\n}\n\nmodel ConversationParticipant {\n  role ParticipantRole @default(PARTICIPANT)\n  viewerId String?\n  userId   String?\n  receiveNotifications Boolean @default(false)\n}\n\nmodel Message {\n  content       String\n  conversationId String\n  userId        String?  // Team member sender\n  viewerId      String?  // Visitor sender\n  viewId        String?  // Context of where message was sent\n  isRead        Boolean  @default(false)\n}\n```\n\n### FAQ System\n\nConversations can be published as FAQs:\n\n```prisma\nmodel DataroomFaqItem {\n  editedQuestion   String\n  originalQuestion String?\n  answer           String\n  \n  dataroomId       String\n  linkId           String?  // Optional link-specific FAQ\n  dataroomDocumentId String?\n  \n  sourceConversationId String?\n  questionMessageId    String?  @relation(\"FAQQuestionMessage\")\n  answerMessageId      String?  @relation(\"FAQAnswerMessage\")\n  \n  visibilityMode FaqVisibility @default(PUBLIC_DATAROOM)\n  status         FaqStatus     @default(PUBLISHED)\n  isAnonymized   Boolean       @default(true)\n  \n  viewCount      Int @default(0)\n  tags           String[] @default([])\n}\n```\n\n## AI Chat\n\n```prisma\nmodel Chat {\n  title       String?\n  teamId      String\n  \n  // Context (exactly one set)\n  documentId  String?\n  dataroomId  String?\n  linkId      String?\n  viewId      String?\n  \n  // Participants\n  userId      String?\n  viewerId    String?\n  \n  vectorStoreId String?  // OpenAI vector store for RAG\n  messages      ChatMessage[]\n  lastMessageAt DateTime?\n}\n\nmodel ChatMessage {\n  chatId   String\n  role     String  // \"user\", \"assistant\", \"system\"\n  content  String  @db.Text\n  metadata Json?   // Sources, page numbers, etc.\n}\n```\n\n## Task System (Request Lists)\n\nThe task system allows dataroom owners to request actions from viewers:\n\n```mermaid\nerDiagram\nTaskList ||--o{ Task : \"tasks\"\nTask ||--o{ TaskAssignment : \"assignments\"\nTask ||--o{ TaskActivity : \"activities\"\nTaskAssignment }o--|| Viewer : \"viewer\"\nTaskAssignment }o--|| ViewerGroup : \"group\"\nTaskAssignment }o--|| Link : \"link\"\n```\n\n### Models\n\n```prisma\nmodel TaskList {\n  name       String\n  orderIndex Int?\n  dataroomId String\n  tasks      Task[]\n}\n\nmodel Task {\n  title       String\n  type        String  @default(\"TODO\")  // TODO, UPLOAD, ACKNOWLEDGE\n  status      String  @default(\"OPEN\")  // OPEN, IN_PROGRESS, SUBMITTED, COMPLETED\n  category    String?  // \"Financial\", \"Tax\", etc.\n  dueDate     DateTime?\n  orderIndex  Int?\n  \n  taskListId String\n  dataroomId String\n  assignments TaskAssignment[]\n  activities  TaskActivity[]\n}\n\nmodel TaskAssignment {\n  // Exactly one of these is set\n  viewerId String?\n  groupId  String?\n  linkId   String?\n  email    String?\n  \n  notifiedAt     DateTime?\n  lastReminderAt DateTime?\n}\n\nmodel TaskActivity {\n  type       String  // CREATED, ASSIGNED, STATUS_CHANGED, COMMENT\n  comment    String?\n  fromStatus String?\n  toStatus   String?\n  \n  // Actor\n  userId   String?\n  viewerId String?\n  viewId   String?\n}\n```\n\n## Document Annotations\n\n```prisma\nmodel DocumentAnnotation {\n  title       String\n  content     Json   // TipTap/ProseMirror JSON\n  pages       Int[]  // Affected page numbers\n  \n  documentId  String\n  teamId      String\n  createdById String\n  isVisible   Boolean @default(true)  // Admin toggle\n  \n  images      AnnotationImage[]\n}\n\nmodel AnnotationImage {\n  filename String\n  url      String\n  size     Int?\n  mimeType String?\n  \n  annotationId String\n}\n```\n\n## Workflows\n\nWorkflows route visitors to different links based on email/domain rules:\n\n```prisma\nmodel Workflow {\n  entryLinkId String @unique\n  isActive    Boolean @default(true)\n  steps       WorkflowStep[]\n  executions  WorkflowExecution[]\n}\n\nmodel WorkflowStep {\n  stepOrder  Int\n  stepType   WorkflowStepType @default(ROUTER)\n  conditions Json   // Array of conditions\n  actions    Json   // Array of actions\n}\n\nmodel WorkflowExecution {\n  visitorEmail String?\n  visitorIp    String?\n  status       ExecutionStatus\n  result       Json?  // Target link\n  stepLogs     WorkflowStepLog[]\n}\n```\n\n## API Keys\n\n```prisma\nmodel RestrictedToken {\n  name        String\n  hashedKey   String    @unique\n  partialKey  String    // First 8 chars for display\n  scopes      String?   // \"apis.all\" or granular\n  mode        String    @default(\"live\")  // \"live\" | \"test\"\n  source      String    @default(\"dashboard\")  // \"dashboard\" | \"oauth\"\n  subjectType String    @default(\"user\")  // \"user\" | \"machine\"\n  clientId    String?   // OAuth client reference\n  expires     DateTime?\n  lastUsed    DateTime?\n  rateLimit   Int       @default(60)  // per minute\n  \n  userId      String\n  teamId      String\n}\n```\n\n## Indexes\n\nThe schema relies heavily on indexes for query performance:\n\n```prisma\n// Common patterns:\n// Team-scoped lookups\n@@index([teamId])\n\n// Foreign key joins\n@@index([documentId])\n@@index([linkId])\n@@index([viewerId])\n\n// Time-series queries\n@@index([viewedAt(sort: Desc)])\n\n// Partial/composite indexes\n@@index([documentId, isArchived])\n@@index([viewerId, documentId])\n@@index([teamId, hiddenInAllDocuments])\n```\n\n## Key Design Patterns\n\n### 1. Soft Deletes\n\nLinks use a `deletedAt` timestamp for soft deletion:\n\n```prisma\nmodel Link {\n  deletedAt DateTime?\n  // Filter with: where: { deletedAt: null }\n}\n```\n\n### 2. Denormalized Path Storage\n\nFolder paths are materialized (stored explicitly) for efficient tree queries without recursive CTEs:\n\n```prisma\nmodel Folder {\n  path     String  // \"/sales/q4/proposals\"\n  parentId String?\n}\n```\n\n### 3. JSON for Flexible Data\n\nSeveral fields use `Json` type for schema flexibility:\n\n```prisma\nmodel DocumentPage {\n  pageLinks Json?   // [{href, coords}]\n  metadata  Json?   // {originalWidth, scaledWidth, scaleFactor}\n}\n```\n\n### 4. Polymorphic Relations\n\nSome relations use `itemType` discriminator for polymorphic associations:\n\n```prisma\nmodel TagItem {\n  itemType TagType  // LINK_TAG, DOCUMENT_TAG, DATAROOM_TAG\n  linkId   String?\n  documentId String?\n  dataroomId String?\n}\n```\n\n### 5. Separate Permission Strategies\n\nDatarooms maintain separate permission strategies for link-level (`defaultPermissionStrategy`) and group-level (`defaultGroupPermissionStrategy`) access, allowing different defaults for each access path.","prisma":"# prisma\n\n# Prisma Database Migrations\n\nThis module group manages database schema evolution for Papermark using Prisma ORM with PostgreSQL.\n\n## How the Sub-Modules Fit Together\n\nThe prisma module operates as a two-layer system:\n\n1. **[Schema Definition](prisma-schema.md)** — Defines *what* the database should look like across multiple domain-specific files (`schema.prisma`, `team.prisma`, `document.prisma`, `link.prisma`, `dataroom.prisma`, `conversation.prisma`)\n2. **[Migrations](prisma-migrations.md)** — Contains the SQL scripts that *apply* those changes to the live database\n\n```mermaid\nflow LR\n    A[schema.prisma<br/>domain files] --> B[Migration Files]\n    B --> C[(PostgreSQL<br/>Database)]\n```\n\nWhen you modify any schema file, Prisma generates a new migration. That migration becomes part of the versioned history in the `migrations` folder, ensuring every schema change is tracked and can be reproduced.\n\n## Key Workflow\n\n**Development cycle:**\n\n1. Modify a schema file (e.g., add a field to `document.prisma`)\n2. Run `prisma migrate dev` — Prisma compares your schema against the current database state\n3. Prisma generates a new timestamped migration file with the necessary SQL\n4. Apply migrations in staging/production with `prisma migrate deploy`\n\n## Core Entities\n\nThe schema defines the complete data model for Papermark's document sharing platform:\n\n- **Users & Teams** — User accounts, OAuth accounts, team membership with roles\n- **Documents** — Document storage, versioning, and storage configuration\n- **Views & Viewers** — Tracking for document views with authentication options\n- **Links** — Sharing links with presets, password protection, and expiration\n- **Datarooms** — Virtual data rooms with folders, branding, and request lists\n- **Conversations** — Chat threads attached to documents or datarooms\n- **Workflows** — Task and request management with automation triggers\n\n## Related Modules\n\n- [Schema Definition](prisma-schema.md) — Domain-organized schema files\n- [Migrations](prisma-migrations.md) — Versioned migration history (75+ migrations since 2023)","root":"# Root\n\n# Root Module\n\nThe root module contains the foundational configuration files that bootstrap the Papermark application. These files control how Next.js handles requests, configures the build pipeline, manages dependencies, and sets up the development environment.\n\n## Overview\n\nPapermark is a Next.js application that uses a layered configuration approach:\n\n```\n┌─────────────────────────────────────────────────────────────┐\n│                     Vercel Edge Layer                        │\n│                   (middleware.ts)                            │\n├─────────────────────────────────────────────────────────────┤\n│                   Next.js Application                        │\n│            (next.config.mjs, pages, app/)                    │\n├─────────────────────────────────────────────────────────────┤\n│                   Build Configuration                        │\n│     (package.json, tsconfig.json, tailwind.config.js)        │\n└─────────────────────────────────────────────────────────────┘\n```\n\n## Request Routing Flow\n\nThe `middleware.ts` file intercepts all incoming requests and routes them based on the request path and host header:\n\n```mermaid\nflowchart TD\n    A[Request] --> B{API Host?}\n    B -->|Yes| C{Allowed v1 path?}\n    C -->|Yes| D[Pass through to Next.js]\n    C -->|No| E[/] --> F[Redirect to docs]\n    E -->|Other| G[Return 404]\n    B -->|No| H{Analytics path?}\n    H -->|/ingest/*| I[PostHog Middleware]\n    H -->|No| J{Webhook host?}\n    J -->|Yes| K[Webhook Middleware]\n    J -->|No| L{Custom domain?}\n    L -->|Yes| M[Domain Middleware]\n    L -->|No| N{Standard app path?}\n    N -->|Yes| O[App Middleware]\n    N -->|No| P{View route with valid path?}\n    P -->|Yes| D\n    P -->|No| Q[Rewrite to /404]\n```\n\n### Host-Based Routing\n\nThe application uses three distinct hosts:\n\n| Host | Purpose |\n|------|---------|\n| `app.papermark.com` | Main application (dashboard, settings) |\n| `api.papermark.com` | Public v1 API surface only |\n| `mcp.papermark.com` | MCP (Model Context Protocol) endpoint |\n\n### Path Matching Logic\n\nThe middleware matcher excludes internal paths:\n\n```typescript\nexport const config = {\n  matcher: [\n    \"/((?!api/|oauth/|mcp/?$|\\\\.well-known/|_next/|_static|vendor|_icons|_vercel|favicon.ico|sitemap.xml|robots.txt).*)\",\n  ],\n};\n```\n\n- `api/` - API routes (handled separately)\n- `oauth/` - OIDC provider endpoints (bypassed for consent UI)\n- `mcp/?$` - MCP endpoint only (not subpaths like `/mcp-oauth/*`)\n- `_next/`, `_static`, `_vercel` - Next.js internals\n\n## Middleware Chain\n\n### API Host Restriction\n\nWhen requests arrive at `api.papermark.com`, the middleware enforces that only the public v1 API surface is accessible:\n\n```typescript\nconst apiHost = process.env.NEXT_PUBLIC_API_BASE_HOST;\nif (apiHost && requestHostname === apiHost) {\n  if (path === \"/v1\" || path.startsWith(\"/v1/\") || path === \"/openapi.json\") {\n    return NextResponse.next();\n  }\n  if (path === \"/\") {\n    return NextResponse.redirect(\"https://www.papermark.com/docs/api\", 302);\n  }\n  return new NextResponse(null, { status: 404 });\n}\n```\n\n### Analytics Paths\n\nPostHog proxy requests (`/ingest/*`) are routed to the PostHog middleware for event collection.\n\n### Incoming Webhooks\n\nWebhooks identified by host are handled by `IncomingWebhookMiddleware` from `lib/middleware/incoming-webhooks.ts`.\n\n### Custom Domains\n\nUser-configured custom domains trigger `DomainMiddleware` which serves their documents under their own domain.\n\n### Blocked Pathnames\n\nView routes (`/view/*`) are checked against a blocklist to prevent path traversal attacks:\n\n```typescript\nif (\n  path.startsWith(\"/view/\") &&\n  (BLOCKED_PATHNAMES.some((blockedPath) => path.includes(blockedPath)) ||\n    path.includes(\".\"))\n) {\n  url.pathname = \"/404\";\n  return NextResponse.rewrite(url, { status: 404 });\n}\n```\n\n## Next.js Configuration\n\n### Rewrites\n\nThe `next.config.mjs` rewrites configuration handles subdomain routing and OIDC discovery:\n\n```typescript\nasync rewrites() {\n  const afterFiles = [\n    { source: \"/oauth/:path*\", destination: \"/api/oauth/:path*\" },\n    { source: \"/.well-known/openid-configuration\", destination: \"/api/oauth/.well-known/openid-configuration\" },\n    { source: \"/.well-known/oauth-protected-resource\", destination: \"/api/well-known/oauth-protected-resource\" },\n  ];\n  // ...\n}\n```\n\nThe `beforeFiles` rules handle subdomain-specific routing with `has` conditions:\n\n```typescript\nif (apiHost) {\n  beforeFiles.push(\n    { source: \"/v1/:path*\", destination: \"/api/v1/:path*\", has: [{ type: \"host\", value: apiHost }] },\n    { source: \"/oauth/:path*\", destination: \"/404\", has: [{ type: \"host\", value: apiHost }] },\n  );\n}\n```\n\n### Security Headers\n\nThe headers configuration applies security headers to all routes and specific directives for embed routes:\n\n```typescript\n{\n  source: \"/view/:path*/embed\",\n  headers: [{ key: \"Content-Security-Policy\", value: \"frame-ancestors *;\" }],\n}\n```\n\nEmbed routes relax the `frame-ancestors` CSP directive to allow iframe embedding.\n\n### Image Domains\n\nThe `prepareRemotePatterns()` function generates the allowed remote image domains from environment variables, supporting multiple CloudFront distributions and blob storage providers:\n\n```typescript\nfunction prepareRemotePatterns() {\n  let patterns = [\n    { protocol: \"https\", hostname: \"assets.papermark.io\" },\n    { protocol: \"https\", hostname: \"d2kgph70pw5d9n.cloudfront.net\" },\n    // ... more domains\n  ];\n\n  if (process.env.NEXT_PRIVATE_UPLOAD_DISTRIBUTION_HOST) {\n    patterns.push({ protocol: \"https\", hostname: process.env.NEXT_PRIVATE_UPLOAD_DISTRIBUTION_HOST });\n  }\n  // ...\n}\n```\n\n### External Packages\n\nSeveral packages are marked as server-side externals or stubs:\n\n```typescript\nwebpack: (config, { isServer }) => {\n  if (isServer) {\n    externals.push(\"oidc-provider\", \"koa\");\n  }\n  config.resolve.alias = {\n    ...config.resolve.alias,\n    \"@google-cloud/kms\": false,\n    \"mongodb\": false,\n    \"mysql\": false,\n  };\n}\n```\n\n## Configuration Files\n\n### package.json\n\nThe project requires Node.js >= 24 and includes:\n\n| Category | Notable Dependencies |\n|----------|---------------------|\n| **Framework** | Next.js, React, TypeScript |\n| **Auth** | NextAuth.js, oidc-provider, @teamhanko/passkeys |\n| **Database** | Prisma, PostgreSQL |\n| **Storage** | AWS S3 SDK, @tus/server, @vercel/blob |\n| **UI** | Tailwind, shadcn/ui, Radix UI, Tremor |\n| **Analytics** | PostHog, Tinybird |\n| **Payments** | Stripe |\n| **Email** | Resend, React Email |\n| **PDF** | mupdf, pdf-lib, @libpdf/core |\n| **AI** | OpenAI SDK, AI SDK |\n| **Background Jobs** | Trigger.dev |\n| **MCP** | @modelcontextprotocol/sdk |\n\n### tsconfig.json\n\nThe TypeScript configuration uses bundler module resolution and includes the `ee/` directory for enterprise features:\n\n```json\n{\n  \"compilerOptions\": {\n    \"moduleResolution\": \"bundler\",\n    \"paths\": { \"@/*\": [\"./*\"] }\n  },\n  \"include\": [\"next-env.d.ts\", \"**/*.ts\", \"**/*.tsx\", \".next/types/**/*.ts\", \"trigger.config.ts\"]\n}\n```\n\n### tailwind.config.js\n\nCustom color palette includes the standard shadcn colors plus a `sidebar` color scheme for the application layout.\n\n### trigger.config.ts\n\nBackground jobs are configured in the `lib/trigger` and `ee/**/lib/trigger` directories using Trigger.dev with Prisma, FFmpeg, and Python support.\n\n## Key Environment Variables\n\n| Variable | Purpose |\n|----------|---------|\n| `NEXT_PUBLIC_API_BASE_HOST` | API subdomain (e.g., `api.papermark.com`) |\n| `NEXT_PUBLIC_MCP_BASE_HOST` | MCP subdomain (e.g., `mcp.papermark.com`) |\n| `NEXT_PUBLIC_APP_BASE_HOST` | App subdomain (e.g., `app.papermark.com`) |\n| `NEXT_PUBLIC_BASE_URL` | Asset prefix for production CDN |\n| `NEXT_PRIVATE_UPLOAD_DISTRIBUTION_HOST` | CloudFront distribution for uploads |\n| `TINYBIRD_TOKEN` | Analytics data pipeline token |\n\n## Development Workflow\n\n```bash\n# Install dependencies\nnpm install\n\n# Generate Prisma client and run migrations\nnpm run dev:prisma\n\n# Start development server\nnpm run dev\n\n# Run with email preview (React Email)\nnpm run email\n\n# Start Stripe webhook listener\nnpm run stripe:webhook\n\n# Start Trigger.dev local development\nnpm run trigger:v4:dev\n```\n\n## Integration Points\n\nThe root module connects to several internal modules:\n\n- **`lib/middleware/app`** - App middleware for authenticated routes\n- **`lib/middleware/domain`** - Custom domain handling\n- **`lib/middleware/incoming-webhooks`** - Webhook processing\n- **`lib/middleware/posthog`** - Analytics proxy\n- **`lib/constants`** - Blocked pathnames list\n- **`prisma/schema`** - Database schema (via postinstall)","styles":"# styles\n\n# Styles Module\n\nThe styles module provides a complete Notion-inspired styling system for the application. It consists of three CSS files that work together to create a consistent, responsive, and accessible content viewing experience.\n\n## Architecture Overview\n\n```mermaid\ngraph TB\n    subgraph \"styles/globals.css\"\n        G[CSS Custom Properties<br/>Tailwind Base & Utilities]\n    end\n    \n    subgraph \"styles/custom-notion-styles.css\"\n        N1[Grid Layout System]\n        N2[Content Block Styles]\n        N3[Table Styles]\n        N4[Dark Mode]\n        N5[User Selection Control]\n        N6[Responsive Breakpoints]\n    end\n    \n    subgraph \"styles/custom-viewer-styles.css\"\n        V1[Viewer Image Styles]\n        V2[Mobile Drag Prevention]\n    end\n    \n    G --> N1\n    G --> N2\n    G --> N3\n    G --> N4\n    N1 --> N2\n```\n\n## File Structure\n\n| File | Purpose |\n|------|---------|\n| `globals.css` | CSS custom properties, Tailwind base layer, and animation utilities |\n| `custom-notion-styles.css` | Notion-style grid layout, content blocks, tables, and dark mode |\n| `custom-viewer-styles.css` | Image viewer-specific styles for mobile drag prevention |\n\n---\n\n## Grid Layout System\n\nThe module implements a CSS Grid-based layout that mirrors Notion's content structure. The grid uses named lines for precise content positioning.\n\n### Named Grid Lines\n\n```\n[full-start] ─ [margin] ─ [content-start] ─ 708px ─ [content-end] ─ [margin] ─ [full-end]\n```\n\n**CSS Variables:**\n\n```css\n:root {\n  --notion-max-width: 990px;      /* Total page width */\n  --notion-content-width: 708px;  /* Main content column */\n  --notion-margin-width: minmax(96px, 1fr); /* Flexible side margins */\n}\n```\n\n### Grid Behavior by Content Type\n\n| Content Type | Grid Column | Behavior |\n|--------------|-------------|----------|\n| Regular blocks | `content` | Centered within content width |\n| Collections | `full` | Spans entire viewport width |\n| Simple tables | `content-start / -1` | Aligned with content, extends to full width |\n\n### Full-Width Pages\n\nFor pages with `page_full_width: true`, the grid switches to fixed 96px margins:\n\n```css\n@media (min-width: 769px) {\n  .notion-page.notion-full-page.notion-full-width {\n    grid-template-columns:\n      [full-start] 96px\n      [content-start] minmax(0, 1fr)\n      [content-end] 96px\n      [full-end];\n  }\n}\n```\n\nThis ensures full-width pages span the viewport like on notion.so.\n\n---\n\n## User Selection Control\n\nThe module provides granular control over text selection behavior.\n\n### Default: Selection Disabled\n\nAll Notion content blocks have text selection disabled by default:\n\n```css\n.notion-page,\n.notion-text,\n.notion-h1,\n/* ... all block types ... */ {\n  user-select: none;\n}\n```\n\n### Enabled State\n\nSelection is re-enabled via a parent class `.notion-text-selection-enabled`:\n\n```css\n.notion-text-selection-enabled .notion-page,\n.notion-text-selection-enabled .notion-text,\n/* ... */ {\n  user-select: text;\n}\n```\n\n**Usage Pattern:** Apply `.notion-text-selection-enabled` to a parent element to enable text selection within that subtree.\n\n---\n\n## Image and Media Handling\n\n### Drag Prevention\n\nImages have user selection and touch interactions disabled to prevent accidental saving:\n\n```css\n.notion-image,\n.notion-asset,\nimg {\n  -webkit-touch-callout: none;\n  user-select: none;\n  -webkit-tap-highlight-color: transparent;\n  pointer-events: auto; /* Keep clickable */\n}\n```\n\n### Interactive Elements\n\nLinks and buttons retain pointer events for normal interaction:\n\n```css\n.notion-link,\na,\nbutton,\ninput,\nselect,\ntextarea,\n.notion-toggle-button,\n.notion-page-icon {\n  pointer-events: auto !important;\n  cursor: pointer !important;\n}\n```\n\n---\n\n## Table Styles\n\n### Simple Tables\n\nSimple tables use the `content-start / -1` grid span, allowing them to extend from the content area to the right edge:\n\n```css\n.notion-simple-table {\n  grid-column: content-start / -1;\n  overflow-x: auto;\n}\n```\n\n### Table Cell Styling\n\n```css\n.notion-simple-table td {\n  padding: 8px 10px;\n  border: 1px solid rgb(210, 210, 208);\n}\n```\n\n### Table Header Styling\n\nHeader rows and cells have a distinct background:\n\n```css\n.notion-simple-table-header-row td,\n.notion-simple-table-header-cell {\n  background: rgb(247, 246, 243);\n  font-weight: 500;\n}\n```\n\n---\n\n## Dark Mode Support\n\nDark mode is implemented using the `.dark` class on a parent element. The styles adjust both color values and table borders for visibility.\n\n### CSS Variables in Dark Mode\n\n```css\n.dark {\n  --background: 224 71.4% 4.1%;\n  --foreground: 210 20% 98%;\n  --border: 215 27.9% 16.9%;\n  /* ... */\n}\n```\n\n### Table Borders in Dark Mode\n\n```css\n.dark .notion-simple-table td {\n  border-color: rgba(255, 255, 255, 0.2);\n}\n```\n\n---\n\n## Responsive Design\n\n### Breakpoints\n\n| Breakpoint | Grid Behavior |\n|------------|---------------|\n| `≥ 769px` | Full grid with 96px margins, fixed table widths |\n| `≤ 768px` | Reduced margins (24px), tables use native sizing |\n| `≤ 640px` | Column layout stacks vertically |\n\n### Mobile Table Handling\n\n```css\n@media (max-width: 768px) {\n  .notion-simple-table {\n    grid-column: content;\n    display: block;\n    max-width: 100%;\n    overflow-x: auto;\n  }\n}\n```\n\n### Column Stacking\n\n```css\n@media (max-width: 640px) {\n  .notion-row {\n    flex-wrap: wrap;\n    gap: 1rem;\n  }\n\n  .notion-row > .notion-column {\n    width: 100% !important;\n  }\n}\n```\n\n---\n\n## Animation Utilities\n\n### Fade-In Animation\n\n```css\n@keyframes fade-in {\n  from { opacity: 0; }\n  to { opacity: 1; }\n}\n\n.animate-fade-in {\n  animation: fade-in 0.5s ease-in-out;\n}\n```\n\n---\n\n## Touch Optimization Utilities\n\nThe `globals.css` provides utility classes for optimized touch interactions:\n\n```css\n.touch-action-manipulation {\n  touch-action: manipulation; /* Remove 300ms delay */\n}\n\n.touch-zoom-container {\n  touch-action: none;              /* Disable browser handling */\n  -webkit-overflow-scrolling: touch;\n  isolation: isolate;              /* New stacking context */\n  contain: paint;                  /* Optimize rendering */\n}\n```\n\n---\n\n## Integration with react-notion-x\n\nThe styles target specific classes rendered by react-notion-x:\n\n| react-notion-x Class | Styling Applied |\n|----------------------|-----------------|\n| `.notion-page-content-inner` | Grid container |\n| `.notion-page.notion-full-width` | Full-width grid |\n| `.notion-collection` | Full-width span |\n| `.notion-page-icon-hero` | Overlapping cover, negative margin positioning |\n| `.notion-asset-wrapper` | Video/iframe sizing |\n\n### Icon Positioning\n\nPage icons are styled to overlap the cover image, matching Notion's design:\n\n```css\n.notion-page-icon-hero {\n  margin-top: -70px !important;\n  position: relative;\n  z-index: 10;\n}\n```\n\n---\n\n## Usage\n\nImport the stylesheets in your application entry point:\n\n```css\n/* In your main CSS or component */\n@import './styles/globals.css';\n@import './styles/custom-notion-styles.css';\n@import './styles/custom-viewer-styles.css';\n```\n\nOr in your HTML:\n\n```html\n<link rel=\"stylesheet\" href=\"/styles/globals.css\">\n<link rel=\"stylesheet\" href=\"/styles/custom-notion-styles.css\">\n<link rel=\"stylesheet\" href=\"/styles/custom-viewer-styles.css\">\n```\n\n---\n\n## Customization\n\n### Adjusting Content Width\n\nModify the CSS custom property to change the main content width:\n\n```css\n:root {\n  --notion-content-width: 800px; /* Increase content width */\n}\n```\n\n### Adjusting Margins\n\n```css\n:root {\n  --notion-margin-width: minmax(120px, 1fr); /* Wider margins */\n}\n```\n\n### Adding Custom Block Selection\n\nExtend selection control to custom block types:\n\n```css\n.notion-text-selection-enabled .notion-custom-block {\n  user-select: text;\n}\n```"};

(function() {
  var activePage = 'overview';

  document.addEventListener('DOMContentLoaded', function() {
    mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });
    renderMeta();
    renderNav();
    document.getElementById('menu-toggle').addEventListener('click', function() {
      document.getElementById('sidebar').classList.toggle('open');
    });
    if (location.hash && location.hash.length > 1) {
      activePage = decodeURIComponent(location.hash.slice(1));
    }
    navigateTo(activePage);
  });

  function renderMeta() {
    if (!META) return;
    var el = document.getElementById('meta-info');
    var parts = [];
    if (META.generatedAt) {
      parts.push(new Date(META.generatedAt).toLocaleDateString());
    }
    if (META.model) parts.push(META.model);
    if (META.fromCommit) parts.push(META.fromCommit.slice(0, 8));
    el.textContent = parts.join(' \u00b7 ');
  }

  function renderNav() {
    var container = document.getElementById('nav-tree');
    var html = '<div class="nav-section">';
    html += '<a class="nav-item overview" data-page="overview" href="#overview">Overview</a>';
    html += '</div>';
    if (TREE.length > 0) {
      html += '<div class="nav-group-label">Modules</div>';
      html += buildNavTree(TREE);
    }
    container.innerHTML = html;
    container.addEventListener('click', function(e) {
      var target = e.target;
      while (target && !target.dataset.page) { target = target.parentElement; }
      if (target && target.dataset.page) {
        e.preventDefault();
        navigateTo(target.dataset.page);
      }
    });
  }

  function buildNavTree(nodes) {
    var html = '';
    for (var i = 0; i < nodes.length; i++) {
      var node = nodes[i];
      html += '<div class="nav-section">';
      html += '<a class="nav-item" data-page="' + escH(node.slug) + '" href="#' + encodeURIComponent(node.slug) + '">' + escH(node.name) + '</a>';
      if (node.children && node.children.length > 0) {
        html += '<div class="nav-children">' + buildNavTree(node.children) + '</div>';
      }
      html += '</div>';
    }
    return html;
  }

  function escH(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function navigateTo(page) {
    activePage = page;
    location.hash = encodeURIComponent(page);

    var items = document.querySelectorAll('.nav-item');
    for (var i = 0; i < items.length; i++) {
      if (items[i].dataset.page === page) {
        items[i].classList.add('active');
      } else {
        items[i].classList.remove('active');
      }
    }

    var contentEl = document.getElementById('content');
    var md = PAGES[page];

    if (!md) {
      contentEl.innerHTML = '<div class="empty-state"><h2>Page not found</h2><p>' + escH(page) + '.md does not exist.</p></div>';
      return;
    }

    contentEl.innerHTML = marked.parse(md);

    // Rewrite .md links to hash navigation
    var links = contentEl.querySelectorAll('a[href]');
    for (var i = 0; i < links.length; i++) {
      var href = links[i].getAttribute('href');
      if (href && href.endsWith('.md') && href.indexOf('://') === -1) {
        var slug = href.replace(/\.md$/, '');
        links[i].setAttribute('href', '#' + encodeURIComponent(slug));
        (function(s) {
          links[i].addEventListener('click', function(e) {
            e.preventDefault();
            navigateTo(s);
          });
        })(slug);
      }
    }

    // Convert mermaid code blocks into mermaid divs
    var mermaidBlocks = contentEl.querySelectorAll('pre code.language-mermaid');
    for (var i = 0; i < mermaidBlocks.length; i++) {
      var pre = mermaidBlocks[i].parentElement;
      var div = document.createElement('div');
      div.className = 'mermaid';
      div.textContent = mermaidBlocks[i].textContent;
      pre.parentNode.replaceChild(div, pre);
    }
    try { mermaid.run({ querySelector: '.mermaid' }); } catch(e) {}

    window.scrollTo(0, 0);
    document.getElementById('sidebar').classList.remove('open');
  }
})();
