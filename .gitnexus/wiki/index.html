\n// Returns { ok: false, configured: false } when secret is missing\n```\n\nThe webhook handler at `/webhooks/signing` uses this before processing any events.\n\n## Browser Utilities\n\n### Download Token (`download-token.ts`)\n\n```typescript\nbuildSignedAgreementDownloadCookie({ token, maxAgeSeconds, secure })\n// Path-scoped to /api/agreements/signing\n```\n\n### Agreement Downloads (`download.ts`)\n\n```typescript\ndownloadSignedAgreement({ url, fallbackFilename? })\n// Triggers browser download from the signed agreement URL\n// Extracts filename from Content-Disposition or URL params\n// Revokes object URL after download starts\n\nbuildTeamSignedAgreementDownloadUrl({ teamId, agreementId, responseId })\n// Produces: /api/teams/{teamId}/agreements/{agreementId}/responses/{responseId}/download\n```\n\n### Local Storage Bridge (`agreement-storage.ts`)\n\n```typescript\ngetAgreementResponseStorageKey(linkId, agreementId)\n// Key: \"papermark.agreement.{linkId}.{agreementId}\"\n\nparseStoredAgreementResponse(raw)\n// Deserializes the stored response from localStorage\n```\n\n## Constants (`template-upload.ts`)\n\n```typescript\nMAX_SIGNING_TEMPLATE_PDF_BYTES  // 30 MB\nMAX_SIGNING_TEMPLATE_PDF_MB     // 30\n\ngetSigningTemplateTooLargeMessage()\n// \"PDF is too large for signing setup (max 30 MB).\"\n```\n\n## Signing Flow Sequence\n\n```mermaid\nsequenceDiagram\n    participant UI as Agreement UI\n    participant API as POST /api/views\n    participant Sign as lib/signing\n    participant Doc as Documenso\n    participant Webhook as Signing Webhook\n    participant Mirror as Storage Mirror\n\n    Note over UI,Webhook: Visitor opens agreement link\n\n    UI->>API: GET /api/views (with access cookie)\n    API->>Sign: parseSignedAgreementAccessToken(cookie)\n    Sign-->>API: payload or null\n\n    alt No valid cookie / first visit\n        UI->>Doc: Start signing (direct link)\n        Doc-->>UI: Signing page\n\n        UI->>Doc: Signer completes signing\n        Doc->>Webhook: POST /webhooks/signing\n        Webhook->>Sign: syncAgreementResponseWithSigningDocument()\n        Sign->>Sign: Verify document binding\n        Sign->>Doc: getSignedDocumentDetails()\n        Sign->>Sign: Update agreementResponse in DB\n        Sign->>Mirror: mirrorSignedAgreementToStorage()\n        Mirror->>Doc: Fetch signed PDF\n        Mirror->>S3/Blob: Upload PDF\n        Mirror-->>Webhook: { mirrored: true }\n\n        Webhook-->>UI: Redirect to status page\n    end\n\n    UI->>API: GET /api/views (with access cookie)\n    API->>Sign: verifySignedAgreementAccessToken()\n    API-->>UI: Access granted with signed PDF URL\n```\n\n## Environment Variables\n\n| Variable | Required | Description |\n|----------|----------|-------------|\n| `NEXTAUTH_SECRET` | Yes | HMAC signing key for all tokens |\n| `SIGNING_API_KEY` | Yes | Documenso API key |\n| `SIGNING_API_URL` | No | Documenso API endpoint (defaults to `{host}/api/v2`) |\n| `NEXT_PUBLIC_SIGNING_HOST` | No | Documenso host (defaults to `https://app.documenso.com`) |\n| `SIGNING_WEBHOOK_SECRET` | No | Webhook verification secret |\n| `NEXT_PUBLIC_UPLOAD_TRANSPORT` | No | `s3` or default (Vercel Blob) |\n\n## Error Handling\n\nAll errors are thrown as `TeamError` from `lib/errorHandler`. Key error messages:\n\n- `\"Signing access token cannot be issued: NEXTAUTH_SECRET is not set.\"` — startup safety check\n- `\"Agreement signing could not be verified for this link.\"` — identity/permission failures\n- `\"Agreement signing is still pending. Please finish signing to continue.\"` — incomplete signing\n- `\"Signed document does not belong to this signing session.\"` — binding validation failure\n- `\"Documenso did not return a download URL for the signed agreement.\"` — envelope resolution failure","lib-swr":"# lib — swr\n\n# lib/swr — SWR Data Fetching Hooks\n\nThis module contains React hooks that wrap [SWR](https://swr.vercel.app/) for data fetching from the application's API routes. They provide a type-safe, consistent interface for consuming server data across the Next.js frontend.\n\n## Architecture Overview\n\nAll hooks in this module follow a consistent pattern: they retrieve the current team ID from the `TeamContext`, construct an API endpoint, and delegate fetching to SWR. This creates a uniform data-fetching layer where every API call is automatically deduplicated, cached, and revalidated according to sensible defaults.\n\n```mermaid\nflowchart TD\n    subgraph \"React Components\"\n        C1[UI Components]\n        C2[Pages]\n    end\n\n    subgraph \"lib/swr\"\n        H1[useDocument]\n        H2[useDataroom]\n        H3[usePlan]\n        H4[useViewers]\n        H5[...other hooks]\n    end\n\n    subgraph \"Dependencies\"\n        TC[TeamContext]\n        F[fetcher utility]\n        R[Next Router]\n    end\n\n    subgraph \"API Routes\"\n        A1[/api/teams/:teamId/documents]\n        A2[/api/teams/:teamId/datarooms]\n        A3[/api/teams/:teamId/billing/plan]\n        A4[...other endpoints]\n    end\n\n    C1 & C2 --> H1 & H2 & H3 & H4 & H5\n    H1 & H2 & H3 & H4 & H5 --> TC\n    H1 & H2 & H3 & H4 & H5 --> F\n    H1 & H2 & H3 & H4 & H5 --> R\n    H1 --> A1\n    H2 --> A2\n    H3 --> A3\n    H5 --> A4\n```\n\n## Core Concepts\n\n### Team-Scoped Fetching\n\nEvery hook that fetches team-level data requires a `teamId`. The hooks obtain this from `useTeam` in `context/team-context.tsx`. If no team is selected, requests are skipped entirely by passing `null` as the URL:\n\n```typescript\nconst { data } = useSWR<Document>(\n  teamId && `/api/teams/${teamId}/documents/${id}`,\n  fetcher\n);\n```\n\n### Return Shape Convention\n\nHooks return a consistent object shape with `loading`, `error`, and often `mutate` for programmatic revalidation:\n\n```typescript\nreturn {\n  document: data,\n  loading: !error && !data,\n  error,\n  mutate,\n};\n```\n\n### SWR Configuration Patterns\n\nDifferent data types require different caching strategies. The module defines three main patterns:\n\n| Pattern | `dedupingInterval` | `revalidateOnFocus` | Use Case |\n|---------|-------------------|---------------------|----------|\n| Standard | 10–30s | `false` | Most data |\n| Static/Rarely changing | 60s | `false` | Teams, billing plans |\n| Fast polling | 3s (refreshInterval) | `false` | Processing status |\n| Keep previous | 20–30s | `false` + `keepPreviousData` | Paginated lists |\n\n## Document Hooks\n\n### `useDocument`\n\nFetches a single document by ID from the URL query parameter `id`. Uses aggressive caching because document data changes infrequently after initial load.\n\n```typescript\nconst { document, primaryVersion, loading, error, mutate } = useDocument();\n```\n\n### `useDocuments`\n\nFetches the document list with support for search, sorting, and pagination. Passes query parameters to the API:\n\n```typescript\nconst { documents, searchFolders, pagination, isValidating, loading } = useDocuments();\n// Returns: documents, optional folders when searching, pagination metadata\n```\n\n### `useDocumentOverview`\n\nReturns an aggregated response containing the document, user limits, feature flags, and view/link counts in a single request:\n\n```typescript\nconst { document, limits, featureFlags, team, counts } = useDocumentOverview();\n```\n\n### `useDocumentVisits`\n\nFetches paginated view data for a document with optional dataroom scoping:\n\n```typescript\nconst { views, loading, error, mutate } = useDocumentVisits(\n  page, \n  limit,\n  documentId,  // optional override\n  { dataroomId, scope }  // optional: 'dataroom' | 'other'\n);\n```\n\n### `useDocumentStats`\n\nFetches aggregated analytics for a document, including views, average completion rate, and duration data:\n\n```typescript\nconst { stats, loading, error } = useDocumentStats(documentId);\n```\n\n## Dataroom Hooks\n\n### `useDataroom`\n\nCore hook for fetching dataroom metadata. Includes 404 handling that redirects to the datarooms list:\n\n```typescript\nconst { dataroom, loading, error } = useDataroom(dataroomId?);\n```\n\n### `useDatarooms`\n\nFetches the datarooms list with support for filtering by search query, status, and tags:\n\n```typescript\nconst { datarooms, totalCount, loading, mutate } = useDatarooms();\n```\n\n### `useDataroomItems`\n\nCombines folders and documents into a single sorted list for displaying a dataroom folder's contents:\n\n```typescript\nconst { items, folderCount, documentCount, isLoading, error } = useDataroomItems({\n  root: boolean,\n  name: string[]  // folder path segments\n});\n```\n\nItems are sorted using `sortByIndexThenName` from `lib/utils/sort-items-by-index-name.ts`.\n\n### `useDataroomLinks`\n\nFetches all links associated with a dataroom:\n\n```typescript\nconst { links, loading, error } = useDataroomLinks();\n```\n\n### `useDataroomStats`\n\nFetches analytics data for an entire dataroom, including visitor views and document-specific metrics:\n\n```typescript\nconst { stats, loading, error } = useDataroomStats({ excludeTeamMembers });\n```\n\n### `useDataroomGroups`\n\nFetches viewer groups for a dataroom with optional document or folder scoping:\n\n```typescript\nconst { viewerGroups, loading, error, mutate } = useDataroomGroups({\n  documentId,\n  folderId,\n  dataroomId\n});\n```\n\n### `useDataroomGroup`\n\nFetches a single group including its members and access controls:\n\n```typescript\nconst { viewerGroup, viewerGroupMembers, viewerGroupPermissions } = useDataroomGroup();\n```\n\n### `useDataroomViewerGroups`\n\nFetches permission groups with their associated links:\n\n```typescript\nconst { permissionGroups, loading, error, mutate } = useDataroomPermissionGroups();\n```\n\n### `useDataroomSearch`\n\nSearches documents and folders within a dataroom by name:\n\n```typescript\nconst { documents, folders, isLoading, error } = useDataroomSearch({ query });\n```\n\n### `useDataroomDocumentOverview`\n\nFetches document data scoped to a dataroom, allowing dataroom-scoped members to access document details:\n\n```typescript\nconst { document, limits, featureFlags, counts } = useDataroomDocumentOverview();\n```\n\n### `useDataroomDocumentStats`\n\nFetches per-document statistics when viewing a document within a dataroom context:\n\n```typescript\nconst { stats, loading, error } = useDataroomDocumentStats(documentId);\n```\n\n### `useDataroomViewDocumentStats`\n\nFetches document-level stats for a specific view within a dataroom visit:\n\n```typescript\nconst { documentStats, loading, error } = useDataroomViewDocumentStats({\n  dataroomId, dataroomViewId, enabled\n});\n```\n\n### `useDataroomDocumentPageStats`\n\nFetches page-level duration data for a document viewed during a dataroom visit:\n\n```typescript\nconst { duration, loading, error } = useDataroomDocumentPageStats({\n  dataroomId, dataroomViewId, documentViewId, documentId, enabled\n});\n```\n\n## Viewer/Visitor Hooks\n\n### `useViewers`\n\nFetches paginated visitor list with sorting and optional search:\n\n```typescript\nconst { viewers, pagination, sorting, isValidating, loading } = useViewers(\n  page, pageSize, sortBy, sortOrder\n);\n```\n\n### `useViewer`\n\nFetches detailed information for a single viewer including all their document views:\n\n```typescript\nconst { viewer, durations, loading, loadingDurations } = useViewer(\n  page, pageSize, sortBy, sortOrder\n);\n```\n\nFetches durations as a separate request when the viewer has views.\n\n### `useLinkVisits`\n\nFetches visits for a specific link:\n\n```typescript\nconst { views, hiddenFromPause, loading, error } = useLinkVisits(linkId);\n```\n\n## Billing Hooks\n\n### `usePlan`\n\nThe most frequently used hook for plan-based feature gating. Returns parsed plan details plus convenience boolean flags:\n\n```typescript\nconst { \n  plan,              // 'free' | 'starter' | 'pro' | etc.\n  planName,          // Human-readable name from PLAN_NAME_MAP\n  isTrial, \n  isCustomer,\n  isPro,\n  isDatarooms,\n  isBusiness,\n  isFree,\n  discount,\n  loading \n} = usePlan({ withDiscount });\n```\n\nThe hook parses compound plan strings like `\"pro+drtrial+old\"` into structured data.\n\n## Agreement/Signing Hooks\n\n### `useAgreements`\n\nFetches all agreements with link and response counts:\n\n```typescript\nconst { agreements, loading, error } = useAgreements();\n```\n\n### `useAgreementResponses`\n\nFetches all responses to a specific agreement, including signing status and envelope data:\n\n```typescript\nconst { agreement, responses, loading, error, mutate } = useAgreementResponses(agreementId);\n```\n\n## Annotation Hooks\n\n### `useAnnotations`\n\nFetches annotations for a document (admin side):\n\n```typescript\nconst { annotations, loading, error, mutate } = useAnnotations(documentId, teamId);\n```\n\n### `useViewerAnnotations`\n\nFetches viewer-visible annotations for a document link. Only fetches when `viewId` is available to avoid 404s on unviewed documents:\n\n```typescript\nconst { annotations, loading, error, mutate } = useViewerAnnotations(linkId, documentId, viewId);\n```\n\n## Integration Hooks\n\n### `useSlackIntegration`\n\nFetches the team's Slack integration status (immutable cache):\n\n```typescript\nconst { integration, loading, error, mutate } = useSlackIntegration({ enabled });\n```\n\n### `useSlackChannels`\n\nFetches available Slack channels with support for forced refresh:\n\n```typescript\nconst { channels, loading, error, refresh } = useSlackChannels({ enabled });\n```\n\n## Settings Hooks\n\n### `useBrand`\n\nFetches team branding settings:\n\n```typescript\nconst { brand, loading, error } = useBrand();\n```\n\n### `useDataroomBrand`\n\nFetches dataroom-specific branding:\n\n```typescript\nconst { brand, loading, error } = useDataroomBrand({ dataroomId });\n```\n\n### `useNotificationPreferences`\n\nFetches and updates team notification preferences:\n\n```typescript\nconst { preferences, role, isLoading, updatePreferences } = useNotificationPreferences();\n```\n\n## Team Hooks\n\n### `useTeams`\n\nFetches all teams the current user belongs to. Waits for router readiness and session:\n\n```typescript\nconst { teams, loading, isValidating } = useTeams();\n```\n\n### `useGetTeam`\n\nFetches the current team details:\n\n```typescript\nconst { team, loading, error } = useGetTeam();\n```\n\n## Tag Hooks\n\n### `useTags`\n\nFetches tags with optional filtering, sorting, and pagination. Supports query validation via Zod schema:\n\n```typescript\nconst { tags, tagCount, loading, isValidating } = useTags({\n  query: { search, sortBy, sortOrder, page, pageSize },\n  enabled,\n  includeLinksCount\n});\n```\n\n## Authentication Hooks\n\n### `usePasskeys`\n\nFetches the user's passkey credentials:\n\n```typescript\nconst { passkeys, loading, error, mutate, isValidating } = usePasskeys();\n```\n\n### `useSAML`\n\nFetches SAML SSO configuration:\n\n```typescript\nconst { saml, connections, issuer, acs, configured, loading } = useSAML();\n```\n\n### `useSCIM`\n\nFetches SCIM directory sync configuration:\n\n```typescript\nconst { scim, directories, provider, configured, loading } = useSCIM();\n```\n\n### `useDomains`\n\nFetches team domains (disabled by default, must be explicitly enabled):\n\n```typescript\nconst { domains, loading, error } = useDomains({ enabled });\n```\n\n## Link Hooks\n\n### `useLink`\n\nFetches a single link by ID from URL:\n\n```typescript\nconst { link, loading, error } = useLink();\n```\n\n### `useDomainLink`\n\nFetches a link by domain and slug:\n\n```typescript\nconst { link, loading, error } = useDomainLink();\n```\n\n## Other Hooks\n\n### `useInvoices`\n\nFetches billing invoices:\n\n```typescript\nconst { invoices, loading, error } = useInvoices();\n```\n\n### `useInvitations`\n\nFetches team invitations:\n\n```typescript\nconst { invitations, loading, error } = useInvitations();\n```\n\n### `useVisitorGroups`\n\nFetches visitor groups:\n\n```typescript\nconst { visitorGroups, loading, error, mutate } = useVisitorGroups();\n```\n\n### `useTeamAI`\n\nChecks AI feature availability for the team:\n\n```typescript\nconst { \n  isAIFeatureEnabled,\n  isAIEnabled,\n  isAdmin,\n  canManageAI,\n  canUseAI,\n  isLoading \n} = useTeamAI();\n```\n\n### `useStats` / `useVisitorStats`\n\nLegacy hooks for document-level analytics. Prefer `useDocumentStats` and `useDataroomStats` for new code.\n\n### `useLimits`\n\nRe-exports from `@/ee/limits/swr-handler` for platform limits.\n\n## Adding New Hooks\n\nFollow this template for new hooks in this module:\n\n```typescript\nimport { useTeam } from \"@/context/team-context\";\nimport useSWR from \"swr\";\n\nimport { fetcher } from \"@/lib/utils\";\n\nexport type NewDataType = { /* ... */ };\n\nexport function useNewData(param?: string) {\n  const teamInfo = useTeam();\n  const teamId = teamInfo?.currentTeam?.id;\n\n  const { data, error, mutate } = useSWR<NewDataType>(\n    teamId && param\n      ? `/api/teams/${teamId}/new-endpoint/${param}`\n      : null,\n    fetcher,\n    {\n      // Choose based on data volatility:\n      // - 10000: frequently changing (stats, visits)\n      // - 30000: moderately stable (documents, datarooms)\n      // - 60000+: rarely changing (teams, billing)\n      dedupingInterval: 30000,\n      revalidateOnFocus: false,\n    },\n  );\n\n  return {\n    newData: data,\n    loading: !error && !data,\n    error,\n    mutate,\n  };\n}\n```","lib-team":"# lib — team\n\n# Team Helper Module (`lib/team/helper.ts`)\n\nProvides data access and authorization helpers for team-based document operations. These functions enforce team membership validation and handle document retrieval with associated link data.\n\n## Overview\n\nThis module serves as a reusable layer for any operation that requires fetching a team, its documents, or a specific document while verifying the requesting user has access. It centralizes authorization checks to ensure consistent security across team-related routes.\n\n## Functions\n\n### `getTeamWithUsersAndDocument`\n\nFetches a team with its members and documents, optionally filtering to a specific document. Performs three authorization checks before returning data.\n\n```typescript\nasync function getTeamWithUsersAndDocument({\n  teamId,\n  userId,\n  docId,\n  checkOwner,\n  options,\n}: ITeamUserAndDocument)\n```\n\n**Parameters:**\n\n| Parameter | Type | Required | Description |\n|-----------|------|----------|-------------|\n| `teamId` | `string` | Yes | The team's unique identifier |\n| `userId` | `string` | Yes | The requesting user's ID |\n| `docId` | `string` | No | Optional document ID to fetch alongside the team |\n| `checkOwner` | `boolean` | No | Whether to verify the user owns the document (currently commented out) |\n| `options` | `object` | No | Prisma include/select options for the documents relation |\n\n**Returns:** `{ team: Team, document?: Document & { views?, versions?, links? } }`\n\n**Authorization Flow:**\n\n1. **Team existence** — Throws `TeamError` if the team doesn't exist\n2. **Membership check** — Throws `TeamError` if the user isn't in `team.users`\n3. **Document existence** — Throws `TeamError` if `docId` is provided but the document isn't in the team\n\n**Password Decryption:**\n\nWhen a document is returned with its `links` relation, any link with an encrypted password gets decrypted in-place before return. The `password` field on each `Link` object is replaced with the plaintext value.\n\n### `getDocumentWithTeamAndUser`\n\nFetches a single document with its team data, verifying the user has access.\n\n```typescript\nasync function getDocumentWithTeamAndUser({\n  docId,\n  userId,\n  options,\n}: IDocumentWithLink)\n```\n\n**Parameters:**\n\n| Parameter | Type | Required | Description |\n|-----------|------|----------|-------------|\n| `docId` | `string` | Yes | The document's unique identifier |\n| `userId` | `string` | Yes | The requesting user's ID |\n| `options` | `object` | No | Prisma include options for additional relations |\n\n**Returns:** `{ document: Document & { team: { users: { userId: string }[] } } }`\n\n**Authorization Flow:**\n\n1. **Document existence** — Throws `DocumentError` if the document doesn't exist\n2. **Membership check** — Throws `TeamError` if the user isn't in the document's team\n\n## Error Handling\n\nBoth functions use typed errors from `lib/errorHandler.ts`:\n\n| Function | Error | Condition |\n|----------|-------|-----------|\n| `getTeamWithUsersAndDocument` | `TeamError` | Team not found |\n| `getTeamWithUsersAndDocument` | `TeamError` | User not a team member |\n| `getTeamWithUsersAndDocument` | `TeamError` | Document not in team |\n| `getDocumentWithTeamAndUser` | `DocumentError` | Document not found |\n| `getDocumentWithTeamAndUser` | `TeamError` | User not a team member |\n\n## Data Flow\n\n```mermaid\nsequenceDiagram\n    participant Route as Route Handler\n    participant Helper as getTeamWithUsersAndDocument\n    participant Prisma as Prisma Client\n    participant Utils as lib/utils.ts\n\n    Route->>Helper: getTeamWithUsersAndDocument({ teamId, userId, docId })\n    Helper->>Prisma: Find team with users and documents\n    Prisma-->>Helper: Team data\n    Helper->>Helper: Validate team exists\n    Helper->>Helper: Validate user is team member\n    Helper->>Helper: Validate document in team (if docId provided)\n    Helper->>Utils: decryptEncrpytedPassword(link.password)\n    Utils-->>Helper: Plaintext password\n    Helper-->>Route: { team, document }\n```\n\n## Integration\n\n### Called By\n\n- `app/links/[id]/visits/route.ts` — Uses `getDocumentWithTeamAndUser` to verify link access before recording a visit\n\n### Dependencies\n\n- **Prisma** (`@prisma/client`) — Database queries for teams, documents, and relations\n- **lib/utils.ts** — `decryptEncrpytedPassword` for link password decryption\n- **lib/errorHandler.ts** — `TeamError`, `DocumentError` for typed exceptions\n\n## Security Considerations\n\n1. **Authorization happens server-side** — All user membership checks occur in this module before returning sensitive document data\n2. **Password decryption is localized** — Decryption only happens when needed for link access, not on every document fetch\n3. **Explicit validation** — Each function fails fast on the first authorization check that fails, preventing unnecessary database access after a rejection\n\n## Notes\n\n- The `checkOwner` parameter and its associated logic in `getTeamWithUsersAndDocument` is currently commented out. If re-enabled, it would add a fourth check verifying the requesting user is the document's `ownerId`.\n- The `decryptEncrpytedPassword` function name contains a typo (`Encrpyted` instead of `Encrypted`) — this is a pre-existing issue in the codebase.","lib-tinybird":"# lib — tinybird\n\n# Tinybird Analytics Module\n\nThe `lib/tinybird` module provides typed integrations with [Tinybird](https://tinybird.co/), a real-time analytics platform built on ClickHouse. This module handles all analytics event ingestion and querying for the application.\n\n## Overview\n\nTinybird serves as the analytics backend for tracking user engagement with documents, videos, and links. The module provides two primary capabilities:\n\n1. **Event Ingestion** — Publishing analytics events (page views, video plays, clicks) to Tinybird datasources\n2. **Analytics Queries** — Fetching aggregated statistics through Tinybird pipes\n\nThe module uses [`@chronark/zod-bird`](https://github.com/chronark/zod-bird) to generate fully typed, type-safe wrappers around Tinybird endpoints, ensuring compile-time validation of parameters and response data.\n\n## Architecture\n\n```mermaid\nflowchart LR\n    subgraph Application\n        A[User Action]\n        E[Event Publisher]\n    end\n    \n    subgraph lib/tinybird\n        P[publish.ts]\n        PS[pipes.ts]\n    end\n    \n    subgraph Tinybird\n        D[Datasources]\n        PP[Pipes/Endpoints]\n    end\n    \n    A --> E\n    E --> P\n    P --> D\n    PS --> PP\n    PP --> D\n```\n\n### Data Flow\n\n1. **Ingestion Path**: User actions trigger event publishers in `publish.ts`, which send JSON events to Tinybird datasources\n2. **Query Path**: Analytics queries call functions from `pipes.ts`, which execute Tinybird pipe endpoints and return typed responses\n\n## Datasources\n\nThe module manages five analytics datasources in Tinybird:\n\n### page_views__v3\n\nTracks when a user views a page within a document. Contains comprehensive engagement data including geolocation, device information, and timing metrics.\n\n| Field | Type | Description |\n|-------|------|-------------|\n| `id` | String | Unique event identifier |\n| `linkId` | String | The sharing link ID |\n| `documentId` | String | The viewed document |\n| `viewId` | String | Unique viewer session ID |\n| `time` | Int64 | Unix timestamp |\n| `duration` | UInt32 | Time spent on page (ms) |\n| `pageNumber` | LowCardinality(String) | Page identifier |\n| `browser`, `os`, `device` | String | User agent components |\n| `country`, `city`, `region` | String | Geo information |\n| `bot` | UInt8 | Bot detection flag |\n\n### click_events__v1\n\nRecords when a user clicks a link within a document (internal navigation).\n\n| Field | Type | Description |\n|-------|------|-------------|\n| `timestamp` | DateTime64(3) | Event timestamp |\n| `event_id` | String | Unique event ID |\n| `session_id` | String | User session |\n| `link_id` | String | Clicked link |\n| `document_id` | String | Parent document |\n| `view_id` | String | Viewer session |\n| `page_number` | LowCardinality(String) | Source page |\n| `href` | String | Destination URL |\n\n### pm_click_events__v1\n\nTracks link clicks from the public-facing link viewer, capturing extended geographic and device data.\n\n| Field | Type | Description |\n|-------|------|-------------|\n| `click_id` | String | Unique click ID |\n| `view_id` | String | Viewer session |\n| `link_id` | String | Clicked link |\n| `continent`, `country` | LowCardinality(String) | Geographic region |\n| `device`, `browser`, `os` | LowCardinality(String) | Device info |\n| `ip_address` | Nullable(String) | User IP |\n| `bot` | UInt8 | Bot detection |\n\n### video_views__v1\n\nRecords video playback events with detailed engagement metrics.\n\n| Field | Type | Description |\n|-------|------|-------------|\n| `event_type` | LowCardinality(String) | Event type (start, play, pause, end) |\n| `start_time`, `end_time` | UInt32 | Playback position (seconds) |\n| `playback_rate` | UInt16 | Stored as 100/150/200 (not 1.0/1.5/2.0) |\n| `volume` | UInt8 | Stored as 0-100 (not 0.0-1.0) |\n| `is_muted`, `is_focused`, `is_fullscreen` | UInt8 | State flags |\n\n### webhook_events__v1\n\nLogs webhook delivery attempts for debugging and monitoring.\n\n| Field | Type | Description |\n|-------|------|-------------|\n| `event_id` | String | Unique event ID |\n| `webhook_id` | String | Webhook configuration ID |\n| `event` | LowCardinality(String) | Trigger type |\n| `http_status` | UInt16 | Response status code |\n| `request_body`, `response_body` | String | Request/response payloads |\n| `message_id` | String | QStash message ID |\n\n## Publishing Events\n\nThe `publish.ts` file exports ingest endpoint functions. Call these from your application code when tracking events.\n\n### Available Publishers\n\n| Function | Datasource | Purpose |\n|----------|------------|---------|\n| `publishPageView` | `page_views__v3` | Track document page views |\n| `recordVideoView` | `video_views__v1` | Track video playback |\n| `recordClickEvent` | `click_events__v1` | Track internal link clicks |\n| `recordLinkViewTB` | `pm_click_events__v1` | Track public link views |\n| `recordWebhookEvent` | `webhook_events__v1` | Log webhook delivery |\n\n### Usage Example\n\n```typescript\nimport { publishPageView } from \"@/lib/tinybird\";\n\nawait publishPageView({\n  id: crypto.randomUUID(),\n  linkId: \"link_abc123\",\n  documentId: \"doc_xyz789\",\n  viewId: \"view_def456\",\n  time: Date.now(),\n  duration: 12500, // milliseconds\n  pageNumber: \"5\",\n  country: \"US\",\n  browser: \"Chrome\",\n  os: \"macOS\",\n});\n```\n\n### IP Address Handling\n\n`recordLinkViewTB`, `recordVideoView`, and `recordWebhookEvent` accept nullable `ip_address` fields. Pass `null` when IP is unavailable (e.g., server-side rendering).\n\n## Querying Analytics (Pipes)\n\nThe `pipes.ts` file exports typed pipe functions for analytics queries. These return Zod-parsed responses with full type inference.\n\n### Duration Queries\n\n| Function | Pipe | Returns |\n|----------|------|---------|\n| `getTotalDocumentDuration` | `get_total_document_duration__v1` | Total engagement time for a document |\n| `getTotalViewerDuration` | `get_total_viewer_duration__v1` | Total time across multiple viewers |\n| `getTotalLinkDuration` | `get_total_link_duration__v1` | Duration for a specific link |\n| `getTotalDataroomDuration` | `get_total_dataroom_duration__v1` | Duration for all docs in a dataroom |\n| `getTotalTeamDuration` | `get_total_team_duration__v1` | Team-wide aggregated stats |\n| `getDocumentDurationPerViewer` | `get_document_duration_per_viewer__v1` | Per-viewer breakdown |\n\n### Page-Level Analytics\n\n| Function | Pipe | Returns |\n|----------|------|---------|\n| `getViewPageDuration` | `get_page_duration_per_view__v5` | Duration per page for a view |\n| `getTotalAvgPageDuration` | `get_total_average_page_duration__v5` | Average duration per page across views |\n| `getViewCompletionStats` | `get_view_completion_stats__v1` | Pages viewed per viewer |\n\n### Engagement Queries\n\n| Function | Pipe | Returns |\n|----------|------|---------|\n| `getDataroomViewDocumentStats` | `get_dataroom_view_document_stats__v1` | Stats grouped by view/document |\n| `getViewUserAgent` | `get_useragent_per_view__v3` | Viewer device info |\n\n### Event Retrieval\n\n| Function | Pipe | Returns |\n|----------|------|---------|\n| `getClickEventsByView` | `get_click_events_by_view__v1` | All clicks within a view |\n| `getVideoEventsByDocument` | `get_video_events_by_document__v1` | Video events for a document |\n| `getVideoEventsByView` | `get_video_events_by_view__v1` | Video events for a view |\n| `getWebhookEvents` | `get_webhook_events__v1` | Recent webhook deliveries |\n\n### Usage Example\n\n```typescript\nimport { getTotalDocumentDuration, getViewPageDuration } from \"@/lib/tinybird\";\n\n// Query total document duration\nconst totalResult = await getTotalDocumentDuration({\n  documentId: \"doc_abc123\",\n  excludedLinkIds: \"link_x,link_y\", // comma-separated\n  excludedViewIds: \"view_1,view_2\",\n  since: Date.now() - 7 * 24 * 60 * 60 * 1000, // 7 days ago\n});\n\n// Query per-page breakdown\nconst pageResults = await getViewPageDuration({\n  documentId: \"doc_abc123\",\n  viewId: \"view_def456\",\n  since: Date.now() - 24 * 60 * 60 * 1000,\n});\n\nconsole.log(`Total: ${totalResult.data.sum_duration}ms`);\npageResults.data.forEach(page => {\n  console.log(`Page ${page.pageNumber}: ${page.sum_duration}ms`);\n});\n```\n\n## API\n\n### index.ts\n\nRe-exports all public functions:\n\n```typescript\nexport * from \"./pipes\";\nexport * from \"./publish\";\n```\n\nImport everything from `@/lib/tinybird` or import specific functions as needed.\n\n## Maintenance\n\n### Adding a New Pipe\n\n1. Create the pipe definition file in `lib/tinybird/endpoints/` (see existing `.pipe` files for format)\n2. Push to Tinybird: `tb push lib/tinybird/endpoints/<PIPENAME>.pipe`\n3. Add the TypeScript wrapper in `pipes.ts`:\n\n```typescript\nexport const getMyAnalytics = tb.buildPipe({\n  pipe: \"get_my_analytics__v1\",\n  parameters: z.object({\n    // your parameters\n  }),\n  data: z.object({\n    // your response schema\n  }),\n});\n```\n\n### Adding a New Datasource\n\n1. Create the datasource definition file in `lib/tinybird/datasources/`\n2. Push to Tinybird: `tb push lib/tinybird/datasources/<DATASOURCE>.datasource`\n3. Add the ingest endpoint in `publish.ts`:\n\n```typescript\nexport const recordMyEvent = tb.buildIngestEndpoint({\n  datasource: \"my_events__v1\",\n  event: z.object({\n    // your schema\n  }),\n});\n```\n\n### Versioning\n\nTinybird pipes and datasources are versioned via the `VERSION` directive. When modifying an existing pipe:\n\n1. Increment the version number in the `.pipe` file\n2. Update the TypeScript wrapper to reference the new version (e.g., `get_page_duration_per_view__v5`)\n\n### Deleting Data\n\nTo remove specific records from a datasource (requires careful SQL):\n\n```bash\ntb datasource delete page_views__v3 --dry-run --sql-condition \"viewId='VIEWID' and CAST(pageNumber AS UInt8) = PAGENUMBER\" --wait\n```\n\nAlways use `--dry-run` first to preview the deletion query.\n\n## Configuration\n\nThe module requires the `TINYBIRD_TOKEN` environment variable, which should be set to a valid Tinybird API token with appropriate permissions (ingest and/or query access depending on usage).","lib-tracking":"# lib — tracking\n\n# Tracking Module\n\nThe `lib/tracking` module provides comprehensive analytics tracking for document views, page interactions, and video playback events. It captures user engagement data including geographic location, device information, referrer sources, and temporal metrics like view duration.\n\n## Architecture Overview\n\n```mermaid\nflowchart TB\n    subgraph Client[\"Client-Side Tracking\"]\n        PPT[useSafePageViewTracker]\n        VT[createVideoTracker]\n    end\n    \n    subgraph Server[\"Server-Side Recording\"]\n        RLV[recordLinkView]\n        TB[Tinybird Storage]\n        WH[Webhook Events]\n        NF[Notifications]\n    end\n    \n    subgraph Config[\"Configuration\"]\n        TC[TRACKING_CONFIG]\n    end\n    \n    PPT -->|trackPageViewReliably| RLV\n    VT -->|/api/record_video_view| RLV\n    RLV -->|recordLinkViewTB| TB\n    RLV -->|sendNotification| NF\n    RLV -->|sendLinkViewWebhook| WH\n    \n    TC -->|options| PPT\n    \n    Viewers[\"PDFViewer, ImageViewer, VideoViewer, etc.\"] --> PPT\n    Viewers --> VT\n```\n\n## Key Components\n\n### `record-link-view.ts`\n\nServer-side function that processes and records link/document view events. This is the central recording endpoint invoked from API routes.\n\n**Primary Responsibilities:**\n\n1. **Bot Detection** — Filters out automated traffic using `isBot()` to prevent false analytics\n2. **Geolocation** — Extracts geographic data (continent, country, region, city) from Vercel edge headers or defaults for localhost\n3. **GDPR Compliance** — Excludes IP addresses from EU country visitors to comply with data privacy regulations\n4. **Data Recording** — Sends click/view data to three destinations in parallel:\n   - Tinybird for analytics storage\n   - Email notification system (if enabled)\n   - Webhook events (if not paused)\n\n**Input Parameters:**\n\n```typescript\n{\n  req: NextRequest;           // Incoming request for UA/geolocation\n  clickId: string;            // Unique click identifier\n  viewId: string;             // Unique view identifier\n  linkId: string;             // Associated link\n  teamId: string;             // Team context for webhooks\n  documentId?: string;        // Optional document reference\n  dataroomId?: string;        // Optional dataroom context\n  enableNotification: boolean | null;\n  isPaused: boolean;          // Webhook pause state\n}\n```\n\n**Return Value:** Returns the `clickData` object containing all captured metrics, or `null` if the visitor was identified as a bot.\n\n---\n\n### `safe-page-view-tracker.ts`\n\nReact hook that provides reliable client-side page view tracking with sophisticated timing and activity detection. Used by document viewers to measure actual engagement time.\n\n**Tracking Strategies:**\n\n1. **Interval Tracking** — Sends periodic tracking events at configurable intervals (default: 10 seconds) to capture continuous engagement\n2. **Activity Detection** — Monitors user interactions (mouse, keyboard, scroll, touch) to distinguish active reading from idle tab-switching\n3. **Inactivity Accumulation** — Tracks active time separately, only counting periods when the user is genuinely engaged\n4. **Beacon Fallback** — Uses `navigator.sendBeacon` during page unload for reliable delivery\n\n**Hook Interface:**\n\n```typescript\ninterface TrackingOptions {\n  intervalTracking?: boolean;           // Enable periodic tracking (default: true)\n  intervalDuration?: number;           // Interval in ms (default: 10000)\n  activityTracking?: boolean;           // Track active vs inactive time (default: true)\n  inactivityThreshold?: number;        // Inactivity timeout in ms (default: 60000)\n  enableActivityDetection?: boolean;   // Listen for user events (default: true)\n  externalStartTimeRef?: React.MutableRefObject<number>; // External timing control\n}\n```\n\n**Returned Methods:**\n\n| Method | Purpose |\n|--------|---------|\n| `trackPageViewSafely(data, useBeacon)` | Records a page view event with optional beacon delivery |\n| `startIntervalTracking(data)` | Begins periodic tracking for the current view |\n| `stopIntervalTracking()` | Halts periodic tracking and clears timers |\n| `resetTrackingState()` | Resets all tracking counters and timers |\n| `getActiveDuration()` | Returns accumulated active time in milliseconds |\n| `updateActivity()` | Manually triggers activity detection |\n| `isInactive` | Boolean state indicating user inactivity |\n\n**Activity Detection Events:**\nThe hook listens for `mousedown`, `mousemove`, `keydown`, `keyup`, `scroll`, `touchstart`, and `click` to determine active engagement.\n\n---\n\n### `video-tracking.ts`\n\nClass-based tracker for video playback analytics with debounced event handling.\n\n**Tracked Video Events:**\n\n| Event Type | Trigger | Debounce |\n|------------|---------|----------|\n| `loaded` | Video metadata loaded | Immediate (1s) |\n| `played` | Playback started/resumed | 1s |\n| `seeked` | User skipped ahead/back | 500ms |\n| `rate_changed` | Playback speed changed | 500ms |\n| `volume_up/down` | Volume adjustments | 500ms |\n| `muted/unmuted` | Mute toggle | Immediate (500ms) |\n| `focus/blur` | Tab visibility changes | Immediate (500ms) |\n| `enterfullscreen/exitfullscreen` | Fullscreen toggle | Immediate (500ms) |\n\n**Delivery Strategy:**\n\n1. Primary: `navigator.sendBeacon` with blob payload for maximum reliability\n2. Fallback: `fetch` with `keepalive: true` for unload scenarios\n3. Tertiary: Retry with sendBeacon if fetch fails\n\n**Class Methods:**\n\n| Method | Purpose |\n|--------|---------|\n| `updateConfig(config)` | Update tracking configuration mid-playback |\n| `trackVisibilityChange(isVisible)` | Handle tab visibility changes |\n| `cleanup()` | Remove listeners and send final events |\n\n**Usage Pattern:**\n\n```typescript\nconst tracker = createVideoTracker(videoElement, {\n  linkId: string,\n  documentId: string,\n  viewId?: string,\n  dataroomId?: string,\n  versionNumber: number,\n  playbackRate: number,\n  volume: number,\n  isMuted: boolean,\n  isFocused: boolean,\n  isFullscreen: boolean,\n  isPreview?: boolean,\n});\n```\n\n---\n\n### `tracking-config.ts`\n\nCentralized configuration constants for tracking behavior across all components.\n\n**Configuration Values:**\n\n```typescript\nTRACKING_CONFIG = {\n  INTERVAL_TRACKING_ENABLED: true,\n  INTERVAL_DURATION: 10000,           // 10 seconds\n  ACTIVITY_TRACKING_ENABLED: true,\n  INACTIVITY_THRESHOLD: 5 * 60000,   // 5 minutes\n  ACTIVITY_DETECTION_ENABLED: true,\n  MIN_TRACKING_DURATION: 1000,        // 1 second\n}\n```\n\n**Helper Function:**\n\n```typescript\ngetTrackingOptions(overrides)\n```\n\nMerges user-provided overrides with defaults, allowing per-component configuration without duplicating constants.\n\n---\n\n## Data Flow\n\n### Page View Tracking Flow\n\n```mermaid\nsequenceDiagram\n    participant User\n    participant Viewer as Document Viewer\n    participant Tracker as useSafePageViewTracker\n    participant Reliable as trackPageViewReliably\n    participant API as POST /api/views\n    participant Record as recordLinkView\n    participant TB as Tinybird\n    participant Webhook as sendLinkViewWebhook\n\n    User->>Viewer: Opens document\n    Viewer->>Tracker: startIntervalTracking()\n    \n    loop Every intervalDuration\n        Tracker->>Tracker: getActiveDuration()\n        alt activeDuration >= MIN_TRACKING_DURATION\n            Tracker->>Reliable: trackPageViewReliably(data, false)\n            Reliable->>API: POST /api/views\n            API->>Record: recordLinkView()\n            Record->>TB: recordLinkViewTB()\n            Record->>Webhook: sendLinkViewWebhook()\n        end\n    end\n    \n    User->>Viewer: Leaves page\n    Viewer->>Tracker: Unmount cleanup\n    Tracker->>Reliable: trackPageViewReliably(data, true)\n    Reliable->>API: POST /api/views\n```\n\n### Video Tracking Flow\n\n```mermaid\nsequenceDiagram\n    participant User\n    participant Video as HTMLVideoElement\n    participant Tracker as VideoTracker\n    participant API as /api/record_video_view\n\n    User->>Video: Clicks play\n    Video->>Tracker: play event\n    Tracker->>Tracker: debounce(played, 1000ms)\n    \n    loop Every 10s during playback\n        Tracker->>Tracker: timeupdate\n        Tracker->>Tracker: trackEvent(played)\n    end\n    \n    User->>Video: Pauses\n    Video->>Tracker: pause event\n    Tracker->>Tracker: trackEvent(played)\n    \n    User->>Browser: Switches tabs\n    Browser->>Tracker: visibilitychange (hidden)\n    Tracker->>Tracker: trackVisibilityChange(false)\n    Tracker->>API: sendBeacon()\n```\n\n---\n\n## GDPR and Privacy Considerations\n\nThe tracking module implements several privacy safeguards:\n\n1. **EU IP Exclusion** — IP addresses are only recorded for non-EU country visitors. EU visitors have `ip_address: null` in all records.\n\n2. **Bot Filtering** — Automated traffic from crawlers and bots is detected via `isBot()` and excluded from all tracking.\n\n3. **Preview Mode** — When `isPreview: true` is set, video tracking skips recording to avoid capturing preview/impression data.\n\n4. **Data Minimization** — Only essential engagement metrics are collected; no personal information beyond device/browser fingerprinting.\n\n---\n\n## Usage in Viewers\n\nThe tracking module is consumed by multiple viewer components:\n\n| Viewer Component | Tracking Features |\n|------------------|-------------------|\n| `PDFViewer` | Page view tracking with activity detection |\n| `ImageViewer` | Interval tracking, viewed pages state |\n| `VideoViewer` | Video-specific event tracking |\n| `ExcelViewer` | Page duration accumulation |\n| `NotionPage` | Full activity tracking configuration |\n| `LinkPreview` | Basic interval tracking |\n\nExample integration pattern:\n\n```typescript\nfunction DocumentViewer({ linkId, documentId }) {\n  const { \n    trackPageViewSafely, \n    startIntervalTracking, \n    stopIntervalTracking \n  } = useSafePageViewTracker(getTrackingOptions());\n\n  useEffect(() => {\n    startIntervalTracking({ \n      linkId, \n      documentId,\n      pageNumber: 1,\n      versionNumber: 1 \n    });\n\n    return () => stopIntervalTracking();\n  }, [linkId]);\n\n  // On page change:\n  const handlePageChange = (pageNumber) => {\n    trackPageViewSafely({\n      linkId, documentId, pageNumber, duration: activeDuration\n    });\n  };\n}\n```\n\n---\n\n## Dependencies\n\n**External:**\n- `next/server` — Request/response handling\n- `@vercel/functions` — Edge geolocation functions\n\n**Internal:**\n- `lib/tinybird` — Analytics data storage\n- `lib/api/notification-helper` — Email notifications\n- `lib/api/views/send-webhook-event` — Webhook delivery\n- `lib/utils/user-agent` — Bot detection\n- `lib/utils/reliable-tracking` — Beacon-based delivery\n- `lib/constants` — EU country codes, video event types","lib-trigger":"# lib — trigger\n\n# lib/trigger Module\n\nCentral hub for all Trigger.dev background tasks. These tasks handle long-running, asynchronous, and scheduled operations that would exceed API request timeouts or require reliable background processing.\n\n## Overview\n\nThe module provides a unified interface for Trigger.dev tasks across the application, from document conversion and bulk downloads to notifications and scheduled cleanup jobs. Each task is designed for specific operational concerns: document processing, dataroom management, exports, and notifications.\n\n## Architecture\n\n```mermaid\nflowchart TB\n    subgraph \"Trigger Tasks\"\n        BDT[bulkDownloadTask]\n        CFT[convertFilesToPdfTask<br/>convertCadToPdfTask<br/>convertKeynoteToPdfTask]\n        CPD[convertPdfDirectTask]\n        PTIR[convertPdfToImageRoute]\n        OVF[processVideo]\n        EVT[exportVisitsTask]\n        DCN[sendDataroomChangeNotificationTask]\n        DUN[sendDataroomUploadNotificationTask]\n        CEE[cleanupExpiredExports]\n    end\n\n    subgraph \"External Services\"\n        LAMBDA[AWS Lambda]\n        GOTENBERG[Gotenberg<br/>LibreOffice]\n        MUPDF[MuPDF WASM]\n        FFMPEG[FFmpeg]\n        TB[Tinybird API]\n        VB[Vercel Blob]\n        EDGE[Edge Config]\n    end\n\n    subgraph \"Internal Services\"\n        JSTORE[Redis Job Store]\n        PRISMA[(Prisma DB)]\n        S3[S3 Storage]\n        SLACK[Slack]\n        EMAIL[Email Service]\n    end\n\n    BDT --> LAMBDA\n    BDT --> JSTORE\n    CFT --> GOTENBERG\n    CFT --> PTIR\n    CPD --> MUPDF\n    PTIR --> EDGE\n    OVF --> FFMPEG\n    EVT --> TB\n    EVT --> VB\n    EVT --> PRISMA\n    DCN --> JSTORE\n    DCN --> EMAIL\n    CEE --> VB\n    CEE --> JSTORE\n```\n\n## Key Tasks\n\n### Document Conversion Pipeline\n\nThree-stage pipeline for converting various file formats to PDF, then processing into page images.\n\n| Task | File | Purpose |\n|------|------|---------|\n| `convertFilesToPdfTask` | `convert-files.ts` | DOCX/Office → PDF via Gotenberg/LibreOffice |\n| `convertCadToPdfTask` | `convert-files.ts` | CAD files (DWG, DXF) → PDF |\n| `convertKeynoteToPdfTask` | `convert-files.ts` | Keynote/iWork → PDF |\n| `convertPdfToImageRoute` | `pdf-to-image-route.ts` | Routes PDFs to appropriate conversion path |\n| `convertPdfDirectTask` | `convert-pdf-direct.ts` | Large PDF → images via MuPDF WASM |\n\n#### Conversion Flow\n\n```mermaid\nsequenceDiagram\n    participant API as API Route\n    participant Queue as Trigger Queue\n    participant Gotenberg as Gotenberg/LibreOffice\n    participant Lambda as AWS Lambda\n    participant MuPDF as MuPDF WASM\n    participant S3 as S3 Storage\n\n    API->>Queue: Trigger conversion task\n    Queue->>Gotenberg: POST file for conversion\n    Gotenberg->>Queue: Return PDF buffer\n\n    alt Large PDF (>150MB)\n        Queue->>MuPDF: Direct WASM processing\n        MuPDF->>S3: Upload page images\n    else Standard PDF\n        loop Each page\n            Queue->>Lambda: Convert page\n            Lambda->>S3: Upload page image\n        end\n    end\n```\n\n#### DOCX Sanitization Path\n\nWhen Gotenberg conversion fails for DOCX files, `convertFilesToPdfTask` attempts sanitization via a Python script (`docx-sanitizer.py`) before retrying:\n\n```typescript\n// From convert-files.ts\nconst result = await python.runScript(\n  \"./ee/features/conversions/python/docx-sanitizer.py\",\n  [\"-v\", \"--mode\", \"all\", inputPath, outputPath],\n);\n// Then retry Gotenberg conversion on sanitized output\n```\n\n### Bulk Download (`bulkDownloadTask`)\n\nHandles large dataroom document downloads with automatic batching and Lambda invocation.\n\n```mermaid\nflowchart LR\n    subgraph \"API Path\"\n        A[API Request] --> B{Build folder<br/>structure?}\n    end\n\n    subgraph \"Task Execution\"\n        B -->|Yes| C[buildDownloadContext]\n        B -->|No| D[Use pre-built<br/>structure]\n        C --> E[Revalidate permissions]\n        C --> F[Query folders/docs]\n        C --> G[Build file list]\n        C --> H[Persist views]\n        D --> I{Size check}\n        I -->|Small| J[Single batch]\n        I -->|Large| K[Split into batches]\n    end\n\n    subgraph \"Lambda Processing\"\n        J --> L[Invoke Lambda]\n        K --> L\n        L --> M[Watermark + ZIP]\n        M --> N[Upload to S3]\n    end\n\n    subgraph \"Completion\"\n        N --> O[Update Redis job]\n        O --> P[Send email]\n    end\n```\n\n#### Batching Strategy\n\nThe task uses a size-aware batching algorithm (`splitFilesIntoBatches`):\n\n```typescript\n// Size limits\nconst MAX_FILES_PER_BATCH = 500;\nconst MAX_ZIP_SIZE_BYTES = 500 * 1024 * 1024; // 500MB\nconst UNKNOWN_FILE_SIZE_ESTIMATE = 10 * 1024 * 1024; // 10MB fallback\n```\n\n**Batching rules:**\n- If >50% of files have known sizes → size-based batching\n- Otherwise → count-based batching (500 files per batch)\n- Each batch becomes a separate ZIP with part numbers\n\n#### Permission Revalidation\n\nBefore processing, `revalidateDownloadContext` checks the **live** database state to handle the time-of-check/time-of-use gap:\n\n- Link archived/deleted status\n- Link expiration\n- Download permission settings\n- Bulk download allowance\n\n```typescript\n// Throws DownloadNotPermittedError for invalid states\nif (link.isArchived) throw NOT_PERMITTED;\nif (link.expiresAt && link.expiresAt < new Date()) throw NOT_PERMITTED;\nif (type === \"bulk\" && !link.dataroom.allowBulkDownload) throw NOT_PERMITTED;\n```\n\n### Export Visits (`exportVisitsTask`)\n\nExports document or dataroom visit analytics to CSV, with rate-limited Tinybird API calls.\n\n#### Processing Flow\n\n```mermaid\nsequenceDiagram\n    participant Task as Trigger Task\n    participant Redis as Redis Job Store\n    participant Prisma as Prisma Database\n    participant Tinybird as Tinybird API\n    participant Blob as Vercel Blob\n    participant Email as Email Service\n\n    Task->>Redis: Update status to PROCESSING\n    Task->>Prisma: Fetch views with filters\n    Task->>Prisma: Filter views during pause period\n    Note over Task: Rate limit: 5 concurrent,<br/>200ms between calls\n\n    loop Each view\n        Task->>Tinybird: getViewPageDuration()\n        Task->>Tinybird: getViewUserAgent()\n        Note over Tinybird: ~400ms per view\n    end\n\n    Task->>Blob: Upload CSV\n    Task->>Redis: Update status + blob URL\n    Task->>Email: Send download link (if requested)\n```\n\n#### Rate Limiting\n\nUses Bottleneck to respect Tinybird API limits:\n\n```typescript\nconst tinybirdLimiter = new Bottleneck({\n  maxConcurrent: 5,\n  minTime: 200, // ms between requests\n});\n```\n\n### Dataroom Notifications\n\n#### `sendDataroomChangeNotificationTask`\n\nNotifies verified viewers when documents are added/updated in a dataroom.\n\n**Notification routing:**\n1. Check viewer's notification preferences (instant/daily/weekly)\n2. Verify folder access via cached permission checks\n3. For instant → direct HTTP call to notification endpoint\n4. For digest → queue via Redis for batched delivery\n\n```typescript\n// Caches folder access checks to reduce DB queries\nconst folderAccessCache = new Map<string, boolean>();\nconst canViewFolder = async (groupId, permissionGroupId, folderId) => {\n  const cacheKey = `viewer-group:${groupId}:${folderId}`;\n  if (folderAccessCache.has(cacheKey)) return folderAccessCache.get(cacheKey);\n  // ... query and cache result\n};\n```\n\n#### `sendDataroomUploadNotificationTask`\n\nBatches uploads within a 10-minute window and notifies team members:\n\n```typescript\nconst tenMinutesAgo = new Date(Date.now() - 10 * 60 * 1000);\nconst recentUploads = await prisma.documentUpload.findMany({\n  where: {\n    uploadedAt: { gte: tenMinutesAgo },\n  },\n});\n```\n\n### Video Optimization (`processVideo`)\n\nProcesses uploaded videos using FFmpeg for web-optimized H.264 encoding.\n\n**Capabilities:**\n- Scale videos larger than 1080p down to 1920px width\n- Keyframe interval: 2 seconds\n- Output: H.264/AAC MP4 with faststart for web streaming\n- Skips optimization for files >500MB\n\n```typescript\n// Encoding parameters\nconst bitrate = \"6000k\";\nconst maxBitrate = parseInt(bitrate.replace(\"k\", \"\")) * 2;\nconst keyframeInterval = Math.round(metadata.fps * 2);\n```\n\n### Scheduled Tasks\n\n#### `cleanupExpiredExports`\n\nRuns daily at 02:00 UTC to remove expired export blobs:\n\n```typescript\nexport const cleanupExpiredExports = schedules.task({\n  id: \"cleanup-expired-exports\",\n  cron: \"0 2 * * *\",\n  // Fetches blobs due for cleanup from Redis\n  // Deletes from Vercel Blob\n  // Removes from cleanup queue\n});\n```\n\n## Common Patterns\n\n### Progress Tracking\n\nTasks report progress via `metadata` for the Trigger.dev UI:\n\n```typescript\nfunction setProgress(status: { progress: number; text: string }) {\n  metadata.set(\"status\", status);\n  try {\n    metadata.parent.set(\"status\", status); // For nested tasks\n  } catch {\n    // no parent task\n  }\n}\n```\n\n### Error Handling\n\n- **Retryable errors**: Tasks throw to trigger retry (up to configured max attempts)\n- **AbortTaskRunError**: Used for permanent failures that shouldn't retry (e.g., document blocked)\n- **Validation failures**: Clean user-facing messages stored in job status\n\n```typescript\n// Example: Download permission failure\nclass DownloadNotPermittedError extends Error {\n  constructor(public readonly userMessage: string) {\n    super(userMessage);\n    this.name = \"DownloadNotPermittedError\";\n  }\n}\n```\n\n### Job Status Updates\n\nLong-running tasks update Redis to allow polling:\n\n```typescript\nawait downloadJobStore.updateJob(jobId, {\n  status: \"PROCESSING\",\n  phase: \"ZIPPING\",\n  processedFiles: 0,\n  progress: 0,\n  totalFiles: fileKeys.length,\n});\n```\n\n## External Dependencies\n\n| Service | Tasks Using It | Purpose |\n|---------|---------------|---------|\n| **Trigger.dev SDK** | All | Task execution, retries, queues, scheduling |\n| **AWS Lambda** | `bulkDownloadTask` | ZIP processing with watermarks |\n| **Gotenberg** | `convertFilesToPdfTask` | Office document → PDF |\n| **MuPDF WASM** | `convertPdfDirectTask` | Large PDF → images |\n| **FFmpeg** | `processVideo` | Video encoding |\n| **Tinybird** | `exportVisitsTask` | Analytics data |\n| **Vercel Blob** | `exportVisitsTask`, `cleanupExpiredExports` | CSV storage, cleanup |\n| **Edge Config** | `convertPdfDirectTask`, `pdf-to-image-route` | Trusted team flags, blocked keywords |\n\n## Configuration\n\nTasks use machine presets appropriate to their workload:\n\n| Preset | Memory | Use Case |\n|--------|--------|----------|\n| `small-1x` | 512MB | Simple tasks, small data |\n| `medium-1x` | 1GB | Video processing |\n| `large-1x` | 2GB | MuPDF PDF conversion |\n\nRetry configuration varies by task:\n- **Bulk download**: 2 attempts\n- **File conversion**: 3 attempts\n- **Export visits**: 2 attempts\n- **Notifications**: 3 attempts","lib-types":"# lib — types\n\n# lib/types Module\n\nType definitions for document management and dataroom indexing features.\n\n## Overview\n\nThis module exports TypeScript interfaces for two distinct but related domains:\n\n- **Document previews** — metadata and page information for rendered documents\n- **Dataroom indexes** — structured directory listings of files and folders within a dataroom\n\nThese types are consumed throughout the application wherever document or dataroom data is processed, stored, or transmitted.\n\n---\n\n## Document Preview Types\n\n### `DocumentPreviewData`\n\nRepresents the complete preview state for a document, including metadata, page details, and optional Excel-specific data.\n\n```typescript\nexport interface DocumentPreviewData {\n  documentId: string;\n  documentName: string;\n  documentType: string;\n  fileType: string;\n  isVertical: boolean;\n  numPages: number;\n  advancedExcelEnabled?: boolean;\n  pages?: {\n    file: string | null;\n    pageNumber: string;\n    embeddedLinks: string[];\n    pageLinks: {\n      href: string;\n      coords: string;\n      isInternal?: boolean;\n      targetPage?: number;\n    }[];\n    metadata: { width: number; height: number; scaleFactor: number };\n  }[];\n  file?: string;\n  sheetData?: any;\n}\n```\n\n| Property | Type | Description |\n|----------|------|-------------|\n| `documentId` | `string` | Unique identifier for the document |\n| `documentName` | `string` | Display name of the document |\n| `documentType` | `string` | Classification type (e.g., \"pdf\", \"spreadsheet\") |\n| `fileType` | `string` | MIME type or file extension category |\n| `isVertical` | `boolean` | Page orientation flag |\n| `numPages` | `number` | Total page count |\n| `advancedExcelEnabled` | `boolean?` | Whether advanced Excel rendering is active |\n| `pages` | `Page[]?` | Array of page data when multi-page rendering is used |\n| `file` | `string?` | Base file reference (single-page documents) |\n| `sheetData` | `any?` | Excel sheet information when applicable |\n\n#### Page Structure\n\nEach page in the `pages` array contains:\n\n- **`file`**: Path or URL to the rendered page image. Can be `null` for placeholder pages.\n- **`pageNumber`**: Page identifier as a string (e.g., `\"1\"`, `\"2\"`)\n- **`embeddedLinks`**: Raw link URLs found within the page content\n- **`pageLinks`**: Parsed link objects with positioning information\n\n#### Page Link Structure\n\nLinks extracted from pages include both external URLs and internal document navigation:\n\n```typescript\npageLinks: {\n  href: string;       // Destination URL\n  coords: string;     // Bounding box coordinates (e.g., \"x,y,w,h\")\n  isInternal?: boolean;      // Whether link targets internal content\n  targetPage?: number;       // For internal links, the target page number\n}\n```\n\n---\n\n## Dataroom Index Types\n\nDataroom indexes provide a structured view of files and folders within a virtual data room, enabling navigation, search, and export functionality.\n\n### `DataroomIndexEntry`\n\nRepresents a single item (file or folder) within the index.\n\n```typescript\nexport interface DataroomIndexEntry {\n  hierarchicalIndex: string | null | undefined;\n  name: string;\n  type: \"File\" | \"Folder\" | \"Root Folder\";\n  path: string;\n  size?: number;\n  pages?: number;\n  lastUpdated: Date;\n  onlineUrl?: string;\n  mimeType?: string;\n  createdAt?: Date;\n  version?: number;\n}\n```\n\n| Property | Type | Description |\n|----------|------|-------------|\n| `hierarchicalIndex` | `string?` | Breadcrumb or hierarchical path string for display |\n| `name` | `string` | Entry display name |\n| `type` | `\"File\" \\| \"Folder\" \\| \"Root Folder\"` | Item classification |\n| `path` | `string` | Full filesystem-style path |\n| `size` | `number?` | File size in bytes (undefined for folders) |\n| `pages` | `number?` | Page count for multi-page documents |\n| `lastUpdated` | `Date` | Most recent modification timestamp |\n| `onlineUrl` | `string?` | CDN or storage URL for online access |\n| `mimeType` | `string?` | MIME type for files |\n| `createdAt` | `Date?` | Creation timestamp |\n| `version` | `number?` | Document version number |\n\n### `DataroomIndex`\n\nThe complete index for a dataroom, containing metadata and all entries.\n\n```typescript\nexport interface DataroomIndex {\n  dataroomId: string;\n  dataroomName: string;\n  linkId: string;\n  generatedAt: Date;\n  entries: DataroomIndexEntry[];\n  totalFiles: number;\n  totalFolders: number;\n  totalSize: number;\n}\n```\n\n| Property | Type | Description |\n|----------|------|-------------|\n| `dataroomId` | `string` | Unique identifier for the dataroom |\n| `dataroomName` | `string` | Display name of the dataroom |\n| `linkId` | `string` | Sharing or access link identifier |\n| `generatedAt` | `Date` | When the index was generated |\n| `entries` | `DataroomIndexEntry[]` | All files and folders in the dataroom |\n| `totalFiles` | `number` | Count of files only |\n| `totalFolders` | `number` | Count of folders only |\n| `totalSize` | `number` | Sum of all file sizes in bytes |\n\n### `IndexFileFormat`\n\nSupported export formats for dataroom indexes:\n\n```typescript\nexport type IndexFileFormat = \"excel\" | \"csv\" | \"json\";\n```\n\n---\n\n## Relationship Diagram\n\n```mermaid\nerDiagram\n    DataroomIndex ||--o{ DataroomIndexEntry : contains\n    DataroomIndexEntry {\n        string hierarchicalIndex\n        string name\n        string type\n        string path\n        number size\n        number pages\n        Date lastUpdated\n        string onlineUrl\n    }\n    DataroomIndex {\n        string dataroomId\n        string dataroomName\n        string linkId\n        Date generatedAt\n        DataroomIndexEntry[] entries\n        number totalFiles\n        number totalFolders\n        number totalSize\n    }\n```\n\n---\n\n## Usage Notes\n\n### Type Safety\n\nThese interfaces provide compile-time type safety for:\n\n- API request/response payloads\n- Database entity shapes\n- Component props for document viewers\n- Export generators for different file formats\n\n### Extensibility\n\nBoth `DocumentPreviewData` and `DataroomIndexEntry` use optional properties (`?`) to accommodate variations across document types and export configurations. Always check for the presence of optional fields before accessing them.\n\n### Common Patterns\n\n**Working with index entries:**\n\n```typescript\nconst files = index.entries.filter(e => e.type === \"File\");\nconst folders = index.entries.filter(e => e.type === \"Folder\");\nconst totalDocumentSize = files.reduce((sum, f) => sum + (f.size ?? 0), 0);\n```\n\n**Iterating document pages:**\n\n```typescript\nif (preview.pages) {\n  for (const page of preview.pages) {\n    // page.pageNumber, page.pageLinks, page.metadata\n  }\n}\n```","lib-webhook":"# lib — webhook\n\n# Webhook Module (`lib/webhook`)\n\nThe webhook module handles reliable delivery of event notifications to external systems. When actions occur in Papermark (documents created, links generated, etc.), registered webhooks receive POST requests with event payloads signed using HMAC-SHA256.\n\n## Architecture Overview\n\n```mermaid\nsequenceDiagram\n    participant Trigger as Event Source\n    participant Handler as Trigger Handler\n    participant Webhook as sendWebhooks()\n    participant QStash as QStash\n    participant Receiver as External Endpoint\n\n    Trigger->>Handler: Event occurs\n    Handler->>Handler: Check plan eligibility\n    Handler->>Handler: Check team not paused\n    Handler->>Handler: Fetch relevant data\n    Handler->>Webhook: sendWebhooks(webhooks, trigger, data)\n    Webhook->>Webhook: prepareWebhookPayload()\n    Webhook->>Webhook: Create HMAC signature\n    Webhook->>QStash: Publish JSON message\n    QStash->>Receiver: POST with signature\n    QStash->>Receiver: Retry on failure\n```\n\n## Trigger Events\n\nThe module supports the following webhook events, organized by scope:\n\n| Event | Scope | Description |\n|-------|-------|-------------|\n| `document.created` | Team | A document is created |\n| `document.updated` | Team | A document is modified |\n| `document.deleted` | Team | A document is removed |\n| `dataroom.created` | Team | A data room is created |\n| `link.created` | Document | A link is generated |\n| `link.updated` | Document | A link is modified |\n| `link.viewed` | Link | A link receives a view |\n| `link.downloaded` | Link | A link triggers a download |\n\n## Core Components\n\n### Payload Preparation (`transform.ts`)\n\n`prepareWebhookPayload()` normalizes event data into a consistent schema before delivery:\n\n```typescript\nconst payload = prepareWebhookPayload(trigger, data);\n```\n\nThe payload includes:\n- `id` — Unique event identifier with `webhookEvent` prefix\n- `event` — The trigger type (e.g., `link.created`)\n- `data` — Event-specific payload data\n- `createdAt` — ISO timestamp of event creation\n\n### Signature Generation (`signature.ts`)\n\n`createWebhookSignature()` generates an HMAC-SHA256 signature that receivers use to verify payload authenticity:\n\n```typescript\nconst signature = await createWebhookSignature(webhook.secret, payload);\n```\n\nThe signature is:\n1. Computed over the JSON-stringified payload body\n2. Hex-encoded from the raw HMAC output\n3. Sent in the `X-Papermark-Signature` header\n\nReceivers should recompute the HMAC using their configured secret and compare it against the received signature.\n\n### Webhook Delivery (`send-webhooks.ts`)\n\nThe `sendWebhooks()` function orchestrates delivery to multiple endpoints:\n\n```typescript\nconst results = await sendWebhooks({\n  webhooks,\n  trigger: \"link.created\",\n  data: webhookData,\n});\n```\n\n**Delivery flow:**\n1. Validates the payload against the schema\n2. Maps each webhook to a QStash publish call\n3. Uses `Promise.allSettled` so one failure doesn't block others\n4. Returns only fulfilled results; logs errors for rejections\n\n**QStash integration:**\n- Messages are published with the target URL, signed body, and headers\n- `Upstash-Hide-Headers: true` prevents internal headers from reaching receivers\n- Both `callback` and `failureCallback` point to `/api/webhooks/callback` for delivery confirmation\n\n**URL redaction:**\n`redactUrl()` strips query strings and path segments from logged URLs, preventing accidental exposure of credentials embedded in webhook endpoints:\n\n```typescript\n// \"https://api.example.com/hook?token=secret\" → \"https://api.example.com/\"\n```\n\n### Trigger Handlers (`triggers/`)\n\nEach trigger handler follows a consistent pattern:\n\n1. **Extract required IDs** from input data\n2. **Check plan eligibility** — Only enterprise-tier teams receive webhooks\n3. **Check team status** — Paused teams are skipped\n4. **Query registered webhooks** — Find endpoints subscribed to this trigger\n5. **Fetch event data** — Retrieve the relevant document/link/dataroom\n6. **Dispatch** via `sendWebhooks()`\n\n**Example: Link created webhook (`triggers/link-created.ts`)**\n\n```typescript\nexport async function sendLinkCreatedWebhook({ teamId, data }) {\n  // 1. Validate required IDs\n  const { link_id, document_id, dataroom_id } = data;\n  \n  // 2. Check team plan (must be enterprise, not free/pro)\n  const team = await prisma.team.findUnique({ where: { id: teamId }, select: { plan: true } });\n  if (team?.plan === \"free\" || team?.plan === \"pro\") return;\n  \n  // 3. Check team not paused\n  if (await isTeamPausedById(teamId)) return;\n  \n  // 4. Find subscribed webhooks\n  const webhooks = await prisma.webhook.findMany({\n    where: { teamId, triggers: { array_contains: [\"link.created\"] } },\n    select: { pId: true, url: true, secret: true },\n  });\n  if (webhooks.length === 0) return;\n  \n  // 5. Fetch link with optional document/dataroom\n  const link = await prisma.link.findUnique({ where: { id: linkId } });\n  \n  // 6. Send to all matching webhooks\n  await sendWebhooks({ webhooks, trigger: \"link.created\", data: webhookData });\n}\n```\n\n## Integration Points\n\n### Incoming Triggers\n\nThe following API routes and service handlers invoke webhook functions:\n\n| Source | Trigger Function | Event |\n|--------|-----------------|-------|\n| `services/[...path]/index.ts` | `handleDataroomCreate()` | `sendLinkCreatedWebhook()` |\n| `services/[...path]/index.ts` | `handleLinkCreate()` | `sendLinkCreatedWebhook()` |\n| `api/documents/process-document.ts` | `processDocument()` | `sendLinkCreatedWebhook()`, `sendDocumentCreatedWebhook()` |\n| `api/links/index.ts` | `handler()` | `sendLinkCreatedWebhook()` |\n| `api/links/[id]/duplicate.ts` | `handle()` | `sendLinkCreatedWebhook()` |\n| `api/links/bulk-import.ts` | `handleBulkLinkImport()` | `sendLinkCreatedWebhook()` |\n| `api/views/send-webhook-event.ts` | `sendLinkViewWebhook()` | `sendWebhooks()` directly |\n| `api/documents/process-document.ts` | `processDocument()` | `sendDocumentCreatedWebhook()` |\n\n### Internal Dependencies\n\n| Dependency | Usage |\n|------------|-------|\n| `@/lib/cron` (QStash) | HTTP message publishing |\n| `@/ee/features/billing/cancellation/lib/is-team-paused` | Pause status check |\n| `@/lib/prisma` | Webhook and entity queries |\n| `@/lib/id-helper` | Event ID generation |\n| `@/lib/zod/schemas/webhooks` | Payload validation schemas |\n| `@/lib/utils` (log) | Error logging |\n\n## Security Considerations\n\n### Signature Verification\n\nReceivers should verify the `X-Papermark-Signature` header to ensure:\n- The payload originated from Papermark\n- It wasn't tampered with in transit\n\n```typescript\n// Receiver-side verification (pseudocode)\nconst expectedSig = hmacSha256(secret, JSON.stringify(body));\nif (expectedSig !== receivedSignature) {\n  return reject(\"Invalid signature\");\n}\n```\n\n### Credential Protection\n\n- Webhook URLs containing tokens, API keys, or basic auth credentials are redacted in server logs\n- Secrets are never included in the payload body — only used for signature generation\n- URLs are sanitized to protocol and host before logging\n\n## Error Handling\n\nThe module handles failures gracefully at multiple levels:\n\n1. **Empty webhook list** — Returns early without attempting delivery\n2. **QStash publish failure** — Logs the error and re-throws for caller awareness\n3. **Individual webhook failure** — `Promise.allSettled` ensures one broken endpoint doesn't affect others\n4. **Plan/pause checks** — Silently returns without error when conditions aren't met\n5. **Database errors** — Caught and logged, returning gracefully to prevent transaction rollback issues\n\n## Types (`types.ts`)\n\n```typescript\ntype WebhookTrigger = keyof typeof WEBHOOK_TRIGGER_DESCRIPTIONS;\n// Values: \"link.created\" | \"link.updated\" | \"link.deleted\" | ...\n\ntype WebhookPayload = z.infer<typeof webhookPayloadSchema>;\n\ntype EventDataProps = WebhookPayload[\"data\"];\n```\n\nThe `WebhookPayload` type is a union of the base payload schema and specific event schemas (`linkCreatedWebhookSchema`, `documentCreatedWebhookSchema`, `dataroomCreatedWebhookSchema`).","lib-year-in-review":"# lib — year-in-review\n\n# Year-in-Review Module\n\nThe `lib/year-in-review` module handles the computation, storage, and delivery of Papermark's annual year-in-review statistics emails. It aggregates team activity data—documents, links, views, datarooms, and geographic reach—then sends personalized recap emails to team admins and managers.\n\n## Architecture Overview\n\n```mermaid\nflowchart TD\n    A[\"initializeEmailQueue()\"] --> B[\"YearInReview Table\"]\n    C[\"getYearInReviewStats()\"] --> D[\"Stats Data\"]\n    E[\"processEmailQueue()\"] --> F[\"Resend API\"]\n    B --> E\n    D --> F\n    \n    subgraph \"Data Sources\"\n        G[\"Prisma: Document, Link, View, Dataroom\"]\n        H[\"Tinybird: Duration & Country Data\"]\n        I[\"Prisma: UserTeam, Team\"]\n    end\n    \n    A --> G\n    A --> H\n    A --> I\n    C --> G\n    C --> H\n    E --> I\n```\n\n## Core Components\n\n### `get-stats.ts` — Statistics Computation\n\nThis file computes comprehensive year-in-review statistics for a team. It runs multiple Prisma queries in parallel and aggregates data from Tinybird for duration metrics.\n\n**`getYearInReviewStats(teamId, year?, userGeo?)`**\n\n| Parameter | Type | Description |\n|-----------|------|-------------|\n| `teamId` | `string` | The team identifier |\n| `year` | `number` (optional) | Year to query (defaults to current year) |\n| `userGeo` | `{ latitude?, longitude? }` (optional) | User's geolocation from IP |\n\n**Returns:**\n\n```typescript\n{\n  year: number;\n  totalDocuments: number;\n  totalLinks: number;\n  totalViews: number;\n  totalDatarooms: number;\n  mostViewedDocument: {\n    documentId: string;\n    documentName: string;\n    viewCount: number;\n  } | null;\n  mostActiveMonth: {\n    month: string;        // e.g., \"March\"\n    viewCount: number;\n  } | null;\n  mostActiveViewer: {\n    email: string;\n    name: string | null;\n    viewCount: number;\n  } | null;\n  totalDuration: number;  // milliseconds\n  uniqueCountries: string[];\n  distanceTraveled: number;  // kilometers\n}\n```\n\n**Key implementation details:**\n\n- **Parallel queries**: All major database queries run concurrently via `Promise.all` for performance\n- **Excludes team members**: The \"most active viewer\" excludes emails belonging to the team itself\n- **Batch processing**: Document IDs are chunked into batches of 100 to respect Tinybird URL length limits\n- **Geographic fallback**: When `userGeo` is unavailable, defaults to San Francisco (37.77, -122.42)\n\n### `calculate-percentile.ts` — Percentile Ranking\n\nDetermines where a team ranks compared to all other Papermark teams by view count.\n\n**`calculateViewPercentile(teamTotalViews)`**\n\nUses raw SQL via `$queryRaw` with a CTE to compute percentiles without pulling all data into application memory:\n\n1. Extracts `totalViews` from all `YearInReview` records\n2. Finds the team's position in the sorted list\n3. Maps to predefined percentile brackets: 1%, 3%, 5%, 10%, 25%, 50%, 100%\n\n**Brackets:**\n\n| Percentile Bracket | Threshold |\n|--------------------|-----------|\n| Top 1% | ≤ 1st percentile |\n| Top 3% | ≤ 3rd percentile |\n| Top 5% | ≤ 5th percentile |\n| Top 10% | ≤ 10th percentile |\n| Top 25% | ≤ 25th percentile |\n| Top 50% | ≤ 50th percentile |\n| Top 100% | Below 50th |\n\n### `index.ts` — Email Queue Initialization\n\n`initializeEmailQueue()` precomputes and stores stats for all teams. This separates computation from email delivery, allowing the email sender to run independently.\n\n**Process:**\n1. Fetches teams in batches of 100\n2. For each team, calls `getYearInReviewStats()` to compute stats\n3. Skips teams with zero views (no meaningful stats to report)\n4. Bulk inserts into the `YearInReview` Prisma model with status `\"pending\"`\n\nThis function is designed to run once during initial setup (e.g., via a cron job or migration script).\n\n### `send-emails.ts` — Email Delivery\n\n`processEmailQueue()` reads pending jobs from the database and dispatches emails via Resend's batch API.\n\n**Processing flow:**\n\n```mermaid\nsequenceDiagram\n    participant DB as Prisma\n    participant API as Resend API\n    participant Email as React Email\n    \n    loop Batch of 100 jobs\n        DB->>DB: Fetch pending jobs\n        DB->>DB: Fetch team + admin users\n        loop For each team\n            loop For each admin/manager\n                Email->>Email: Render email template\n                Email->>Email: Convert to plain text\n            end\n        end\n        API->>API: Batch send via Resend\n        API-->>DB: Send results\n        DB->>DB: Update job statuses\n        Note over API: 10s delay between batches\n    end\n```\n\n**Key behaviors:**\n\n- **Retry logic**: Jobs retry up to 3 times (`MAX_ATTEMPTS = 3`)\n- **Rate limiting**: 10-second delay between batches to respect API limits\n- **Status transitions**: `\"pending\"` → `\"completed\"` or `\"failed\"`\n- **Unsubscribe handling**: Each email includes a unique unsubscribe URL\n\n**`msToMinutes(ms)`**\n\nSimple utility that converts milliseconds to minutes for display in emails:\n```typescript\nMath.ceil(ms / 60000)\n```\n\n## Geographic Calculations\n\nThe module calculates \"distance traveled\" based on the geographic spread of viewers:\n\n### `calculateDistance(lat1, lng1, lat2, lng2)`\n\nImplements the **Haversine formula** to compute the great-circle distance between two points on Earth:\n\n```typescript\nconst R = 6371; // Earth's radius in kilometers\nconst dLat = ((lat2 - lat1) * Math.PI) / 180;\nconst dLng = ((lng2 - lng1) * Math.PI) / 180;\nconst a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +\n          Math.cos(lat1 * π/180) * Math.cos(lat2 * π/180) *\n          Math.sin(dLng / 2) * Math.sin(dLng / 2);\nconst c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));\nreturn R * c;\n```\n\n### `calculateTotalDistance(countryCodes, origin)`\n\nSums the distances from the origin point (user's IP location) to each unique country's centroid:\n\n1. Maps country codes (e.g., `\"US\"`) to coordinates using `COUNTRY_CENTROIDS`\n2. Calculates Haversine distance for each\n3. Returns the total in kilometers\n\n## External Dependencies\n\n| Dependency | Purpose |\n|------------|---------|\n| `@prisma/client` | Database queries (Prisma) |\n| `@/lib/tinybird/pipes` | `getTotalTeamDuration()` for duration/country aggregation |\n| `@/lib/resend` | Email delivery via Resend API |\n| `@/lib/utils` | Logging via `log()` |\n| `@/lib/utils/unsubscribe` | `generateUnsubscribeUrl()` |\n| `@/components/emails/year-in-review-papermark` | React Email template |\n| `react-email` | `render()`, `toPlainText()` for email generation |\n| `nanoid` | Unique email tracking IDs |\n\n## Database Schema\n\nThe module relies on the `YearInReview` Prisma model:\n\n```prisma\nmodel YearInReview {\n  id        String   @id @default(cuid())\n  teamId    String\n  status    String   // \"pending\", \"completed\", \"failed\"\n  stats     Json     // Precomputed stats object\n  attempts  Int      @default(0)\n  error     String?\n  createdAt DateTime @default(now())\n}\n```\n\n## Usage Patterns\n\n### Real-time Stats (for API routes)\n\n```typescript\nimport { getYearInReviewStats } from \"@/lib/year-in-review/get-stats\";\n\n// In an API route or server component\nconst stats = await getYearInReviewStats(teamId, 2024, { latitude: \"37.77\", longitude: \"-122.42\" });\n```\n\n### Initialization (one-time setup)\n\n```typescript\nimport { initializeEmailQueue } from \"@/lib/year-in-review\";\n\n// Run during deployment or via admin script\nawait initializeEmailQueue();\n```\n\n### Email Processing (cron job)\n\n```typescript\nimport { processEmailQueue } from \"@/lib/year-in-review/send-emails\";\n\n// Called by POST /cron/year-in-review\nawait processEmailQueue();\n```","lib-zod":"# lib — zod\n\n# lib/zod Module Documentation\n\nType-safe schema validation layer for the Papermark application using [Zod](https://zod.dev). This module centralizes input validation, security checks, and type inference across multiple feature domains.\n\n## Overview\n\nThe `lib/zod` module provides runtime validation schemas that complement TypeScript's compile-time type checking. Each schema serves as both documentation of expected data shapes and a validation gate that rejects malformed or malicious input before it reaches business logic.\n\n```mermaid\ngraph TB\n    subgraph \"lib/zod\"\n        folders[\"folders.ts<br/>Folder Path Validation\"]\n        multipart[\"multipart.ts<br/>Multipart Upload\"]\n        notifications[\"notifications.ts<br/>Notification Preferences\"]\n        presets[\"presets.ts<br/>Preset Configuration\"]\n        webhooks[\"webhooks.ts<br/>Webhook Events\"]\n        url[\"url-validation.ts<br/>URL & Path Security\"]\n    end\n    \n    url --> folders\n    url --> multipart\n    url --> webhooks\n```\n\n## Security Architecture\n\nThe `url-validation.ts` file implements defense-in-depth validation for URLs and file paths, protecting against common attack vectors.\n\n### Path Traversal Prevention\n\n```typescript\nvalidatePathSecurity(pathOrUrl: string): boolean\n```\n\nBlocks directory traversal attempts and injection attacks:\n\n| Attack Vector | Detection Pattern |\n|---------------|-------------------|\n| Path traversal | `../`, `..\\` |\n| Null byte injection | `\\0` |\n| Double encoding | `%2E%2E`, `%2F%2F` |\n\n### SSRF Protection\n\n```typescript\nvalidateUrlSSRFProtection(url: string): boolean\n```\n\nPrevents Server-Side Request Forgery by blocking connections to internal infrastructure:\n\n- Private IP ranges (10.x, 172.16-31.x, 192.168.x)\n- Localhost and loopback addresses\n- Link-local addresses (169.254.x)\n- IPv6 equivalents (::1, fc00::, fe80::)\n- URLs containing credentials in the authority section\n\nUses `isPublicHostnameLiteral()
