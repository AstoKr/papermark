 UI->>UI: router.push(url)\n    Note over UI: User completes on Stripe portal\n```\n\nThe `type` parameter in the manage API supports: `manage`, `invoices`, `subscription_update`, `payment_method_update`, and `cancellation`.\n\n## External Dependencies\n\n| Dependency | Usage |\n|------------|-------|\n| `@/lib/swr/use-billing` | `usePlan()` hook provides plan state, billing dates, trial info, and customer status |\n| `@/context/team-context` | `useTeam()` provides `currentTeamId` for API calls |\n| `@/ee/stripe/functions/get-price-id-from-plan` | Converts plan enum + period to Stripe price ID |\n| `@/ee/stripe/constants` | `PlanEnum`, `getPlanFeatures()`, feature definitions |\n| `@/ee/stripe/utils` | `PLANS` array with pricing configuration |\n| `@/ee/stripe/client` | `getStripe()` initializes Stripe.js for checkout |\n| `useAnalytics` | Tracks upgrade button clicks with `trigger` context |\n\n## Key API Routes\n\n| Route | Methods | Purpose |\n|-------|---------|---------|\n| `/api/teams/[teamId]/billing/upgrade` | POST | Create Stripe Checkout session for new subscriptions |\n| `/api/teams/[teamId]/billing/manage` | POST | Handle plan changes, seat additions, portal redirects |\n| `/api/teams/[teamId]/billing/unpause` | POST | Reactivate a paused subscription |\n| `/api/teams/[teamId]/billing/reactivate` | POST | Reactivate a cancelled subscription |\n\n## Integration Points\n\n`UpgradePlanModal` is invoked from 20+ locations throughout the codebase, typically triggered when users attempt gated features:\n\n- **Documents**: `AddDocumentModal`, `DocumentsCard`, `DocumentHeader`\n- **Data Rooms**: `AddDataroomModal`, `DataroomTagSection`, `GenerateIndexDialog`\n- **Links**: `LinksTable`, `AddLinkButton`, `LinkOptions`, `DomainSection`\n- **Settings**: `WebhookSettings`, `AddDomainModal`, `AddFolderModal`\n- **Navigation**: `NavMain`, `NavItem`, `TeamSwitcher`, `MobileBottomNav`\n- **Overlays**: `BlockingModal`, `MobileMoreMenu`, `TrialBannerComponent`\n\nEach integration passes a `trigger` prop (e.g., `\"add_document_dropdown\"`, `\"sidebar_datarooms\"`) used in analytics to measure which paths lead to conversions.","components-charts":"# components — charts\n\n# Charts Module\n\nThe `components/charts` module provides bar chart visualizations for displaying document reading analytics — specifically, time spent per page across document versions.\n\n## Overview\n\nThis module renders interactive bar charts using the [Tremor](https://tremor.so/) library, supporting two visualization modes:\n\n1. **Per-version comparison** — Shows average time spent per page for each document version\n2. **Aggregated sum** — Shows total time spent per page across all versions\n\nThe charts display time in a `MM:SS` format and include a custom tooltip that fetches and displays document page thumbnails on hover.\n\n## Module Structure\n\n```\ncomponents/charts/\n├── bar-chart.tsx          # Main chart component with data transformation\n├── bar-chart-tooltip.tsx  # Custom tooltip with thumbnail support\n└── utils.ts               # Types, formatters, and color utilities\n```\n\n## Data Flow\n\n```mermaid\nflowchart TD\n    A[External Caller] -->|\"Data[] or SumData[]\"| B[BarChartComponent]\n    B -->|transformData / renameSumDurationKey| C[TransformedData[]]\n    C --> D[Tremor BarChart]\n    D -->|onValueChange| E[State Update]\n    D -->|hover| F[CustomTooltip]\n    F -->|pageNumber, documentId| G[useDocumentThumbnail]\n    G -->|imageUrl| F\n```\n\n## Types\n\nDefined in `utils.ts`:\n\n```typescript\n// Per-version data structure\ntype Data = {\n  pageNumber: string;\n  data: {\n    versionNumber: number;\n    avg_duration: number;\n  }[];\n};\n\n// Aggregated data structure\ntype SumData = {\n  pageNumber: string;\n  sum_duration: number;\n};\n\n// Tremor-compatible format\ntype TransformedData = {\n  pageNumber: string;\n  [key: string]: number | string;  // Dynamic version keys\n};\n```\n\n## BarChartComponent (`bar-chart.tsx`)\n\nThe main exported component that handles data transformation and renders the Tremor `BarChart`.\n\n### Props\n\n| Prop | Type | Default | Description |\n|------|------|---------|-------------|\n| `data` | `any` | — | Chart data in `Data[]` or `SumData[]` format |\n| `isSum` | `boolean` | `false` | When `true`, renders aggregated view instead of per-version |\n| `isDummy` | `boolean` | `false` | When `true`, renders placeholder data with gray styling |\n| `versionNumber` | `number` | — | Passed to tooltip for thumbnail fetching |\n| `documentId` | `string` | — | Passed to tooltip for thumbnail fetching |\n\n### Data Transformation\n\nThe component transforms raw data into Tremor's expected format:\n\n**Per-version mode** (`isSum=false`):\n```typescript\n// Input: Data[]\n{ pageNumber: \"1\", data: [{ versionNumber: 1, avg_duration: 5000 }] }\n\n// Output: TransformedData[]\n{ pageNumber: \"1\", \"Version 1\": 5000 }\n```\n\n**Aggregated mode** (`isSum=true`):\n```typescript\n// Input: SumData[]\n{ pageNumber: \"1\", sum_duration: 15000 }\n\n// Output (renamed key)\n{ pageNumber: \"1\", \"Time spent per page\": 15000 }\n```\n\n### Color Assignment\n\nVersion numbers are mapped to Tremor color values using a cycle of 22 colors. The `getColors()` utility distributes colors across version categories to ensure visual distinction:\n\n```typescript\nconst colors = [\"emerald\", \"teal\", \"gray\", \"orange\", ...];\n// Version 1 → emerald, Version 2 → teal, Version 23 → emerald (wraps)\n```\n\n## CustomTooltip (`bar-chart-tooltip.tsx`)\n\nA custom tooltip component that displays when hovering over chart bars. It shows page metadata and fetches document thumbnails on demand.\n\n### Behavior\n\n1. **Extracts payload data** — Gets `pageNumber`, `documentId`, and `versionNumber` from the chart payload\n2. **Fetches thumbnail** — Calls `useDocumentThumbnail` with the page number and document ID\n3. **Renders tooltip** — Displays page number, thumbnail image (if available), and a list of version times with color indicators\n\n### Thumbnail Fetching\n\nThe tooltip always calls `useDocumentThumbnail()` regardless of hover state — this is an intentional pattern to pre-fetch data so thumbnails are available immediately when hovering. The component returns `null` if `active` is false or no payload exists.\n\n### Dependencies\n\n- `useRouter` from `next/router` — Falls back to `router.query.id` if `documentId` isn't in the payload\n- `useDocumentThumbnail` — Fetches the page thumbnail image URL\n\n## Utility Functions (`utils.ts`)\n\n### timeFormatter\n\nConverts milliseconds to a `MM:SS` string:\n\n```typescript\ntimeFormatter(125000)  // \"02:05\"\ntimeFormatter(5000)    // \"00:05\"\n```\n\n### getColorForVersion\n\nMaps a version string (e.g., `\"Version 1\"`) to a Tremor color value:\n\n```typescript\ngetColorForVersion(\"Version 1\")  // \"emerald\"\ngetColorForVersion(\"Version 2\")  // \"teal\"\n```\n\n### getColors\n\nReturns an array of colors for a list of version numbers, useful for the Tremor `colors` prop:\n\n```typescript\ngetColors([\"Version 1\", \"Version 2\", \"Version 3\"])\n// [\"emerald\", \"teal\", \"gray\"]\n```\n\n## Usage Example\n\n```tsx\nimport BarChartComponent from \"@/components/charts/bar-chart\";\n\n// Per-version comparison\n<BarChartComponent\n  data={[\n    { pageNumber: \"1\", data: [{ versionNumber: 1, avg_duration: 5000 }] },\n    { pageNumber: \"2\", data: [{ versionNumber: 1, avg_duration: 8000 }] },\n  ]}\n  versionNumber={1}\n  documentId=\"doc-123\"\n/>\n\n// Aggregated view\n<BarChartComponent\n  data={[\n    { pageNumber: \"1\", sum_duration: 15000 },\n    { pageNumber: \"2\", sum_duration: 20000 },\n  ]}\n  isSum\n  versionNumber={1}\n  documentId=\"doc-123\"\n/>\n```\n\n## External Dependencies\n\n| Dependency | Source | Purpose |\n|------------|--------|---------|\n| `BarChart` | `@tremor/react` | Base chart rendering |\n| `useDocumentThumbnail` | `lib/swr/use-document.ts` | Page thumbnail fetching |\n| `useRouter` | `next/router` | Document ID from URL |\n| Tremor utilities | `tailwind-merge` | Color and styling classes |","components-components":"# components — components\n\n# Components Module\n\nThe `components/` directory contains reusable React UI components that power the application interface. These components handle user authentication flows, document management, navigation, search, theme switching, and file uploads.\n\n## Architecture Overview\n\nThe components are organized by feature domain rather than type:\n\n```mermaid\ngraph TD\n    Navigation[Navigation Components]\n    Upload[Upload System]\n    Search[Search & Discovery]\n    Theme[Theme System]\n    Auth[Auth & Profile]\n    Documents[Document UI]\n    \n    Navigation --> NavMenu\n    Navigation --> TabMenu\n    Navigation --> SidebarFolders\n    \n    Upload --> DocumentUpload\n    Upload --> UploadZone\n    Upload --> UploadNotificationDrawer\n    \n    Search --> SearchBox\n    Search --> SearchCommand\n    Search --> ProfileSearchTrigger\n    \n    Theme --> ThemeProvider\n    Theme --> ThemeToggle\n    \n    Auth --> ProfileMenu\n    Auth --> EmailForm\n    \n    Documents --> BlurImage\n    Documents --> Skeleton\n```\n\n## Navigation Components\n\n### NavMenu (`navigation-menu.tsx`)\n\nA sticky navigation bar with tab-style links. Handles complex active-state logic for routes with nested paths.\n\n**Key behavior:**\n\n- Highlights the current route by matching `segment` against `router.pathname`\n- Special cases for permissions routes (also active when pathname includes \"groups\")\n- Renders a crown icon for `limited` items that trigger the upgrade modal\n- Disabled items are hidden but still rendered in the nav array for consistent positioning\n\n```tsx\n// Usage in SettingsHeader\n<NavMenu\n  navigation={[\n    { label: \"General\", href: \"/settings/general\", segment: \"/settings/general\" },\n    { label: \"Billing\", href: \"/settings/billing\", segment: \"/settings/billing\", limited: true },\n  ]}\n/>\n```\n\n### TabMenu (`tab-menu.tsx`)\n\nA tabbed navigation component for secondary page sections. Similar to `NavMenu` but styled differently with optional count badges.\n\n**Props:**\n- `navigation` — Array of tab definitions with `value`, `href`, `currentValue` for active matching\n- `count` — Optional number displayed in a badge next to the label\n\n### SidebarFolders (`sidebar-folders.tsx`)\n\nRenders a nested folder tree for document navigation. Uses the `FileTree` component from `@/components/ui/nextra-filetree`.\n\n**Two variants:**\n\n1. **`SidebarFolderTree`** — Read-only tree for browsing folders\n2. **`SidebarFolderTreeSelection`** — Selection tree for move/copy operations with a virtual \"Home\" node\n\n**Folder structure building:**\n\n```tsx\n// buildNestedFolderStructure transforms flat folder list into nested tree\nconst rootFolders = buildNestedFolderStructure(folders);\n// Each folder gets a childFolders array injected\n```\n\n## Upload System\n\nThe upload system is the most complex part of this module, involving three coordinated components.\n\n### UploadZone (`upload-zone.tsx`)\n\nThe core upload handler that wraps a drop zone and manages the entire upload lifecycle. It handles:\n\n- **Drag-and-drop** file/folder uploads\n- **File picker** inputs (both files and directories via `webkitdirectory`)\n- **Concurrent uploads** with `UPLOAD_CONCURRENCY = 5`\n- **Multipart uploads** for large files via S3 pre-signed URLs\n- **Resumable uploads** via TUS protocol for smaller files\n- **Folder traversal** using `FileSystemEntry` APIs\n- **Plan-aware validation** (file types, sizes, page counts per plan tier)\n\n**Key interfaces:**\n\n```tsx\ninterface UploadItemState {\n  itemId: string;\n  name: string;\n  type: \"folder\" | \"file\";\n  totalEntries: number;      // folders + files for folders; 1 for loose files\n  completedEntries: number;\n  failedEntries: number;\n  cancelled?: boolean;\n  folderHref?: string;      // link to completed folder\n  bytesUploaded?: number;\n  bytesTotal?: number;\n}\n\ninterface UploadBatchState {\n  batchId: string;\n  items: UploadItemState[];\n  startedAt: number;\n  totalEntries: number;\n  completedEntries: number;\n  failedEntries: number;\n  cancelled?: boolean;\n}\n```\n\n**Upload flow:**\n\n1. Files dropped or selected → `getFilesFromEvent` normalizes paths\n2. Folder uploads: `walkTopLevel` recursively reads `FileSystemEntry` tree\n3. Bulk folder creation via `createFoldersForUpload` (single API request)\n4. Files validated against plan limits (type, size, page count)\n5. Upload via TUS or S3 multipart based on file size (`MULTIPART_SIZE_THRESHOLD`)\n6. Document records created via `createDocument` API\n7. Optional: add to dataroom with folder replication\n8. SWR cache invalidated via `mutateQueue` (batched to prevent connection pool saturation)\n\n**Context integration:**\n\n```tsx\n// Registers picker triggers so external components can open file/folder dialogs\nconst { registerUploadTriggers } = useUploadProgress();\nuseEffect(() => {\n  return registerUploadTriggers({\n    openFilesPicker: () => filesInputRef.current?.click(),\n    openFolderPicker: () => folderInputRef.current?.click(),\n  });\n}, [registerUploadTriggers]);\n```\n\n### UploadNotificationDrawer (`upload-notification.tsx`)\n\nA fixed-position drawer showing real-time upload progress. Displays:\n\n- Individual item rows with progress gauges\n- Collapsible sections for skipped files (plan limits) and failed files\n- Estimated time remaining based on byte-level progress\n- Downloadable list of skipped file names\n- Cancel buttons per-item and per-batch\n\n**Key states:**\n- `isPreparing` — Batch created but no items yet\n- `isCancelled` — User cancelled the batch\n- `isComplete` — All entries processed (completed + failed ≥ total)\n\n### DocumentUpload (`document-upload.tsx`)\n\nA simpler single-file upload component for document modals. Uses `react-dropzone` for drag-and-drop with:\n\n- Plan-aware file type filtering (`FREE_PLAN_ACCEPTED_FILE_TYPES` vs `FULL_PLAN_ACCEPTED_FILE_TYPES`)\n- Explicit `maxSizeBytes` prop override for templates (e.g., NDA signing)\n- Page count validation for PDFs\n- Preview of selected file with background image from blob URL\n\n## Search Components\n\n### SearchBox (`search-box.tsx`)\n\nA debounced search input with keyboard shortcuts:\n\n- **Cmd/Ctrl+K** — Global focus shortcut (works even while typing elsewhere)\n- **/** — Focus when not in an input/textarea and no modal is open\n- **Debounced callback** — Fires `onChangeDebounced` after `debounceTimeoutMs`\n- **URL persistence** — `SearchBoxPersisted` variant syncs with query params\n\n```tsx\n// SearchBoxPersisted automatically:\n// 1. Reads initial value from URL (?search=value)\n// 2. Updates URL on debounced input\n// 3. Syncs back if URL changes externally\n<SearchBoxPersisted\n  urlParam=\"search\"\n  placeholder=\"Search documents...\"\n  onChangeDebounced={(value) => fetchResults(value)}\n/>\n```\n\n### SearchCommand (`search-command.tsx`)\n\nA command-palette-style dialog for help article search. Renders a combobox with:\n\n- Remote article fetching via `/api/help`\n- Links to articles on the marketing site\n- Customizable placeholder, no-results text, and heading\n\n## Profile & Authentication\n\n### ProfileMenu (`profile-menu.tsx`)\n\nUser dropdown with session-aware rendering:\n\n- Shows skeleton while loading session\n- Displays avatar (from session) or placeholder icon\n- Dropdown contents: theme toggle, help search trigger, contact link, sign out\n- Integrates `SearchCommand` for help article search\n\n**Help article fetching:**\n\n```tsx\nconst fetchArticles = async (query?: string) => {\n  const params = new URLSearchParams({ locale: \"en\", ...(query && { q: query }) });\n  const res = await fetch(`/api/help?${params}`);\n  // Articles displayed in SearchCommand dialog\n};\n```\n\n### EmailForm (`email-form.tsx`)\n\nMinimal email capture form for document viewing. Props:\n\n- `onSubmitHandler` — Form submission callback\n- `setEmail` — State setter for email value\n\n## Theme System\n\n### ThemeProvider (`theme-provider.tsx`)\n\nWrapper around `next-themes` `ThemeProvider`. Sets up CSS variables for dark/light mode.\n\n### ThemeToggle (`theme-toggle.tsx`)\n\nDropdown submenu for theme selection with three options:\n\n- Light (sun icon)\n- Dark (moon icon)\n- System (monitor icon)\n\nUses `useTheme` hook from `next-themes` and `DropdownMenuRadioGroup` for the selection state.\n\n## Utility Components\n\n### BlurImage (`blur-image.tsx`)\n\nNext.js `Image` wrapper with blur-up loading effect:\n\n```tsx\n<BlurImage\n  src={user.avatarUrl}\n  alt=\"User avatar\"\n  className=\"rounded-full\"\n/>\n// Adds blur-[2px] while loading, blur-0 when loaded\n// Falls back to avatar.vercel.sh on error or tiny images\n```\n\n### Skeleton (`skeleton.tsx`)\n\nAnimated loading placeholder using Tailwind's `animate-pulse`. Merges custom className with `bg-muted`.\n\n### GTMComponent (`gtm-component.tsx`)\n\nGoogle Tag Manager integration. Returns `null` if `NEXT_PUBLIC_GTM_ID` is not set.\n\n## Integration Patterns\n\n### Context Dependencies\n\n| Component | Contexts |\n|-----------|----------|\n| `UploadZone` | `useTeam`, `useSession`, `usePlan`, `useLimits`, `useUploadProgress` |\n| `DocumentUpload` | `usePlan`, `useLimits` |\n| `ProfileMenu` | `useSession` |\n| `ThemeToggle` | `useTheme` (next-themes) |\n| `NavMenu` | `useRouter` |\n\n### SWR Integration\n\n`UploadZone` uses `mutate` from SWR to invalidate cache keys after uploads complete. The `mutateQueue` batches invalidations to prevent connection pool saturation:\n\n```tsx\n// Batches up to 500ms of mutate calls into single flushes\nconst mutateQueue = createMutateQueue(MUTATE_FLUSH_INTERVAL_MS);\nmutateQueue.enqueue(`/api/teams/${teamId}/documents`);\nmutateQueue.flush();\n```\n\n### Plan-Aware Features\n\nSeveral components gate features based on plan tier:\n\n- `UploadZone` checks `isFree`, `isTrial` for file type acceptance\n- `DocumentUpload` limits accepted types on free plan\n- `NavItem` shows upgrade modal for `limited: true` items\n- Upload rejections include upgrade CTAs when on free tier","components-conversations":"# components — conversations\n\n# Conversations Components\n\nA thin re-export layer that provides access to enterprise-grade conversation UI components.\n\n## Overview\n\nThis module acts as a facade, exposing two conversation-related components that are implemented in the Enterprise Edition (EE) package. The re-export pattern allows the public API to remain stable while the underlying implementation lives in the EE module, enabling feature gating and code splitting.\n\n## Exports\n\n### `ConversationListItem`\n\nRenders a single conversation item in a list view.\n\n**Source:** `@/ee/features/conversations/components/dashboard/conversation-list-item`\n\n**Props:** Accepts all props defined by the EE implementation. See the EE component for detailed prop documentation.\n\n### `ConversationMessage`\n\nDisplays a single message within a conversation thread.\n\n**Source:** `@/ee/features/conversations/components/shared/conversation-message`\n\n**Props:** Accepts all props defined by the EE implementation. See the EE component for detailed prop documentation.\n\n## Architecture\n\n```\n┌─────────────────────────────────────────┐\n│     components/conversations/index.tsx  │\n│              (this module)              │\n├───────────────┬─────────────────────────┤\n│ Conversation  │  Conversation           │\n│ ListItem      │  Message                │\n└───────┬───────┴────────────┬────────────┘\n        │                    │\n        ▼                    ▼\n┌───────────────────┐ ┌─────────────────────┐\n│ @/ee/features/    │ │ @/ee/features/      │\n│ conversations/    │ │ conversations/      │\n│ components/      │ │ components/shared/  │\n│ dashboard/       │ │ conversation-       │\n│ conversation-    │ │ message.tsx         │\n│ list-item.tsx    │ │                     │\n└───────────────────┘ └─────────────────────┘\n```\n\n## Usage\n\nImport components from the public path:\n\n```tsx\nimport { ConversationListItem, ConversationMessage } from \"@/components/conversations\";\n\n// In a conversation list\n<ConversationListItem\n  conversation={conversationData}\n  onSelect={handleSelect}\n/>\n\n// In a message thread\n<ConversationMessage\n  message={messageData}\n  isOwnMessage={true}\n/>\n```\n\n## Relationship to EE Features\n\nThis module is part of the feature layering strategy:\n\n- **Public API** — Components here form the stable contract consumed by non-EE code\n- **EE Implementation** — The actual logic and UI live in `@/ee/features/conversations/`\n- **Future migration** — If features become generally available, implementations can be moved here without changing consumers","components-emails":"# components — emails\n\n# Email Components Module\n\nThe `components/emails` module provides a library of React email templates for Papermark. All emails use the [react-email](https://react.email/) library for rendering and [Tailwind CSS](https://tailwindcss.com/) for styling.\n\n## Module Structure\n\n```\ncomponents/emails/\n├── shared/\n│   └── footer.tsx          # Reusable footer component\n├── custom-domain-setup.tsx\n├── data-rooms-information.tsx\n├── dataroom-digest-notification.tsx\n├── dataroom-notification.tsx\n├── dataroom-trial-24h.tsx\n├── dataroom-trial-end.tsx\n├── dataroom-trial-welcome.tsx\n├── dataroom-upload-notification.tsx\n├── deleted-domain.tsx\n├── download-ready.tsx\n├── email-updated.tsx\n├── export-ready.tsx\n├── hundred-views-congrats.tsx\n├── installed-integration-notification.tsx\n├── invalid-domain.tsx\n├── onboarding-1.tsx through onboarding-4.tsx\n├── otp-verification.tsx\n├── slack-integration.tsx\n├── team-invitation.tsx\n├── thousand-views-congrats.tsx\n├── upgrade-one-month-checkin.tsx\n├── upgrade-personal-welcome.tsx\n├── upgrade-plan.tsx\n├── upgrade-six-month-checkin.tsx\n├── verification-email-change.tsx\n├── verification-link.tsx\n├── viewed-dataroom-paused.tsx\n├── viewed-dataroom.tsx\n├── viewed-document-paused.tsx\n├── viewed-document.tsx\n├── welcome.tsx\n└── year-in-review-papermark.tsx\n```\n\n## Email Categories\n\n### Notification Emails\n\nEmails that alert users to activity on their content:\n\n| Component | Purpose | Key Props |\n|-----------|---------|-----------|\n| `ViewedDocument` | Notifies when someone views a document | `documentId`, `documentName`, `linkName`, `viewerEmail`, `locationString` |\n| `ViewedDocumentPausedEmail` | Notifies about views when subscription is paused | `documentName`, `linkName` |\n| `ViewedDataroom` | Notifies when someone views a dataroom | `dataroomId`, `dataroomName`, `linkName`, `viewerEmail`, `locationString` |\n| `ViewedDataroomPausedEmail` | Notifies about dataroom views when subscription is paused | `dataroomName`, `linkName` |\n| `DataroomNotification` | Single document added to dataroom | `dataroomName`, `documentName`, `senderEmail`, `url`, `unsubscribeUrl` |\n| `DataroomDigestNotification` | Batch notification of document changes | `dataroomName`, `documents[]`, `frequency`, `preferencesUrl` |\n| `DataroomUploadNotification` | Notifies when visitor uploads files via link | `dataroomId`, `dataroomName`, `uploaderEmail`, `documentNames[]`, `linkName` |\n\n### Download & Export Emails\n\n| Component | Purpose | Key Props |\n|-----------|---------|-----------|\n| `DownloadReady` | Notifies when dataroom download is prepared | `dataroomName`, `downloadUrl`, `expiresAt`, `isViewer` |\n| `ExportReady` | Notifies when export is available | `resourceName`, `downloadUrl`, `email` |\n\n### Onboarding Sequence\n\nA four-email sequence for new users:\n\n1. **`onboarding-1.tsx`** — Upload your first document\n2. **`onboarding-2.tsx`** — Set link permissions\n3. **`onboarding-3.tsx`** — Watch views come in real-time\n4. **`onboarding-4.tsx`** — Custom domains and branding\n\n### Welcome Emails\n\n| Component | Purpose | Key Props |\n|-----------|---------|-----------|\n| `WelcomeEmail` | Welcome new users with getting started guide | `name` |\n| `DataroomTrialWelcomeEmail` | Personal welcome from founder for dataroom trial | `name` |\n\n### Trial Management\n\n| Component | Purpose | Trigger |\n|-----------|---------|---------|\n| `DataroomTrialWelcomeEmail` | Welcome to trial | Trial created |\n| `DataroomTrial24hReminderEmail` | 24 hours until trial ends | 24h before expiry |\n| `DataroomTrialEnd` | Trial has expired | Trial expired |\n\n### Plan Upgrade Emails\n\n| Component | Purpose | Key Props |\n|-----------|---------|-----------|\n| `UpgradePlanEmail` | Confirmation after upgrading | `name`, `planType` |\n| `UpgradePersonalEmail` | Personal welcome from co-founder | `name`, `planName` |\n| `UpgradeOneMonthCheckin` | 1-month follow-up | `name` |\n| `UpgradeSixMonthCheckin` | 6-month milestone | `name`, `planName` |\n\n### Domain Management\n\n| Component | Purpose | Trigger |\n|-----------|---------|---------|\n| `CustomDomainSetup` | Guide for custom domain setup | User action or upgrade |\n| `InvalidDomain` | Domain not configured after X days | 14+ days unconfigured |\n| `DeletedDomain` | Domain deleted after 30 days | 30 days unconfigured |\n\n### Verification Emails\n\n| Component | Purpose | Key Props |\n|-----------|---------|-----------|\n| `VerificationCodeEmail` | One-time login code | Magic link login |\n| `OtpEmailVerification` | OTP for document/dataroom access | Protected content access |\n| `EmailUpdated` | Email address change confirmation | Email changed |\n| `ConfirmEmailChange` | Confirm new email address | Email change request |\n\n### Team & Collaboration\n\n| Component | Purpose | Key Props |\n|-----------|---------|-----------|\n| `TeamInvitation` | Invite user to team | `senderName`, `teamName`, `url` |\n\n### Integration Emails\n\n| Component | Purpose | Key Props |\n|-----------|---------|-----------|\n| `SlackIntegrationEmail` | Promote Slack integration | Onboarding sequence |\n| `InstalledIntegrationNotification` | Integration installed | `team`, `integration` |\n\n### Data Rooms Information\n\n| Component | Purpose | Key Props |\n|-----------|---------|-----------|\n| `DataRoomsInformationEmail` | Promote data rooms features | Onboarding sequence |\n\n### Milestone & Special Emails\n\n| Component | Purpose |\n|-----------|---------|\n| `HundredViewsCongratsEmail` | Congratulations at 100 views |\n| `ThousandViewsCongratsEmail` | Congratulations at 1000 views |\n| `YearInReviewPapermarkEmail` | Annual usage statistics |\n\n## Shared Components\n\n### Footer Component\n\nThe `Footer` component (`components/emails/shared/footer.tsx`) provides consistent footer styling across emails.\n\n```tsx\nimport { Footer } from \"./shared/footer\";\n\n// Standard footer (most emails)\n<Footer />\n\n// With company address\n<Footer withAddress={true} />\n\n// Marketing footer variant (for WelcomeEmail)\n<Footer marketing />\n\n// Custom footer text\n<Footer footerText=\"Custom message here\" />\n\n// React node for footer text\n<Footer footerText={<><strong>Bold text<\/strong> in footer<\/>} />\n```\n\n**Props:**\n\n| Prop | Type | Default | Description |\n|------|------|---------|-------------|\n| `withAddress` | `boolean` | `false` | Include company address (1111B S Governors Ave #28117, Dover, DE 19904) |\n| `marketing` | `boolean` | `false` | Use marketing footer variant with unsubscribe link |\n| `footerText` | `string \\| ReactNode` | varies | Custom footer message text |\n\n## Email Design Patterns\n\n### Container Structure\n\nAll full-featured emails follow this structure:\n\n```tsx\n<Html>\n  <Head />\n  <Preview>{previewText}<\/Preview>\n  <Tailwind>\n    <Body>\n      <Container className=\"mx-auto my-10 w-[465px] p-5\">\n        {/* Header */}\n        <Text className=\"text-center text-2xl\">\n          <span className=\"font-bold tracking-tighter\">Papermark<\/span>\n        <\/Text>\n        \n        {/* Title */}\n        <Text className=\"text-center text-xl\">Email Title<\/Text>\n        \n        {/* Content */}\n        <Text className=\"text-sm leading-6\">Body content<\/Text>\n        \n        {/* CTA Button */}\n        <Section className=\"my-8 text-center\">\n          <Button href=\"...\">Call to Action<\/Button>\n        <\/Section>\n        \n        {/* Footer */}\n        <Footer />\n      <\/Container>\n    <\/Body>\n  <\/Tailwind>\n<\/Html>\n```\n\n### Minimal Emails\n\nSome emails (milestone emails, check-ins) use a minimal design without containers:\n\n```tsx\n<Html>\n  <Head />\n  <Preview>{previewText}<\/Preview>\n  <Tailwind>\n    <Body className=\"font-sans text-sm\">\n      <Text>Hi{name && ` ${name}`},<\/Text>\n      <Text>Email body...<\/Text>\n    <\/Body>\n  <\/Tailwind>\n<\/Html>\n```\n\n### Dynamic Content Helpers\n\n**`formatExpirationTime`** in `download-ready.tsx`:\n\n```tsx\nfunction formatExpirationTime(expiresAt?: string): string {\n  // Calculates human-readable time remaining\n  // Returns: \"3 days\", \"5 hours\", \"less than an hour\"\n}\n```\n\n**`getPlanInfo`** in `custom-domain-setup.tsx`:\n\n```tsx\nconst getPlanInfo = () => {\n  if (hasAccess) {\n    return {\n      title: \"Your custom domain is ready to set up! 🎉\",\n      subtitle: `Great news! Your ${currentPlan} plan includes custom domain access.`,\n    };\n  }\n  return {\n    title: \"Interested in custom domains? 🚀\",\n    subtitle: \"Learn how custom domains can enhance your document sharing experience.\",\n  };\n};\n```\n\n## Usage Example\n\nImport and render an email template:\n\n```tsx\nimport { render } from \"@react-email/components\";\nimport ViewedDocument from \"@/components/emails/viewed-document\";\nimport DownloadReady from \"@/components/emails/download-ready\";\n\n// Render email to HTML string\nconst html = await render(\n  <ViewedDocument\n    documentId=\"doc_123\"\n    documentName=\"Q4 Pitch Deck\"\n    linkName=\"Investor Link\"\n    viewerEmail=\"investor@acme.com\"\n    locationString=\"San Francisco, CA\"\n  />\n);\n\n// With Next.js API route for sending\nexport async function POST(req: Request) {\n  const html = await render(\n    <DownloadReady\n      dataroomName=\"M&A Due Diligence\"\n      downloadUrl=\"https://app.papermark.com/downloads/abc123\"\n      email=\"buyer@acme.com\"\n      expiresAt=\"2024-12-31T23:59:59Z\"\n      isViewer={true}\n    />\n  );\n  \n  // Send via email provider (Resend, SendGrid, etc.)\n  await sendEmail({\n    to: \"buyer@acme.com\",\n    subject: \"Your download is ready\",\n    html,\n  });\n}\n```\n\n## Styling Conventions\n\n- **Container width**: 465px for standard emails, 600px max for emails with tables\n- **Font**: System font stack (`font-sans`)\n- **Colors**: Black text on white background, gray for secondary text\n- **Buttons**: Black background, white text, rounded corners, `12px 20px` padding\n- **Links**: Blue-600 color with no underline (except in specific contexts)\n\n## External Links Reference\n\nEmails link to these external destinations:\n\n| Destination | URL Pattern |\n|-------------|-------------|\n| App Dashboard | `https://app.papermark.com/dashboard` |\n| Documents | `https://app.papermark.com/documents` |\n| Datarooms | `https://app.papermark.com/datarooms` |\n| Settings | `https://app.papermark.com/settings/*` |\n| Billing | `https://app.papermark.com/settings/billing` |\n| Domains | `https://app.papermark.com/settings/domains` |\n| Integrations | `https://app.papermark.com/settings/integrations` |\n| Documentation | `https://docs.papermark.com/*` |\n| Marketing | `https://www.papermark.com/*` |\n| Calendar Booking | `https://cal.com/marcseitz/papermark` |\n| G2 Reviews | `https://www.g2.com/products/papermark/reviews` |","components-folders":"# components — folders\n\n# Folders Module (`components/folders`)\n\nThe folders module provides UI components for creating and editing folders across two contexts: **document folders** (general file organization) and **dataroom folders** (structured document rooms). It includes the creation/edit modals plus reusable pickers for folder icons and colors.\n\n---\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    subgraph Pickers\n        FC[FolderColorPicker]\n        FI[FolderIconPicker]\n        FIC[FolderIconColorPicker]\n        FID[FolderIconPreview]\n        FCD[FolderColorDot]\n    end\n\n    subgraph Modals\n        AFM[AddFolderModal]\n        EFM[EditFolderModal]\n    end\n\n    AFM --> FIC\n    EFM --> FIC\n    FIC --> FI\n    FIC --> FC\n    FI --> FID\n    FC --> FCD\n\n    AFM --> UpgradePlanModal\n    AFM --> Dialog\n    EFM --> Dialog\n\n    AFM -.->|creates folder| API[(Teams API)]\n    EFM -.->|updates folder| API\n```\n\n---\n\n## Core Concepts\n\n### Dual Context Support\n\nAll folder components support two contexts via the `isDataroom` and `dataroomId` props:\n\n| Context | API Endpoint | Use Case |\n|---------|--------------|----------|\n| Documents | `/api/teams/{teamId}/folders` | General file organization |\n| Dataroom | `/api/teams/{teamId}/datarooms/{id}/folders` | Structured document rooms |\n\n### Controlled vs. Uncontrolled State\n\n`AddFolderModal` supports both patterns:\n\n```tsx\n// Uncontrolled: uses internal state\n<AddFolderModal>\n  <Button>Add Folder<\/Button>\n<\/AddFolderModal>\n\n// Controlled: parent drives open state\n<AddFolderModal\n  open={isOpen}\n  onOpenChange={setIsOpen}\n  onAddition={(name) => handleNewFolder(name)}\n/>\n```\n\nThis pattern allows both trigger-based opening and programmatic control without leaking internal state.\n\n### Plan Gating\n\nFolder creation is gated on the Pro plan. Free tier users (outside trial) see an `UpgradePlanModal` instead of the creation dialog. The gating applies regardless of how the modal is opened, preventing bypass via controlled props.\n\n---\n\n## Components\n\n### `AddFolderModal`\n\nCreates new folders with custom name, icon, and color.\n\n**Props:**\n\n```typescript\n{\n  open?: boolean;                           // Controlled open state\n  onOpenChange?: (open: boolean) => void;  // Controlled setOpen\n  onAddition?: (folderName: string) => void;\n  isDataroom?: boolean;\n  dataroomId?: string;\n  children?: React.ReactNode;              // DialogTrigger content\n}\n```\n\n**Behavior:**\n\n1. Validates folder name (3–256 characters) using Zod\n2. On submit, calls the appropriate API endpoint based on context\n3. Invalidates SWR cache for folder lists\n4. Resets form state (name, icon, color) after successful creation\n5. Tracks analytics event `\"Folder Added\"`\n6. Shows a success toast with an \"Open folder\" action\n\n**Plan Restriction:** Renders `UpgradePlanModal` for free-tier teams (non-trial).\n\n**Usage Example:**\n\n```tsx\n<AddFolderModal isDataroom dataroomId=\"abc123\">\n  <Button variant=\"outline\">New Folder<\/Button>\n<\/AddFolderModal>\n```\n\n---\n\n### `EditFolderModal`\n\nUpdates existing folder name, icon, and color.\n\n**Props:**\n\n```typescript\n{\n  open: boolean;\n  setOpen: React.Dispatch<React.SetStateAction<boolean>>;\n  name: string;\n  folderId: string;\n  icon?: string | null;\n  color?: string | null;\n  onAddition?: (folderName: string) => void;\n  isDataroom?: boolean;\n  dataroomId?: string;\n  children?: React.ReactNode;\n}\n```\n\n**Behavior:**\n\n1. Syncs local state with props when modal opens (`useEffect`)\n2. Tracks which fields changed for analytics\n3. Calls `PUT /folders/manage` API\n4. Invalidates SWR cache on success\n5. Tracks `\"folder_updated\"` analytics with `changed` array\n\nUnlike `AddFolderModal`, this component is always controlled (no internal open state).\n\n---\n\n### `FolderIconPicker`\n\nGrid-based icon selector wrapped in `ScrollArea`.\n\n**Props:**\n\n```typescript\n{\n  value: FolderIconId | null | undefined;\n  onChange: (iconId: FolderIconId) => void;\n  colorClass?: string;  // Tailwind class for selected icon color\n}\n```\n\n**Visual:** 6-column grid of icon buttons, selected icon shows ring and applies `colorClass`.\n\n---\n\n### `FolderIconColorPicker`\n\nCombined popover for selecting both icon and color. Used inside the modals.\n\n**Props:**\n\n```typescript\n{\n  iconValue: FolderIconId;\n  colorValue: FolderColorId;\n  onIconChange: (iconId: FolderIconId) => void;\n  onColorChange: (colorId: FolderColorId) => void;\n}\n```\n\n**Structure:**\n- Trigger button shows preview of current icon with current color\n- Popover contains:\n  - Color picker row (circular swatches)\n  - Icon picker grid (7 columns, scrollable)\n\n---\n\n### `FolderIconPreview`\n\nRenders a folder icon at a specified size with color.\n\n```typescript\n{\n  iconId: FolderIconId | null | undefined;\n  colorClass?: string;   // Default: \"text-gray-600\"\n  className?: string;\n  size?: \"sm\" | \"md\" | \"lg\";  // Default: \"md\"\n}\n```\n\n---\n\n### `FolderColorPicker`\n\nColor selection as labeled pill buttons.\n\n**Props:**\n\n```typescript\n{\n  value: FolderColorId | null | undefined;\n  onChange: (colorId: FolderColorId) => void;\n}\n```\n\nEach color option shows a dot and label. Selected option displays a ring.\n\n---\n\n### `FolderColorDot`\n\nSimple colored circle for inline color indicators.\n\n```typescript\n{\n  colorId: FolderColorId | null | undefined;\n  className?: string;\n}\n```\n\n---\n\n## Integration with Other Modules\n\n### External Dependencies\n\n| Module | Usage |\n|--------|-------|\n| `team-context` | `useTeam()` — gets `currentTeam.id` for API calls |\n| `lib/swr/use-billing` | `usePlan()` — checks `isFree` / `isTrial` for plan gating |\n| `lib/analytics` | `useAnalytics()` — tracks folder create/update events |\n| `lib/utils` | `safeSlugify()` — sanitizes folder names in paths |\n| `billing/upgrade-plan-modal` | `UpgradePlanModal` — surfaces for free-tier users |\n\n### API Calls\n\nBoth modals call team-scoped endpoints:\n\n```\nPOST   /api/teams/{teamId}/folders\nPOST   /api/teams/{teamId}/datarooms/{id}/folders\nPUT    /api/teams/{teamId}/folders/manage\nPUT    /api/teams/{teamId}/datarooms/{id}/folders/manage\n```\n\n### Cache Invalidation\n\nAfter folder mutations, both components call `mutate()` on multiple cache keys:\n\n```tsx\nmutate(`/api/teams/${teamId}/${endpoint}?root=true`);\nmutate(`/api/teams/${teamId}/${endpoint}`);\nmutate(`/api/teams/${teamId}/${endpoint}${parentFolderPath}`);\n```\n\nThis ensures the folder tree and breadcrumb views refresh.\n\n---\n\n## Consumers\n\n| Component | Usage |\n|-----------|-------|\n| `AddDocumentDropdown` | Opens `AddFolderModal` via `DialogTrigger` child |\n| `FolderCard` | Opens `EditFolderModal` when user clicks edit action |\n\n---\n\n## Constants Reference\n\nFolder icons and colors are defined in `lib/constants/folder-constants.ts`:\n\n- `FOLDER_ICONS` — array of available icon options with `id`, `label`, and `icon` component\n- `FOLDER_COLORS` — array of color options with `id`, `label`, and Tailwind utility classes (`bg`, `border`, `text`)\n- `DEFAULT_FOLDER_ICON` — fallback icon (`\"folder\"`)\n- `DEFAULT_FOLDER_COLOR` — fallback color (`\"gray\"`)\n- `getFolderIcon(iconId)` — returns icon component by ID\n- `getFolderColorClasses(colorId)` — returns Tailwind classes for a color\n\n---\n\n## Key Implementation Notes\n\n1. **Auto-focus management**: `AddFolderModal` intercepts Radix Dialog's `onOpenAutoFocus` to focus the name input instead of the icon picker button.\n\n2. **Defense in depth for plan gating**: The form submission handler re-checks `isCreationAllowed` even though the modal isn't rendered for blocked users. This prevents edge cases with stale submissions.\n\n3. **State reset pattern**: Form state (name, icon, color) resets in the `finally` block, ensuring cleanup even if the API throws.\n\n4. **Analytics tracking**: `EditFolderModal` diffs initial vs. current values to track only changed fields, reducing noise in analytics.","components-hooks":"# components — hooks\n\n# Hooks Module\n\nThis module provides React hooks for managing optimistic data updates and tracking user login preferences.\n\n## Overview\n\nThe hooks are located in `components/hooks/` and include:\n\n- **`useOptimisticUpdate`** — Manages optimistic UI updates with SWR and toast notifications\n- **`useLastUsed`** — Persists and displays the user's last-used login method\n\n## useOptimisticUpdate\n\nProvides optimistic data mutation with automatic toast feedback. The hook wraps SWR's `mutate` function to enable optimistic updates where the UI reflects changes immediately while the request is in-flight.\n\n```typescript\nconst { data, isLoading, update } = useOptimisticUpdate<T>(url, toastCopy?)\n```\n\n### Parameters\n\n| Parameter | Type | Description |\n|-----------|------|-------------|\n| `url` | `string` | SWR endpoint to fetch and mutate |\n| `toastCopy` | `{ loading, success, error }` | Optional custom toast messages |\n\n### Return Value\n\n| Property | Type | Description |\n|----------|------|-------------|\n| `data` | `T` | The current fetched data |\n| `isLoading` | `boolean` | Whether initial fetch is in progress |\n| `update` | `(fn, optimisticData) => Promise` | Mutation function |\n\n### Usage\n\n```typescript\nconst { data, update } = useOptimisticUpdate<UserPreferences>(\n  \"/api/user/preferences\"\n);\n\nawait update(\n  (currentData) => api.updatePreferences({ theme: \"dark\" }),\n  { ...currentData, theme: \"dark\" }  // optimisticData\n);\n```\n\n### How It Works\n\nThe `update` function:\n\n1. Accepts a transformation function `fn` that receives current data and returns a `Promise<T>`\n2. Accepts `optimisticData` — the expected result applied immediately to the cache\n3. Calls `mutate` with `rollbackOnError: true` — reverts to the original data if the mutation fails\n4. Shows a toast notification with the provided copy (or defaults)\n5. Returns a `toast.promise` for caller awaiting\n\n### Integration\n\nUsed by `UpdateMailSubscribe` in `components/account/update-subscription.tsx` for subscription modifications.\n\n---\n\n## useLastUsed\n\nTracks and persists the user's most recent authentication method, with a companion display component.\n\n```typescript\nconst [lastUsed, setLastUsed] = useLastUsed();\n```\n\n### Supported Login Types\n\n```typescript\ntype LoginType = \"passkey\" | \"google\" | \"credentials\" | \"linkedin\";\n```\n\n### Return Value\n\n| Value | Type | Description |\n|-------|------|-------------|\n| `lastUsed` | `LoginType \\| undefined` | The stored login method |\n| `setLastUsed` | `(type: LoginType) => void` | Updates and persists the value |\n\n### Storage Behavior\n\n- **Read:** On mount, reads from `localStorage` key `last_papermark_login`\n- **Write:** Updates localStorage whenever `lastUsed` changes\n- **Clear:** Removes the key if `lastUsed` is set to `undefined`\n\n### LastUsed Component\n\nA visual indicator that displays \"Last used\" next to the associated login option.\n\n```tsx\n<LastUsed className=\"custom-styles\" />\n```\n\n**Positioning:** Absolute positioning with CSS transforms — displays to the right on mobile, offset to the side on larger screens using a CSS triangle pointer.\n\n### Integration\n\nUsed in `app/(auth)/login/page-client.tsx` to:\n\n1. Show which login method was previously used\n2. Persist the user's choice when they authenticate","components-layouts":"# components — layouts\n\n# Layout Components (`components/layouts/`)\n\nThe layouts module provides the main application shell for Papermark, handling responsive navigation, user context, and access enforcement across the platform.\n\n## Overview\n\nThe module implements a hybrid desktop/mobile layout strategy:\n\n- **Desktop**: Persistent sidebar navigation + header with breadcrumb\n- **Mobile**: Fixed bottom tab bar + collapsible \"More\" sheets\n\n```mermaid\ngraph TD\n    AppLayout --> SidebarProvider\n    AppLayout --> Sidebar\n    AppLayout --> SidebarInset\n    AppLayout --> MobileHeader\n    AppLayout --> MobileBottomNav\n    AppLayout --> BlockingModal\n    AppLayout --> TrialBanner\n    \n    SidebarInset --> AppBreadcrumb\n    MobileBottomNav --> MobileShareFab\n    MobileBottomNav --> MobileMoreMenu\n    MobileBottomNav --> MobileDataroomMoreMenu\n    \n    AppLayout --> DataroomMemberRouteGuard\n```\n\n## Core Layout (`app.tsx`)\n\n`AppLayout` is the root layout component wrapped around all authenticated pages. It orchestrates:\n\n1. **Sidebar state management** via `SidebarProvider` and the `SIDEBAR_COOKIE_NAME` cookie\n2. **Dataroom member route guarding** for scoped access\n3. **Responsive chrome**: header on desktop, fixed header/bottom nav on mobile\n\n### Sidebar State Persistence\n\n```typescript\nfunction getInitialSidebarState(isDataroom: boolean): boolean\n```\n\nThe sidebar open/collapsed state persists across sessions via a cookie. Special handling applies to dataroom routes—they always start expanded.\n\n### Dataroom Member Route Guard\n\n`DataroomMemberRouteGuard` is a UX-only redirect mechanism for members with restricted (dataroom-scoped) access. It:\n\n1. Detects if the current user is a dataroom-scoped member via `useSelfMembership`\n2. Redirects off non-dataroom paths back to `/datarooms`\n3. On dataroom detail pages (`/datarooms/[id]`), verifies the user is assigned to that specific dataroom\n\n> **Note**: The API layer is the real security boundary. This guard prevents users from landing on pages where they'd see empty states or errors.\n\n## Blocking Modal (`blocking-modal.tsx`)\n\n`BlockingModal` enforces access restrictions for teams on free/solo plans or with expired trials.\n\n### Trigger Conditions\n\nThe modal appears when:\n- User is on the free plan, not in trial, not an admin, and the team has multiple users\n- User's status is `BLOCKED_TRIAL_EXPIRED`\n\n### Behavior\n\nWhen active, the modal:\n1. Disables right-click, F12, and developer tools shortcuts (Ctrl+Shift+I/J/C)\n2. Offers three actions:\n   - **Upgrade** → Opens plan upgrade modal\n   - **Switch Team** → If user belongs to another team\n   - **Create New Team** → If no other teams exist\n   - **Log out** → Always available\n\n## Breadcrumb Navigation (`breadcrumb.tsx`)\n\n`AppBreadcrumb` is a router-aware component that renders different breadcrumb structures based on the current path.\n\n### Supported Route Patterns\n\n| Route Pattern | Component |\n|---------------|-----------|\n| `/dashboard` | `AnalyticsBreadcrumb` |\n| `/settings/*` | `SettingsBreadcrumb` |\n| `/account/*` | `AccountBreadcrumb` |\n| `/documents` | Static \"Documents\" crumb |\n| `/documents/tree/[...name]` | `DocumentsBreadcrumb` (folder hierarchy) |\n| `/documents/[id]` | `SingleDocumentBreadcrumb` (folder path + doc name) |\n| `/datarooms` | Static \"Datarooms\" crumb |\n| `/datarooms/[id]` | `SingleDataroomBreadcrumb` |\n| `/datarooms/[id]/documents` | `DataroomBreadcrumb` (from datarooms module) |\n| `/datarooms/[id]/document/[documentId]` | `SingleDataroomDocumentBreadcrumb` |\n| `/visitors` | `VisitorsBreadcrumb` |\n| `/visitors/[id]` | `SingleVisitorBreadcrumb` |\n\n### Truncation Handling\n\n`TruncatedBreadcrumbLink` detects when breadcrumb text overflows its container and wraps it in a tooltip to preserve layout.\n\n## Mobile Navigation\n\n### Bottom Tab Bar (`mobile-bottom-nav.tsx`)\n\nThe bottom navigation adapts its tabs based on context:\n\n**Standard tabs** (non-dataroom members):\n- Dashboard, Documents, Share FAB, Datarooms, More\n\n**Dataroom detail context**:\n- Documents, Permissions, Share FAB, Analytics, More\n\n**Dataroom-scoped members**:\n- Data Rooms, More (minimal nav matching their restricted access)\n\n### Mobile Header (`mobile-header.tsx`)\n\nDisplays:\n- Dataroom name + back button when in a dataroom\n- Papermark logo when elsewhere\n- User avatar dropdown with account settings, theme toggle, support contact, logout\n\n### More Menus\n\nBoth `MobileMoreMenu` and `MobileDataroomMoreMenu` are full-screen sheet overlays containing:\n\n- Team switcher (for users in multiple teams)\n- Settings sub-navigation with collapsible sections\n- Usage progress bars for links/documents\n- Upgrade CTAs for free/trial users\n\nThe dataroom variant additionally includes:\n- Share button → opens `DataroomLinkSheet`\n- Q&A (conversations) link (feature-gated)\n- Request List (feature-gated)\n- Visitors, Branding sections\n\n### Share FAB (`mobile-share-fab.tsx`)\n\nThe floating \"+\" button on mobile opens a flow for creating share links:\n\n1. **Choose type sheet**: Document or Dataroom\n2. **Document picker**: Searchable list of team documents → creates `LinkSheet`\n3. **Dataroom picker**: List of datarooms → creates `DataroomLinkSheet`\n\nIn dataroom context, it skips the picker and directly opens `DataroomLinkSheet`.\n\n### Team Switcher (`mobile-team-switcher.tsx`)\n\nCollapsible team selector used in the More menu. Shows only when user belongs to multiple teams. Displays team avatars with initials and handles switching via `useTeam().setCurrentTeam`.\n\n## Trial Banner (`trial-banner.tsx`)\n\n`TrialBanner` shows a dismissible alert when the user is on a Data Rooms trial. It:\n\n1. Checks for a `hideTrialBanner` cookie (dismissible for 24 hours)\n2. Computes days remaining using either:\n   - Explicit `trialEndsAt` from the billing hook\n   - Legacy calculation: 7 days from first dataroom or team creation\n3. Displays expired state (red border) or countdown state\n4. Provides inline upgrade CTA\n\nThe banner is desktop-only (hidden on mobile via `md:block`).\n\n## Key Dependencies\n\n```typescript\n// State management\nuseTeam()           // Team context for current team and switching\nusePlan()           // Billing plan state (isFree, isTrial, etc.)\n\n// Membership\nuseSelfMembership() // Current user's role and dataroom assignments\n\n// Feature flags\nuseFeatureFlags()    // Controls optional features like requestList\nuseLimits()          // Usage limits for links/documents\n\n// UI primitives\nSidebarProvider      // Radix sidebar state container\nAlertDialog          // Blocking modal and confirmation dialogs\nSheet                // Bottom sheets for mobile menus\n```\n\n## Data Flow\n\n```mermaid\nsequenceDiagram\n    participant U as User\n    participant AL as AppLayout\n    participant DM as DataroomMemberRouteGuard\n    participant BM as BlockingModal\n    participant BN as MobileBottomNav\n    \n    U->>AL: Load authenticated page\n    AL->>DM: Check membership\n    DM->>DM: Redirect if scoped member on wrong path\n    AL->>BM: Check plan status\n    alt Trial expired or free team blocked\n        BM->>U: Show blocking modal\n    end\n    AL->>BN: Determine nav context\n    BN->>BN: Render tabs or scoped nav\n```","components-providers":"# components — providers\n\n# PostHog Providers Module\n\n## Overview\n\nThe `components/providers/` module provides PostHog analytics integration for the application. It consists of two components that work together to initialize PostHog, identify authenticated users, and sync team-level group analytics data.\n\n**File structure:**\n\n```\ncomponents/providers/\n├── posthog-provider.tsx     # Main provider: initializes PostHog and identifies users\n└── posthog-group-sync.tsx   # Syncs team data as a PostHog group\n```\n\n## PostHogCustomProvider\n\nThe root provider component that initializes the PostHog client and wraps the application tree.\n\n### Purpose\n\n- Initializes the PostHog JavaScript SDK on the client\n- Identifies authenticated users and attaches user properties to events\n- Provides PostHog context to all child components via `posthog-js/react`\n\n### How It Works\n\n```tsx\nexport const PostHogCustomProvider = ({ children }) => {\n  // ...\n  if (typeof window !== \"undefined\" && posthogConfig) {\n    posthog.init(posthogConfig.key, {\n      api_host: posthogConfig.host,\n      ui_host: \"https://eu.posthog.com\",\n      disable_session_recording: true,\n      autocapture: false,\n      loaded: (posthog) => {\n        // Identify user or reset on load\n      },\n    });\n  }\n  return <PostHogProvider client={posthog}>{children}<\/PostHogProvider>;\n};\n```\n\n**Initialization behavior:**\n\n1. Checks for client-side execution (`typeof window !== \"undefined\"`)\n2. Retrieves configuration via `getPostHogConfig()`\n3. Initializes PostHog with specific settings:\n   - `disable_session_recording: true` — Session recording is disabled\n   - `autocapture: false` — Click and form autocapture is disabled\n   - `ui_host` points to EU PostHog instance\n\n**User identification:**\n\nWhen PostHog finishes loading, it calls `getSession()` to check authentication status:\n\n- **Authenticated user:** Calls `posthog.identify()` with email and user ID as user properties\n- **No session:** Calls `posthog.reset()` to clear any stored user data\n\n```tsx\ngetSession().then((session) => {\n  if (session) {\n    posthog.identify(email ?? userId, {\n      email,\n      userId,\n    });\n  } else {\n    posthog.reset();\n  }\n});\n```\n\n### Usage\n\nThis provider wraps the entire application in `pages/_app.tsx`. It must be placed outside any components that need PostHog access.\n\n```tsx\n<PostHogCustomProvider>\n  <TeamProvider>\n    <Component {...pageProps} />\n  <\/TeamProvider>\n<\/PostHogCustomProvider>\n```\n\n## PostHogGroupSync\n\nA side-effect component that syncs the current team context to PostHog as a `team` group for group analytics.\n\n### Purpose\n\n- Associates all analytics events with the user's current team\n- Enables team-level aggregation and filtering in PostHog dashboards\n- Syncs team properties (name, plan, join date) as group traits\n\n### How It Works\n\n```tsx\nexport function PostHogGroupSync() {\n  const { currentTeam } = useTeam();\n  const lastGroupKeyRef = useRef<string | null>(null);\n\n  useEffect(() => {\n    // Skip if PostHog not configured\n    if (!getPostHogConfig()) return;\n    if (!currentTeam?.id) return;\n\n    // Build team properties\n    const properties: Record<string, unknown> = {};\n    if (currentTeam.name) properties.name = currentTeam.name;\n    if (currentTeam.plan) properties.plan = currentTeam.plan;\n    if (currentTeam.createdAt) {\n      properties.date_joined = new Date(currentTeam.createdAt).toISOString();\n    }\n\n    // Set the team group in PostHog\n    posthog.group(\"team\", currentTeam.id, properties);\n  }, [currentTeam?.id, currentTeam?.name, currentTeam?.plan, currentTeam?.createdAt]);\n\n  return null;\n}\n```\n\n**Group properties synced:**\n\n| Property | Source | Description |\n|----------|--------|-------------|\n| `name` | `currentTeam.name` | Team display name |\n| `plan` | `currentTeam.plan` | Subscription tier |\n| `date_joined` | `currentTeam.createdAt` | When the team was created |\n\n### Usage Requirements\n\nThis component must be rendered:\n\n1. **Inside `<PostHogCustomProvider>`** — Requires PostHog to be initialized\n2. **Inside `<TeamProvider>`** — Requires the team context to access `currentTeam`\n\n```tsx\n<PostHogCustomProvider>\n  <TeamProvider>\n    <PostHogGroupSync />\n    {/* rest of app */}\n  <\/TeamProvider>\n<\/PostHogCustomProvider>\n```\n\nThe component returns `null` and performs no visible rendering — it exists purely for its side effect.\n\n## Architecture\n\n```mermaid\ngraph TD\n    App[pages/_app.tsx] -->|wraps| PostHogCustomProvider\n    App -->|wraps| TeamProvider\n    \n    PostHogCustomProvider -->|initializes| PostHogSDK[posthog-js]\n    PostHogCustomProvider -->|calls| getPostHogConfig[\"getPostHogConfig()\"]\n    PostHogCustomProvider -->|calls| getSession[\"getSession()\"]\n    \n    TeamProvider -->|provides| useTeam\n    \n    PostHogGroupSync -->|uses| useTeam\n    PostHogGroupSync -->|calls| getPostHogConfig\n    PostHogGroupSync -->|calls| posthog_group[\"posthog.group('team', ...node[\")\"]\"]\n    \n    style PostHogSDK fill:#f9f,stroke:#333,stroke-width:2px\n```\n\n## Key Behaviors\n\n### Server-Side Rendering Safety\n\nBoth components include `typeof window !== \"undefined\"` checks to prevent PostHog initialization during SSR:\n\n```tsx\nif (typeof window === \"undefined\") return;\n```\n\n### Debug Mode\n\nWhen `NODE_ENV === \"development\"`, PostHog debug mode is enabled automatically, logging all events to the browser console.\n\n### Missing Configuration\n\nIf `getPostHogConfig()` returns falsy (no PostHog key configured), initialization and group syncing are skipped silently.\n\n### Dependencies\n\n| Dependency | Source | Purpose |\n|------------|--------|---------|\n| `getPostHogConfig()` | `@/lib/posthog` | Retrieves API key and host from environment |\n| `useTeam()` | `@/context/team-context` | Accesses current team state |\n| `getSession()` | `next-auth/react` | Checks authentication status |\n| `posthog-js` | external | Analytics SDK |\n| `posthog-js/react` | external | React context provider |","components-sidebar":"# components — sidebar\n\n# Components — Sidebar Module\n\nThe sidebar module provides the primary navigation interface for the Papermark application. It operates in two distinct modes: a general application sidebar for team-level navigation, and a specialized dataroom sidebar for context-specific navigation within individual datarooms.\n\n## Architecture Overview\n\nThe sidebar system uses a routing-aware orchestration layer that switches between two sidebar content variants based on the current pathname. The `SidebarPanels` component detects the route and renders either `AppSidebarContent` (for general routes) or `DataroomSidebarContent` (for dataroom routes).\n\n```mermaid\ngraph TB\n    subgraph \"Sidebar Module\"\n        SP[SidebarPanels]\n        SBC[SidebarBrandHeader]\n        AS[AppSidebar]\n        ASC[AppSidebarContent]\n        DSC[DataroomSidebarContent]\n        NM[NavMain]\n        NU[NavUser]\n        TS[TeamSwitcher]\n        UP[UsageProgress]\n        SB[SlackBanner]\n    end\n    \n    subgraph \"External Dependencies\"\n        TC[TeamContext]\n        PL[usePlan]\n        FF[useFeatureFlags]\n        DR[useDataroom]\n    end\n    \n    SP --> SBC\n    SP --> AS\n    AS --> ASC\n    ASC --> NM\n    ASC --> TS\n    ASC --> UP\n    ASC --> SB\n    \n    SP --> DSC\n    \n    ASC --> TC\n    ASC --> PL\n    ASC --> FF\n    DSC --> DR\n    DSC --> FF\n```\n\n## Core Components\n\n### SidebarPanels\n\n**File:** `components/sidebar/sidebar-panels.tsx`\n\nThe orchestrator component that manages which sidebar content to display. It uses `useRouter` to detect if the current route starts with `/datarooms/[id]` and switches between the two sidebar variants accordingly.\n\n**Key behavior:**\n- Detects dataroom routes via `router.pathname.startsWith(\"/datarooms/[id]\")`\n- Applies a slide animation (100% offset) when switching between sidebar types\n- Renders `SidebarBrandHeader` (always visible) and `NavUser` footer (always visible)\n- The animation direction is calculated based on the previous state to determine enter vs. leave direction\n\n```typescript\nconst animDirection = useState<\"enter\" | \"leave\" | null>(() => {\n    if (lastKnownIsDataroom === null) return null;\n    if (isDataroom && !lastKnownIsDataroom) return \"enter\";\n    if (!isDataroom && lastKnownIsDataroom) return \"leave\";\n    return null;\n});\n```\n\n### AppSidebarContent\n\n**File:** `components/sidebar/app-sidebar.tsx`\n\nThe main application sidebar content, rendered for all non-dataroom routes. This component assembles the complete navigation structure including team context, datarooms listing, plan-based gating, and promotional banners.\n\n**Navigation structure (navMain):**\n- Dashboard (`/dashboard`)\n- All Documents (`/documents`)\n- All Datarooms (`/datarooms`) — conditionally enabled based on plan\n- Visitors (`/visitors`) — requires Pro plan\n- Workflows (`/workflows`) — gated by feature flag\n- Branding (`/branding`)\n- General Settings — collapsible submenu with 7-8 items\n\n**Plan-based access control:**\n- Datarooms require Business, Datarooms, DataroomsPlus plan, or active trial\n- Visitors requires Pro plan\n- Workflows require DataRoomsPlus plan and `features.workflows` flag\n- Security settings (in General Settings) only visible to admins\n\n**Dataroom member scoping:**\nWhen `isDataroomMember` is true, the sidebar shows only the Datarooms section with only the user's assigned rooms. All other navigation items are hidden—the user has no access to Dashboard, Documents, Visitors, Workflows, Branding, or Settings.\n\n**Banner system:**\n- ProBanner shown to free-tier users (cookie-dismissable for 30 days)\n- SlackBanner shown when no Slack integration exists (cookie-dismissable for 30 days)\n\n**Usage limits:**\nDisplays `UsageProgress` components showing current links/documents usage against plan limits. Only renders when limits exist for the current plan.\n\n### DataroomSidebarContent\n\n**File:** `components/sidebar/dataroom-sidebar.tsx`\n\nSpecialized sidebar for dataroom pages. Provides context-aware navigation for managing a specific dataroom.\n\n**Navigation sections:**\n- Documents — main dataroom content view\n- Permissions — collapsible with Links and Groups sub-items\n- Analytics — collapsible with Overview and Audit Log sub-items\n- Q&A — conversations/questions interface\n- Request List — optional, gated by `requestListFeatureEnabled` and `dataroom.requestListEnabled`\n- Branding\n- Settings — collapsible with General, Introduction, Notifications, Downloads, File Permissions, and Danger Zone (hidden for dataroom members)\n\n**Dataroom header features:**\n- Back link to `/datarooms`\n- ScrollingText component for long dataroom names (animates on hover when overflow)\n- Frozen indicator (snowflake icon) for archived datarooms\n\n**Frozen dataroom handling:**\nWhen `dataroom.isFrozen` is true, the share button is replaced with a link to the danger zone settings.\n\n### NavMain\n\n**File:** `components/sidebar/nav-main.tsx`\n\nReusable navigation menu component that renders collapsible sidebar items.\n\n**NavItem interface:**\n```typescript\ninterface NavItem {\n    title: string;\n    url: string;\n    icon: LucideIcon;\n    current?: boolean;\n    isActive?: boolean;\n    disabled?: boolean;\n    plan?: PlanEnum;\n    trigger?: string;\n    highlightItem?: string[];\n    items?: { title: string; url: string; current?: boolean }[];\n}\n```\n\n**Disabled items:**\nWhen an item is disabled, it renders an `UpgradePlanModal` trigger instead of a direct link. The modal displays when clicked, showing the required plan for access.\n\n### TeamSwitcher\n\n**File:** `components/sidebar/team-switcher.tsx`\n\nTeam selection dropdown that allows users to switch between teams they belong to.\n\n**Features:**\n- Displays current team with avatar\n- Lists all teams the user belongs to\n- \"Add new team\" option (requires DataroomsPremium plan or triggers upgrade modal)\n- Invite team members button with three states:\n  - If `canAddUsers` is true: opens `AddTeamMembers` modal\n  - If user limit reached: opens `AddSeatModal` for plan upgrade\n  - If `showUpgradePlanModal`: shows upgrade prompt\n\n**Dataroom member restriction:**\nTeam switching and member invitation are hidden for dataroom-scoped members (`isDataroomMember`).\n\n### NavUser\n\n**File:** `components/sidebar/nav-user.tsx`\n\nUser menu and help center interface in the sidebar footer.\n\n**Features:**\n- User avatar with name/email from NextAuth session\n- Dropdown menu with:\n  - Theme toggle\n  - User settings link (`/account/general`)\n  - Help Center (opens search dialog)\n  - Contact Support (copies support email to clipboard)\n  - Log out\n\n**Help center search:**\n- Command-palette style dialog\n- Fetches articles from `/api/help` endpoint\n- Debounced search on input change\n- Opens articles in new tab to marketing site\n\n### SlackBanner\n\n**File:** `components/sidebar/banners/slack-banner.tsx`\n\nPromotional banner encouraging Slack integration.\n\n**Behavior:**\n- Only renders when `slackIntegration` is falsy\n- Dismissable with 30-day cookie persistence\n- Clicking \"Set up Slack\" navigates to `/settings/slack` and tracks analytics event\n\n### ScrollingText\n\n**File:** `components/sidebar/dataroom-sidebar.tsx`\n\nUtility component for displaying long text that scrolls horizontally when hovered if overflow exists.\n\n**Implementation:**\n- Uses `ResizeObserver` to detect overflow\n- Animates `translateX` on hover when text exceeds container width\n- Animation duration scales with overflow amount (minimum 600ms)\n\n## Key Data Flows\n\n### Team Context Integration\n\nThe sidebar integrates with the global team context from `context/team-context.tsx`. The `currentTeam` and `teams` are passed to `TeamSwitcher`, which handles switching via `setCurrentTeam`. The team ID is persisted to `localStorage` under the key `currentTeamId`.\n\n### Plan and Feature Gating\n\n```typescript\n// Plan checks via usePlan hook\nconst { isBusiness, isDatarooms, isDataroomsPlus, isFree, isTrial } = usePlan();\n\n// Feature flags via useFeatureFlags hook\nconst { features } = useFeatureFlags();\n\n// Admin check via useIsAdmin hook\nconst { isAdmin } = useIsAdmin();\n\n// Limits via useLimits hook\nconst { limits, canAddUsers } = useLimits();\n```\n\nThese hooks determine visibility of gated navigation items and conditional UI elements.\n\n### Dataroom Member Scoping\n\nThe `useSelfMembership` hook identifies if the current user is a dataroom-scoped member versus a full team member. When scoped:\n\n1. `AppSidebarContent` hides all navigation except Datarooms\n2. `TeamSwitcher` hides invite controls\n3. `DataroomSidebarContent` hides the Danger Zone from settings\n\n## Integration Points\n\n### Parent Layout\n\n`SidebarPanels` is consumed by `AppLayout` (`components/layouts/app.tsx`), which wraps all authenticated routes.\n\n### Supporting Hooks\n\n| Hook | Usage |\n|------|-------|\n| `useTeam` | Current team and team list |\n| `usePlan` | Plan tier and feature flags |\n| `useLimits` | Usage limits and user capacity |\n| `useDataroom` | Current dataroom data |\n| `useDataroomsSimple` | Simple dataroom list |\n| `useFeatureFlags` | Feature flag states |\n| `useIsAdmin` | Admin status |\n| `useSelfMembership` | Dataroom member scoping |\n| `useSlackIntegration` | Slack connection status |\n\n### External Services\n\n- **Analytics:** `useAnalytics` tracks banner interactions and navigation events\n- **NextAuth:** Session data provides user info for `NavUser`\n- **Cookies:** Banner dismissal state persisted client-side\n- **Help API:** `/api/help` provides searchable articles","components-tags":"# components — tags\n\n# AddTagsModal Component\n\nA modal dialog component for creating and editing tags. Provides a form interface for tag name, color selection, and optional description with built-in validation, plan-based access control, and loading states.\n\n## Purpose\n\nTags enable users to organize and categorize links. This modal serves as the primary interface for:\n\n- **Creating new tags** with a name, color, and optional description\n- **Editing existing tags** by pre-populating form fields with current values\n- **Enforcing plan limits** by prompting free users to upgrade when exceeding 5 tags\n\n## Props\n\n```typescript\ninterface AddTagsModalProps {\n  open: boolean;\n  setMenuOpen: (open: boolean) => void;\n  children?: React.ReactNode;\n  tagForm: TagFormState;\n  setTagForm: React.Dispatch<React.SetStateAction<TagFormState>>;\n  handleSubmit: FormEventHandler<HTMLFormElement> | undefined;\n  tagCount?: number;\n}\n```\n\n| Prop | Type | Description |\n|------|------|-------------|\n| `open` | `boolean` | Controls modal visibility |\n| `setMenuOpen` | `(open: boolean) => void` | Callback to toggle modal state |\n| `children` | `React.ReactNode` | Optional trigger element for `DialogTrigger` |\n| `tagForm` | `TagFormState` | Current form values including `id` (for edit mode) |\n| `setTagForm` | `Dispatch` | State setter for form updates |\n| `handleSubmit` | `FormEventHandler` | External form submission handler |\n| `tagCount` | `number \\| undefined` | Total tags owned by the team |\n\n### TagFormState Shape\n\n```typescript\n{\n  color: TagColorProps;\n  name: string;\n  description: string | null;\n  loading: boolean;\n  id?: string;  // Present when editing an existing tag\n}\n```\n\n## Form Behavior\n\n### Mode Detection\n\nThe component operates in two modes based on `tagForm.id`:\n\n- **Create mode**: `id` is undefined — dialog title shows \"Create Tag\", button shows \"Create Tag\"\n- **Edit mode**: `id` is present — dialog title shows \"Edit Tag\", button shows \"Save Changes\"\n\n### Validation\n\nForm submission is disabled unless `isFormValid` evaluates to true:\n\n```typescript\nconst isFormValid =\n  tagForm.name.length >= 3 &&      // Name requires minimum 3 characters\n  !!tagForm.color &&               // Color selection is required\n  (!tagForm.id || hasChanged);     // For edits, at least one field must differ from initial values\n```\n\n### Dirty State Tracking\n\nThe component tracks whether the form has been modified since initial load using a `useRef` to store initial values. This prevents unnecessary save operations when editing tags without making changes.\n\n```typescript\nconst initialValues = useRef(tagForm);\n\nconst hasChanged =\n  tagForm.name !== initialValues.current.name ||\n  tagForm.color !== initialValues.current.color ||\n  tagForm.description !== initialValues.current.description;\n```\n\n## Plan Gating\n\nFree plan users are limited to 5 tags. When `tagCount >= 5` and `isFree` is true, the modal renders an `UpgradePlanModal` instead of the standard dialog:\n\n- **Trial users** → Prompted to upgrade to Business plan\n- **Other free users** → Prompted to upgrade to Pro plan\n\n```typescript\nif (isFree && tagCount >= 5) {\n  return (\n    <UpgradePlanModal\n      clickedPlan={isTrial ? PlanEnum.Business : PlanEnum.Pro}\n      trigger={\"create_tag\"}\n    >\n      <Button>Upgrade to Create Tags<\/Button>\n    <\/UpgradePlanModal>\n  );\n}\n```\n\n## Component Structure\n\n```\nAddTagsModal\n├── Dialog (wrapper)\n│   ├── DialogTrigger (children passed in as trigger)\n│   └── DialogContent\n│       ├── DialogHeader\n│       │   ├── DialogTitle (Create Tag / Edit Tag)\n│       │   └── DialogDescription\n│       ├── Form\n│       │   ├── Input (tag name)\n│       │   ├── ToggleGroup (color selection)\n│       │   │   └── ToggleGroupItem × N (from COLORS_LIST)\n│       │   └── Textarea (description)\n│       └── DialogFooter\n│           └── Button (submit)\n└── UpgradePlanModal (conditional, for free plan limit)\n```\n\n## Color Selection\n\nColor options are sourced from `COLORS_LIST` (imported from `@/components/links/link-sheet/tags/tag-badge`). Each color renders as a `ToggleGroupItem` with:\n\n- Display of the color name\n- Dynamic ring styling when selected: `ring-{color}-500 ring-2`\n- Color-specific text styling when active\n\n## Usage Example\n\n```tsx\nimport { AddTagsModal } from \"@/components/tags/add-tag-modal\";\n\nfunction TagSettings() {\n  const [open, setOpen] = useState(false);\n  const [tagForm, setTagForm] = useState<TagFormState>({\n    name: \"\",\n    color: null,\n    description: null,\n    loading: false,\n  });\n\n  const handleSubmit = (e: FormEvent<HTMLFormElement>) => {\n    e.preventDefault();\n    // Handle tag creation/update\n  };\n\n  return (\n    <AddTagsModal\n      open={open}\n      setMenuOpen={setOpen}\n      tagForm={tagForm}\n      setTagForm={setTagForm}\n      handleSubmit={handleSubmit}\n      tagCount={existingTags.length}\n    >\n      <Button onClick={() => setOpen(true)}>+ Add Tag<\/Button>\n    <\/AddTagsModal>\n  );\n}\n```\n\n## External Dependencies\n\n| Dependency | Purpose |\n|-------------|---------|\n| `usePlan` | Checks user's subscription tier and trial status |\n| `UpgradePlanModal` | Displays upgrade prompts for free plan users |\n| `COLORS_LIST` | Predefined color options for tag styling |\n| `TagColorProps` | Type definition for valid color values |","components-view":"# components — view\n\n# components/view Module\n\nThe `components/view` module provides the public-facing viewing experience for documents and datarooms. It handles access control gates (email/password/agreement forms), document rendering, annotation display, and dataroom browsing interfaces. This is the layer visitors interact with when accessing a Papermark link.\n\n## Architecture Overview\n\nThe module consists of several functional areas: access gating, document/dataroom viewing, annotation display, and supporting UI utilities. The entry points (`DataroomView`, `DataroomDocumentView`, and page-level viewers) orchestrate the flow from access verification through to the final rendered content.\n\n```mermaid\nflowchart TD\n    subgraph \"Access Layer\"\n        AF[AccessForm]\n        EV[EmailVerificationForm]\n        AS[AgreementSection]\n    end\n\n    subgraph \"Viewing Layer\"\n        DV[DataroomView]\n        DDV[DataroomDocumentView]\n        V[Viewer components]\n    end\n\n    subgraph \"Utilities\"\n        SP[ScreenProtector]\n        AN[AnnotationPanel]\n        CM[CustomMetaTag]\n    end\n\n    AF -->|protected| EV\n    AF -->|unprotected| DV\n    DV --> DDV\n    DV --> V\n    DDV --> V\n    V --> SP\n    V --> AN\n```\n\n## Access Form System\n\nThe access form system (`access-form/`) implements the gate that visitors encounter before viewing protected content. It supports email collection, passcode verification, agreement acceptance (including Documenso e-signature integration), and custom field capture.\n\n### Theme Provider\n\n**`access-form-theme.tsx`** provides a React context for theming the access form. It wraps `createAdaptiveSurfacePalette` with the brand's accent color to produce a complete color palette for controls, backgrounds, and text.\n\n```tsx\nexport function AccessFormThemeProvider({ value, children }) {\n  return (\n    <AccessFormThemeContext.Provider value={value}>\n      {children}\n    <\/AccessFormThemeContext.Provider>\n  );\n}\n\nexport function createAccessFormTheme(accentColor: string | null | undefined) {\n  return createAdaptiveSurfacePalette(accentColor || \"#000000\");\n}\n```\n\nThe theme is memoized at the call site to avoid recalculation on every render.\n\n### Form Sections\n\nEach section is a self-contained input component:\n\n| Component | Purpose |\n|-----------|---------|\n| `EmailSection` | Email input with debounced validation, localStorage persistence, and \"shared with sender\" messaging |\n| `NameSection` | Full name input with localStorage persistence |\n| `PasswordSection` | Passcode input with show/hide toggle |\n| `CustomFieldsSection` | Dynamic rendering of custom fields (text, textarea, phone, checkbox, URL, number) |\n| `AgreementSection` | Agreement display and Documenso signing integration |\n\n### Agreement Signing Flow\n\n**`agreement-section.tsx`** is the most complex form section. When `signingProvider === \"DOCUMENSO\"` or `agreementContentType === \"SIGNING\"`, it embeds the Documenso signing widget:\n\n```tsx\nconst signingEmbedCssVars = useMemo(() => ({\n  background: getEmbedSurfaceColor(theme.backgroundColor),\n  primary: theme.ctaBgColor,\n  primaryForeground: theme.ctaTextColor,\n  // ... other CSS variable mappings\n}), [/* theme tokens */]);\n```\n\nThe signing flow:\n\n1. **Session creation** — `ensureSigningSession()` posts to `/api/agreements/signing/session` with the agreement ID, link ID, and visitor identity\n2. **Pre-warming** — on hover/focus of the \"Open signing\" button, the session is created early so the iframe loads faster\n3. **Embedding** — `EmbedDirectTemplate` from `@documenso/embed-react` renders inside a `Sheet` (side panel) with custom CSS to hide Documenso's sidebar\n4. **Completion** — `handleDocumentCompleted()` posts to `/api/agreements/signing/complete` when the visitor finishes signing\n\nThe component also handles **hydration** from stored state: if the visitor previously signed, their agreement status is loaded from localStorage and the status API, auto-confirming them.\n\n### Email Verification\n\n**`email-verification-form.tsx`** handles OTP verification when email verification is enabled. It displays a 6-digit OTP input with a 60-second resend cooldown timer.\n\n## Document and Dataroom Views\n\n### DataroomView\n\n**`dataroom-view.tsx`** is the entry point for dataroom links. It manages the access flow and, once submitted, renders `DataroomViewer`.\n\n```tsx\n// State machine for the access/viewing lifecycle\nconst [submitted, setSubmitted] = useState(false);\nconst [verificationRequested, setVerificationRequested] = useState(false);\n// ... then:\n<DataroomViewer\n  linkId={link.id}\n  dataroom={dataroom}\n  viewerEmail={viewData.viewerEmail ?? data.email ?? ...}\n/>\n```\n\n### DataroomDocumentView\n\n**`dataroom-document-view.tsx`** handles viewing a single document within a dataroom context. It differs from `DataroomView` in that it renders `ViewData` instead of `DataroomViewer`, passing document-specific data (pages, file, sheet data, etc.).\n\nBoth views share similar access patterns: form → email verification → viewing. They also both handle **inline OTP re-authentication** via `DownloadOtpVerification` when the server requires it for viewer uploads.\n\n### ViewData\n\n`ViewData` (imported from `view-data`) is the main document renderer that selects the appropriate viewer based on file type: PDF pages, Excel sheets, images, video, or Notion pages.\n\n## Dataroom Components\n\n### DataroomViewer\n\nThe viewer renders the dataroom shell with navbar, sidebar, and content area. Key sub-components:\n\n- **`DataroomFolderPicker`** — dropdown for navigating folder hierarchy\n- **`CompactDataroomListHeader`** / **`DocumentCard`** — compact list layout with grid template classes built from literal Tailwind strings\n- **`DataroomBannerMedia`** — renders banner based on URL classification (image, video, YouTube embed)\n- **`DataroomNoBannerTitle`** — title display when no banner is present\n- **`DataroomTrailingActions`** — CTA buttons, Q&A toggle, download button; extracted to allow rendering from the body toolbar (in Notion preset mode)\n\n### Downloads\n\n**`viewer-download-progress-modal.tsx`** implements bulk download with progress tracking. It polls `/api/documents/[id]/download-status` and handles OTP verification for team member downloads.\n\n## Screen Protection\n\n**`ScreenProtection.tsx`** prevents screenshots by intercepting keyboard shortcuts across platforms:\n\n| Platform | Shortcuts |\n|----------|-----------|\n| Windows/Linux | `PrintScreen`, `Alt+PrintScreen`, `Ctrl+PrintScreen`, `Shift+PrintScreen`, `Ctrl+Alt+PrintScreen`, `Meta+Shift+S` (Snipping), `Meta+G` (Game Bar) |\n| macOS | `Cmd+Shift+3/4/5`, `Cmd+Shift+4+Space` (window) |\n| Dev tools | `F12`, `Ctrl+Shift+I`, `Cmd+Option+I`, `Ctrl+Shift+C`, `Cmd+Option+C` |\n\nPrintScreen requires `keyup: true` because browsers only emit it on keyup, not keydown. When triggered, an overlay blocks the screen with an \"Screenshot is not allowed\" message. The component also includes a print-specific block via `print:block`.\n\n## Annotation System\n\n**`annotation-panel.tsx`** renders annotations for the current page. It:\n\n1. Fetches annotations via `useViewerAnnotations(linkId, documentId, viewId)`\n2. Filters to the current page using `annotation.pages.includes(currentPage)`\n3. Renders collapsible items with Tiptap JSON content (paragraphs, lists, blockquotes, images)\n4. Displays attached images in a responsive grid\n\n**`annotation-toggle.tsx`** provides the show/hide button, disabled when no annotations exist for the current page.\n\n## Meta Tags\n\n**`custom-metatag.tsx`** sets Open Graph and Twitter Card meta tags for link previews: canonical
