 {\n    // ctx same as App Router, plus req/res\n    res.json(ctx.team);\n  },\n  {\n    requiredPermissions: [\"team.read\"],\n  },\n);\n```\n\n### Resolution Flow\n\n```\ngetServerSession()\n        │\n        ▼\nresolveSessionTeam()\n        │\n        ├── Auth check ──────────────────────────── 401\n        │\n        ├── TeamId check ────────────────────────── 400\n        │\n        ├── Membership lookup ───────────────────── 401\n        │\n        ├── Active status check ────────────────── 403\n        │\n        ├── Role gate (optional) ───────────────── 403\n        │\n        ├── Permission gate ─────────────────────── 403\n        │\n        ├── Default-deny for scoped role ───────── 403 (no requiredPermissions)\n        │\n        ├── Plan gate (optional) ───────────────── 403\n        │\n        └── Per-room entitlement (scoped only)\n                │\n                ├── Resolve room id from params\n                │\n                └── canAccessDataroom() ────────── 403\n```\n\nThe `SessionTeamContext` returned on success:\n\n```typescript\ninterface SessionTeamContext {\n  userId: string;\n  teamId: string;\n  membership: { role, status, blockedAt };\n  role: Role;\n  permissions: Set<PermissionAction>;\n  allowedDataroomIds: string[];   // scoped members only\n  dataroomId?: string;             // resolved from params when configured\n  team: { id: string; plan: string };\n}\n```\n\n---\n\n## Link Data Fetching (`links/link-data.ts`)\n\nFetches and processes link data for Next.js `getStaticProps` and route handlers. Avoids internal HTTP fetches that can fail at the Vercel edge.\n\n### Entry Points\n\n```typescript\n// By link ID (for /view/[linkId] routes)\nconst result = await fetchLinkDataById({ linkId, dataroomDocumentId? });\n\n// By domain + slug (for custom domain links)\nconst result = await fetchLinkDataByDomainSlug({ domain, slug, dataroomDocumentId? });\n```\n\n### Return Type\n\n```typescript\ntype LinkFetchResult =\n  | { status: \"ok\"; linkType: LinkType; link: LinkRecord; brand: Brand | null; ... }\n  | { status: \"not_found\" | \"archived\" | \"deleted\" | \"free\" | \"frozen\" };\n```\n\n### Link Types Handled\n\n| Link Type | Data Fetched |\n|-----------|-------------|\n| `DOCUMENT_LINK` | Document, versions, brand, team plan |\n| `DATAROOM_LINK` | Dataroom, documents, folders, access controls, brand |\n| `DATAROOM_LINK` + `dataroomDocumentId` | Specific document within dataroom |\n| `WORKFLOW_LINK` | Minimal — team brand only |\n\n### Brand Cascading\n\nDataroom-level branding overrides team-level defaults:\n\n```typescript\nconst brand = {\n  logo: dataroomBrand?.logo || teamBrand?.logo,\n  brandColor: dataroomBrand?.brandColor || teamBrand?.brandColor,\n  // ... all fields cascade in the same pattern\n  defaultLanguage: dataroomBrand?.defaultLanguage ?? teamBrand?.defaultLanguage ?? \"en\",\n};\n```\n\n---\n\n## Document Processing Pipeline (`documents/process-document.ts`)\n\nHandles document upload and triggers downstream conversion jobs.\n\n```typescript\nconst document = await processDocument({\n  documentData,\n  teamId,\n  teamPlan,\n  userId,\n  folderPathName,\n  folderId,\n  createLink: true,\n  isExternalUpload: false,\n});\n```\n\n### Processing Steps\n\n1. **Type detection** — Derives type from file extension or explicit `supportedFileType`\n2. **Notion validation** — For `notion` type: verifies page is publicly accessible\n3. **Link URL validation** — For `link` type: validates URL format, checks against keyword blocklist for non-trusted teams\n4. **Folder resolution** — Resolves `folderId` from path or explicit parameter\n5. **Download-only determination** — Marks CAD, CAD-adjacent, and special formats as non-viewable\n6. **Database write** — Creates `Document` and `DocumentVersion` records\n7. **Conversion triggers** — Queues background jobs based on type:\n\n| Type | Trigger |\n|------|---------|\n| Keynote (`.key`, `application/vnd.apple.keynote`) | `convertKeynoteToPdfTask` |\n| Docs/Slides (non-Keynote) | `convertFilesToPdfTask` |\n| Non-MP4 video | `processVideo` |\n| PDF | `convertPdfToImageRoute` |\n| Excel with advanced mode | File copy + ISR revalidation |\n\n8. **Webhook dispatch** — `document.created` and optionally `link.created`\n\n---\n\n## Bulk Link Import (`links/bulk-import.ts`)\n\nHandles batch link creation via API (CSV importer or incoming webhook integration).\n\n```typescript\nawait handleBulkLinkImport(req, res, {\n  teamId,\n  targetId,        // document or dataroom ID\n  linkType: \"DOCUMENT_LINK\" | \"DATAROOM_LINK\",\n});\n```\n\n### Request Schema\n\n```typescript\n{\n  links: [\n    {\n      name?: string;\n      domain?: string;       // custom domain\n      slug?: string;         // link path\n      password?: string;\n      expiresAt?: string;     // ISO-8601\n      emailProtected?: boolean;\n      allowDownload?: boolean;\n      enableNotification?: boolean;\n      enableScreenshotProtection?: boolean;\n      allowList?: string[];\n      denyList?: string[];\n      presetId?: string;\n      // ... more fields\n    }\n  ]\n}\n```\n\n### Per-Row Processing\n\n- Domain + slug must be provided together\n- Presets resolved once per request and cached\n- Domain lookups cached per team\n- Plan link limit tracked per-request (rows beyond cap return per-row errors)\n- Frozen datarooms reject all row processing\n- `waitUntil` used for webhook dispatch to avoid blocking\n\n### Response\n\n```typescript\n{\n  summary: { total, success, failed },\n  results: [\n    { row: 1, status: \"success\", linkId, linkUrl },\n    { row: 2, status: \"error\", error: \"Link limit reached\" },\n  ]\n}\n```\n\n---\n\n## Domain Management (`domains/`)\n\n### Redis-Backed Redirects (`domains/redis.ts`)\n\nCaches redirect URLs in Redis for fast middleware lookups:\n\n```typescript\n// Check if plan supports custom redirects\nplanSupportsRedirects(\"business\"); // true\n\n// Get cached redirect\nconst url = await getDomainRedirectUrl(\"docs.example.com\");\n\n// Set or clear redirect\nawait setDomainRedirectUrl(\"docs.example.com\", \"https://target.com\");\n```\n\n### Clearing Redirects (`domains/clear-team-redirects.ts`)\n\nCalled when a team is deleted or downgrades from a redirect-eligible plan:\n\n```typescript\nawait clearTeamDomainRedirects(teamId);\n```\n\nRemoves redirect data from both Prisma and Redis.\n\n### Redirect URL Validation (`domains/validate-redirect-url.ts`)\n\nValidates URLs before saving:\n\n- Must use HTTPS\n- URL security validation (no `javascript:`, etc.)\n- Keyword blocklist check (non-trusted teams only)\n\n```typescript\nconst result = await validateRedirectUrl(url, teamId);\nif (!result.valid) {\n  return res.status(400).json({ error: result.message });\n}\n```\n\n### Domain Deletion (`domains.ts`)\n\nHandles domain cleanup including Vercel DNS removal:\n\n```typescript\nawait deleteDomain(\"example.com\");\nawait deleteDomain(\"sub.example.com\", { skipPrismaDelete: true }); // Vercel only\n```\n\n---\n\n## Passkey Authentication (`auth/passkey.ts`)\n\nIntegrates with Hanko for WebAuthn passkey management.\n\n### Registration Flow\n\n```typescript\n// Step 1: Client requests options to begin registration\nconst options = await startServerPasskeyRegistration({ session });\n\n// Step 2: After client completes registration, finalize on server\nawait finishServerPasskeyRegistration({ credential, session });\n```\n\n### Passkey Management\n\n```typescript\n// List user's registered passkeys\nconst passkeys = await listUserPasskeys({ session });\n\n// Remove a specific passkey\nawait removeUserPasskey({ credentialId, session });\n```\n\n`removeUserPasskey` verifies ownership by checking the credential belongs to the user before deletion.\n\n---\n\n## View Webhook Dispatch (`views/send-webhook-event.ts`)\n\nSends `link.viewed` webhooks when a link is accessed:\n\n```typescript\nawait sendLinkViewWebhook({ teamId, clickData });\n```\n\n### Checks Before Dispatch\n\n- Team must be on a webhook-eligible plan (not `free` or `pro`)\n- Team must not be paused\n- At least one webhook must be configured with `link.viewed` trigger\n\n### Payload Structure\n\n```typescript\n{\n  view: { viewedAt, viewId, email, emailVerified, country, city, device, ... },\n  link: { id, url, domain, key, name, expiresAt, permissions, ... },\n  document?: { id, name, contentType, teamId, createdAt },\n  dataroom?: { id, name, teamId, createdAt },\n}\n```\n\n---\n\n## SAML Enforcement (`teams/is-saml-enforced-for-email-domain.ts`)\n\nChecks whether a user must authenticate via SSO based on their email domain:\n\n```typescript\nconst enforced = await isSamlEnforcedForEmailDomain(userEmail);\nif (enforced) {\n  // Block email/password, Google OAuth, magic links\n}\n```\n\nSkips generic email providers (gmail.com, yahoo.com, etc.).\n\n---\n\n## ISR Revalidation (`links/revalidate.ts`)\n\nTriggers on-demand revalidation for links when content changes:\n\n```typescript\n// Single link\nawait revalidateLinkById(linkId);\n\n// All links using a permission group (after group changes)\nawait revalidateLinksForPermissionGroup(permissionGroupId);\n```\n\nUsed after creating, updating, or deleting permission groups to ensure link views reflect current access controls.\n\n---\n\n## Notifications (`notification-helper.ts`)\n\nDispatches background jobs for view notifications and viewer invitations:\n\n```typescript\n// View notification with location data\nawait sendNotification({ viewId, locationData });\n\n// Dataroom viewer invitation\nawait sendViewerInvitation({ dataroomId, linkId, viewerIds, senderUserId });\n```\n\nUses `waitUntil` internally to avoid blocking the request handler.\n\n---\n\n## Token Hashing (`auth/token.ts`)\n\nSHA-256 hashing for opaque tokens (e.g., email change tokens):\n\n```typescript\nconst hash = hashToken(rawToken);\nconst hashNoSecret = hashToken(rawToken, { noSecret: true });\n```\n\n---\n\n## Key Dependencies\n\n| Dependency | Used By |\n|------------|---------|\n| `prisma` | All modules — database access |\n| `next-auth` (`getServerSession`) | `with-session-team.ts` |\n| `@vercel/redis` | `domains/redis.ts` |\n| `@vercel/blob` | `bulk-import.ts` (preset image upload) |\n| `@vercel/edge-config` | `process-document.ts`, `validate-redirect-url.ts` |\n| `@prisma/client` (`Role`, `ItemType`) | RBAC, link types |\n| `lib/trigger/*` | Document conversion queueing |\n| `lib/webhook/send-webhooks` | View webhook dispatch |","lib-auth":"# lib — auth\n\n# lib/auth Module\n\nThe `lib/auth` module provides authentication and session management for Paperless. It handles three distinct session types: user authentication via NextAuth, public link sharing sessions, and dataroom access sessions.\n\n## Architecture Overview\n\nThe module is organized around the concept of Redis-backed sessions. Rather than storing sessions in database tables, short-lived session tokens are stored in Redis with automatic expiration. This approach provides:\n\n- Fast session lookup and validation\n- Automatic cleanup via Redis TTL\n- Stateless request handling across serverless instances\n- Support for both Next.js App Router and Pages Router APIs\n\n```mermaid\ngraph TB\n    subgraph \"Session Types\"\n        NA[NextAuth<br/>auth-options.ts]\n        LS[Link Sessions<br/>link-session.ts]\n        DS[Dataroom Sessions<br/>dataroom-auth.ts]\n        PS[Preview Sessions<br/>preview-auth.ts]\n    end\n    \n    subgraph \"Security Layer\"\n        FP[Fingerprint<br/>Generation]\n        IP[IP<br/>Normalization]\n    end\n    \n    subgraph \"Storage\"\n        Redis[(Redis)]\n    end\n    \n    NA --> Redis\n    LS --> FP --> Redis\n    DS --> FP --> Redis\n    DS --> IP --> Redis\n    PS --> Redis\n```\n\n## Core Concepts\n\n### Browser Fingerprinting\n\nAll link and dataroom sessions use browser fingerprinting to prevent session hijacking via cookie theft. The fingerprint combines:\n\n- `User-Agent` header\n- `Accept-Language` header\n- `Sec-CH-UA` client hints (browser brand)\n- `Sec-CH-UA-Platform` (operating system)\n- `Sec-CH-UA-Mobile` (mobile device indicator)\n\nThese values are combined with SHA-256 hashing to produce a stable identifier. Unlike IP-based validation, fingerprints remain constant when users switch networks or use VPNs, while still preventing session cookie reuse across different browsers or devices.\n\nThe fingerprinting system supports backward compatibility: sessions created before fingerprinting was implemented fall back to comparing User-Agent strings only.\n\n### IP Address Normalization\n\nIPv6 loopback addresses are normalized to a consistent format:\n\n```typescript\n// ::1, ::ffff:127.0.0.1, and 127.0.0.1 all become \"127.0.0.1\"\n```\n\nThis prevents false negatives when users access the application from different network representations of localhost.\n\n## Module Components\n\n### auth-options.ts — NextAuth Configuration\n\nThe NextAuth configuration file sets up authentication for logged-in users. It defines:\n\n**Providers:**\n\n| Provider | Purpose | Account Linking |\n|----------|---------|-----------------|\n| Google OAuth | Sign in with Google | Enabled (allows linking Google account to existing email) |\n| LinkedIn OAuth | Sign in with LinkedIn | Enabled |\n| Email Magic Link | Passwordless email login | N/A |\n| Passkey (Hanko) | WebAuthn passkey authentication | N/A |\n| SAML (BoxyHQ) | Enterprise SSO | Enabled |\n| SAML IdP | Identity Provider login flow | Enabled |\n\n**Session Strategy:** JWT-based sessions with the following callback flow:\n\n1. `jwt` callback attaches the `user` object to the token and tracks the provider\n2. `session` callback merges token data with session user, ensuring `id` is available client-side\n\n**User Creation Events:**\n\nWhen a new user is created, three side effects occur:\n\n1. User is identified in analytics (`identifyUser`)\n2. \"User Signed Up\" event is tracked\n3. A delayed welcome email job is queued via QStash (15-minute delay)\n\n### dataroom-auth.ts — Dataroom Access Sessions\n\nDataroom sessions control access to secure document rooms. When a user gains access to a dataroom (e.g., after OTP verification or valid credentials), a session is created and stored in Redis.\n\n**Session Cookie Format:** `pm_drs_{linkId}`\n\n**Session Schema:**\n\n```typescript\n{\n  linkId: string,           // The access link ID\n  dataroomId: string,       // The dataroom being accessed\n  viewId: string,           // Analytics view tracking ID\n  viewerId?: string,        // Optional persistent viewer ID\n  expiresAt: number,        // Unix timestamp (23 hours)\n  ipAddress: string,        // Normalized IP at creation\n  fingerprint?: string,     // Browser fingerprint (new sessions)\n  verified: boolean,        // OTP verification status\n}\n```\n\n**Verification Flow:**\n\n1. Extract session token from cookie\n2. Retrieve session data from Redis\n3. Check expiration\n4. Validate fingerprint (or IP for legacy sessions)\n5. Verify `linkId` and `dataroomId` match\n\nThe `updateDataroomSessionVerified()` function marks a session as verified after successful OTP validation, allowing access to sensitive operations like downloads.\n\n### link-session.ts — Link Sharing Sessions\n\nLink sessions manage access for shared document and dataroom links. They track not just authentication but also access patterns.\n\n**Session Cookie Format:** `pm_ls_{linkId}`\n\n**Session Schema:**\n\n```typescript\n{\n  linkId: string,\n  documentId?: string,\n  dataroomId?: string,\n  viewId: string,\n  viewerId?: string,\n  email: string,\n  expiresAt: number,\n  ipAddress: string,\n  userAgent: string,\n  fingerprint?: string,\n  verified: boolean,\n  linkType: \"DOCUMENT_LINK\" | \"DATAROOM_LINK\" | \"WORKFLOW_LINK\",\n  accessCount: number,      // Increments on each request\n  maxAccesses: number,      // Default 1000\n  lastAccessedAt: number,\n  createdAt: number,\n}\n```\n\n**Access Tracking:**\n\n- `accessCount` increments on every verified request, allowing link owners to see usage\n- `maxAccesses` defaults to 1000, providing soft limits on link usage\n- Viewer sessions are tracked in a Redis set (`viewer_sessions:{viewerId}`) for bulk revocation\n\n**Rate Limiting:** Each session is limited to 100 requests per minute via Redis increment with TTL.\n\n**Session Revocation:** The `revokeLinkSession()` function deletes a session by link ID, useful when link owners want to immediately invalidate access.\n\n### preview-auth.ts — Preview Sessions\n\nPreview sessions are short-lived tokens for authenticated previews (e.g., showing a document to its owner before publishing).\n\n**Session Duration:** 20 minutes\n\n**Session Schema:**\n\n```typescript\n{\n  userId: string,\n  linkId: string,\n  expiresAt: number,\n}\n```\n\nPreview sessions are intentionally minimal—they only verify that the requesting user owns the link and that the session hasn't expired. They don't track fingerprints or IP addresses since the user is already authenticated.\n\n## Security Model\n\n### Defense in Depth\n\nThe session system implements multiple layers of protection:\n\n| Layer | Protection Against |\n|-------|-------------------|\n| Redis TTL | Session expiration (auto-cleanup) |\n| Fingerprint validation | Cookie theft / session hijacking |\n| IP normalization | Network change false positives |\n| Access count limits | Resource exhaustion |\n| Rate limiting | Automated abuse |\n| LinkId/dataroomId verification | Parameter tampering |\n\n### Cookie Security\n\nSession cookies are configured with:\n\n- `httpOnly: true` — Prevents JavaScript access\n- `sameSite: \"lax\"` — CSRF protection while allowing navigation\n- `secure: true` on Vercel deployments — HTTPS-only\n\n### Error Handling\n\nAll session verification functions return `null` on failure rather than throwing exceptions. This prevents information leakage through error messages and simplifies calling code.\n\n## Integration Points\n\n### API Routes Using Session Auth\n\n| Route | Session Type | Purpose |\n|-------|--------------|---------|\n| `POST api/views` | Link + Preview | Track document view |\n| `POST api/views-dataroom` | Dataroom + Preview | Track dataroom view |\n| `GET api/faqs` | Dataroom | FAQ access |\n| `POST ai/chat` | Dataroom | AI chat within dataroom |\n| `POST [entryLinkId]/access` | Link + Dataroom | Link access grant |\n| `handleAccess` in `domains/[...domainSlug]` | Link + Dataroom | Domain-based access |\n\n### Analytics Integration\n\nThe `createUser` event handler fires on new user registration, enabling:\n\n- User identification in the analytics system\n- \"User Signed Up\" event tracking\n- Delayed welcome email via QStash cron\n\n### Database Schema\n\nSessions use Prisma for user-account linking via `PrismaAdapter`. The `Account` model stores OAuth tokens, while `User` stores identity information. The JWT strategy means session data is signed rather than stored in the database.","lib-billing":"# lib — billing\n\n# lib/billing/team-plan-custom-messaging\n\nProvides plan-gating logic for team-level features, particularly around dataroom branding, layout customization, and visitor-facing settings.\n\n## Overview\n\nThis module contains a set of predicate functions that answer a single question: *does a given team plan allow access to this feature?* Callers use these checks to conditionally render UI, gate API actions, or evaluate feature flags.\n\n## Plan String Format\n\nPlan strings follow a compound format: `base-plan[+modifier]`.\n\n| Component | Example | Description |\n|-----------|---------|-------------|\n| `base-plan` | `business`, `datarooms`, `datarooms-plus` | The primary subscription tier |\n| `modifier` | `drtrial`, `old` | Optional add-ons that unlock features on lower tiers |\n\nAll functions in this module:\n\n1. Handle `null`, `undefined`, and `\"free\"` as a single rejection case\n2. Treat any plan containing `\"drtrial\"` as a trial state that unlocks Data Rooms features\n3. Extract the base plan by splitting on `+` before comparing\n\n## Feature Gates\n\n### `teamPlanAllowsCustomWelcomeAndCta`\n\nDetermines whether a team can set a custom welcome message and call-to-action. This applies to both global team branding and per-dataroom branding.\n\n**Grants access to:** Business, Data Rooms, Data Rooms Plus, Data Rooms Premium, Data Rooms Unlimited, or any `drtrial` team.\n\n```typescript\nfunction teamPlanAllowsCustomWelcomeAndCta(\n  plan: string | null | undefined\n): boolean\n```\n\n**Used by:**\n- `teams/[teamId]/branding.ts` — gates the welcome/CTA form\n- `datarooms/[id]/branding.ts` — gates per-dataroom welcome/CTA settings\n\n### `teamPlanIsDataroomPlusTier`\n\nChecks whether a team is on Data Rooms Plus or a higher tier (Premium, Unlimited). This is a narrower gate than `teamPlanAllowsLayoutCustomization` — it excludes the base `datarooms` tier.\n\n**Grants access to:** Data Rooms Plus, Data Rooms Premium, Data Rooms Unlimited only. Trials do not count for this check.\n\n```typescript\nfunction teamPlanIsDataroomPlusTier(\n  plan: string | null | undefined\n): boolean\n```\n\n**Used by:**\n- `datarooms/[id]/calculate-indexes.ts` — evaluates index computation eligibility\n- `lib/featureFlags/dataroom-index-viewer.ts` — determines whether the index viewer feature flag is active for a viewer\n\n### `teamPlanAllowsLayoutCustomization`\n\nControls whether a team can save dataroom layout settings (preset, folder tree, card layout, header style, etc.). The companion function `teamPlanShowsLayoutUi` controls whether the UI renders at all; this function controls whether the *save* action succeeds.\n\n**Grants access to:** Data Rooms, Data Rooms Plus, Data Rooms Premium, Data Rooms Unlimited, or any `drtrial` team.\n\n```typescript\nfunction teamPlanAllowsLayoutCustomization(\n  plan: string | null | undefined\n): boolean\n```\n\n**Used by:**\n- `teams/[teamId]/branding.ts` — gates the layout save action in global branding\n- `datarooms/[id]/branding.ts` — gates the layout save action in per-dataroom branding\n\n### `teamPlanAllowsVisitorLanguage`\n\nControls whether a team can configure a visitor language picker for dataroom branding. English is always available as the free default; this gate determines whether additional languages are offered.\n\n**Grants access to:** Data Rooms Plus, Data Rooms Premium, Data Rooms Unlimited, or any `drtrial` team.\n\n```typescript\nfunction teamPlanAllowsVisitorLanguage(\n  plan: string | null | undefined\n): boolean\n```\n\n**Note:** Callers must separately enforce that English remains the default when the feature is disabled.\n\n**Used by:**\n- `datarooms/[id]/branding.ts` — gates the language picker control\n\n### `teamPlanShowsLayoutUi`\n\nControls whether the Layouts UI is rendered at all in the branding screens. This is a looser gate than `teamPlanAllowsLayoutCustomization` — Business plan users see and interact with the controls, but attempting to save triggers an upgrade modal.\n\n**Grants access to:** Business, Data Rooms, Data Rooms Plus, Data Rooms Premium, Data Rooms Unlimited, or any `drtrial` team.\n\n```typescript\nfunction teamPlanShowsLayoutUi(\n  plan: string | null | undefined\n): boolean\n```\n\n**Used by:**\n- `teams/[teamId]/branding.ts` — conditionally renders the layout controls\n- `datarooms/[id]/branding.ts` — conditionally renders the layout controls\n\n## Plan Hierarchy\n\n```\nfree\n  └── business          → Layout UI visible, custom welcome/CTA allowed\n        └── datarooms   → Layout customization saved, custom welcome/CTA allowed\n              └── datarooms-plus\n                    ├── datarooms-premium\n                    └── datarooms-unlimited\n                          → Visitor language picker allowed\n                          → Dataroom Plus tier features enabled\n```\n\n**`drtrial` modifier** — When appended to any plan (e.g., `business+drtrial`), it activates Data Rooms feature gates. This allows trial users to exercise the full feature set without a paid subscription.\n\n## Usage Pattern\n\nCallers typically follow a two-step pattern for layout settings:\n\n```typescript\n// Step 1: Determine whether to render the UI\nconst showLayoutUi = teamPlanShowsLayoutUi(team.plan);\n\n// Step 2: Determine whether the save action is permitted\nconst canSaveLayout = teamPlanAllowsLayoutCustomization(team.plan);\n```\n\nFor welcome/CTA and visitor language, a single gate check is sufficient since there is no separate \"visible but not savable\" state.","lib-constants":"# lib — constants\n\n# Folder Constants Module\n\n## Overview\n\nThe `folder-constants.ts` module centralizes all icon and color definitions used for folder customization throughout the application. It provides a single source of truth for folder styling, ensuring consistency across folder-related components and enabling server-side validation of user-provided values.\n\nThis module exports constants, types, and helper functions that components use to render and validate folder icons and colors.\n\n## Exports Summary\n\n| Export | Type | Purpose |\n|--------|------|---------|\n| `FOLDER_ICONS` | `readonly` array | Icon definitions for folder customization |\n| `FOLDER_COLORS` | `readonly` array | Color palette definitions for folders |\n| `FolderIconId` | Type | Union type of valid icon IDs |\n| `FolderColorId` | Type | Union type of valid color IDs |\n| `ALLOWED_FOLDER_ICONS` | string array | Allowed values for server-side validation |\n| `ALLOWED_FOLDER_COLORS` | string array | Allowed values for server-side validation |\n| `DEFAULT_FOLDER_ICON` | string | Default icon ID (`\"folder\"`) |\n| `DEFAULT_FOLDER_COLOR` | string | Default color ID (`\"gray\"`) |\n| `getFolderIcon()` | function | Lookup icon component by ID |\n| `getFolderColorClasses()` | function | Lookup color classes by ID |\n\n## Icon Definitions\n\n### FOLDER_ICONS\n\nA readonly array of 34 icon definitions sourced from `lucide-react`. Each entry contains:\n\n- **`id`**: Unique identifier (e.g., `\"folder\"`, `\"briefcase\"`, `\"star\"`)\n- **`icon`**: The actual Lucide icon component for rendering\n- **`label`**: Human-readable name for UI display (e.g., `\"Folder\"`, `\"Briefcase\"`)\n\n```typescript\n{ id: \"folder\", icon: FolderIcon, label: \"Folder\" },\n{ id: \"briefcase\", icon: BriefcaseIcon, label: \"Briefcase\" },\n// ... 32 more icons\n```\n\nThe array uses `as const` for immutable tuple typing, enabling the `FolderIconId` type inference.\n\n### FolderIconId Type\n\n```typescript\nexport type FolderIconId = (typeof FOLDER_ICONS)[number][\"id\"];\n```\n\nThis generates a union type of all valid icon IDs: `\"folder\" | \"folder-open\" | \"briefcase\" | ...`\n\n### Available Icons\n\nThe icon library covers several use cases:\n\n| Category | Icons |\n|----------|-------|\n| **Storage** | Folder, Folder Open, Archive, Box, File, Cloud |\n| **Work** | Briefcase, Settings, Wrench, Layers, Zap |\n| **Social** | Users, Heart, Star, Flag, Award, Bell |\n| **Creative** | Palette, Pen Tool, Lightbulb, Sparkles |\n| **Media** | Image, Video, Music, Book, Bookmark |\n| **Status** | Lock, Shield, Globe, Home, Mail, Tag, Sun, Hash, Flame |\n\n## Color Palette\n\n### FOLDER_COLORS\n\nA readonly array of 7 color definitions. Each entry provides Tailwind CSS classes for consistent styling:\n\n- **`id`**: Unique identifier (`\"gray\"`, `\"red\"`, `\"orange\"`, etc.)\n- **`label`**: Display name (`\"Gray\"`, `\"Red\"`, `\"Orange\"`, etc.)\n- **`text`**: Text color class (e.g., `\"text-gray-600\"`)\n- **`bg`**: Background color class (e.g., `\"bg-gray-100\"`)\n- **`border`**: Border color class (e.g., `\"border-gray-300\"`)\n- **`iconClass`**: Icon-specific color with dark mode support (e.g., `\"text-gray-600 dark:text-gray-400\"`)\n\n```typescript\n{\n  id: \"blue\",\n  label: \"Blue\",\n  text: \"text-blue-600\",\n  bg: \"bg-blue-100\",\n  border: \"border-blue-300\",\n  iconClass: \"text-blue-500 dark:text-blue-400\",\n}\n```\n\n### FolderColorId Type\n\n```typescript\nexport type FolderColorId = (typeof FOLDER_COLORS)[number][\"id\"];\n```\n\nUnion type: `\"gray\" | \"red\" | \"orange\" | \"yellow\" | \"green\" | \"blue\" | \"black\"`\n\n## Validation Constants\n\nTwo arrays are exported specifically for server-side validation:\n\n```typescript\nexport const ALLOWED_FOLDER_ICONS = FOLDER_ICONS.map((icon) => icon.id);\nexport const ALLOWED_FOLDER_COLORS = FOLDER_COLORS.map((color) => color.id);\n```\n\nThese flat string arrays can be used directly in validation schemas:\n\n```typescript\nimport { ALLOWED_FOLDER_ICONS, ALLOWED_FOLDER_COLORS } from \"@/lib/constants/folder-constants\";\n\nconst folderSchema = z.object({\n  icon: z.enum(ALLOWED_FOLDER_ICONS),\n  color: z.enum(ALLOWED_FOLDER_COLORS),\n});\n```\n\n## Default Values\n\n```typescript\nexport const DEFAULT_FOLDER_ICON: FolderIconId = \"folder\";\nexport const DEFAULT_FOLDER_COLOR: FolderColorId = \"gray\";\n```\n\nUse these when creating new folders without user-specified customization.\n\n## Helper Functions\n\n### getFolderIcon()\n\nRetrieves the Lucide icon component for a given ID. Falls back to `FolderIcon` if the ID is not found.\n\n```typescript\nexport function getFolderIcon(iconId: string | null | undefined) {\n  const foundIcon = FOLDER_ICONS.find((icon) => icon.id === iconId);\n  return foundIcon?.icon ?? FolderIcon;\n}\n```\n\n**Usage:**\n\n```tsx\nimport { getFolderIcon } from \"@/lib/constants/folder-constants\";\n\nfunction FolderIconRenderer({ iconId }: { iconId: string }) {\n  const Icon = getFolderIcon(iconId);\n  return <Icon className=\"h-5 w-5\" />;\n}\n```\n\n### getFolderColorClasses()\n\nRetrieves the color class definitions for a given ID. Falls back to the first entry (gray) if the ID is not found.\n\n```typescript\nexport function getFolderColorClasses(colorId: string | null | undefined) {\n  const foundColor = FOLDER_COLORS.find((color) => color.id === colorId);\n  return foundColor ?? FOLDER_COLORS[0];\n}\n```\n\n**Usage:**\n\n```tsx\nimport { getFolderColorClasses } from \"@/lib/constants/folder-constants\";\n\nfunction FolderBadge({ colorId }: { colorId: string }) {\n  const colors = getFolderColorClasses(colorId);\n  \n  return (\n    <span className={`${colors.bg} ${colors.text} px-2 py-1 rounded`}>\n      Custom Folder\n    <\/span>\n  );\n}\n```\n\n## Component Integration\n\nThe module is consumed by several folder-related components:\n\n```mermaid\ngraph LR\n    FC[folder-constants.ts] --> FIP[FolderIconColorPicker]\n    FC --> FCp[FolderColorDot]\n    FC --> FIPrev[FolderIconPreview]\n    FC --> FCD[FolderCard<br/>components/documents]\n    FC --> FCDr[FolderCard<br/>view/dataroom]\n```\n\n| Component | Usage |\n|-----------|-------|\n| `FolderIconColorPicker` | `getFolderColorClasses()` for color selection UI |\n| `FolderIconPreview` | `getFolderIcon()` for icon preview rendering |\n| `FolderColorDot` | `getFolderColorClasses()` for color indicator dots |\n| `FolderCard` (documents) | `getFolderIcon()`, `getFolderColorClasses()` for folder display |\n| `FolderCard` (dataroom) | `getFolderIcon()`, `getFolderColorClasses()` for folder display |\n\n## Adding New Icons or Colors\n\nTo extend the icon or color options:\n\n1. **New icon**: Import the Lucide icon component and add it to `FOLDER_ICONS` with an `id` and `label`\n2. **New color**: Add a new entry to `FOLDER_COLORS` with all required class properties\n\nThe types, validation arrays, and helper functions will automatically include the new options due to the `as const` inference pattern.","lib-cron":"# lib — cron\n\n# lib/cron\n\nProvides infrastructure for scheduled task execution and webhook signature verification using Upstash QStash.\n\n## Overview\n\nThis module handles communication with Upstash QStash, a serverless task queue and scheduler. It provides:\n\n- **Rate limiting** via Bottleneck to respect third-party API limits (e.g., Resend's 10 req/s)\n- **Signature verification** to validate that incoming webhooks originate from QStash\n- **QStash client** for scheduling and managing background tasks\n\n## Key Components\n\n### Rate Limiter\n\n```typescript\nexport const limiter = new Bottleneck({\n  maxConcurrent: 1,\n  minTime: 100,\n});\n```\n\nA shared Bottleneck instance limiting concurrent requests to 1 and enforcing 100ms between requests. This prevents hitting Resend's rate limit of 10 requests per second when sending scheduled emails.\n\n### Signature Verification\n\nThe `verifyQstashSignature` function validates incoming webhook requests from QStash:\n\n```typescript\nverifyQstashSignature({ req, rawBody })\n```\n\n**Parameters:**\n- `req` — The incoming `Request` object\n- `rawBody` — The raw request body string (not parsed JSON)\n\n**Behavior:**\n1. Skips verification when `VERCEL !== \"1\"` (local development)\n2. Extracts the `Upstash-Signature` header\n3. Uses Upstash's `Receiver` to verify the signature against the raw body\n4. Logs and throws on invalid signatures\n\n### QStash Client\n\n```typescript\nexport const qstash = new Client({\n  token: process.env.QSTASH_TOKEN || \"\",\n});\n```\n\nA pre-configured client for scheduling tasks, sending messages, and managing scheduled jobs.\n\n### Upstash Receiver\n\n```typescript\nexport const receiver = new Receiver({\n  currentSigningKey: process.env.QSTASH_CURRENT_SIGNING_KEY || \"\",\n  nextSigningKey: process.env.QSTASH_NEXT_SIGNING_KEY || \"\",\n});\n```\n\nThe `Receiver` verifies that incoming webhook payloads are genuinely from QStash and haven't been tampered with.\n\n## Architecture Flow\n\n```mermaid\nsequenceDiagram\n    participant QStash\n    participant Next.js Route\n    participant verifyQstashSignature\n    participant Receiver\n    \n    QStash->>Next.js Route: POST webhook (with signature header)\n    Next.js Route->>verifyQstashSignature: Call with req + rawBody\n    verifyQstashSignature->>Receiver: verify({ signature, body })\n    Receiver-->>verifyQstashSignature: true/false\n    alt invalid signature\n        verifyQstashSignature->>log: Log error with URL and message ID\n        verifyQstashSignature-->>Next.js Route: Throw error\n    else valid signature\n        verifyQstashSignature-->>Next.js Route: Return (proceed)\n    end\n```\n\n## Environment Variables\n\n| Variable | Description |\n|----------|-------------|\n| `QSTASH_TOKEN` | API token for QStash client |\n| `QSTASH_CURRENT_SIGNING_KEY` | Current signing key for signature verification |\n| `QSTASH_NEXT_SIGNING_KEY` | Next signing key for signature rotation |\n| `VERCEL` | Set to `\"1\"` in Vercel environment; enables signature verification |\n\n## Usage\n\n### Verifying a Webhook Request\n\nIn your route handler, pass both the request and the raw body:\n\n```typescript\nimport { verifyQstashSignature } from \"@/lib/cron/verify-qstash\";\n\nexport async function POST(req: Request) {\n  const rawBody = await req.text();\n  \n  await verifyQstashSignature({ req, rawBody });\n  \n  // Proceed with webhook logic\n  const body = JSON.parse(rawBody);\n  // ...\n}\n```\n\n### Using the Rate Limiter\n\n```typescript\nimport { limiter } from \"@/lib/cron\";\n\nawait limiter.schedule(() => {\n  return sendEmail({ to: user.email, template: \"welcome\" });\n});\n```\n\n### Scheduling a Cron Job\n\n```typescript\nimport { qstash } from \"@/lib/cron\";\n\nawait qstash.publishJSON({\n  url: \"https://yourapp.com/api/cron/process-queue\",\n  body: { task: \"process-queue\" },\n  cron: \"*/5 * * * *\", // Every 5 minutes\n});\n```\n\n## Integration Points\n\nThis module is consumed by:\n\n| Route | Purpose |\n|-------|---------|\n| `cron/welcome-user/route.ts` | Processes scheduled welcome email tasks |\n| `webhooks/callback/route.ts` | Handles QStash delivery callbacks |\n\n## Security Note\n\nSignature verification is critical for webhook security. Always call `verifyQstashSignature` before processing any webhook payload to ensure the request originated from QStash and wasn't tampered with in transit.","lib-dataroom":"# lib — dataroom\n\n# Dataroom Module (`lib/dataroom`)\n\nThe dataroom module provides shared utilities for the dataroom feature — a secure document portal with hierarchical folders, granular permissions, bulk download support, and index generation.\n\nThe module is organized around three concerns:\n\n1. **Folder hierarchy** — path computation from parentId chains, descendant collection, name mapping\n2. **Bulk download** — building the folder structure and file manifest that the download lambda consumes\n3. **Permissions** — SQL builders for efficient bulk permission writes, plus tree-based helpers for computing permission cascades from UI interactions\n4. **Index generation** — producing Excel, CSV, or JSON manifests of dataroom contents\n\n---\n\n## Folder Hierarchy (`build-folder-hierarchy.ts`)\n\n### Why parentId instead of the materialized `path` field?\n\nThe dataroom schema has a `DataroomFolder` table with both `parentId` (reference to parent folder) and a materialized `path` field (e.g., `\"/legal/contracts\"`). The materialized field can become stale after renames or moves. This module ignores the stored path and **recomputes all paths from the parentId chain** on every operation.\n\n### `buildFolderPathsFromHierarchy`\n\n```typescript\nfunction buildFolderPathsFromHierarchy(\n  folders: FolderInput[],\n): Map<string, string>\n```\n\nRecursively walks the parentId chain for every folder and returns a map of `folderId → slugified path`. Handles circular parentId references defensively by falling back to a safe slugified path.\n\n```typescript\n// Input\n[\n  { id: \"f1\", name: \"Legal\", parentId: null },\n  { id: \"f2\", name: \"Contracts\", parentId: \"f1\" },\n  { id: \"f3\", name: \"NDA\", parentId: \"f2\" },\n]\n\n// Output\n{\n  \"f1\" → \"/legal\",\n  \"f2\" → \"/legal/contracts\",\n  \"f3\" → \"/legal/contracts/nda\",\n}\n```\n\n### `collectDescendantIds`\n\n```typescript\nfunction collectDescendantIds(\n  rootId: string,\n  folders: { id: string; parentId: string | null }[],\n): Set<string>\n```\n\nUses BFS traversal to return all descendant folder IDs under a root. This replaces `path: { startsWith }` queries that rely on the stale materialized field.\n\n### `buildFolderNameMap`\n\n```typescript\nfunction buildFolderNameMap(\n  folders: FolderInput[],\n  pathMap: Map<string, string>,\n): Map<string, { name: string; id: string }>\n```\n\nInverts the path map so the download builder can look up the original display name for a path. This matters for non-ASCII folder names where the slug differs from what the user sees in the UI.\n\n---\n\n## Bulk Download Structure (`build-bulk-download-structure.ts`)\n\n### Purpose\n\nBuilds the `folderStructure` + `fileKeys` payload that two lambdas consume:\n\n- **Bulk-download lambda** — zips files for the viewer\n- **Freeze-archive lambda** — archives a dataroom snapshot\n\nBoth lambdas share the same shape, so a single builder serves both.\n\n### Data Flow\n\n```mermaid\nflowchart LR\n    A[\"fullFolders<br/>(unfiltered)\"] --> B[\"buildFolderPathsFromHierarchy\"]\n    A --> C[\"buildFolderNameMap\"]\n    D[\"includedFolders<br/>(permission-filtered)\"] --> F[\"resolveZipPath\"]\n    E[\"includedDocuments<br/>(permission-filtered)\"] --> G[\"addDocument\"]\n    B --> F\n    C --> F\n    F --> H[\"ensureFolderChain\"]\n    G --> H\n    H --> I[\"folderStructure\"]\n    G --> J[\"fileKeys\"]\n    G --> K[\"downloadableDocuments\"]\n```\n\n### `BulkDownloadFile`\n\n```typescript\ntype BulkDownloadFile = {\n  name: string;           // Display name with extension fix applied\n  key: string;            // Storage key for the lambda to fetch\n  type?: string;          // e.g. \"pdf\", \"image\"\n  numPages?: number;\n  needsWatermark?: boolean;\n  size?: number;\n};\n```\n\n### `BulkDownloadFolderStructure`\n\n```typescript\ntype BulkDownloadFolderStructure = {\n  [path: string]: {\n    name: string;\n    path: string;\n    files: BulkDownloadFile[];\n  };\n};\n```\n\nPaths are slash-separated and slugified. Empty folders are represented by entries with `files: []` so the lambda recreates them in the zip.\n\n### Watermarking Logic\n\n| Condition | File picked |\n|-----------|-------------|\n| `enableWatermark=false` | `version.originalFile ?? version.file` |\n| `enableWatermark=true` and type is PDF | `version.file` (the rendered watermark-ready copy) |\n| `enableWatermark=true` and type is not PDF | `version.originalFile ?? version.file` |\n\nPDFs always get their `.pdf` extension forced because `mupdf` saves renders as PDFs regardless of the upload type.\n\n### Filtering\n\nDocuments are excluded when:\n\n- Their latest version has `type === \"notion\"` (the lambda can't handle Notion docs)\n- Their latest version has `storageType === VERCEL_BLOB` (same reason)\n- They live in a folder that's not in `includedFolders` (permission boundary)\n- The folder's computed path can't be resolved (the folder isn't in `fullFolders`)\n\n### Folder-Scoped Downloads\n\nWhen a viewer downloads a single folder rather than the whole dataroom, pass `rootFolder`:\n\n```typescript\nbuildBulkDownloadStructure({\n  fullFolders,\n  includedFolders,\n  includedDocuments,\n  enableWatermark: true,\n  rootFolder: { id: \"f123\", name: \"Legal\" },\n});\n```\n\nThe structure is then rooted at `\"/legal\"` instead of `\"/\"`, and `stripRootPath` rebases descendant paths under the root.\n\n---\n\n## Index Generation (`index-generator.ts`)\n\n### `generateDataroomIndex`\n\n```typescript\nasync function generateDataroomIndex(\n  link: LinkWithDataroom,\n  options?: {\n    format?: \"excel\" | \"csv\" | \"json\";\n    baseUrl?: string;\n    showHierarchicalIndex?: boolean;\n  },\n): Promise<{ data: Buffer; filename: string; mimeType: string }>\n```\n\nRecursively traverses the folder tree and produces a flattened list of entries:\n\n- **Root folder** — the dataroom itself\n- **Folders** — included at the level where they appear in the tree\n- **Files** — included with their parent folder path, size, page count, version, and online link\n\nThe index includes metadata about the dataroom (total files, total folders, total size in MB) and is consumed by both:\n\n- `api/links/generate-index.ts` — per-link index download\n- `datarooms/[id]/generate-index.ts` — dataroom-level index download\n\n### Format Details\n\n| Format | Notes |\n|--------|-------|\n| **Excel** | Two worksheets: \"Dataroom Index\" (full data) and \"Summary\" (totals). Online URLs are hyperlinks. Header rows are styled. |\n| **CSV** | Flat row-per-entry. All columns included. |\n| **JSON** | Serialized `DataroomIndex` type with entries array and totals. |\n\nFile sizes are converted from bytes to megabytes and rounded to two decimal places.\n\n---\n\n## Permissions SQL Builders (`permissions-sql.ts`)\n\n### The Problem with Per-Row Upserts\n\nThe previous permission-save implementation used `prisma.*.upsert(...)` inside a `prisma.$transaction` loop. On datarooms with thousands of documents, this produced thousands of individual round-trips and reliably timed out Prisma's interactive transaction window.\n\n### Solution\n\nFour pure SQL builder functions that produce a single SQL statement covering all rows. They are invoked inside `prisma.$transaction` as raw SQL:\n\n```typescript\n// Before: O(n) round trips\nfor (const row of permissions) {\n  await prisma.viewerGroupAccessControls.upsert({...});\n}\n\n// After: O(1) round trips\nconst sql = buildBulkUpsertPermissionsSql(table, groupId, rows);\nawait prisma.$executeRaw(sql);\n```\n\n### Two Consumers with Different Semantics\n\n| Consumer | Table | Semantics |\n|----------|-------|-----------|\n| Viewer groups (admin permissions UI) | `ViewerGroupAccessControls` | Append-only delta — only rows in the payload are upserted; nothing deleted |\n| Link permission groups (per-link overrides) | `PermissionGroupAccessControls` | Set-everything — any DB row not in the payload (or the computed ancestor set) is deleted |\n\n### `buildBulkUpsertPermissionsSql`\n\nUpserts all user-supplied permission rows with a single `INSERT ... ON CONFLICT DO UPDATE`. Rows are sorted by `itemId` before building the VALUES clause to produce a stable row-lock order for concurrent saves.\n\n### `buildFindAncestorFolderIdsSql`\n\nA recursive CTE that walks from each visible document's `folderId` and each visible folder up to the root, returning the distinct set of ancestor folders. This is the server-side safety net — the UI already computes ancestors locally, but the server re-derives them to guard against stale or manipulated payloads.\n\nThe CTE is constrained to `dataroomId` so a malicious caller cannot walk folders in a different dataroom.\n\n### `buildUpsertAncestorVisibilitySql`\n\nTakes the ancestor IDs from the CTE and forces `canView=TRUE` for each. `canDownload` is intentionally left untouched so existing download grants on ancestors are preserved. The `WHERE existing.canView = FALSE` guard skips no-op writes in steady state.\n\n### `buildDeletePermissionsNotInPayloadSql`\n\nImplements the link-permission \"set the complete desired state\" semantics. Anything not in `keepItemIds` (after ancestor expansion) is deleted. Returns `null` when `keepItemIds` is empty so the caller can decide whether to wipe everything or skip the call.\n\n### `extractVisibleItemIds`\n\nConvenience helper that splits a permission payload into the two ID arrays the recursive CTE needs:\n\n```typescript\nextractVisibleItemIds({ \"doc1\": { itemType: DATAROOM_DOCUMENT, view: true, download: false } })\n// → { visibleDocumentIds: [\"doc1\"], visibleFolderIds: [] }\n```\n\n---\n\n## Permissions Tree Helpers (`permissions-tree.ts`)\n\n### Purpose\n\nThese pure functions compute permission changes from user interactions in the group-permissions UI. They were extracted from the React component so the cascade logic can be unit tested without React.\n\n### The `TreeNode` Model\n\n```typescript\ntype TreeNode = {\n  id: string;\n  itemType: ItemType;\n  permissions: { view: boolean; download: boolean };\n  subItems?: TreeNode[];   // Children in the tree\n};\n```\n\nThe UI maintains a virtual root node (`__dataroom_root__`) that never gets written to the database — toggling it applies the change to every real item in the tree.\n\n### Invariants\n\n1. **Download requires view** — turning view off forces download off. Turning download on forces view on.\n2. **Ancestor cascade** — when a descendant changes, the ancestors may need updating:\n   - Turning view ON → all ancestors forced to view=true (download bumped only if explicitly toggled)\n   - Turning view OFF → ancestors recomputed from remaining visible siblings\n   - Turning download OFF (view stays on) → only `canDownload` recomputed from remaining downloadable siblings\n\n### `collectChangesForItem`\n\nCore function. Takes the toggled item, its parent chain, and the new permission state, then returns all the DB changes needed:\n\n```typescript\n// User turns off view on \"doc1\" inside \"Legal > Contracts\":\ncollectChangesForItem(doc1Node, [contractsNode, legalNode], { view: false, download: false })\n// → {\n//     \"doc1\": { view: false, download: false },\n//     \"contracts\": { view: false, download: false },  // recomputed from siblings\n//     \"legal\": { view: false, download: false },       // recomputed from siblings\n//   }\n```\n\nThe function walks the parent chain in reverse (bottom-up) so that changes to lower ancestors are visible when computing higher ones.\n\n### `resolveToggleIntent`\n\nThe permissions UI uses a multi-select toggle group that can produce ambiguous state changes. `resolveToggleIntent` disambiguates between \"user turned view off\" and \"user turned download on\" by comparing the previous and next state:\n\n```typescript\n// Previous: { view: true, download: false }\n// Next:     { view: false, download: false } (both flags cleared by toggle group)\n\n// resolveToggleIntent returns: { view: false, download: false }\n// → user turned view OFF, not download ON\n```\n\n### `aggregateFolderPermissions`\n\nRenders folder rows in the UI with three states per flag:\n\n| State | Meaning |\n|-------|---------|\n| Checked (true) | All direct children are true |\n| Unchecked (false) | No direct children are true |\n| Indeterminate (partial) | Some but not all children are true |\n\nThe `partial*` flags propagate upward: a folder is `partialView=true` when any direct child is `view=false` or itself `partialView=true`, even if every direct child reports `view=true` (because one of those children is hiding a deeper item).\n\n```typescript\naggregateFolderPermissions([\n  { view: true, download: false, partialView: false, partialDownload: true },\n  { view: true, download: false, partialView: true, partialDownload: false },\n])\n// → { view: true, partialView: true, download: false, partialDownload: true }\n```\n\n---\n\n## Module Architecture\n\n```mermaid\ngraph TD\n    subgraph \"API Layer (Callers)\"\n        A[\"POST [id]/download/bulk.ts\"]\n        B[\"POST [id]/freeze/route.ts\"]\n        C[\"groups/[groupId]/permissions.ts\"]\n        D[\"[id]/permission-groups/[permissionGroupId].ts\"]\n        E[\"api/links/generate-index.ts\"]\n        F[\"datarooms/[id]/generate-index.ts\"]\n        G[\"group-permissions.tsx (React)\"]\n    end\n\n    subgraph \"lib/dataroom\"\n        H[\"build-bulk-download-structure.ts\"]\n        I[\"build-folder-hierarchy.ts\"]\n        J[\"permissions-sql.ts\"]\n        K[\"permissions-tree.ts\"]\n        L[\"index-generator.ts\"]\n    end\n\n    subgraph \"lib/utils\"\n        M[\"safeSlugify\"]\n        N[\"ensureFileExtension\"]\n    end\n\n    A --> H\n    B --> H\n    B --> I\n    A --> I\n    C --> J\n    C --> I\n    D --> J\n    D --> I\n    E --> L\n    F --> L\n    G --> K\n    G --> J\n\n    H --> I\n    H --> M\n    H --> N\n    I --> M\n    J --> M\n```\n\n### Data Dependencies\n\n- **`build-folder-hierarchy.ts`** — no dependencies on other dataroom modules. Used by the download builder, the freeze archive handler, the bulk-download trigger, and the permissions SQL builders.\n- **`build-bulk-download-structure.ts`** — depends on folder hierarchy for path computation and on `lib/utils` for slugification and content type handling.\n- **`permissions-sql.ts`** — pure SQL builders with no internal dependencies. Consumed by permission API handlers.\n- **`permissions-tree.ts`** — pure tree helpers with no internal dependencies. Consumed by the React permissions UI.\n- **`index-generator.ts`** — depends on `lib/types/index-file` for the `DataroomIndex` type and `exceljs` for file generation.","lib-edge-config":"# lib — edge-config\n\n# Edge Config Module (`lib/edge-config`)\n\nThe edge-config module provides a typed interface to Vercel Edge Config, a globally distributed key-value store optimized for low-latency reads. This module centralizes all Edge Config access in the codebase, making it easy to manage runtime configuration without deploying code changes.\n\n## Purpose\n\nThis module enables several runtime behaviors that would otherwise require code deployments to change:\n\n- **Email blacklist enforcement** — Block sign-ins from specific email addresses\n- **Custom team emails** — Override default sender addresses per team\n- **Embeddable domain allowlisting** — Control which domains can embed content via iframes\n- **Trusted team verification** — Mark specific teams as trusted for elevated permissions\n\n## How Edge Config Works\n\nEdge Config is backed by Vercel's global edge network. When `process.env.EDGE_CONFIG` is set, the `@vercel/edge-config` client reads from this store. All functions in this module follow the same pattern:\n\n```typescript\nif (!process.env.EDGE_CONFIG) {\n  return safeDefaultValue;\n}\n```\n\nThis ensures the application functions normally in environments without Edge Config configured.\n\n## Module Structure\n\n```\nlib/edge-config/\n├── blacklist.ts          # Email blacklist checking\n├── custom-email.ts       # Team-specific custom email retrieval\n├── embeddable-domains.ts # Domain allowlist for embeds\n└── trusted-teams.ts      # Team trust verification\n```\n\n## Components\n\n### Email Blacklist (`blacklist.ts`)\n\n```typescript\nisBlacklistedEmail(email: string): Promise<boolean>\n```\n\nChecks whether an email address matches any entry in the blacklist stored under the `emails` key.\n\n**Matching behavior:**\n- Uses a case-insensitive regex constructed from all blacklist entries joined with `|`\n- Supports glob-style patterns since regex is applied (e.g., `.*@temp\\.com` blocks all emails from that domain)\n\n**Returns:** `false` if Edge Config is unavailable, the key is missing, or no match is found.\n\n**Used by:** `signIn` handler in `api/auth/[...nextauth].ts`\n\n---\n\n### Custom Email per Team (`custom-email.ts`)\n\n```typescript\ngetCustomEmail(teamId?: string): Promise<string | null>\n```\n\nRetrieves a custom sender email for a specific team from the `customEmail` key, which stores a JSON object mapping team IDs to email addresses.\n\n**Returns:** The custom email string if found, or `null` if:\n- `EDGE_CONFIG` is not set\n- `teamId` is not provided\n- The key doesn't exist or is malformed\n- No custom email is defined for the given team\n\n**Used by:** `sendOtpVerificationEmail` in `lib/emails/send-email-otp-verification.ts`\n\n---\n\n### Embeddable Domains (`embeddable-domains.ts`)\n\nThis file contains the most complex logic, implementing hostname matching for iframe embedding restrictions.\n\n#### `getEmbeddableDomains(): Promise<string[]>`\n\nReads the `embeddableDomains` key and returns an array of allowed hostnames. Returns an empty array if Edge Config is unavailable or the value is not an array.\n\n#### `isEmbeddableUrl(url: string | null | undefined): Promise<boolean>`\n\nDetermines whether a URL can be used as an embed source.\n\n**Validation steps:**\n1. Returns `false` for null/undefined/empty URLs\n2. Parses the URL and returns `false` if parsing fails\n3. Returns `false` if the protocol is not `https:`\n4. Returns `false` if the allowlist is empty\n5. Returns `true` if the hostname matches any allowlist entry\n\n**Hostname matching rules:**\n\n| Allowlist Entry | Matches | Does Not Match |\n|-----------------|---------|----------------|\n| `example.com` | `example.com` | `app.example.com` |\n| `.example.com` | `app.example.com`, `nested.app.example.com` | `example.com` |\n\nMatching is case-insensitive.\n\n**Used by:**\n- `POST` handler in `api/views/route.ts`\n- `POST` handler in `api/views-dataroom/route.ts`\n\n---\n\n### Trusted Teams (`trusted-teams.ts`)\n\n```typescript\nisTrustedTeam(teamId: string): Promise<boolean>\n```\n\nChecks whether a team ID exists in the `trustedTeams` array stored in Edge Config.\n\n**Returns:** `false` if Edge Config is unavailable, the key is missing, or the team ID is not in the list.\n\n**Used by:**\n- `validateRedirectUrl` in `api/domains/validate-redirect-url.ts`\n- `handle` in `documents/[id]/update-link-url.ts`\n- `processDocument` in `api/documents/process-document.ts`\n- `run` in `lib/trigger/pdf-to-image-route.ts`\n\n## Error Handling Pattern\n\nAll functions in this module implement defensive error handling:\n\n```typescript\ntry {\n  const result = await get(\"key\");\n  // Validate and transform result\n} catch (e) {\n  // Return safe default (empty array, null, or false)\n}\n```\n\nThis ensures that transient Edge Config failures don't crash the application — callers receive a safe default value and the request continues.\n\n## Usage Example\n\n```typescript\nimport { isBlacklistedEmail, isEmbeddableUrl, isTrustedTeam } from \"~/lib/edge-config\";\n\n// Block a sign-in from a blacklisted email\nconst isBlocked = await isBlacklistedEmail(user.email);\nif (isBlocked) {\n  throw new Error(\"Sign-in not allowed\");\n}\n\n// Check if a URL can be embedded\nconst canEmbed = await isEmbeddableUrl(sourceUrl);\nif (!canEmbed) {\n  return { error: \"Domain not allowed for embedding\" };\n}\n\n// Verify team trust level\nconst isTrusted = await isTrustedTeam(teamId);\nif (isTrusted) {\n  // Grant elevated permissions\n}\n```\n\n## Configuration Keys\n\nThe module expects the following keys to be configured in your Vercel Edge Config store:\n\n| Key | Type | Description |\n|-----|------|-------------|\n| `emails` | `string[]` | Array of email patterns to block |\n| `customEmail` | `Record<string, string>` | Team ID to custom sender email mapping |\n| `embeddableDomains` | `string[]` | Allowed hostnames for iframe embeds |\n| `trustedTeams` | `string[]` | Array of trusted team IDs |","lib-emails":"# lib — emails\n\n# lib/emails Module\n\nTransactional and marketing email dispatch for Papermark, built on Resend. This module centralizes all email sending logic, ensuring consistent formatting, branding, and error handling across the application.\n\n## Overview\n\nThe emails module handles three categories of email:\n\n| Category | Purpose |\n|----------|---------|\n| **Transactional** | Document/view notifications, authentication, downloads |\n| **Marketing** | Onboarding sequences, milestones, upgrade check-ins |\n| **System** | Dataroom digests, domain alerts, team invitations |\n\nAll emails route through the shared `sendEmail` utility in `lib/resend`, which wraps the Resend API with consistent headers, error handling, and environment-based test mode.\n\n## Core Pattern\n\nEvery email function follows the same structure:\n\n```typescript\nexport const sendSomeEmail = async (params: EmailParams) => {\n  const emailTemplate = SomeEmailTemplate({ /* props */ });\n  \n  try {\n    await sendEmail({\n      to: params.recipient,\n      subject: \"Email subject\",\n      react: emailTemplate,\n      test: process.env.NODE_ENV === \"development\",\n      // ... optional flags\n    });\n  } catch (e) {\n    console.error(e);\n    // Re-throw or swallow depending on function\n  }\n};\n```\n\nThe React template (`SomeEmailTemplate`) is a component from `@/components/emails/*` that renders the email HTML.\n\n## Dataroom Notifications\n\nDataroom emails handle the notification system for document sharing. They support both instant notifications and batched digests.\n\n### Instant Notifications\n\n**`sendDataroomNotification`** — Alerts a viewer when a new document becomes available in a dataroom they have access to.\n\n```typescript\nsendDataroomNotification({\n  dataroomName: string,\n  documentName: string | undefined,\n  senderEmail: string | null,\n  to: string,\n  url: string,\n  unsubscribeUrl: string,\n})\n```\n\n**`sendViewedDataroomEmail`** — Notifies the dataroom owner when someone views their dataroom. Includes viewer email and optional geolocation.\n\n```typescript\nsendViewedDataroomEmail({\n  ownerEmail: string | null,\n  dataroomId: string,\n  dataroomName: string,\n  viewerEmail: string | null,\n  linkName: string,\n  teamMembers?: string[],\n  locationString?: string,\n})\n```\n\n**`sendViewedDataroomPausedEmail`** — Triggers when dataroom views resume after being paused. Same signature as `sendViewedDataroomEmail` minus viewer details.\n\n**`sendDataroomUploadNotification`** — Notifies dataroom owners and team members when documents are uploaded. The subject line includes the uploader's email if available.\n\n```typescript\nsendDataroomUploadNotification({\n  ownerEmail: string,\n  dataroomId: string,\n  dataroomName: string,\n  uploaderEmail: string | null,\n  documentNames: string[],\n  linkName: string,\n  teamMembers?: string[],\n})\n```\n\n### Digest Processing\n\nThe digest system batches viewer activity and sends periodic summaries. Processing happens on a scheduled basis (daily or weekly cron jobs hit the `dataroom-digest/daily` and `dataroom-digest/weekly` API routes).\n\n```mermaid\nsequenceDiagram\n    participant Cron as Daily/Weekly Cron\n    participant Route as /dataroom-digest/[frequency]\n    participant Queue as Redis Queue\n    participant DB as Prisma\n    participant Resend as Resend API\n\n    Cron->>Route: POST\n    Route->>Queue: popDigestQueue(frequency)\n    Queue-->>Route: DigestBatch[]\n    \n    Loop For each batch\n        Route->>DB: Fetch viewer, dataroom, sender\n        Route->>DB: Fetch dataroom documents\n        Route->>Route: Build document list\n        Route->>Resend: sendDataroomDigestNotification()\n    End\n```\n\n**`processDataroomDigest`** — Entry point for digest processing. Pops batches from Redis, processes each one, and logs failures.\n\n```typescript\nexport async function processDataroomDigest(\n  frequency: \"daily\" | \"weekly\"\n): Promise<{ processed: number }>\n```\n\n**`processBatch`** — Handles a single digest batch:\n1. Fetches the viewer's verified views for the dataroom\n2. Retrieves dataroom and sender details\n3. Collects unique document IDs from batch items\n4. Resolves document names via a `Map` lookup\n5. Builds the view link URL (custom domain or fallback)\n6. Generates unsubscribe URL\n7. Sends the digest email\n\nThe batch skips processing if:\n- No items in the batch\n- Viewer has no verified email\n- No valid view link found\n\n**`sendDataroomDigestNotification`** — Renders the digest email with document list. The subject dynamically reflects the frequency (\"today\" for daily, \"this week\" for weekly).\n\n```typescript\nsendDataroomDigestNotification({\n  dataroomName: string,\n  documents: { documentName: string }[],\n  senderEmail: string | null,\n  to: string,\n  url: string,\n  preferencesUrl: string,\n  frequency: \"daily\" | \"weekly\" | \"instant\",\n})\n```\n\n## Authentication Emails\n\n### OTP Verification\n\n**`sendOtpVerificationEmail`** — Sends a one-time password for viewer verification. Supports custom branding when the team has configured a custom domain.\n\n```typescript\nsendOtpVerificationEmail(\n  email: string,\n  code: string,\n  isDataroom: boolean = false,\n  teamId: string,\n)\n```\n\nThe `isDataroom` flag affects the email template rendering. Custom branding is resolved from Edge Config (`getCustomEmail`) and Redis (`brand:logo:*`).\n\n### Login Code (Passwordless)\n\n**`sendVerificationRequestEmail`** — Generates a 10-character alphanumeric code, stores it in Redis with a 15-minute TTL, and sends the email using `waitUntil` to defer sending after the response.\n\n```typescript\nexport interface LoginCodeData {\n  email: string;\n  code: string;\n  callbackUrl: string;\n  createdAt: number;\n}\n```\n\n**`fetchAndDeleteLoginCodeData`** — Atomic fetch-and-delete using Redis `GETDEL` to prevent race conditions where the same code could be used twice. Returns `null` if the code is expired or doesn't exist.\n\n```typescript\nfetchAndDeleteLoginCodeData(\n  email: string,\n  code: string\n): Promise<LoginCodeData | null>\n```\n\n### Email Change Verification\n\n**`sendEmailChangeVerificationRequestEmail`** — Sent when a user requests to change their email address. Includes a confirmation URL that completes the change.\n\n## Document Notifications\n\n### View Notifications\n\n**`sendViewedDocumentEmail`** — Notifies document owners when someone views their document. Includes viewer email and geolocation if available.\n\n**`sendViewedDocumentPausedEmail`** — Triggers when document views resume after being paused.\n\n### Download & Export Notifications\n\n**`sendDownloadReadyEmail`** — Confirms when a bulk download package is ready, with an expiration timestamp.\n\n```typescript\nsendDownloadReadyEmail({\n  to: string,\n  dataroomName: string,\n  downloadUrl: string,\n  expiresAt?: string,\n  isViewer?: boolean,\n})\n```\n\n**`sendExportReadyEmail`** — Confirms when a data export is ready for download.\n\n## Dataroom Trial Lifecycle\n\nThe trial system sends three emails at key moments:\n\n| Function | Trigger | Delay |\n|----------|---------|-------|\n| `sendDataroomTrialWelcome` | Trial starts | 6 minutes |\n| `sendDataroomTrial24hReminderEmail` | Trial expires | 24 hours before |\n| `sendDataroomTrialEndEmail` | Trial ends | At expiration |\n\n`sendDataroomTrialWelcome` uses `scheduledAt` to defer delivery by 6 minutes—likely to avoid immediate signup noise.\n\n## User Lifecycle Emails\n\n### Welcome & Onboarding\n\n**`sendWelcomeEmail`** — Initial welcome to Papermark. Marked as `marketing: true` with an unsubscribe link to account settings.\n\n**`sendOnboardingEmail`** — Sends day 1–5 onboarding sequence emails. Each email covers a key feature:\n\n| Type | Subject |\n|------|---------|\n| `onboarding1` | Turn your documents into links |\n| `onboarding2` | Set link permissions |\n| `onboarding3` | Track analytics on each page |\n| `onboarding4` | Custom domain and branding |\n| `onboarding5` | Virtual Data Rooms |\n\n### Milestones\n\n- **`sendHundredViewsCongratsEmail`** — Celebrates 100 document views\n- **`sendThousandViewsCongratsEmail`** — Celebrates 1000 document views\n\n### Upgrade Check-ins\n\n- **`sendUpgradeOneMonthCheckinEmail`** — 1-month post-upgrade check-in\n- **`sendSixMonthMilestoneEmail`** — 6.5-month milestone (scheduled 195 days ahead)\n\n## Plan & Upgrade Emails\n\n**`sendUpgradePlanEmail`** — Immediate confirmation after plan upgrade. Mapped plan types:\n\n| Plan Slug | Display Name |\n|-----------|--------------|\n| `pro` | Pro |\n| `business` | Business |\n| `datarooms` | Data Rooms |\n| `datarooms-plus` | Data Rooms Plus |\n| `datarooms-premium` | Data Rooms Premium |\n| `datarooms-unlimited` | Data Rooms Unlimited |\n\n**`sendUpgradePersonalEmail`** — Personalized welcome after upgrade. Sent 6 minutes after purchase. Custom from address: `Iuliia Shnari <iuliia@papermark.com>`.\n\n**`sendDataroomInfoEmail`** — Educational email about dataroom use cases. Use case determines subject:\n\n```typescript\nconst USECASE_SUBJECTS = {\n  \"mergers-and-acquisitions\": \"Virtual Data Rooms for Mergers and Acquisitions\",\n  \"startup-fundraising\": \"Virtual Data Rooms for Startup Fundraising\",\n  \"fund-management\": \"Virtual Data Rooms for Fund Management & Fundraising\",\n  sales: \"Virtual Data Rooms for Sales\",\n  \"project-management\": \"Virtual Data Rooms for Project Management\",\n  operations: \"Virtual Data Rooms for Operations\",\n  other: \"Virtual Data Rooms\",\n};\n```\n\n## Domain Management Emails\n\n- **`sendInvalidDomainEmail`** — Alerts when a domain has been invalid for N days, prompting reconfiguration\n- **`sendDeletedDomainEmail`** — Confirms domain deletion\n- **`sendCustomDomainSetupEmail`** — Guides users through custom domain setup\n\n## Team Emails\n\n**`sendTeammateInviteEmail`** — Team invitation with sender details and join URL.\n\n## Integration Points\n\nThe module integrates with these external systems:\n\n| Dependency | Purpose |\n|------------|---------|\n| `@/lib/resend` | Email delivery via Resend API |\n| `@/lib/prisma` | Database queries for viewer/document data |\n| `@/lib/redis` | Login code storage, digest queue, brand assets |\n| `@/lib/edge-config/custom-email` | Team custom branding |\n| `@/lib/utils/unsubscribe` | Unsubscribe URL generation |\n| `@vercel/functions` | Background email sending (`waitUntil`) |\n\n## Usage from Routes\n\n| Route/Function | Email Function |\n|----------------|----------------|\n| `POST /dataroom-digest/daily` | `processDataroomDigest(\"daily\")` |\n| `POST /dataroom-digest/weekly` | `processDataroomDigest(\"weekly\")` |\n| `POST /cron/welcome-user` | `sendWelcomeEmail` |\n| `POST /api/jobs/send-dataroom-new-document-notification` | `sendDataroomNotification`, `sendDataroomDigestNotification` |\n| `POST /api/views` | `sendOtpVerificationEmail` |\n| `POST /api/views-dataroom` | `sendOtpVerificationEmail` |\n| `POST /api/jobs/send-notification` | `sendViewedDocument*`, `sendViewedDataroom*` |\n| `POST /auth/verify-code` | `fetchAndDeleteLoginCodeData` |\n| Stripe webhook | `sendUpgradePlanEmail`, `sendUpgradePersonalEmail` |\n| `lib/trigger/bulk-download` | `sendDownloadReadyEmail` |\n| `lib/trigger/export-visits` | `sendExportReadyEmail` |\n\n## Security Considerations\n\n- **Login codes** use atomic Redis operations (`GETDEL`) to prevent reuse via race conditions\n- **Unsubscribe URLs** are included in all marketing and system emails\n- **Custom branding** is fetched per-team, ensuring white-label consistency\n- **OTP codes** are generated client-side and transmitted via Resend's verification flow\n- **Test mode**: Emails are suppressed in development (`NODE_ENV === \"development\"`) unless explicitly sent","lib-featureflags":"# lib — featureFlags\n\n# `lib/featureFlags` Module\n\nThe feature flags module provides a centralized system for enabling and disabling beta features on a per-team basis using Vercel Edge Config.\n\n## Overview\n\nThis module implements a **team-based feature flag system** where features can be selectively enabled for specific teams. It integrates with Vercel Edge Config to store feature-to-team mappings, allowing runtime feature toggling without code deployments.\n\n## Architecture\n\n```mermaid\nflowchart TB\n    subgraph \"Feature Flags Module\"\n        GF[\"getFeatureFlags<br/>lib/featureFlags/index.ts\"]\n        RD[\"resolveDataroomIndexEnabledForViewer<br/>lib/featureFlags/dataroom-index-viewer.ts\"]\n    end\n    \n    subgraph \"Vercel Edge Config\"\n        EC[\"Edge Config<br/>betaFeatures map\"]\n        TP[\"teamPlanIsDataroomPlusTier<br/>Billing Module\"]\n    end\n    \n    subgraph \"Consumers (20+ locations)\"\n        API[\"API Routes\"]\n        Pages[\"Page Handlers\"]\n        Props[\"Static Props\"]\n        Storage[\"Storage Config\"]\n    end\n    \n    GF --> EC\n    RD --> GF\n    RD --> TP\n    API --> GF\n    Pages --> GF\n    Props --> GF\n    Storage --> GF\n```\n\n## Core API\n\n### `getFeatureFlags(options)`\n\nRetrieves all feature flags for a given team.\n\n```typescript\nimport { getFeatureFlags } from \"@/lib/featureFlags\";\n\nconst flags = await getFeatureFlags({ teamId: \"team_abc123\" });\n// { tokens: false, incomingWebhooks: true, dataroomIndex: false, ... }\n```\n\n**Parameters:**\n\n| Parameter | Type | Description |\n|-----------|------|-------------|\n| `options.teamId` | `string \\| undefined` | The team ID to check flags for |\n\n**Returns:** `Promise<Record<BetaFeatures, boolean>>`\n\nA record mapping each feature name to a boolean indicating whether it's enabled.\n\n### Default Behavior\n\nThe function returns `false` for all features when:\n- `EDGE_CONFIG` environment variable is not set (local development)\n- No `teamId` is provided\n- Edge Config fetch fails with non-403 errors\n\n### Error Handling\n\n```typescript\n// Edge Config unavailable (403/Unauthorized)\n// → All flags default to false, warning logged\n\n// Other Edge Config errors\n// → All flags default to false, error logged\n\n// No EDGE_CONFIG set\n// → Returns all flags as false immediately\n```\n\n## Available Feature Flags\n\nThe system supports 18 beta features:\n\n| Flag | Description |\n|------|-------------|\n| `tokens` | API token generation |\n| `incomingWebhooks` | Inbound webhook support |\n| `roomChangeNotifications` | Real-time room update notifications |\n| `webhooks` | General webhook functionality |\n| `conversations` | Chat/conversation features |\n| `dataroomUpload` | Enhanced dataroom upload capabilities |\n| `inDocumentLinks` | Links within documents |\n| `usStorage` | US-based storage region |\n| `dataroomIndex` | Hierarchical numbering for datarooms |\n| `slack` | Slack integrations |\n| `annotations` | Document annotation features |\n| `dataroomInvitations` | Enhanced dataroom sharing |\n| `workflows` | Automated workflow capabilities |\n| `ai` | AI-powered features |\n| `sso` | Single sign-on support |\n| `textSelection` | Text selection in viewer |\n| `requestList` | Request queue functionality |\n\n## Helper Functions\n\n### `resolveDataroomIndexEnabledForViewer(options)`\n\nDetermines if the dataroom index feature (hierarchical numbering) is available for a viewer.\n\n```typescript\nimport { resolveDataroomIndexEnabledForViewer } from \"@/lib/featureFlags/dataroom-index-viewer\";\n\nconst isEnabled = await resolveDataroomIndexEnabledForViewer({\n  teamId: \"team_abc123\",\n  teamPlan: \"dataroom_plus\",\n});\n```\n\n**Parameters:**\n\n| Parameter | Type | Description |\n|-----------|------|-------------|\n| `options.teamId` | `string \\| null \\| undefined` | The team ID |\n| `options.teamPlan` | `string \\| null \\| undefined` | The team's subscription plan |\n\n**Returns:** `Promise<boolean>`\n\n**Eligibility Logic:**\n\n```\nEnabled if:\n  - dataroomIndex flag is set for teamId in Edge Config\n  OR\n  - Team is on Dataroom Plus tier plan\n```\n\nThis allows the feature to be enabled either through feature flags (for beta testing) or automatically for paying Plus-tier customers.\n\n## Edge Config Data Structure\n\nThe Edge Config stores feature flags as a mapping of feature names to arrays of team IDs:\n\n```json\n{\n  \"betaFeatures\": {\n    \"tokens\": [\"team_abc123\", \"team_def456\"],\n    \"dataroomIndex\": [\"team_xyz789\"],\n    \"ai\": [\"team_abc123\"]\n  }\n}\n```\n\nA team with ID `team_abc123` would have `tokens: true` and `ai: true`, while `dataroomIndex` would be `false`.\n\n## Usage Patterns\n\n### Direct Flag Checking\n\n```typescript\n// In an API route or server component\nexport async function GET(req: Request, { params }: { params: { teamId: string } }) {\n  const flags = await getFeatureFlags({ teamId: params.teamId });\n  \n  if (!flags.workflows) {\n    return Response.json({ error: \"Workflows not enabled\" }, { status: 403 });\n  }\n  \n  // Proceed with workflow logic...\n}\n```\n\n### Viewer-Specific Logic\n\n```typescript\n// For visitor-facing features\nasync function renderDataroomViewer(teamId: string, teamPlan: string) {\n  const indexEnabled = await resolveDataroomIndexEnabledForViewer({\n    teamId,\n    teamPlan,\n  });\n  \n  return indexEnabled ? renderWithNumbering() : renderWithoutNumbering();\n}\n```\n\n### Storage Region Selection\n\n```typescript\n// Combined with billing tier checks\nconst flags = await getFeatureFlags({ teamId });\nif (flags.usStorage && teamPlanIsUSStoragePlan(plan)) {\n  return useUSStorage();\n}\n```\n\n## Consumers\n\nThe feature flags module is used across 20+ locations in the codebase:\n\n**API Routes:**\n- `api/feature-flags/route.ts` — Public flag endpoint\n- `api/views/route.ts` — View creation\n- `api/links/generate-index.ts` — Link index generation\n- `documents/[documentId]/route.ts` — Document operations\n- `datarooms/[dataroomId]/route.ts` — Dataroom operations\n- `chat/[chatId]/route.ts` — Chat endpoints\n- `ai/chat/route.ts` — AI chat\n- `workflows/route.ts` — Workflow operations\n\n**Page Handlers:**\n- `documents/[id]/index.ts` — Document viewer\n- `documents/[documentId]/annotations.ts` — Annotations\n- `documents/[documentId]/overview.ts` — Document overview\n- `datarooms/[id]/index.ts` — Dataroom index\n- `datarooms/[id]/calculate-indexes.ts` — Index calculations\n- `datarooms/[id]/generate-index.ts` — Index generation\n- `teams/[teamId]/ai-settings.ts` — AI settings\n\n**Static Props:**\n- `view/[linkId]/index.tsx`\n- `[linkId]/d/[documentId].tsx`\n- `[slug]/d/[documentId].tsx`\n- `[domain]/[slug]/index.tsx`\n\n**Storage Configuration:**\n- `features/storage/s3-store.ts` — S3 client selection\n- `features/storage/config.ts` — Storage config retrieval\n\n## Environment Configuration\n\n| Variable | Required | Description |\n|----------|----------|-------------|\n| `EDGE_CONFIG` | No (local dev) | Vercel Edge Config connection string |\n\nWhen `EDGE_CONFIG` is not set, the module gracefully degrades by returning all features as disabled. This enables local development without Edge Config access.\n\n## Team Plan Integration\n\nThe `resolveDataroomIndexEnabledForViewer` helper combines feature flag checks with billing tier checks:\n\n```mermaid\nflowchart LR\n    A[\"resolveDataroomIndexEnabledForViewer\"] --> B{\"Edge Config<br/>dataroomIndex?\"}\n    A --> C{\"teamPlanIsDataroomPlusTier?\"}\n    B --> |Yes| D[\"return true\"]\n    C --> |Yes| D\n    B --> |No| E[\"return false\"]\n    C --> |No| E\n```\n\nThis two-path approach allows:\n1. **Beta testing** — Enable for specific teams via Edge Config before broader rollout\n2. **Tier-based access** — Automatically enable for Dataroom Plus subscribers","lib-i18n":"# lib — i18n\n\n# `lib/i18n` — Internationalization Module\n\nThe `lib/i18n` module provides locale-aware formatting and translation infrastructure for the **viewer side** of the application. It powers language rendering for datarooms, document viewers, and access forms — everything visitors see when viewing shared content.\n\n> **Admin split**: The admin UI intentionally stays in English. It uses `asSupportedLocale` from `locales.ts` to validate locale codes stored in the database (e.g., for branding settings), but it renders those codes using legacy `en-US` hardcoded helpers. This keeps admin analytics, exports, and internal tooling in a stable English format.\n\n---\n\n## Supported Locales\n\nThe viewer supports seven locales defined in `locales.ts`:\n\n| Code | Native Name | English Name |\n|------|-------------|--------------|\n| `en` | English | English |\n| `de` | Deutsch | German |\n| `fr` | Français | French |\n| `es` | Español | Spanish |\n| `it` | Italiano | Italian |\n| `pt-BR` | Português (Brasil) | Portuguese (Brazil) |\n| `ja` | 日本語 | Japanese |\n\nEach locale has a matching `locales/<code>/*.json` directory containing translation files for three namespaces: `access-form`, `dataroom`, and `viewer`.\n\n**Adding a new language** requires only two steps:\n\n1. Add an entry to `SUPPORTED_LOCALES` in `locales.ts`\n2. Create `locales/<code>/*.json` files for the three namespaces\n\nNo other code changes are required.\n\n---\n\n## Architecture\n\nThe module has four files, each with a distinct responsibility:\n\n```\nlib/i18n/\n├── locales.ts          # Locale definitions and type safety\n├── format.ts           # Locale-aware date/time formatting (no i18next)\n├── viewer-i18n.ts      # i18next instance management and resource loading\n└── viewer-page-props.ts # Server-side helper for page props\n```\n\n```mermaid\nflowchart LR\n    subgraph Server\n        BPP[buildViewerI18nPageProps] --> LN[loadViewerNamespaces]\n        LN --> LNF[loadNamespaceFile]\n        LNF --> FS[locales/&lt;locale&gt;/&lt;ns&gt;.json]\n    end\n    \n    subgraph PageProps\n        BPP -->|\"i18n: {locale, resources}\"| PP[pageProps]\n    end\n    \n    subgraph Client\n        VIP[ViewerI18nProvider] --> GCI[getOrCreateViewerI18n]\n        GCI --> CI[cached I18nInstance]\n        \n        DC[Dataroom components] --> FDL[formatDateLocalized]\n        DC --> TAL[timeAgoLocalized]\n    end\n```\n\n---\n\n## `locales.ts` — Locale Definitions\n\nProvides the canonical list of supported locales and utilities for narrowing arbitrary strings to valid locale codes.\n\n### Key Exports\n\n- **`SupportedLocaleCode`** — A union type of all valid locale codes (`\"en\" | \"de\" | \"fr\" | ...`)\n- **`SUPPORTED_LOCALES`** — An array of locale metadata objects with `code`, `nativeName`, and `englishName`\n- **`DEFAULT_LOCALE`** — Always `\"en\"`\n- **`SUPPORTED_LOCALE_CODES`** — A readonly array of just the codes, derived from `SUPPORTED_LOCALES`\n- **`VIEWER_NAMESPACES`** — The three translation namespaces: `[\"access-form\", \"dataroom\", \"viewer\"]`\n\n### `asSupportedLocale`\n\n```typescript\nfunction asSupportedLocale(value: string | null | undefined): SupportedLocaleCode | null\n```\n\nNarrow an arbitrary string (e.g., from the database) to a supported locale code. Returns `null` for empty, undefined, or unknown values.\n\n```typescript\nconst locale = asSupportedLocale(brand.defaultLanguage);\n// Returns \"de\" if defaultLanguage is \"de\", null if i
