 URL, favicon, title, description, and image. Branding (title, description, image) is only included when `enableBranding` is true.\n\n## Theme System Integration\n\nThe viewer uses a separate theme provider from the access form:\n\n```tsx\n// In viewer setup:\nconst palette = createViewerSurfaceTheme(brand?.accentColor);\n\n<ViewerSurfaceThemeProvider value={palette}>\n  {/* viewer content */}\n<\/ViewerSurfaceThemeProvider>\n```\n\nComponents like `CompactDataroomListHeader`, `DataroomFolderPicker`, and `DocumentCard` consume this via `useViewerSurfaceTheme()` to apply consistent surface colors (panel backgrounds, control backgrounds, text colors) derived from the brand accent color.\n\n## Key Patterns\n\n### localStorage Persistence\nEmail and name inputs persist to `localStorage` (`papermark.email`, `papermark.name`) for return visitors, avoiding re-entry after the first visit.\n\n### Session Pre-warming\nThe Documenso signing session is created on hover/focus before the user clicks \"Open signing\", reducing perceived latency when the sheet opens.\n\n### Agreement Status Hydration\nAfter signing, the agreement status is persisted to localStorage and verified against the status API on subsequent page loads, automatically confirming returning visitors who already signed.\n\n### Tailwind JIT Compatibility\nGrid template classes in `compactDataroomListGridClass` use literal strings rather than computed template literals. This ensures Tailwind's JIT compiler generates the corresponding CSS at build time.","components-visitors":"# components — visitors\n\n# Visitors Module\n\nThe `components/visitors/` module provides a comprehensive set of React components for displaying, managing, and tracking visitors across documents and datarooms. It handles everything from visitor lists and avatars to detailed statistics and visitor group management.\n\n## Architecture Overview\n\n```mermaid\nflowchart TB\n    subgraph Tables\n        CT[ContactsTable]\n        CDT[ContactsDocumentsTable]\n        VT[VisitorsTable]\n        DVT[DataroomViewersTable]\n        DVT2[DataroomVisitorsTable]\n    end\n    \n    subgraph Display\n        VA[VisitorAvatar]\n        VC[VisitorChart]\n        DPC[DocumentPageChart]\n        VVC[VisitorVideoChart]\n    end\n    \n    subgraph Info\n        VC2[VisitorClicks]\n        VCF[VisitorCustomFields]\n        DVF[DataroomVisitorCustomFields]\n        VUA[VisitorUserAgentBase]\n        DUA[DataroomVisitorUserAgent]\n    end\n    \n    subgraph Groups\n        VGM[VisitorGroupModal]\n        VGS[VisitorGroupsSection]\n    end\n    \n    subgraph Stats\n        DVS[DataroomViewStats]\n        DTP[DataTablePagination]\n    end\n    \n    subgraph Data\n        useDV[useDataroomViewers]\n        useDVis[useDataroomVisits]\n        useDVH[useDataroomVisitHistory]\n        useVS[useVisitorStats]\n    end\n    \n    DVT --> DVS\n    DVT2 --> DVS\n    DVS --> DPC\n    DVT2 --> DVF\n    DVT2 --> DUA\n    VGS --> VGM\n    \n    CT --> VA\n    CDT --> VA\n    VT --> VA\n    DVT --> VA\n    DVT2 --> VA\n    \n    CT --> DTP\n    CDT --> DTP\n```\n\n## Core Table Components\n\n### ContactsTable\n\nDisplays a sortable, paginated list of visitor contacts. Supports sorting by email, last viewed time, and total visits.\n\n**Key features:**\n- Sortable columns with click-to-toggle ascending/descending order\n- Pagination controls with configurable page size\n- Visitor avatar with email-based gravatar or initials fallback\n- Relative time display with tooltip showing exact timestamps\n\n```tsx\n// Usage\n<ContactsTable\n  viewers={viewersData}\n  pagination={paginationConfig}\n  sorting={currentSort}\n  onPageChange={handlePageChange}\n  onPageSizeChange={handlePageSizeChange}\n  onSortChange={handleSortChange}\n/>\n```\n\n### ContactsDocumentsTable\n\nShows documents viewed by a specific contact, including view duration, visit count, and last viewed time.\n\n**Key features:**\n- Document type icons via `fileIcon()`\n- Duration loading states (shows skeleton while fetching)\n- Custom sorting function for date comparison\n- Row click navigation to document detail pages\n\n```tsx\n<ContactsDocumentsTable\n  views={documentViews}\n  durations={durationMap}\n  loadingDurations={loading}\n  pagination={paginationConfig}\n/>\n```\n\n### DataroomViewersTable\n\nDisplays all visitors to a dataroom with expandable rows showing visit details.\n\n**Key features:**\n- Collapsible row expansion using Radix UI Collapsible\n- Badges for verified, internal, and invited visitors\n- Nested view statistics via `DataroomViewStats`\n- Dynamic column visibility based on expansion state\n\n### DataroomVisitorsTable\n\nEnhanced visitors table for datarooms with support for:\n- Custom field responses\n- User agent information\n- Signed agreement downloads\n- Paused subscription handling (blurred visitor entries)\n\n```tsx\n// Example: Export visits feature\n<Button onClick={() => setExportModalOpen(true)}>\n  <Download className=\"!size-4\" />\n  Export visits\n<\/Button>\n```\n\n## Visitor Identity Components\n\n### VisitorAvatar\n\nGenerates visual identity for visitors based on their email address.\n\n**Avatar generation strategy:**\n1. Attempts gravatar URL using MD5 hash of email\n2. Falls back to colored initials (first 2 characters)\n3. Color is derived from email hash for consistency\n\n```tsx\n<VisitorAvatar \n  viewerEmail=\"user@example.com\"\n  isArchived={false}\n/>\n```\n\nThe component uses a deterministic color scheme derived from the email hash, ensuring the same visitor always gets the same background color across sessions.\n\n## Statistics & Charts\n\n### DataroomViewStats\n\nRenders detailed view statistics for dataroom visits, combining multiple event types into a chronological timeline.\n\n**Event types displayed:**\n- **Upload** - Document uploads (purple icon)\n- **View** - Document page views (orange icon)\n- **Download** - Individual document downloads (cyan icon)\n- **Bulk-download** - Folder or bulk downloads (expandable list)\n\nThe component fetches document-level statistics using `useDataroomViewDocumentStats` and displays:\n- Time spent per document\n- Completion rate as a gauge\n- Page-by-page breakdown on expansion\n\n### DocumentPageChart\n\nBar chart showing time spent on each page of a document.\n\n**Behavior:**\n- Shows loading skeleton during initial fetch\n- Displays \"downloaded without viewing\" message for download-only visits\n- Initializes data fetch after a 150ms delay to avoid unnecessary requests during rapid navigation\n\n```tsx\n<DocumentPageChart\n  dataroomId={dataroomId}\n  dataroomViewId={viewId}\n  documentViewId={documentViewId}\n  documentId={documentId}\n  totalPages={totalPages}\n/>\n```\n\n## Visitor Groups\n\n### VisitorGroupModal\n\nDialog component for creating and editing visitor groups.\n\n**Validation:**\n- Group name must be at least 2 characters\n- Email/domain list validation using `validateList()`\n- Real-time feedback on invalid entries\n\n**Features:**\n- Create new groups or edit existing ones\n- Displays linked documents and datarooms for existing groups\n- Updates group list via SWR mutation after save\n\n### VisitorGroupsSection\n\nCard-based display of visitor groups with expandable member lists.\n\n**Card structure:**\n- Click to expand member details\n- Dropdown menu for edit/delete actions\n- Badges showing member and link counts\n- Preview of first 5 members when collapsed\n\nMembers are categorized as:\n- **Email members** - Specific email addresses\n- **Domain members** - Domain wildcards (prefixed with `@`)\n\n## Supporting Components\n\n### DataTablePagination\n\nReusable pagination control for TanStack Table instances.\n\n**Controls:**\n- Page size selector (10, 20, 30, 40, 50)\n- First/previous/next/last page navigation\n- Current page indicator\n- Row count display\n\n### VisitorClicks\n\nDisplays external link click events recorded during document viewing.\n\nData is fetched via:\n```tsx\nuseSWR(`/api/teams/${teamId}/documents/${documentId}/views/${viewId}/click-events`)\n```\n\n### VisitorCustomFields / DataroomVisitorCustomFields\n\nRenders custom field responses collected during the visitor intake process.\n\n```tsx\n// Custom field structure\ntype CustomFieldResponse = {\n  identifier: string;\n  label: string;\n  response: string;\n};\n```\n\n## Data Dependencies\n\nThe module relies on several SWR hooks for data fetching:\n\n| Hook | Purpose |\n|------|---------|\n| `useDataroomViewers` | List of dataroom visitors |\n| `useDataroomVisits` | Individual visit records |\n| `useDataroomVisitHistory` | Full visit timeline with documents |\n| `useDataroomViewDocumentStats` | Per-document view statistics |\n| `useDataroomVisitorUserAgent` | Browser/device information |\n| `useDataroomDocumentPageStats` | Page-level duration data |\n| `useVisitorGroups` | Visitor group management |\n\n## Key Design Patterns\n\n### Manual Pagination\n\nAll table components implement manual pagination with server-side data fetching:\n\n```tsx\nconst table = useReactTable({\n  data,\n  columns,\n  getCoreRowModel: getCoreRowModel(),\n  manualPagination: true,\n});\n```\n\n### Sort State Management\n\nSorting is handled through callback-driven state updates:\n\n```tsx\nconst handleSort = useCallback((columnId: string) => {\n  if (!onSortChange) return;\n  \n  let newSortOrder = \"desc\";\n  if (currentSortBy === columnId) {\n    if (currentSortOrder === \"desc\") {\n      newSortOrder = \"asc\";\n    }\n    // Toggle behavior for subsequent clicks\n  }\n  onSortChange(columnId, newSortOrder);\n}, [onSortChange, sorting?.sortBy, sorting?.sortOrder]);\n```\n\n### Collapsible Row Expansion\n\nExpandable rows use Radix UI Collapsible with controlled state:\n\n```tsx\nconst [expandedViewIds, setExpandedViewIds] = useState<Set<string>>(new Set());\n\nconst handleOpenChange = (viewId: string, open: boolean) => {\n  setExpandedViewIds((prev) => {\n    const next = new Set(prev);\n    if (open) next.add(viewId);\n    else next.delete(viewId);\n    return next;\n  });\n};\n```\n\n### Loading Skeletons\n\nSkeleton placeholders match the layout of actual content to prevent layout shift:\n\n```tsx\nif (!views) {\n  return (\n    <Table>\n      <TableBody>\n        {[...Array(5)].map((_, index) => (\n          <TableRow key={index}>\n            <TableCell>\n              <div className=\"flex items-center space-x-3\">\n                <Skeleton className=\"h-7 w-7\" />\n                <Skeleton className=\"h-4 w-[200px]\" />\n              <\/div>\n            <\/TableCell>\n            {/* ... */}\n          <\/TableRow>\n        ))}\n      <\/TableBody>\n    <\/Table>\n  );\n}\n```\n\n## External Integrations\n\n- **Next.js Router** - Navigation on row clicks\n- **TanStack Table** - Table state management\n- **SWR** - Data fetching and caching\n- **Radix UI** - Accessible collapsible and popover components\n- **Lucide React** - Iconography\n- **TanStack React Table** - Sortable, filterable tables\n- **Charting library** - Bar charts via `BarChartComponent`","components-webhooks":"# components — webhooks\n\n# Webhook Events Component Module\n\n`components/webhooks/webhook-events.tsx`\n\n## Overview\n\nThe webhook events module provides a visual interface for displaying webhook delivery history. It renders a scrollable list of webhook events with expandable detail views showing request and response payloads, syntax-highlighted for readability.\n\n## Component Hierarchy\n\n```mermaid\ncomponentDiagram\n    direction LR\n    WebhookEventList --> WebhookEvent\n    WebhookEvent --> CodeHighlighter\n    WebhookEvent --> Sheet\n    WebhookEvent --> ButtonTooltip\n```\n\n## Components\n\n### `WebhookEventList`\n\nThe main export. Renders a bordered container with a vertically-stacked list of webhook events.\n\n**Props:**\n```typescript\ntype EventListProps = PropsWithChildren<{\n  events: any[];\n}>;\n```\n\n**Usage Pattern:**\n\n```tsx\n<WebhookEventList events={webhook.events} />\n```\n\nThe `events` array expects objects with this shape:\n\n```typescript\ninterface WebhookEvent {\n  event: string;           // Event type name (e.g., \"payment.created\")\n  event_id: string;        // Unique identifier for the event\n  http_status: number;     // Delivery HTTP status code\n  timestamp: string;       // ISO 8601 timestamp\n  request_body: object;    // JSON payload sent to the endpoint\n  response_body: object;   // JSON response received from the endpoint\n}\n```\n\n---\n\n### `WebhookEvent`\n\nAn individual row within the event list. Displays a summary row by default and manages an expandable detail sheet.\n\n**Visual Structure:**\n\n| Icon | HTTP Status | Event Name | Timestamp |\n|------|-------------|------------|-----------|\n| ✓/✗  | 200         | payment.created | Jan 15, 2025, 10:30:00 AM |\n\n**Status Indicators:**\n- `CircleCheck` (green) — HTTP status in 2xx range\n- `CircleXIcon` (red/destructive) — HTTP status outside 2xx range or error\n\n**Detail Sheet Content:**\n\nWhen clicked, a `Sheet` slides in from the right containing:\n\n1. **Header** — Event name and event ID (with copy-to-clipboard button)\n2. **Response Section** — HTTP status code and formatted response body\n3. **Request Section** — Formatted request body payload\n\n---\n\n### `CodeHighlighter`\n\nAn internal component that uses [Shiki](https://shiki.matsu.io/) to apply syntax highlighting to JSON payloads. It supports light and dark theme variants.\n\n**Initialization:**\n```typescript\nconst shiki = await createHighlighter({\n  themes: ['material-theme-lighter', 'material-theme-darker'],\n  langs: ['json']\n});\n```\n\n**Theme Selection:**\n- Light mode: `material-theme-lighter`\n- Dark mode: `material-theme-darker`\n\nThe component applies custom inline styles to the Shiki output for consistent padding, font sizing, and scroll behavior.\n\n**Fallback Rendering:**\n\nWhile the highlighter initializes (which requires async loading of language grammars), a plain `<pre>` block displays the raw JSON.\n\n---\n\n## State Management\n\n| State | Purpose |\n|-------|---------|\n| `isOpen` (in `WebhookEvent`) | Controls the detail sheet visibility |\n| `highlightedCode` (in `CodeHighlighter`) | Caches the rendered HTML output |\n\nThe `isDark` flag is derived from `next-themes`:\n\n```typescript\nconst { theme, systemTheme } = useTheme();\nconst isDark = theme === \"dark\" || (theme === \"system\" && systemTheme === \"dark\");\n```\n\nThis drives both the Shiki theme selection and could be extended to other styling decisions.\n\n---\n\n## External Dependencies\n\n| Dependency | Source | Usage |\n|------------|--------|-------|\n| `useCopyToClipboard` | `@/lib/utils/use-copy-to-clipboard` | Copy event ID to clipboard |\n| `useMediaQuery` | `@/lib/utils/use-media-query` | Detect mobile for timestamp formatting |\n| `Sheet` components | `@/components/ui/sheet` | Slide-out detail panel |\n| `ScrollArea` | `@/components/ui/scroll-area` | Scrollable content in detail panel |\n| `Button` | `@/components/ui/button` | Icon buttons (copy action) |\n| `ButtonTooltip` | `@/components/ui/tooltip` | Hover tooltips for status icons |\n\n---\n\n## Usage in Parent Components\n\nThe `WebhookEventList` is consumed by `WebhookDetail` at `webhooks/[id]/index.tsx`. The parent component is responsible for fetching webhook event data and passing it as the `events` prop.\n\n```tsx\n// Simplified example\nexport default function WebhookDetail({ params }: { params: { id: string } }) {\n  const { data } = useWebhookEvents(params.id);\n  \n  return (\n    <div>\n      <h1>Webhook Events<\/h1>\n      <WebhookEventList events={data?.events ?? []} />\n    <\/div>\n  );\n}\n```\n\n---\n\n## Timestamp Handling\n\nTimestamps are converted to local time before display:\n\n```typescript\nconst date = new Date(event.timestamp);\nconst localDate = new Date(date.getTime() - date.getTimezoneOffset() * 60000);\n```\n\n**Display behavior:**\n- Mobile (`isMobile`): Shows only time (`10:30:00 AM`)\n- Desktop: Shows full date and time (`Jan 15, 2025, 10:30:00 AM`)","components-welcome":"# components — welcome\n\n# Welcome Module (`components/welcome`)\n\nThe welcome module provides the onboarding and document/dataroom creation flows for Papermark. It guides new users through initial setup, from choosing what to share through file upload to final link configuration with security settings.\n\n## Overview\n\nThe module implements a multi-step wizard pattern that handles four primary flows:\n\n1. **Document Sharing** — Upload a document and configure a shareable link with analytics\n2. **Data Room Creation** — Start a trial and set up a multi-document data room\n3. **Notion Import** — Import and share publicly-accessible Notion pages\n4. **AI-Generated Data Rooms** — Describe a use case and have AI generate the folder structure\n\n```mermaid\nflowchart TD\n    Intro[\"intro.tsx<br/>Welcome Screen\"] --> Next[\"next.tsx<br/>Choose: Document or Data Room\"]\n    \n    Next --> Doc[\"Document Flow\"]\n    Next --> DR[\"Data Room Flow\"]\n    \n    Doc --> Select[\"select.tsx<br/>Document Type Selection\"]\n    Select --> Pitch[\"pitchdeck\"]\n    Select --> Sales[\"sales-document\"]\n    Select --> Notion[\"notion\"]\n    Select --> Generic[\"document\"]\n    \n    Pitch --> Upload[\"upload.tsx\"]\n    Sales --> Upload\n    Generic --> Upload\n    Notion --> NotionForm[\"notion-form.tsx\"]\n    \n    Upload --> UploadContainer[\"upload-container.tsx\"]\n    UploadContainer --> LinkOptionContainer[\"link-option-container.tsx\"]\n    \n    NotionForm --> NotionLinkOpts[\"Link Config + Share\"]\n    \n    LinkOptionContainer --> OnboardingLinkOptions[\"onboarding-link-options.tsx\"]\n    \n    DR --> Dataroom[\"dataroom.tsx\"]\n    Dataroom --> Trial[\"dataroom-trial.tsx\"]\n    \n    Trial --> Choice[\"dataroom-choice.tsx\"]\n    \n    Choice --> Scratch[\"dataroom-upload.tsx\"]\n    Choice --> Templates[\"TODO: Templates\"]\n    Choice --> AI[\"dataroom-ai-generate.tsx\"]\n    \n    Scratch --> UploadContainer\n    AI --> NavigateToDataroom\n    \n    classDef container fill:#f9f,stroke:#333,stroke-width:2px\n    classDef orchestrator fill:#bbf,stroke:#333,stroke-width:2px\n    class LinkOptionContainer,NavigationLink,RouterPush container\n    class Intro,Next,Select orchestrator\n```\n\n## Core Orchestrators\n\nThese components act as stateful containers that manage the wizard flow:\n\n### `Upload` (`upload.tsx`)\n\nManages the document upload-to-share flow. Tracks local state for:\n\n- `currentFile` — the selected `File` object\n- `currentBlob` — whether a file has been uploaded (triggers phase change)\n- `currentLinkId` / `currentDocId` — IDs returned from the API after upload\n- `linkData` — the `DEFAULT_LINK_TYPE` object for link configuration\n\n```tsx\n// Phase 1: File selection and upload\nif (!currentBlob) {\n  return <UploadContainer {...props} />;\n}\n\n// Phase 2: Link configuration\nif (currentBlob) {\n  return <LinkOptionContainer {...props} />;\n}\n```\n\n### `DataroomUpload` (`dataroom-upload.tsx`)\n\nIdentical structure to `Upload`, but passes `dataroomId` to `UploadContainer`. When uploading to an existing dataroom, the flow creates a link for the dataroom rather than the document.\n\n### `NotionForm` (`notion-form.tsx`)\n\nHandles Notion page import with two phases:\n\n1. **URL submission** — validates the Notion URL using `parsePageId` from `notion-utils`\n2. **Link configuration** — uses `LinkOptions` (not the onboarding variants) with an `Accordion` toggle\n\n```tsx\n// Validates Notion URL before submission\nconst validateNotionPageURL = parsePageId(notionLink);\nif (validateNotionPageURL === null || !isValidURL.test(notionLink)) {\n  toast.error(\"Please enter a valid Notion link to proceed.\");\n}\n```\n\n### `DataroomChoice` (`dataroom-choice.tsx`)\n\nPresents three options for dataroom setup, each navigating with different query parameters:\n\n| Option | Navigation Target | Icon |\n|--------|-------------------|------|\n| Create from Scratch | `/welcome?type=dataroom-upload&dataroomId={id}` | `FolderIcon` |\n| Use a Template | `/welcome?type=dataroom-templates&dataroomId={id}` | `FileTextIcon` |\n| Generate with AI | `/welcome?type=dataroom-ai-generate&dataroomId={id}` | `Sparkles` |\n\n## Container Components\n\n### `UploadContainer` (`containers/upload-container.tsx`)\n\nHandles file upload with validation and document creation.\n\n**Supported file types** — validated via `getSupportedContentType()`:\n- PDF, PowerPoint, Excel, Word\n\n**Upload flow:**\n\n```tsx\nconst handleBrowserUpload = async (event) => {\n  // 1. Validate file selection\n  if (!currentFile) {\n    toast.error(\"Please select a file to upload.\");\n    return;\n  }\n\n  // 2. Check file type support\n  const supportedFileType = getSupportedContentType(currentFile.type);\n  if (!supportedFileType) {\n    toast.error(\"Unsupported file format...\");\n    return;\n  }\n\n  // 3. Upload to storage\n  const { type, data, numPages, fileSize } = await putFile({ file, teamId });\n\n  // 4. Create document record\n  const response = await createDocument({\n    documentData: { name, key, storageType, contentType, supportedFileType, fileSize },\n    teamId,\n    numPages,\n    createLink: !dataroomId,  // Skip link creation when adding to dataroom\n  });\n\n  // 5. If dataroom, add document and create dataroom link\n  if (dataroomId) {\n    await fetch(`/api/teams/${teamId}/datarooms/${dataroomId}/documents`, {\n      method: \"POST\",\n      body: JSON.stringify({ documentId: document.id }),\n    });\n    // Create dataroom link...\n  }\n\n  // 6. Navigate to link config\n  setCurrentLinkId(linkId);\n  setCurrentDocId(document.id);\n};\n```\n\n### `LinkOptionContainer` (`containers/link-option-container.tsx`)\n\nManages link configuration and sharing. Has two internal phases:\n\n1. **Settings phase** (`showLinkSettings = true`) — renders `OnboardingLinkOptions` or `OnboardingDataroomLinkOptions`\n2. **Share phase** (`showLinkSettings = false`) — displays the shareable link URL and \"Copy & Share\" button\n\n**Link submission:**\n\n```tsx\nconst handleSubmit = async (event) => {\n  // Upload metaImage if it's a data URL\n  let blobUrl = linkData.metaImage;\n  if (linkData.metaImage?.startsWith(\"data:\")) {\n    const blob = convertDataUrlToFile({ dataUrl: linkData.metaImage });\n    blobUrl = await uploadImage(blob);\n  }\n\n  // Update link with all settings\n  await fetch(`/api/links/${currentLinkId}`, {\n    method: \"PUT\",\n    body: JSON.stringify({\n      ...linkData,\n      metaImage: blobUrl,\n      targetId: currentDataroomId || currentDocId,\n      linkType: currentDataroomId ? LinkType.DATAROOM_LINK : LinkType.DOCUMENT_LINK,\n      teamId,\n    }),\n  });\n\n  // Copy to clipboard and redirect\n  copyToClipboard(`${process.env.NEXT_PUBLIC_MARKETING_URL}/view/${currentLinkId}`);\n  router.push(currentDataroomId ? `/datarooms/${currentDataroomId}/documents` : `/documents/${currentDocId}`);\n};\n```\n\n## Link Options Components\n\n### `OnboardingLinkOptions` (`containers/onboarding-link-options.tsx`)\n\nRenders link configuration settings for **documents**. Features:\n\n- **Plan-gated features** — uses `usePlan()` and `useLimits()` hooks to determine which options are available\n- **Upgrade modal integration** — calls `handleUpgradeStateChange()` when users toggle restricted features\n- **Collapsible advanced settings** — toggled via `showAdvancedSettings` state for document links\n\n```tsx\n// Example: Watermark availability depends on plan and limits\n<WatermarkSection\n  {...{ data, setData }}\n  isAllowed={isTrial || isDatarooms || isDataroomsPlus || allowWatermarkOnBusiness}\n  handleUpgradeStateChange={handleUpgradeStateChange}\n  presets={currentPreset}\n/>\n```\n\n### `OnboardingDataroomLinkOptions` (`containers/onboarding-dataroom-link-options.tsx`)\n\nSimpler variant for **dataroom links**. Always shows all settings (no plan-gating) except:\n\n- `ExpirationSection` and `OGSection` are hidden under \"Other custom settings\" toggle\n- Uses a different subset of sections appropriate for datarooms\n\n## AI Data Room Generation\n\n### `DataroomAIGenerate` (`dataroom-ai-generate.tsx`)\n\nTwo-phase component for AI-generated dataroom structures:\n\n**Phase 1: Description input**\n\n```tsx\nconst handleGenerateFolders = async () => {\n  const response = await fetch(\n    `/api/teams/${teamId}/datarooms/generate-ai-structure`,\n    { method: \"POST\", body: JSON.stringify({ description: aiDescription }) }\n  );\n  const { name, folders } = await response.json();\n  setGeneratedFolders(folders);\n  setDataroomName(name);\n  setShowPreview(true);\n};\n```\n\n**Phase 2: Folder preview with selection**\n\nThe component maintains state for:\n- `selectedFolderPaths` — `Set<string>` of selected folder paths\n- `editingFolderPath` / `editingFolderName` — inline editing state\n\n```tsx\n// Recursive folder rendering with checkbox selection\nconst renderFolderPreview = (folders, indent = 0, parentPath = \"\") => {\n  return folders.map((folder) => {\n    const currentPath = generateFolderPath(folder, parentPath);\n    return (\n      <div key={currentPath} className=\"pl-4\">\n        <Checkbox\n          checked={selectedFolderPaths.has(currentPath)}\n          onCheckedChange={() => toggleFolderSelection(currentPath, folder)}\n        />\n        {/* Inline name editing */}\n        {editingFolderPath === currentPath ? (\n          <Input value={editingFolderName} onBlur={saveFolderName} />\n        ) : (\n          <span onClick={() => handleFolderNameEdit(currentPath, folder.name)}>\n            {folder.name}\n          <\/span>\n        )}\n        {folder.subfolders && renderFolderPreview(folder.subfolders, indent + 1, currentPath)}\n      <\/div>\n    );\n  });\n};\n```\n\n**Dataroom creation:**\n\n```tsx\nconst handleCreateDataroom = async () => {\n  const filteredFolders = filterSelectedFolders(generatedFolders);\n  await fetch(`/api/teams/${teamId}/datarooms/generate-ai`, {\n    method: \"POST\",\n    body: JSON.stringify({ name: dataroomName, folders: filteredFolders, dataroomId }),\n  });\n  router.push(`/datarooms/${dataroom.id}/documents`);\n};\n```\n\n## Survey Flow\n\n### `Select` (`select.tsx`)\n\nDocument type selection with conditional survey questions:\n\n1. **Document type selection** — pitchdeck, sales-document, notion, or document\n2. **Use case question** (for notion/document) — shown inline after type selection\n3. **Deal size question** — shown based on document type and use case\n\n```tsx\n// Auto-set deal type for specific document types\nif (docType === \"pitchdeck\") {\n  setDealType(\"startup-fundraising\");\n} else if (docType === \"sales-document\") {\n  setDealType(\"sales\");\n}\n\n// Save survey and proceed to upload\nconst saveSurveyAndProceed = async (type, size, otherText) => {\n  await fetch(`/api/teams/${teamId}/survey`, {\n    method: \"POST\",\n    body: JSON.stringify({ dealType: type, dealTypeOther: otherText, dealSize: size }),\n  });\n  router.push({ pathname: \"/welcome\", query: { type: selectedDoc } });\n};\n```\n\n## Data Flow Summary\n\n```mermaid\nsequenceDiagram\n    participant User\n    participant UploadContainer\n    participant API\n    participant LinkOptionContainer\n    participant OnboardingLinkOptions\n    \n    User->>UploadContainer: Select file\n    UploadContainer->>API: putFile(file)\n    UploadContainer->>API: createDocument()\n    API-->>UploadContainer: { id, links: [{ id }] }\n    UploadContainer-->>User: Navigate to link config\n    \n    User->>OnboardingLinkOptions: Configure settings\n    OnboardingLinkOptions-->>LinkOptionContainer: setLinkData()\n    \n    User->>LinkOptionContainer: Click \"Share\"\n    LinkOptionContainer->>API: PUT /api/links/{id}\n    LinkOptionContainer->>User: copyToClipboard() + redirect\n```\n\n## Key Dependencies\n\n| Dependency | Purpose |\n|------------|---------|\n| `useTeam()` | Access `currentTeam.id` for API calls |\n| `usePlan()` / `useLimits()` | Determine feature availability |\n| `useAnalytics()` | Track user events (Document Added, Link Added, etc.) |\n| `putFile()` | Upload file to storage |\n| `createDocument()` | Create document record in database |\n| `uploadImage()` | Upload meta image (OG images) |\n| `copyToClipboard()` | Copy share link to clipboard |\n| `UpgradePlanModal` | Modal for plan upgrade prompts |","components-yearly-recap":"# components — yearly-recap\n\n# Yearly Recap Module (`components/yearly-recap`)\n\nA \"Spotify Wrapped\" style feature that presents users with a personalized year-in-review of their Papermark document sharing activity. The module consists of a promotional banner and a multi-slide modal with animated statistics.\n\n## Module Structure\n\n```\nyearly-recap/\n├── index.ts                 # Public exports\n├── globe.tsx                # 3D animated globe visualization\n├── yearly-recap-banner.tsx  # Dashboard banner component\n└── yearly-recap-modal.tsx   # Main modal with stat slides\n```\n\n## Public API\n\n```typescript\nexport { YearlyRecapBanner } from \"./yearly-recap-banner\";\nexport { YearlyRecapModal } from \"./yearly-recap-modal\";\n```\n\nBoth components are client-side (`\"use client\"` directive required).\n\n## YearlyRecapBanner\n\nA persistent banner displayed in the dashboard that invites users to view their yearly recap.\n\n### Props\n\nNone required. The component reads team context internally.\n\n### Behavior\n\n1. **Conditional Rendering**: Only renders when `teamInfo?.currentTeam?.id` exists\n2. **URL Parameter Support**: Listens for `?openRecap=true` in the URL. When present, automatically opens the modal and removes the parameter via `router.replace()`\n3. **Analytics**: Fires `YIR: Banner Opened` event on click with `teamId` and `source: \"banner\"`\n\n### Visual Design\n\n- Gradient background: orange → white → green\n- Decorative SVG elements (document stack, scatter dots)\n- Orange Sparkles icon with rounded background\n- \"Papermark Wrapped {year}\" heading with ArrowRight button\n\n## YearlyRecapModal\n\nThe main interactive modal containing 7 slides of statistics.\n\n### Props\n\n```typescript\ninterface YearlyRecapModalProps {\n  isOpen: boolean;      // Dialog visibility state\n  onClose: () => void;  // Callback to close the modal\n  teamId: string;       // Team identifier for data fetching\n}\n```\n\n### Data Source\n\nStats are fetched via SWR Immutable from:\n```\nGET /api/teams/${teamId}/yearly-recap\n```\n\n### Stats Interface\n\n```typescript\ninterface YearlyRecapStats {\n  year: number;\n  totalViews: number;\n  totalDocuments: number;\n  totalLinks: number;\n  totalDatarooms: number;\n  mostViewedDocument: { documentId: string; documentName: string; viewCount: number } | null;\n  mostActiveMonth: { month: string; viewCount: number } | null;\n  mostActiveViewer: { email: string; name: string | null; viewCount: number } | null;\n  totalDuration: number;      // In milliseconds\n  uniqueCountries: string[];\n  distanceTraveled: number;\n}\n```\n\n### Slide Structure\n\n| Slide | Index | Content |\n|-------|-------|---------|\n| IntroSlide | 0 | Welcome message, \"Let's go\" button |\n| GlobalFootprintSlide | 1 | Distance traveled, countries reached |\n| MinutesSlide | 2 | Total viewing time, most viewed document |\n| ViewsStatsSlide | 3 | Grid: views, documents, datarooms |\n| MostActiveSlide | 4 | Most active viewer info |\n| SummarySlide | 5 | Year celebration, busiest month |\n| ShareOfferSlide | 6 | $50 credit offer for sharing |\n\n### Keyboard Navigation\n\n| Key | Action |\n|-----|--------|\n| `→` | Next slide |\n| `←` | Previous slide |\n| `Enter` / `Space` | Next slide (when not on last slide) |\n| `Escape` | Close share view or close modal |\n\n### Share Functionality\n\nThe modal has a separate \"share view\" with three options:\n\n1. **LinkedIn**: Opens share dialog with pre-filled stats text\n2. **Twitter/X**: Opens tweet composer with pre-filled stats\n3. **Download**: Captures shareable card as PNG using `html2canvas`\n\nThe shareable card displays:\n- 2x2 grid of stats (minutes, km, documents, views)\n- Papermark branding\n- Optimized for social sharing\n\n### Analytics Events\n\n| Event | Trigger |\n|-------|---------|\n| `YIR: Banner Opened` | Banner click |\n| `YIR: Share Clicked` | \"Share\" button in navigation |\n| `YIR: Share Platform Clicked` | LinkedIn, Twitter, or download button |\n\n## Globe Component\n\nAn animated 3D globe rendered on HTML Canvas showing document reach.\n\n### Technical Details\n\n- **Rendering**: 2D canvas with perspective projection\n- **Point Generation**: 2500 points distributed using spherical coordinates\n- **Animation**: Continuous Y-axis rotation at 0.003 rad/frame\n- **Fixed Tilt**: 0.3 rad around X-axis for viewing angle\n- **Depth Sorting**: Points sorted by Z-coordinate, back-to-front rendering\n- **Point Colors**:\n  - Land: greens and browns (6 colors)\n  - Ocean: blues (4 colors)\n- **Land Detection**: Approximated via `sin(theta * 3) * sin(phi * 2)` pattern\n\n### Projection Pipeline\n\n```typescript\n// 1. Rotate around X axis\ny = y * cosX - z * sinX\nz = y * sinX + z * cosX\n\n// 2. Rotate around Y axis\nx = x * cosY + z * sinY\nz = -x * sinY + z * cosY\n\n// 3. Perspective projection\nscale = 300 / (z + 150)\nx2d = x * scale + width / 2\ny2d = y * scale + height / 2\n```\n\n## Architecture Flow\n\n```mermaid\ngraph TD\n    A[Dashboard] --> B[YearlyRecapBanner]\n    B --> C{openRecap param?}\n    C -->|Yes| D[Auto-open Modal]\n    C -->|No| E[Wait for click]\n    E --> F[YearlyRecapModal]\n    D --> F\n    F --> G[FETCH /api/teams/:id/yearly-recap]\n    G --> H[YearlyRecapStats]\n    H --> I[Render 7 Slides]\n    I --> J[User clicks Share]\n    J --> K[Share View]\n    K --> L[LinkedIn / Twitter / Download]\n    \n    M[Globe Component] --> N[Canvas Animation]\n    N --> O[3D Globe Visualization]\n    \n    P[External Dependencies] --> Q[html2canvas]\n    P --> R[react-hotkeys-hook]\n    P --> S[SWR Immutable]\n    P --> T[sonner toast]\n```\n\n## Integration Points\n\n### Team Context\n```typescript\nconst teamInfo = useTeam(); // from @/context/team-context\n```\n\n### Analytics\n```typescript\nconst analytics = useAnalytics(); // from @/lib/analytics\n```\n\n### UI Components Used\n- `Button` from `@/components/ui/button`\n- `Dialog` / `DialogContent` from `@/components/ui/dialog`\n- `cn` utility from `@/lib/utils`\n- `fetcher` from `@/lib/utils`\n\n### Routing\nUses `next/router` for URL parameter handling (`openRecap`).\n\n## State Management\n\nThe modal maintains local state:\n- `currentSlide: number` — Active slide index\n- `showShareView: boolean` — Whether share view is displayed\n- `isCapturing: boolean` — Image capture in progress\n\nSWR handles server state for stats with `useSWRImmutable` (cached indefinitely).\n\n## Key Implementation Patterns\n\n### Slide Animation\nUses Tailwind `animate-in` classes with directional classes:\n- `slide-in-from-top-8` / `slide-in-from-bottom-8` / `slide-in-from-left-8` / `slide-in-from-right-8`\n- `zoom-in-75` / `zoom-in-50`\n- Animation delays via `style={{ animationDelay: \"...\" }}`\n\n### Dynamic Import\n```typescript\nconst html2canvas = (await import(\"html2canvas\")).default;\n```\nAvoids bundle bloat by dynamically importing the heavy canvas library only when share is triggered.\n\n### Cleanup\nThe Globe component properly cancels animation frames on unmount:\n```typescript\nreturn () => cancelAnimationFrame(animationId);\n```","context":"# context\n\n# Context Module Documentation\n\nThe `context/` directory provides React Context providers that manage application-wide state for three distinct domains:\n\n1. **Team selection** — current team and team list\n2. **Upload progress** — batch upload tracking, progress UI, and cancellation\n3. **Pending uploads** — documents awaiting or undergoing processing\n\nThese contexts are consumed by components throughout the codebase, from billing modals to dataroom item lists.\n\n---\n\n## Team Context (`team-context.tsx`)\n\n### Purpose\n\nManages the currently selected team across the application. Since the app is multi-tenant (users belong to multiple teams), the team context ensures that the correct team scope is applied to data fetching, settings, and billing operations.\n\n### State Shape\n\n```typescript\ntype TeamContextType = {\n  teams: Team[];           // All teams the current user belongs to\n  currentTeam: Team | null; // The actively selected team\n  currentTeamId: string | null;\n  isLoading: boolean;\n  setCurrentTeam: (team: Team) => void;\n};\n```\n\n### Initialization Logic\n\nThe provider initializes the `currentTeam` through a cascading fallback:\n\n1. **Check localStorage** — Look for a `currentTeamId` saved from a previous session\n2. **Match against loaded teams** — If found, set that team as current\n3. **Default to first team** — If no saved preference, select the first team in the list\n4. **Persist to localStorage** — Save the selection so it survives page reloads\n\nThis means team selection is sticky across sessions without requiring the user to re-select on every visit.\n\n### Data Flow\n\n```\nuseTeams (SWR)          localStorage\n      ↓                      ↓\n   [teams, loading]    currentTeamId\n          ↓                  ↓\n    TeamProvider ──────────────────→ currentTeam\n          ↓\n   Context value ──→ useTeam() consumers\n```\n\n### Usage Example\n\n```tsx\nconst { currentTeam, setCurrentTeam, teams } = useTeam();\n\n// Switch to a different team\n<select onChange={(e) => {\n  const team = teams.find(t => t.id === e.target.value);\n  setCurrentTeam(team);\n}}>\n  {teams.map(team => (\n    <option key={team.id} value={team.id}>{team.name}<\/option>\n  ))}\n<\/select>\n```\n\nThe `useTeam` hook is consumed by 30+ components across billing modals, dataroom settings, group management, and analytics tables. Any component that needs to display team-scoped data or check plan limits uses this context.\n\n---\n\n## Upload Progress Context (`upload-progress-context.tsx`)\n\n### Purpose\n\nCoordinates upload state between the `UploadZone` component and the `UploadNotificationDrawer` UI. It provides:\n\n- A unified view of all active upload batches and their items\n- Rejected file tracking (files that failed validation before upload)\n- Cancellation support (full batch or individual items)\n- Imperative triggers so external UI (like toolbar buttons) can open file/folder pickers\n\n### Architecture\n\nThis context is unusual in that it bridges two separate concerns:\n\n1. **State management** — tracking batches, items, bytes, and rejection lists\n2. **UI coordination** — controlling the drawer and exposing triggers\n\n```mermaid\ngraph TD\n    A[UploadZone] -->|registerUploadTriggers| B[UploadProgressProvider]\n    A -->|useUploadCallbacks| B\n    B -->|showDrawer| C[UploadNotificationDrawer]\n    B -->|uploadTriggers| D[Toolbar / External UI]\n    D -->|openFilesPicker| A\n```\n\n### Upload Zone Triggers\n\nThe context exposes `uploadTriggers` so components outside the `UploadZone` can trigger file picker dialogs:\n\n```typescript\ninterface UploadZoneTriggers {\n  openFilesPicker: () => void;\n  openFolderPicker: () => void;\n}\n```\n\nThis enables scenarios like an \"Upload\" button in the page toolbar opening the picker without reaching into the DOM.\n\nThe `registerUploadTriggers` function returns an unregister callback and includes an identity guard — a late unmount won't clear a newer registration.\n\n### Cancellation Model\n\nThe context supports two cancellation granularities:\n\n| Level | Function | Behavior |\n|-------|----------|----------|\n| Batch | `cancelUpload()` | Cancels all in-flight uploads, marks all pending items as complete |\n| Item | `cancelItem(itemId)` | Cancels a single file/folder, updates batch totals |\n\nBoth functions recalculate `bytesUploaded` and `bytesTotal` using `getActiveUploadByteTotals`, which iterates items and skips cancelled ones.\n\n### Batch and Item State\n\n```typescript\n// Simplified shapes\ntype UploadBatchState = {\n  batchId: string;\n  items: UploadItemState[];\n  totalEntries: number;      // total files across all items\n  completedEntries: number;\n  failedEntries: number;\n  bytesUploaded: number;\n  bytesTotal: number;\n  cancelled: boolean;\n};\n\ntype UploadItemState = {\n  itemId: string;\n  name: string;\n  type: 'file' | 'folder';\n  totalEntries: number;\n  completedEntries: number;\n  failedEntries: number;\n  bytesUploaded?: number;\n  bytesTotal?: number;\n  cancelled: boolean;\n};\n```\n\nThe batch aggregates counts from its items. When an item is cancelled, the batch's `completedEntries` increases by the remaining count (items that won't be uploaded are treated as complete).\n\n### useUploadCallbacks\n\nThis hook provides stable callbacks for wiring `UploadZone` to the context:\n\n```typescript\nconst {\n  onTraversalStart,      // Folder drag detected, show drawer with preliminary items\n  onUploadBatchStart,     // Actual upload beginning, merge into existing batch\n  onUploadBatchUpdate,    // Progress update from Trigger.dev\n  onUploadRejected,       // Files rejected before upload (size, type, etc.)\n  onUploadAborted,        // Upload aborted before starting\n} = useUploadCallbacks();\n```\n\nThese callbacks are designed to be called from the `UploadZone` as the upload lifecycle progresses.\n\n### Drawer Lifecycle\n\nThe drawer opens automatically when:\n\n- Folder traversal begins (`onTraversalStart`)\n- A batch upload starts (`onUploadBatchStart`)\n- Files are rejected (`onUploadRejected`)\n\nClosing the drawer resets all state: the batch, rejected files, cancelled item IDs, and cancel functions. This ensures a clean slate for the next upload session.\n\n---\n\n## Pending Uploads Context (`pending-uploads-context.tsx`)\n\n### Purpose\n\nTracks documents that are either actively uploading/processing or have been persisted from a previous session. This context powers the dataroom items list, showing users the real-time status of their uploads.\n\n### Dual Source Architecture\n\nThe context maintains two separate arrays:\n\n```typescript\n// In-flight uploads from the current session\nconst [pendingUploads, setPendingUploads] = useState<PendingUploadDocument[]>([]);\n\n// Persisted uploads loaded from the server\nconst [persistedUploads, setPersistedUploads] = useState<PendingUploadDocument[]>([]);\n```\n\n**Why separate them?**\n\n- **In-flight uploads** have real-time status (progress percentage, current processing stage)\n- **Persisted uploads** come from the server and represent completed/processing uploads from a previous page load\n\n### Server Persistence\n\nOn mount, if `linkId` and `dataroomId` are provided, the provider fetches persisted uploads:\n\n```\nGET /api/links/{linkId}/upload?dataroomId={dataroomId}\n```\n\nResponse uploads are transformed into `PendingUploadDocument` objects with `persisted: true`.\n\nThe `fetchedRef` prevents duplicate fetches if the component re-renders before the effect completes.\n\n### Deduplication Logic\n\nWhen providing the merged list, in-flight uploads take priority:\n\n```typescript\nconst allUploads = useMemo(() => {\n  // Get documentIds from in-flight uploads\n  const inFlightDocIds = new Set(\n    pendingUploads\n      .filter(u => u.documentId)\n      .map(u => u.documentId)\n  );\n\n  // Filter out persisted uploads that have an in-flight version\n  const filteredPersisted = persistedUploads.filter(\n    u => !inFlightDocIds.has(u.documentId)\n  );\n\n  return [...pendingUploads, ...filteredPersisted];\n}, [pendingUploads, persistedUploads]);\n```\n\nThis ensures that if a user starts uploading a document that was already persisted (e.g., from a previous session), the real-time status takes over rather than showing stale server data.\n\n### Document Lifecycle\n\n```typescript\ntype PendingUploadDocument = {\n  id: string;\n  name: string;\n  folderId: string | null;\n  uploadedAt: Date;\n  status: \"uploading\" | \"processing\" | \"complete\" | \"error\";\n  progress: number;\n  documentId?: string;           // Assigned after server processing\n  dataroomDocumentId?: string;   // Assigned when added to dataroom\n  documentVersionId?: string;    // For Trigger.dev realtime updates\n  fileType?: string;\n  errorMessage?: string;\n  persisted?: boolean;           // Whether loaded from server\n};\n```\n\n### Status Transitions\n\nTypical lifecycle for an uploaded document:\n\n1. **`uploading`** — File is being uploaded to the server\n2. **`processing`** — Upload complete, Trigger.dev is processing/extracting content\n3. **`complete`** — Processing finished, document fully available\n\nIf any step fails, status becomes `error` with an `errorMessage`.\n\n### Provider API\n\n```typescript\ntype PendingUploadsContextType = {\n  pendingUploads: PendingUploadDocument[];  // Merged (allUploads)\n  addPendingUpload: (upload: PendingUploadDocument) => void;\n  updatePendingUpload: (id: string, update: Partial<PendingUploadDocument>) => void;\n  removePendingUpload: (id: string) => void;\n  clearCompletedUploads: () => void;\n  getPendingUploadsForFolder: (folderId: string | null) => PendingUploadDocument[];\n  getAllUploads: () => PendingUploadDocument[];\n  hasUploads: boolean;\n  isLoading: boolean;  // True while fetching persisted uploads\n};\n```\n\n### Usage\n\n```tsx\nconst { getPendingUploadsForFolder, updatePendingUpload, hasUploads } = usePendingUploads();\n\n// Get uploads for current folder (null = root)\nconst folderUploads = getPendingUploadsForFolder(currentFolderId);\n\n// Show upload status in a list\n{folderUploads.map(upload => (\n  <UploadStatusBadge key={upload.id} upload={upload} />\n))}\n```\n\n---\n\n## Relationship Between Upload Contexts\n\nThe two upload-related contexts serve different but complementary roles:\n\n| Aspect | `PendingUploadsContext` | `UploadProgressContext` |\n|--------|------------------------|-------------------------|\n| **Primary concern** | Document status (persistence) | Upload operation (progress) |\n| **Timeframe** | Pre-upload through processing | During active upload |\n| **Status granularity** | `uploading`, `processing`, `complete`, `error` | `totalEntries`, `completedEntries`, bytes |\n| **Consumer** | DataroomItemsList | UploadZone, UploadNotificationDrawer |\n| **Trigger** | API callbacks from Trigger.dev | File picker / drag-drop |\n\nThey are used together in `DataroomItemsList`, which calls both `useUploadCallbacks` (for wiring the upload zone) and `useUploadProgress` (for controlling drawer visibility).","ee-ee":"# ee — ee\n\n# Enterprise Edition (ee) Module\n\n## Overview\n\nThe `ee` module is the organizational root for all **Enterprise Edition** features in Papermark. It serves as a container directory for premium capabilities that are available under commercial license, distinct from the open-source Community Edition.\n\n## Purpose\n\nThis module exists to:\n\n- Segregate licensed enterprise functionality from open-source code\n- Provide a clear entry point for enterprise-grade features\n- Enable modular licensing where certain features require an Enterprise license\n\n## Enterprise Features\n\nThe following feature categories are housed within this module:\n\n| Feature | Description |\n|---------|-------------|\n| **Data Rooms** | Secure document sharing environments with controlled access |\n| **Q&A Conversations** | Structured Q&A workflows between document owners and viewers |\n| **Advanced Permissions** | Granular role-based access control beyond standard sharing |\n\n## Licensing\n\n> ⚠️ **Important**: This code is copyrighted. Use of this code to host your own instance of app.papermark.com requires a valid [Enterprise license](https://www.papermark.com/enterprise).\n\nEnterprise features are available through:\n- [Hosted Enterprise plan](https://www.papermark.com/pricing)\n- [Enterprise license](https://www.papermark.com/enterprise) for self-hosted deployments\n\n## Module Structure\n\n```\npapermark/\n└── ee/                    # Enterprise Edition features\n    └── README.md          # This module's documentation\n```\n\n## Relationship to Core Application\n\nThe `ee` module integrates with the main Papermark application as a feature extension layer. Enterprise features follow the same architectural patterns as core modules but are gated behind license verification.\n\n## Contributing\n\nEnterprise features are developed and maintained by the Papermark team. Contributions to this module are handled through enterprise partnership agreements rather than standard pull requests.","ee-emails":"# ee — emails\n\n# `ee/emails/pause-resume-reminder` Module\n\nThe `pause-resume-reminder.tsx` module provides an email template component that notifies team administrators when a paused subscription is about to automatically resume billing. This is a customer retention and communication component within the Papermark email system.\n\n## Purpose\n\nWhen users pause their Papermark subscription, they receive a reminder email three days before the subscription automatically resumes. This gives administrators time to:\n\n- Review upcoming billing charges\n- Cancel if they no longer need the service\n- Update billing information\n- Contact support with concerns\n\n## Props Interface\n\nThe component accepts the following optional props:\n\n```typescript\ninterface PauseResumeReminderEmailProps {\n  teamName?: string;      // Name of the team/workspace\n  userName?: string;      // First name of the recipient\n  resumeDate?: string;    // Formatted date when billing resumes\n  plan?: string;          // Subscription plan name (e.g., \"Pro\")\n  userRole?: string;      // Recipient's role (e.g., \"Admin\")\n}\n```\n\nAll props have sensible defaults, so the component can be rendered with minimal configuration.\n\n## Email Structure\n\nThe email is organized into distinct sections:\n\n```\n┌─────────────────────────────────────┐\n│         Papermark Logo              │\n│                                     │\n│   Subscription Resume Reminder       │\n│                                     │\n│   Hello {userName},                 │\n│                                     │\n│   Reminder message about            │\n│   subscription resuming in 3 days   │\n│                                     │\n│   ┌─────────────────────────────┐   │\n│   │  📅 Resume Details:        │   │\n│   │    Team: {teamName}         │   │\n│   │    Plan: {plan}             │   │\n│   │    Resume Date: {resumeDate}│   │\n│   │    Your Role: {userRole}    │   │\n│   └─────────────────────────────┘   │\n│                                     │\n│   What happens next?                │\n│   • Subscription resumes on date    │\n│   • Billing restarts                 │\n│   • Features restored               │\n│   • Data remains unchanged          │\n│                                     │\n│   [ Manage Subscription Button ]    │\n│                                     │\n│   Closing text and support info     │\n│                                     │\n│   ─────────────────────────────     │\n│   Footer / Legal notice             │\n└─────────────────────────────────────┘\n```\n\n## Key Components\n\n### Logo Section\n\nRenders the Papermark logo from the marketing domain using the `Img` component from React Email. The source URL is constructed from `NEXT_PUBLIC_MARKETING_URL` environment variable with a fallback to `https://www.papermark.com`.\n\n### Details Card\n\nA bordered, light gray background section (`bg-[#f9fafb]`) displays key subscription information in a scannable format. This uses emoji (📅) for visual hierarchy rather than icons.\n\n### Call-to-Action Button\n\nA centered black button links to `/settings/billing` on the marketing domain. Styled with:\n- Black background (`bg-[#000000]`)\n- White text\n- Rounded corners\n- Padding: `px-5 py-3`\n\n### Footer\n\nContains legal boilerplate explaining why the recipient received the email, with a subtle top border separator.\n\n## Styling Approach\n\nThe component uses:\n\n- **Tailwind CSS** via the `<Tailwind>` wrapper from React Email\n- **Responsive container** with fixed 465px width centered on desktop\n- **System font stack** (`font-sans`)\n- **Consistent spacing** using Tailwind margin/padding utilities\n- **Neutral color palette** with black text and gray secondary text (`text-[#6b7280]`, `text-[#666]`)\n\n## Usage Example\n\n```tsx\nimport PauseResumeReminderEmail from \"@/ee/emails/pause-resume-reminder\";\n\nconst EmailComponent = () => {\n  return (\n    <PauseResumeReminderEmail\n      teamName=\"Acme Corp\"\n      userName=\"Sarah\"\n      resumeDate=\"March 15, 2024\"\n      plan=\"Pro\"\n      userRole=\"Admin\"\n    />\n  );\n};\n```\n\n## Integration Notes\n\nThis component is designed to be rendered by an email service layer (likely Resend or similar) when a scheduled job triggers the resume reminder. The component itself contains no logic for:\n\n- Scheduling or timing\n- Recipient lookup\n- Email sending\n\nIt is purely a presentation component that accepts data via props and renders a styled HTML email.\n\n## Environment Dependencies\n\n| Variable | Purpose | Default |\n|----------|---------|---------|\n| `NEXT_PUBLIC_MARKETING_URL` | Base URL for logo and CTA links | `https://www.papermark.com` |\n\nThe CTA button links to `${baseUrl}/settings/billing`, so users clicking the button are taken directly to their billing management page.","ee-limits":"# ee — limits\n\n# ee/limits Module\n\nThe `ee/limits` module manages subscription-based resource limits for teams. It defines plan tiers, handles per-team limit configuration, and provides both server-side and client-side APIs for checking and enforcing quotas.\n\n## Overview\n\nThis module centralizes limit management for:\n\n- **User seats** — How many team members can join\n- **Documents** — Total documents allowed\n- **Links** — Total links that can be created\n- **Domains** — Custom domain assignments\n- **Datarooms** — Virtual data room instances\n- **File uploads** — Per-file size limits and page counts\n- **Feature flags** — Boolean gates for premium features\n\n```mermaid\nflowchart TD\n    A[Client Component] --> B[useLimits Hook]\n    B --> C[SWR Cache]\n    D[API Route] --> E[getLimits Function]\n    E --> F[Prisma DB Query]\n    F --> G[Team Record]\n    G --> H[Plan + Limits Config]\n    H --> I[Merge with Defaults]\n    I --> J[Normalized Limits]\n    B --> J\n    C --> J\n```\n\n## Plan Architecture\n\n### Plan Tiers\n\nThe module defines seven plan tiers with increasing capabilities:\n\n| Plan | Users | Links | Documents | Domains | Datarooms | Notes |\n|------|-------|-------|-----------|---------|-----------|-------|\n| Free | 1 | 50 | 50 | 0 | 0 | Entry tier |\n| Pro | 1 | ∞ | 300 | 0 | 0 | Limited growth |\n| Business | 3 | ∞ | ∞ | 5 | 100 | Mainstream tier |\n| Datarooms | 3 | ∞ | ∞ | 10 | 100 | Data room focus |\n| Datarooms Plus | 5 | ∞ | ∞ | 1000 | 1000 | +5 custom fields |\n| Datarooms Premium | 10 | ∞ | ∞ | 1000 | 1000 | Team expansion |\n| Datarooms Unlimited | ∞ | ∞ | ∞ | ∞ | ∞ | No restrictions |\n\n### Null Means Unlimited\n\nIn `TFileSizeLimits` and `TPlanLimits`, `null` represents unlimited:\n\n```typescript\nvideo?: number | null;  // null = unlimited upload size\ndocuments?: number | null;  // null = unlimited count\n```\n\nThe `normalizeFileSizeLimit()` function converts `null` to `Infinity` for numeric comparison operations.\n\n## Key Components\n\n### constants.ts — Plan Definitions\n\nDefines the baseline limits for each plan tier as exported constants:\n\n```typescript\nexport const FREE_PLAN_LIMITS = {\n  users: 1,\n  links: 50,\n  documents: 50,\n  domains: 0,\n  datarooms: 0,\n  customDomainOnPro: false,\n  customDomainInDataroom: false,\n  advancedLinkControlsOnPro: false,\n  linkCustomFields: 0,\n};\n```\n\nFeature gates like `customDomainOnPro` are boolean flags that enable/disable functionality regardless of count-based limits.\n\n### server.ts — Limit Resolution\n\nThe core function `getLimits()` resolves final limits by merging:\n\n1. **Plan defaults** — Baseline limits from the team's subscription plan\n2. **Team overrides** — Per-team customizations stored in `team.limits` JSON column\n3. **Trial adjustments** — Special handling for trial periods\n\n```typescript\nexport async function getLimits({ teamId, userId }: {\n  teamId: string;\n  userId: string;\n}) {\n  // 1. Fetch team with plan and limits config\n  // 2. Parse limits JSON with Zod schema\n  // 3. Get base plan (handles \"pro+drtrial\" → \"pro\")\n  // 4. Merge defaults with parsed config\n  // 5. Apply Infinity to null limits for paid plans\n  // 6. Return with current usage counts\n}\n```\n\n**Plan String Parsing**\n\nThe system handles compound plan strings:\n\n```typescript\n\"free+drtrial\"  → base: \"free\", isTrial: true\n\"business\"      → base: \"business\", isTrial: false\n\"datarooms-plus\" → base: \"datarooms-plus\", isTrial: false\n```\n\n**Usage Tracking**\n\nThe function returns current usage alongside limits:\n\n```typescript\n{\n  users: 5,\n  documents: 300,\n  links: Infinity,\n  // ...\n  usage: {\n    documents: 47,  // current count\n    links: 123,\n    users: 3,\n  }\n}\n```\n\n### handler.ts — API Endpoint\n\nProvides the REST endpoint for fetching team limits:\n\n```\nGET /api/teams/:teamId/limits\n```\n\nResponse includes limits merged with feature flags:\n\n```typescript\n{\n  ...limits,\n  conversationsInDataroom: true,  // from feature flags\n  dataroomUpload: true,            // from feature flags\n}\n```\n\n### swr-handler.ts — Client Hook\n\nProvides `useLimits()` for React components:\n\n```typescript\nconst { limits, canAddDocuments, canAddLinks, canAddUsers } = useLimits();\n```\n\nDerived booleans make UI conditional rendering straightforward:\n\n```typescript\nif (!canAddDocuments) {\n  return <UpgradePrompt />;\n}\n```\n\n## Usage Patterns\n\n### Server-Side Enforcement\n\nAPI routes validate limits before operations:\n\n```typescript\n// In document creation handler\nconst limits = await getLimits({ teamId, userId });\n\nif (limits.usage.documents >= limits.documents) {\n  return res.status(403).json({ error: \"Document limit reached\" });\n}\n```\n\nKey consumers:\n- `file/s3/multipart.ts` — File upload initialization\n- `file/tus/[[...file]].ts` — TUS upload handling\n- `api/links/bulk-import.ts` — Bulk link creation\n- `api/datarooms/generate.ts` — Dataroom creation\n- `teams/[teamId]/invite.ts` — User invitations\n\n### Client-Side UI\n\nComponents use `useLimits()` to conditionally render upgrade prompts:\n\n```typescript\nfunction AddDocumentButton() {\n  const { canAddDocuments, showUpgradePlanModal } = useLimits();\n  \n  if (showUpgradePlanModal) {\n    return <UpgradePlanModal />;\n  }\n  \n  return <Button disabled={!canAddDocuments}>Add Document<\/Button>;\n}\n```\n\nKey consumers:\n- `TeamSwitcher` — Sidebar navigation\n- `DuplicateDataroom` — Settings modal\n\n## Limit Merging Logic\n\nThe merging process follows this priority order:\n\n1. **Plan defaults** (lowest priority)\n2. **Team overrides** from `team.limits` JSON\n3. **File size limits** merged separately (plan defaults + team overrides)\n4. **Trial adjustments** (highest priority for trial plans)\n\n```typescript\nconst mergedLimits = {\n  ...defaultLimits,        // from plan\n  ...parsedData,           // team overrides\n  fileSizeLimits: {        // special merge for nested object\n    ...normalizeFileSizeLimits(defaultLimits.fileSizeLimits),\n    ...parsedData.fileSizeLimits,\n  }\n};\n```\n\n## File Size Limits\n\nPer-plan file size constraints:\n\n| Plan | Max Files | Max Pages |\n|------|-----------|-----------|\n| Free/Pro | — | — |\n| Business | 500 | — |\n| Datarooms | 1000 | — |\n| Datarooms Plus | 5000 | 1000 |\n| Datarooms Premium | 5000 | 1000 |\n| Datarooms Unlimited | ∞ | ∞ |\n\nThese limits apply per-upload operation and are checked during file processing.\n\n## Paused Plan Behavior\n\nWhen a subscription is paused (`PAUSED_PLAN_LIMITS`), the system restricts new creation while preserving access:\n\n```typescript\nexport const PAUSED_PLAN_LIMITS = {\n  canCreateLinks: false,\n  canReceiveViews: false,\n  canCreateDocuments: false,\n  canCreateDatarooms: false,\n  // Keep existing access\n  canViewAnalytics: true,\n  canAccessExistingContent: true,\n};\n```","ee-stripe":"# ee — stripe\n\n# ee/stripe Module\n\nThe `ee/stripe` module handles Stripe integration for Papermark.io, managing subscription lifecycles, plan pricing, and the connection between Stripe accounts and internal team records.\n\n## Overview\n\nThis module supports a dual-account Stripe architecture—managing both \"old\" legacy accounts and \"new\" accounts through separate Stripe clients. It provides:\n\n- Stripe client initialization for frontend and backend\n- Plan and pricing definitions with Stripe price IDs\n- Utility functions for mapping between plans, price IDs, and display names\n- Webhook handlers for subscription lifecycle events\n- Feature definitions for each pricing tier\n\n## Architecture\n\n```mermaid\nflowchart TB\n    subgraph \"Client Components\"\n        UP[\"UpgradePlanModal\"]\n        AS[\"AddSeatModal\"]\n    end\n\n    subgraph \"ee/stripe\"\n        CLIENT[\"client.ts<br/>getStripe()\"]\n        INDEX[\"index.ts<br/>stripeInstance()\"]\n        UTILS[\"utils.ts<br/>PLANS, getPlanFromPriceId()\"]\n        CONST[\"constants.ts<br/>PlanEnum, BASE_FEATURES\"]\n        \n        subgraph \"functions/\"\n            GF[\"get-price-id-from-plan.ts\"]\n            GC[\"get-coupon-from-plan.ts\"]\n            GQ[\"get-quantity-from-plan.ts\"]\n            GS[\"get-subscription-item.ts\"]\n        end\n        \n        subgraph \"webhooks/\"\n            CHK[\"checkout-session-completed.ts\"]\n            UPD[\"customer-subscription-updated.ts\"]\n            DEL[\"customer-subscription-deleted.ts\"]\n            INV[\"invoice-upcoming.ts\"]\n        end\n    end\n\n    subgraph \"External Services\"\n        STRIPE[\"Stripe API\"]\n    end\n\n    UP --> CLIENT\n    UP --> GF\n    UP --> CONST\n    AS --> GF\n    AS --> GQ\n    CHK --> UTILS\n    UPD --> UTILS\n    CHK --> INDEX\n    UPD --> INDEX\n    INDEX --> STRIPE\n```\n\n## Dual Account Architecture\n\nThe module maintains two separate Stripe accounts: one for \"old\" accounts (legacy customers) and one for \"new\" accounts. This is handled through the `account` or `isOldAccount` boolean parameter.\n\n**Stripe Instance Selection:**\n\n| Account Type | Secret Key | Publishable Key |\n|-------------|------------|-----------------|\n| New (default) | `STRIPE_SECRET_KEY_LIVE` / `STRIPE_SECRET_KEY` | `NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY_LIVE` / `NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY` |\n| Old | `STRIPE_SECRET_KEY_LIVE_OLD` / `STRIPE_SECRET_KEY_OLD` | `NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY_LIVE_OLD` / `NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY_OLD` |\n\n```typescript\n// Backend usage\nimport { stripeInstance } from \"@/ee/stripe\";\nconst stripe = stripeInstance(isOldAccount);\n\n// Frontend usage\nimport { getStripe } from \"@/ee/stripe/client\";\nconst stripe = await getStripe(isOldAccount);\n```\n\n## Plan Structure\n\nPlans are defined in `utils.ts` with the `PLANS` array. Each plan includes:\n\n- **name**: Display name (e.g., \"Business\")\n- **slug**: URL-safe identifier (e.g., \"business\")\n- **minQuantity**: Minimum team members included\n- **price**: Monthly and yearly pricing with environment-specific Stripe price IDs\n\n### Available Plans\n\n| Plan | Slug | Monthly | Yearly | Min Users |\n|------|------|---------|--------|-----------|\n| Pro | `pro` | €29 | €24 | 1 |\n| Business | `business` | €79 | €59 | 3 |\n| Data Rooms | `datarooms` | €149 | €99 | 3 |\n| Data Rooms Plus | `datarooms-plus` | €349 | €249 | 5 |\n| Data Rooms Premium | `datarooms-premium` | €699 | €549 | 10 |\n| Data Rooms Unlimited | `datarooms-unlimited` | €1499 | €999 | 1 |\n\nEach plan stores price IDs for four combinations:\n- `test` environment + `old` account\n- `test` environment + `new` account\n- `production` environment + `old` account\n- `production` environment + `new` account\n\n## Key Functions\n\n### Price ID Lookup\n\n`getPriceIdFromPlan()` retrieves the Stripe price ID for a given plan and billing period:\n\n```typescript\nimport { getPriceIdFromPlan } from \"@/ee/stripe/functions/get-price-id-from-plan\";\n\nconst priceId = getPriceIdFromPlan({\n  planSlug: \"business\",\n  period: \"yearly\",\n});\n```\n\n### Plan Lookup from Price ID\n\n`getPlanFromPriceId()` reverses the lookup, finding the internal plan from a Stripe price ID:\n\n```typescript\nimport { getPlanFromPriceId } from \"@/ee/stripe/utils\";\n\nconst plan = getPlanFromPriceId(priceId, isOldAccount);\n```\n\nThis function also handles historical price IDs for legacy subscriptions that no longer exist in the main configuration.\n\n### Old Account Detection\n\n`isOldAccount()` checks if a plan string indicates a legacy account:\n\n```typescript\nimport { isOldAccount } from \"@/ee/stripe/utils\";\n\nif (isOldAccount(plan)) {\n  // Use old Stripe account\n}\n```\n\n### Feature Retrieval\n\n`getPlanFeatures()` returns the feature list for a plan with optional filtering:\n\n```typescript\nimport { getPlanFeatures, PlanEnum } from \"@/ee/stripe/constants\";\n\nconst features = getPlanFeatures(PlanEnum.Business, {\n  period: \"yearly\",\n  maxFeatures: 5,\n  excludeFeatures: [\"webhooks\"],\n});\n```\n\n## Webhook Handlers\n\n### Checkout Session Completed\n\n`checkoutSessionCompleted()` processes successful purchases:\n\n1. Retrieves subscription from Stripe\n2. Maps price ID to plan using `getPlanFromPriceId()`\n3. Clones appropriate plan limits from `@/ee/limits/constants`\n4. Updates team record with subscription details and limits\n5. Triggers welcome emails via `waitUntil()`:\n   - `sendUpgradePlanEmail()` - generic upgrade notification\n   - `sendUpgradePersonalEmail()` - personalized welcome\n   - `sendUpgradeOneMonthCheckinEmailTask()` - delayed check-in (40 days)\n\n```typescript\nawait checkoutSessionCompleted(event, isOldAccount);\n```\n\n### Customer Subscription Updated\n\n`customerSubsciptionUpdated()` handles plan changes and quantity adjustments:\n\n1. Detects plan changes (upgrades/downgrades) and updates limits accordingly\n2. Adjusts team member limits when quantity changes\n3. Updates subscription period dates\n4. Clears domain redirects if the new plan doesn't support them\n\n```typescript\nawait customerSubsciptionUpdated(event, res, isOldAccount);\n```\n\n### Customer Subscription Deleted\n\n`customerSubscriptionDeleted()` handles subscription cancellation:\n\n1. Resets team to \"free\" plan\n2. Clears subscription ID and period dates\n3. Applies `FREE_PLAN_LIMITS`\n4. Removes domain redirects\n\n```typescript\nawait customerSubscriptionDeleted(event, res);\n```\n\n### Invoice Upcoming\n\n`invoiceUpcoming()` sends renewal reminders for yearly subscriptions:\n\n1. Checks if invoice is for yearly renewal\n2. Extracts customer email and renewal date\n3. Triggers `sendSubscriptionRenewalReminderEmail()`\n\n```typescript\nawait invoiceUpcoming(event, res, isOldAccount);\n```\n\n## Subscription Cancellation\n\n`cancelSubscription()` schedules a subscription for cancellation at period end:\n\n```typescript\nimport { cancelSubscription } from \"@/ee/stripe\";\n\nawait cancelSubscription(customerId, isOldAccount);\n```\n\n## Subscription Item Retrieval\n\n`getSubscriptionItem()` fetches subscription details including discount information:\n\n```typescript\nimport getSubscriptionItem from \"@/ee/stripe/functions/get-subscription-item\";\n\nconst item = await getSubscriptionItem(subscriptionId, isOldAccount);\n// Returns: { id, currentPeriodStart, currentPeriodEnd, discount }\n```\n\nThe `discount` object contains coupon details:\n- `couponId`: Stripe coupon ID\n- `percentOff` / `amountOff`: Discount value\n- `duration`: Coupon duration (forever, once, repeating)\n- `valid`: Whether coupon is still valid\n\n## Feature Definitions\n\nEach plan has a feature list in `BASE_FEATURES` with these properties:\n\n| Property | Type | Description |\n|----------|------|-------------|\n| `id` | `string` | Unique feature identifier |\n| `text` | `string` | Display text |\n| `highlight` | `boolean?` | Mark as highlighted |\n| `tooltip` | `string?` | Additional info text |\n| `isCustomDomain` | `boolean?` | Feature relates to custom domains |\n| `isUsers` | `boolean?` | Feature relates to team members |\n| `usersIncluded` | `number?` | Number of users included |\n| `isNotIncluded` | `boolean?` | Explicitly marked as not included |\n\n## Integration Points\n\n### Billing Components\n\n- **UpgradePlanModal** - Uses `getStripe()`, `getPriceIdFromPlan()`, `getPlanFeatures()`\n- **AddSeatModal** - Uses `getPriceIdFromPlan()`, `getQuantityFromPriceId()`\n- **UnlimitedPlanModal** - Uses `getStripe()`, `getPriceIdFromPlan()`, `getPlanFeatures()`\n\n### Cancellation Flow\n\nThe `cancellation/api/` routes use:\n- `stripeInstance()` - For direct Stripe API calls\n- `isOldAccount()` - To determine which Stripe account to use\n- `getCouponFromPlan()` - To apply retention discounts\n\n### Domain Management\n\nWhen teams upgrade/downgrade, `customerSubsciptionUpdated()` calls `clearTeamDomainRedirects()` if the new plan doesn't support custom domains (via `planSupportsRedirects()` from `@/lib/api/domains/redis`).\n\n### Email Triggers\n\nWebhooks trigger emails through Vercel's `waitUntil()`:\n\n```typescript\nwaitUntil(sendUpgradePlanEmail({ user, planType: plan.slug }));\n```\n\n## Environment Configuration\n\n| Variable | Description |\n|----------|-------------|\n| `NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY` | Stripe publishable key (test) |\n| `NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY_LIVE` | Stripe publishable key (production) |\n| `NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY_OLD` | Legacy account publishable key (test) |\n| `NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY_LIVE_OLD` | Legacy account publishable key (production) |\n| `STRIPE_SECRET_KEY` | Stripe secret key (test) |\n| `STRIPE_SECRET_KEY_LIVE` | Stripe secret key (production) |\n| `STRIPE_SECRET_KEY_OLD` | Legacy account secret key (test) |\n| `STRIPE_SECRET_KEY_LIVE_OLD` | Legacy account secret key (production) |\n| `NEXT_PUBLIC_VERCEL_ENV` | Environment (\"production\" or \"test\") |","lib-analytics":"# lib — analytics\n\n# Analytics Module (`lib/analytics`)\n\nProvides unified analytics tracking across the application with support for both client-side and server-side event capture. The module abstracts over two analytics backends: **PostHog** for client-side tracking and **Jitsu** for server-side tracking.\n\n## Overview\n\nThis module serves as the central interface for analytics throughout the codebase. It exports a React hook for client-side tracking and standalone functions for server-side event capture. The dual-provider architecture allows:\n\n- **Client-side**: User behavior tracking via PostHog (requires PostHog configuration)\n- **Server-side**: Server-initiated events via Jitsu (requires environment variables)\n\n## Architecture\n\n```mermaid\nflowchart LR\n    subgraph Client[\"Client-Side\"]\n        A[\"Component\"] --> B[\"useAnalytics()\"]\n        B --> C[\"PostHog\"]\n    end\n    \n    subgraph Server[\"Server-Side\"]\n        D[\"API Route\"] --> E[\"trackAnalytics()\"]\n        D --> F[\"identifyUser()\"]\n        E --> G[\"Jitsu\"]\n        F --> G\n    end\n    \n    H[\"lib/posthog\"] --> B\n```\n\n## Key Components\n\n### `useAnalytics()`\n\nA React hook providing client-side analytics capabilities. Returns `capture` and `identify` functions.\n\n```typescript\nconst { capture, identify } = useAnalytics();\n```\n\n**Behavior:**\n- Checks PostHog configuration via `getPostHogConfig()` before any operation\n- All tracking calls are no-ops if PostHog is not enabled\n- Returns functions directly bound to the PostHog instance\n\n**Returns:**\n| Property | Type | Description |\n|----------|------|-------------|\n| `capture` | `(event: string, properties?: Record<string, unknown>) => void` | Capture a custom event |\n| `identify` | `(distinctId?: string, properties?: Record<string, unknown>) => void` | Associate a user with their actions |\n\n### `trackAnalytics(args)`\n\nServer-side event tracking function. Sends events to Jitsu when both `JITSU_HOST` and `JITSU_WRITE_KEY` environment variables are set.\n\n```typescript\ntrackAnalytics({ event: \"user_signup\", properties: { plan: \"pro\" } });\n```\n\n**Parameters:**\n- `args` — `AnalyticsEvents` type containing the event name and optional properties\n\n**Fallback:** If Jitsu is not configured, returns a no-op analytics instance.\n\n### `identifyUser(userId)`\n\nServer-side function to associate a user ID with subsequent tracking calls.\n\n```typescript\nidentifyUser(\"user_123\");\n```\n\n**Parameters:**\n- `userId: string` — The unique identifier for the user\n\n## Environment Configuration\n\n| Variable | Provider | Required For |\n|----------|----------|--------------|\n| `JITSU_HOST` | Jitsu | Server-side tracking |\n| `JITSU_WRITE_KEY` | Jitsu | Server-side tracking |\n\nPostHog configuration is handled separately in `lib/posthog`.\n\n## Usage Examples\n\n### Client-Side Tracking\n\n```typescript\nimport { useAnalytics } from \"@/lib/analytics\";\n\nfunction SignupButton() {\n  const { capture } = useAnalytics();\n\n  const handleClick = () => {\n    capture(\"button_clicked\", { button_id: \"signup\", location: \"hero\" });\n  };\n\n  return <button onClick={handleClick}>Sign Up<\/button>;\n}\n```\n\n### Identifying Users\n\n```typescript\n// Client-side (React component)\nconst { identify } = useAnalytics();\nidentify(user.id, { email: user.email, plan: \"pro\" });\n\n// Server-side (API route)\nimport { identifyUser } from \"@/lib/analytics\";\nidentifyUser(userId);\n```\n\n### Server-Side Event Tracking\n\n```typescript\nimport { trackAnalytics } from \"@/lib/analytics\";\n\nexport async function POST(req: Request) {\n  // Process signup...\n  \n  await trackAnalytics({\n    event: \"user_signup\",\n    properties: {\n      userId: newUser.id,\n      referral: req.headers.get(\"referer\"),\n    },\n  });\n  \n  return Response.json({ success: true });\n}\n```\n\n## Integration with Other Modules\n\n- **`lib/posthog`**: Provides PostHog configuration via `getPostHogConfig()` — used to check if client-side tracking is enabled\n- **`lib/types`**: Exports `AnalyticsEvents` type used by `trackAnalytics()` for type-safe event definitions","lib-api":"# lib — api\n\n# lib/api Module\n\nServer-side API utilities, data fetching, and access control for Papermark. This module centralizes shared logic used by Next.js route handlers, including authentication helpers, RBAC enforcement, link data fetching, domain management, and webhook dispatch.\n\n---\n\n## Architecture Overview\n\nThe module is organized into functional domains:\n\n```\nlib/api/\n├── auth/                     # Authentication utilities\n│   ├── passkey.ts            # Passkey lifecycle (register, list, remove)\n│   ├── token.ts              # Token hashing\n│   └── with-session-team.ts  # Unified session + team context wrapper\n├── domains/                  # Custom domain management\n│   ├── index.ts              # Domain CRUD helpers\n│   ├── clear-team-redirects.ts\n│   ├── redis.ts              # Redirect URL caching\n│   └── validate-redirect-url.ts\n├── documents/\n│   └── process-document.ts   # Document upload pipeline\n├── links/\n│   ├── bulk-import.ts        # CSV-based bulk link creation\n│   ├── link-data.ts          # Link data fetching for SSR/ISR\n│   └── revalidate.ts         # ISR revalidation triggers\n├── rbac/                      # Role-based access control\n│   ├── permissions.ts        # Permission verb definitions\n│   ├── entitlements.ts        # Dataroom-scoped access\n│   └── guard.ts               # Inline access guards\n├── views/\n│   └── send-webhook-event.ts  # View event webhook dispatch\n├── teams/\n│   └── is-saml-enforced-for-email-domain.ts\n└── notification-helper.ts     # Notification job dispatch\n```\n\n---\n\n## Role-Based Access Control (RBAC)\n\nThe RBAC layer enforces what users can do (`permissions`) and which resources they can access (`entitlements`).\n\n### Permission Verbs (`permissions.ts`)\n\n`PermissionAction` defines granular verbs that routes declare as requirements:\n\n```typescript\nexport type PermissionAction =\n  | \"datarooms.read\" | \"datarooms.write\"\n  | \"documents.read\" | \"documents.write\"\n  | \"links.read\" | \"links.write\"\n  | \"analytics.read\" | \"analytics.team\"\n  | \"team.read\" | \"team.write\"\n  | \"members.write\" | \"tokens.write\"\n  | \"webhooks.write\" | \"domains.write\"\n  | \"branding.write\" | \"sso.write\";\n```\n\nRole → permission set mapping:\n\n| Role | Permissions |\n|------|-------------|\n| `ADMIN` | All verbs |\n| `MANAGER` | All except `members.write`, `sso.write` |\n| `MEMBER` | Broad access except admin-only structural ops |\n| `DATAROOM_MEMBER` | Minimal set scoped to assigned datarooms only |\n\n```typescript\n// Check if a role has required permissions\nconst hasAccess = hasAllPermissions(role, [\"links.read\", \"links.write\"]);\n\n// Identify the scoped role (requires per-room entitlement check)\nconst isScoped = isDataroomScopedRole(role); // true only for DATAROOM_MEMBER\n```\n\n### Dataroom Entitlements (`entitlements.ts`)\n\nComplements the verb layer with the \"which rooms\" check for `DATAROOM_MEMBER`:\n\n```typescript\n// Get rooms a user is assigned to within a team\nconst roomIds = await getAllowedDataroomIds(userId, teamId);\n\n// Does this role/room combination allow access?\ncanAccessDataroom(role, allowedIds, dataroomId);     // general access\ncanManageDataroom(role, allowedIds, dataroomId);     // uploads, links, folders\n\n// Assert access for a specific document or link\nassertDocumentAccess({ role, userId, teamId, documentId, allowedIds });\nassertLinkAccess({ role, userId, teamId, linkId, allowedIds });\n```\n\n### Inline Guards (`guard.ts`)\n\nFor routes not yet migrated to `withTeam`, these lightweight guards close IDOR gaps for `DATAROOM_MEMBER`:\n\n```typescript\n// Team-level route — scoped members are denied outright\nconst denied = await enforceDataroomMemberScope({ userId, teamId, res });\nif (denied) return;\n\n// Room-level route — verify assignment\nconst denied = await enforceDataroomMemberScope({ userId, teamId, dataroomId, res });\nif (denied) return;\n\n// Link-scoped check\nconst denied = await enforceLinkMemberScope({ userId, teamId, linkId, res });\n\n// Document-scoped check\nconst denied = await enforceDocumentMemberScope({ userId, teamId, documentId, res });\n```\n\n---\n\n## Session + Team Context Wrapper (`with-session-team.ts`)\n\nCentralizes membership checks, role verification, permission gating, plan checks, and dataroom entitlement enforcement for both App Router and Pages Router handlers.\n\n### Usage (App Router)\n\n```typescript\nimport { withTeam } from \"@/lib/api/auth/with-session-team\";\n\nexport const POST = withTeam(\n  async (ctx) => {\n    // ctx includes: userId, teamId, role, permissions, membership, team, dataroomId\n    return NextResponse.json({ success: true });\n  },\n  {\n    requiredPermissions: [\"documents.write\"],\n    requiredRoles: [\"ADMIN\", \"MANAGER\"],\n    requiredPlan: (plan) => plan !== \"free\",\n    dataroomParam: \"dataroomId\",\n  },\n);\n```\n\n### Usage (Pages Router)\n\n```typescript\nimport { withTeamApi } from \"@/lib/api/auth/with-session-team\";\n\nexport default withTeamApi(\n  async (req, res, ctx) =>
