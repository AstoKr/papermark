` from `@/lib/utils/ssrf-protection` for hostname validation.\n\n## Schema Reference\n\n### Folders (`folders.ts`)\n\nValidates folder path parameters in catch-all routes. Designed to prevent path traversal while ensuring clean URL structures.\n\n```typescript\nfolderPathSchema // Array of non-empty strings, no traversal chars\ntype FolderPath = z.infer<typeof folderPathSchema>\n```\n\n**Constraints enforced:**\n- Array must contain at least one element\n- Each folder name must be non-empty\n- No `..` sequences (path traversal)\n- No forward slashes `/` in individual names\n- No backslashes `\\` in individual names\n\n### Multipart Upload (`multipart.ts`)\n\nHandles the three-phase multipart upload workflow for large file uploads.\n\n```mermaid\nsequenceDiagram\n    participant Client\n    participant API\n    participant S3\n    \n    Client->>API: initiate\n    API-->>Client: uploadId\n    Client->>API: get-part-urls\n    API-->>Client: presigned URLs\n    Client->>S3: Upload parts\n    Client->>API: complete\n    API->>S3: Complete multipart\n```\n\n**Actions and their schemas:**\n\n| Action | Schema | Key Fields |\n|--------|--------|------------|\n| `initiate` | `MultipartInitiateSchema` | fileName, contentType, teamId, docId |\n| `get-part-urls` | `MultipartGetPartUrlsSchema` | + uploadId, fileSize, partSize (≥5MB) |\n| `complete` | `MultipartCompleteSchema` | + uploadId, parts[] |\n\n**Part structure:**\n```typescript\n{\n  ETag: string,      // Required, from S3 upload response\n  PartNumber: number // Positive integer\n}\n```\n\n### Notifications (`notifications.ts`)\n\nDual notification preference systems for different user roles.\n\n#### Viewer Notifications (External Users)\n\n```typescript\nViewerNotificationFrequency // \"instant\" | \"daily\" | \"weekly\"\nZViewerNotificationPreferencesSchema\n```\n\nDataroom change notifications for external viewers. Defaults to `{ dataroom: {} }` with empty preferences.\n\n#### Team Member Notifications\n\n```typescript\nTeamNotificationType // DOCUMENT_VIEW | DATAROOM_VIEW | BLOCKED_ACCESS | \n                     // DATAROOM_UPLOAD | CONVERSATION_MESSAGE | DATAROOM_TASK\n\nTeamNotificationFrequency // \"IMMEDIATE\" | \"NEVER\"\nTeamNotificationScope // \"ALL\" | \"MINE_ONLY\"\n```\n\n**Default configurations:**\n\n| Role | CONVERSATION_MESSAGE | Default Scope |\n|------|---------------------|---------------|\n| Admin | IMMEDIATE | ALL |\n| Member | NEVER | MINE_ONLY |\n\n### Presets (`presets.ts`)\n\nConfiguration schemas for link and document presets.\n\n```typescript\npresetDataSchema // Full preset configuration\ncustomFieldDataSchema // Individual custom field definition\nwatermarkConfigSchema // Watermark styling\n```\n\n**Preset categories:**\n\n| Category | Fields |\n|----------|--------|\n| Social Meta | enableCustomMetaTag, metaFavicon, metaImage, metaTitle, metaDescription |\n| Custom Fields | enableCustomFields, customFields[] |\n| Watermark | enableWatermark, watermarkConfig |\n| Access Control | enableAllowList, allowList[], enableDenyList, denyList[] |\n| Email Protection | emailProtected, emailAuthenticated |\n| Security | enablePassword, password, expiresAt, expiresIn, enableScreenshotProtection |\n| Agreement | enableAgreement, agreementId |\n| UI | showBanner |\n\n**Custom field types:**\n```typescript\n\"SHORT_TEXT\" | \"LONG_TEXT\" | \"NUMBER\" | \"PHONE_NUMBER\" | \"URL\" | \"CHECKBOX\"\n```\n\n### Webhooks (`webhooks.ts`)\n\n#### Creation Schema\n\n```typescript\ncreateWebhookSchema\n{\n  name: string,      // 1-40 characters\n  url: string,       // Valid URL, max 190 chars\n  secret: string,    // Must start with \"whsec_\"\n  triggers: Trigger[] // From WEBHOOK_TRIGGERS constant\n}\n\nupdateWebhookSchema // Partial version for PATCH operations\n```\n\n#### Event Payloads\n\nDiscriminated union of event-specific schemas using the `event` field:\n\n| Event | Schema | Key Data |\n|-------|--------|----------|\n| `link.created` | `linkCreatedWebhookSchema` | link, document?, dataroom? |\n| `document.created` | `documentCreatedWebhookSchema` | document |\n| `dataroom.created` | `dataroomCreatedWebhookSchema` | dataroom |\n| `link.viewed` | `linkViewedWebhookSchema` | view, link, document?, dataroom? |\n\n**View event data includes:**\n- Temporal: viewedAt, createdAt\n- Identity: viewId, email, emailVerified\n- Location: country, city\n- Device: device, browser, os, ua, referer\n\n#### Callback Schema\n\n```typescript\nwebhookCallbackSchema\n{\n  status: number,\n  url: string,\n  createdAt: number,\n  sourceMessageId: string,\n  body: string,       // Response from webhook URL\n  sourceBody: string  // Original payload\n}\n```\n\n## URL Validation (`url-validation.ts`)\n\n### Composite Security Validation\n\n```typescript\nvalidateUrlSecurity(url: string): boolean\n```\n\nCombines path security and SSRF protection checks. Used by:\n- `linkUrlUpdateSchema`\n- `notionUrlUpdateSchema`\n- `webhookFileUrlSchema`\n- External caller: `validateRedirectUrl` in `api/domains/validate-redirect-url.ts`\n\n### File Path Validator\n\n```typescript\nfilePathSchema // createFilePathValidator()\n```\n\nAccepts two path types:\n\n1. **Notion URLs**: Standard domains (`notion.so`, `www.notion.so`, `*.notion.site`) or custom domains with valid page IDs\n2. **S3 paths**: Pattern `teamId/doc_documentId/filename.ext`\n\nUses async refinement to validate custom Notion domains via `getNotionPageIdFromSlug()`.\n\n### Document Upload Schema\n\n```typescript\ndocumentUploadSchema\n```\n\nComprehensive validation for document creation with cross-field refinement:\n\n**Type-specific URL validation:**\n- `link` type: HTTPS URL validated by `validateUrlSecurity()`\n- Other types: File path validated by `filePathSchema`\n\n**Storage type consistency:**\n- `S3_PATH`: Must use file paths, not URLs\n- `VERCEL_BLOB`: Accepts Notion URLs or S3 paths (supports migration)\n\n**Content type validation:**\n- Ensures declared content type matches actual file type\n- Special case: `text/html` allowed for `notion` type\n\n### Notion URL Schema\n\n```typescript\nnotionUrlUpdateSchema\n```\n\nDedicated validator for Notion URL updates:\n- Must be valid HTTPS URL\n- Must resolve to valid Notion page (standard or custom domain)\n- Subject to security validation\n\n## Usage Patterns\n\n### Safe Parsing\n\n```typescript\nimport { folderPathSchema } from \"@/lib/zod/schemas/folders\";\n\nconst result = folderPathSchema.safeParse(req.params.path);\n\nif (!result.success) {\n  return res.status(400).json({ errors: result.error.issues });\n}\n\nconst validatedPath: FolderPath = result.data;\n```\n\n### Transform with Validation\n\n```typescript\nimport { documentUploadSchema } from \"@/lib/zod/url-validation\";\n\nconst result = await documentUploadSchema.spa(formData);\n\nif (result.success) {\n  // data.name is already sanitized via transform\n  const { name, url, type } = result.data;\n}\n```\n\n### Type Inference\n\n```typescript\nimport type { MultipartUploadRequest } from \"@/lib/zod/schemas/multipart\";\nimport type { PresetDataSchema } from \"@/lib/zod/schemas/presets\";\nimport type { WebhookPayload } from \"@/lib/zod/schemas/webhooks\";\n\n// Use inferred types in function signatures\nfunction handleWebhook(payload: WebhookPayload) {\n  switch (payload.event) {\n    case \"link.viewed\":\n      // TypeScript knows payload.data.view exists\n      console.log(payload.data.view.email);\n      break;\n  }\n}\n```\n\n## Dependencies\n\n| External Import | Purpose |\n|-----------------|---------|\n| `zod` | Schema definition and validation |\n| `notion-utils` | Notion page ID parsing |\n| `@/lib/notion/utils` | Custom domain resolution |\n| `@/lib/utils/ssrf-protection` | Public hostname checking |\n| `@/lib/utils/sanitize-html` | Text sanitization |\n| `@/lib/utils/get-content-type` | MIME type mapping |\n| `@/lib/constants` | Supported file types |\n| `@/lib/webhook/constants` | Webhook trigger enum |\n\n## Deprecations\n\n```typescript\n// Legacy names still exported for backwards compatibility\nNotificationFrequency // → use ViewerNotificationFrequency\n```\n\nMaintain deprecated exports only if external consumers depend on them. New code should use the renamed variants.","locales":"# locales\n\nLocales Module\n\nInternationalization (i18n) resource files for the Papermark application. This module contains all user-facing strings translated into seven languages, organized by locale and functional namespace.\n\n## Overview\n\nThe locales module provides translated strings for the UI, organized into three namespaces corresponding to major application sections:\n\n| Namespace | Purpose |\n|-----------|---------|\n| `access-form` | Identity verification and email entry forms |\n| `dataroom` | Document management and download interfaces |\n| `viewer` | Document viewing experience |\n\n## Supported Locales\n\n| Code | Language | Region |\n|------|----------|--------|\n| `en` | English | Default |\n| `de` | German | Germany |\n| `es` | Spanish | Spain |\n| `fr` | French | France |\n| `it` | Italian | Italy |\n| `ja` | Japanese | Japan |\n| `pt-BR` | Portuguese | Brazil |\n\n## File Structure\n\n```\nlocales/\n├── {locale}/\n│   ├── access-form.json   # Verification and access forms\n│   ├── dataroom.json      # Data room interface\n│   └── viewer.json        # Document viewer\n```\n\n## Namespace Reference\n\n### `access-form`\n\nHandles user identity verification flows including email entry, OTP verification, and reauthentication prompts.\n\n**Key sections:**\n\n| Section | Content |\n|---------|---------|\n| `welcome` | Initial prompt text with fallback messaging |\n| `buttons` | Continue and verification action labels |\n| `fields` | Form input labels, placeholders, and validation messages for email, password, name, URL, and phone |\n| `agreement` | Terms acceptance prefixes |\n| `verification` | OTP entry flow: title, description, error states, resend options |\n| `footer` | Branding, security notice, privacy policy link |\n| `reauth` | Re-verification prompts when accessing uploaded content |\n\n**Variable interpolation examples:**\n```json\n\"description\": \"Enter the six digit verification code sent to <email>{{email}}<\/email>\"\n\"copyright\": \"© {{year}}{{name}}\"\n```\n\n### `dataroom`\n\nCovers the data room shell, document browsing, search, upload, and download workflows.\n\n**Key sections:**\n\n| Section | Content |\n|---------|---------|\n| `shell` | Header elements, footer branding, copyright |\n| `tabs` | Navigation tabs (Documents, My Uploads) |\n| `search` | Search input and result messaging |\n| `breadcrumb` | Navigation breadcrumb labels |\n| `empty` | Empty state messages |\n| `cards` | Document/folder card labels and actions |\n| `compactList` | Table column headers |\n| `trailingActions` | Q&A and download action labels |\n| `navToasts` | Notification messages for navigation and download events |\n| `intro` | Data room introduction modal |\n| `upload` | Document upload flow labels and success messages |\n| `download` | Complete download workflow including folder downloads, OTP verification, progress states, and expiration messaging |\n| `downloadsPage` | Standalone downloads page with email verification |\n| `downloadOtp` | One-time password verification for downloads |\n| `downloadsPanel` | Inline download progress panel states |\n| `folderPicker` | Folder selection component |\n| `indexFile` | Index file generation interface |\n\n### `viewer`\n\nDocument viewing interface including navigation, zoom, and reporting.\n\n**Key sections:**\n\n| Section | Content |\n|---------|---------|\n| `nav` | Viewer toolbar actions and tooltips |\n| `toasts` | Download preparation and result notifications |\n| `downloadOnly` | Download-only document mode messaging |\n| `awayPoster` | Idle detection pause overlay with ARIA labels |\n| `poweredBy` | Attribution footer |\n| `report` | Content reporting interface and abuse type options |\n\n## Translation Patterns\n\n### Variable Interpolation\n\nStrings use `{{variableName}}` syntax for dynamic values:\n\n```json\n\"title\": \"Welcome to {{name}}\"\n\"filesCount\": \"{{processed}} / {{total}} files\"\n```\n\n### ICU-Style Pluralization\n\nPlural forms use `_one` and `_other` suffixes following CLDR conventions:\n\n```json\n\"resultCount_one\": \"({{count}} result across all folders)\",\n\"resultCount_other\": \"({{count}} results across all folders)\",\n\"expiresDays_one\": \"{{count}} day\",\n\"expiresDays_other\": \"{{count}} days\"\n```\n\n### HTML Markup in Strings\n\nSome strings embed HTML elements for structured rendering:\n\n```json\n\"description\": \"Enter the six digit verification code sent to <email>{{email}}<\/email>\"\n```\n\n### Accessibility (ARIA)\n\nCritical UI states include ARIA labels:\n\n```json\n\"awayPoster\": {\n  \"ariaTitle\": \"Auto-paused session notification\",\n  \"ariaDescription\": \"Your session was paused due to inactivity...\"\n}\n```\n\n### Fallback Values\n\nDefault values provide graceful degradation:\n\n```json\n\"phone\": {\n  \"placeholderDefault\": \"+1 123 456 7890\"\n}\n```\n\n## Adding a New Locale\n\nTo add support for a new language:\n\n1. Create a new directory under `locales/` with the appropriate ISO code (e.g., `zh` for Chinese)\n2. Copy the three JSON files from an existing locale\n3. Translate all string values while preserving keys\n4. Update any locale-specific formatting (phone numbers, dates)\n\n## Adding a New Translation Key\n\nWhen adding new UI strings:\n\n1. Add the key to `locales/en/` first (the source of truth)\n2. Add the same key to all other locale files with translations\n3. For pluralized strings, include both `_one` and `_other` variants\n4. Test with interpolation variables by running the consuming component\n\n## Integration\n\nThis module is consumed by the application's i18n integration layer. Components reference keys using a path notation matching the JSON structure:\n\n```typescript\n// Example consumption pattern\nt('dataroom.download.start')\nt('viewer.awayPoster.title', { duration: '5 minutes' })\nt('access-form.verification.description', { email: userEmail })\n```\n\n## Mermaid Diagram: Locale Loading Flow\n\n```mermaid\nflowchart TD\n    A[Application Init] --> B[Detect User Locale]\n    B --> C{Supported Locale?}\n    C -->|Yes| D[Load Matching Locale Files]\n    C -->|No| E[Fallback to English]\n    D --> F[Merge with Namespace Files]\n    E --> F\n    F --> G[Provide Translations to Components]\n    G --> H[Dynamic String Resolution]\n    H --> I[User Interface]\n```\n\n## Consistency Guidelines\n\nWhen modifying strings, maintain these conventions:\n\n- **Placeholder format**: Always use `{{variableName}}`\n- **Pluralization**: Always provide both `_one` and `_other` variants\n- **HTML safety**: Only include pre-approved inline elements like `<email>`\n- **Tone**: Keep translations professional and concise\n- **Variable names**: Match across all locales for the same concept\n- **ARIA**: Include both `ariaTitle` and `ariaDescription` for modal overlays","overview":"# papermark — Wiki\n\n# Papermark\n\nThe open-source DocSend alternative. Papermark lets you send documents and track who opens them, with support for custom domains, team management, datarooms, and enterprise features like AI-powered chat and SSO.\n\n## Architecture Overview\n\nPapermark is a multi-tenant SaaS built on Next.js 14's App Router. The codebase follows a layered architecture where API routes handle business logic, components render UI, and shared libraries provide utilities, data fetching, and integrations.\n\n```mermaid\ngraph TB\n    Client[\"Browser / Client\"]\n    NextJS[\"Next.js App Router<br/>(app/, pages/)\"]\n    API[\"API Routes<br/>(app/api, pages/api)\"]\n    Components[\"Components<br/>(components/)\"]\n    Context[\"Context Providers<br/>(context/)\"]\n    Lib[\"Libraries<br/>(lib/)\"]\n    EE[\"Enterprise Features<br/>(ee/)\"]\n    Prisma[\"Database<br/>(prisma/)\"]\n    \n    Client --> NextJS\n    NextJS --> API\n    API --> Components\n    API --> Context\n    Components --> Context\n    API --> Lib\n    Components --> Lib\n    API --> EE\n    Components --> EE\n    API --> Prisma\n    EE --> Prisma\n```\n\n## Key Modules\n\n### [app](app/app.md)\n\nThe Next.js application root containing all pages, layouts, and API routes. Uses route groups to separate concerns: `app/(auth)` for authentication flows, `app/(ee)` for enterprise API routes, and `app/api` for the core REST API.\n\n### [components](components/components.md)\n\nThe UI layer organized by feature domain: `components/ui` contains primitive components like buttons and dialogs that everything depends on. Feature-specific components live in subdirectories like `documents`, `links`, `datarooms`, and `analytics`. The `components/ui` module is the most heavily imported across the codebase.\n\n### [lib](lib/lib.md)\n\nShared utilities and integrations. Key submodules include `lib/swr` for data fetching with stale-while-revalidate, `lib/api` for internal API client functions, `lib/auth` for authentication, `lib/emails` for transactional emails, and `lib/trigger` for background job processing. This module is the backbone connecting API routes to components.\n\n### [context](context/context.md)\n\nReact Context providers that manage application-wide state. The `TeamContext` handles multi-tenant team switching (persistable to localStorage), while `UploadProgressContext` and `PendingUploadsContext` coordinate file upload state between the upload zone and notification UI.\n\n### [ee](ee/ee.md)\n\nEnterprise-only features gated behind billing plans: AI chat elements, SCIM provisioning, dataroom freezing, advanced analytics, and Stripe billing integration. The `ee/features` module is called heavily from both API routes and components.\n\n### [prisma](prisma/prisma.md)\n\nDatabase schema organized by domain (team, document, link, dataroom, conversation) with migration history. Papermark uses PostgreSQL with Prisma ORM.\n\n### [locales](locales/locales.md)\n\nInternationalization resources for seven languages across three namespaces: `access-form`, `dataroom`, and `viewer`.\n\n### [styles](styles/styles.md)\n\nCSS styling system including Tailwind configuration, Notion-inspired content styles, and dark mode support.\n\n## How Requests Flow\n\nA typical user action follows this path:\n\n1. **Client** sends a request to a Next.js route\n2. **API route** (`app/api` or `pages/api`) validates the request and applies business logic\n3. **Prisma** queries or updates the database\n4. **Enterprise features** (`ee/`) may be triggered for plan-gated operations\n5. **Context providers** update reactive state\n6. **Components** re-render with fresh data\n\nThe most common cross-cutting concern is upgrade prompts. Settings pages like billing, general settings, and tag management all funnel through `SettingsHeader` → `NavMenu` → `UpgradePlanModal` when users hit feature limits.\n\n## Setting Up Your Development Environment\n\n```bash\n# Install dependencies\nnpm install\n\n# Set up environment variables\ncp .env.local.example .env.local\n# Edit .env.local with your database URL and API keys\n\n# Generate Prisma client\nnpm run generate\n\n# Run database migrations\nnpm run dev:prisma\n\n# Start development server\nnpm run dev\n```\n\nThe dev script starts Next.js in development mode. Prisma migrations run automatically via the postinstall script when you install dependencies.","pages-account":"# pages — account\n\n# Account Pages Module\n\nThe `/account` module provides two pages for users to manage their profile settings and security preferences. It leverages Next.js App Router patterns, NextAuth.js for session management, and WebAuthn for passwordless authentication.\n\n## Pages Overview\n\n| Route | File | Purpose |\n|-------|------|---------|\n| `/account` | `general.tsx` | Manage display name, email, and avatar |\n| `/account/security` | `security.tsx` | Register and manage passkeys for passwordless login |\n\n## General Settings Page (`/account`)\n\nThe general settings page allows users to update their profile information.\n\n### User Information Form\n\nThe page renders two `Form` components for editable user data:\n\n**Name Field**\n\n- Accepts up to 32 characters\n- Updates immediately via `PATCH /api/account`\n- Session refreshes on success to reflect changes\n- Default value populated from `session.user.name`\n\n**Email Field**\n\n- Validated against RFC-compliant email format using `validateEmail`\n- Requires email confirmation for changes (confirmation sent to current email)\n- Supports addresses up to 52 characters\n- Displays `UpdateMailSubscribe` component for email notification preferences\n\n### Avatar Upload\n\nThe `UploadAvatar` component handles profile image management:\n\n- Accepts `.png` and `.jpg` files\n- Enforces 2MB maximum file size\n- Square images recommended\n\n### Session Integration\n\nThe page uses `useSession` from NextAuth.js to:\n\n- Retrieve current user data (`session.user.name`, `session.user.email`)\n- Trigger session updates after successful name changes via `update()`\n\n## Security Settings Page (`/account/security`)\n\nThe security page provides passkey-based passwordless authentication.\n\n### Passkey Registration\n\nThe `registerPasskey` function implements the WebAuthn registration flow:\n\n```mermaid\nsequenceDiagram\n    Client->>+API: POST /api/passkeys/register {start: true}\n    API-->>-Client: Credential creation options\n    Client->>+WebAuthn: create(options)\n    WebAuthn->>Client: Credential\n    Client->>+API: POST /api/passkeys/register {finish: true, credential}\n    API->>API: Store credential\n    API-->>-Client: Success\n    Client->>Client: mutate() refreshes list\n```\n\n1. Fetches credential creation options from `/api/passkeys/register`\n2. Opens the browser's native passkey registration dialog via `@github/webauthn-json`\n3. Sends the created credential to the API for storage\n4. Refreshes the passkey list using `mutate()`\n\n### Passkey Management\n\nThe page displays existing passkeys fetched via `usePasskeys`:\n\n- Shows credential name, creation date, and last used timestamp\n- Displays supported transports (e.g., `usb`, `nfc`, `ble`)\n- Each passkey has a delete action with confirmation dialog\n\nThe `removePasskey` function:\n\n1. Opens an `AlertDialog` confirmation modal\n2. Sends `DELETE /api/account/passkeys` with the credential ID\n3. Refreshes the list on success\n\n### Date Formatting\n\n`formatDate` converts ISO timestamps to localized display format:\n\n```typescript\nnew Date(dateString).toLocaleDateString(\"en-US\", {\n  year: \"numeric\",\n  month: \"short\",\n  day: \"numeric\",\n  hour: \"2-digit\",\n  minute: \"2-digit\",\n});\n```\n\n## Shared Components\n\nBoth pages use common components for consistent layout and navigation:\n\n```mermaid\nflowchart LR\n    AccountHeader --> NavMenu --> NavItem\n    \n    NavItem -->|Upgrade click| UpgradePlanModal\n```\n\n- **`AccountHeader`**: Renders page title and breadcrumb navigation\n- **`AppLayout`**: Wraps content with the application's main layout structure\n- **`NavItem`**: Navigation item that may trigger `UpgradePlanModal` for plan upgrades\n\n## Key Dependencies\n\n| Dependency | Purpose |\n|------------|---------|\n| `next-auth/react` | Session management via `useSession` |\n| `@github/webauthn-json` | Cross-browser WebAuthn API abstraction |\n| `@/lib/swr/use-passkeys` | Passkey data fetching and caching |\n| `sonner` | Toast notifications for success/error feedback |\n| `@/lib/utils/validate-email` | Email format validation |\n\n## API Endpoints\n\n| Endpoint | Method | Usage |\n|----------|--------|-------|\n| `/api/account` | `PATCH` | Update name and email |\n| `/api/passkeys/register` | `POST` | Register new passkey (start/finish flow) |\n| `/api/account/passkeys` | `DELETE` | Remove existing passkey |\n\n## State Management\n\n- **Loading states**: Track pending operations (`isLoading`, `isLoadingPasskeys`)\n- **Passkey list**: Managed by `usePasskeys` SWR hook with `mutate()` for refresh\n- **Form submissions**: Handled via `fetch` with toast feedback\n- **Confirmation flow**: Email changes require user confirmation before applying","pages-datarooms":"# pages — datarooms\n\n# pages/datarooms Module\n\nThe `pages/datarooms/[id]/` module contains all client-facing pages for managing a single dataroom instance. It handles document organization, analytics, branding customization, access control, conversations, and settings.\n\n## Route Structure\n\n```\ndatarooms/[id]/\n├── analytics/\n│   ├── index.tsx           # Analytics overview with stats\n│   └── audit-log.tsx        # Visitor activity log\n├── branding/\n│   └── index.tsx           # Dataroom branding customization\n├── conversations/\n│   ├── index.tsx            # Conversation list\n│   ├── [conversationId]/\n│   │   └── index.tsx        # Individual conversation thread\n│   └── faqs/\n│       └── index.tsx        # FAQ management\n├── document/\n│   └── [documentId].tsx      # Document detail with visitor stats\n├── documents/\n│   ├── index.tsx            # Root folder view\n│   └── [...name].tsx        # Nested folder view\n├── groups/\n│   └── index.tsx            # Viewer group management\n├── index.tsx                # Dataroom overview/header\n├── links.tsx                # Shared link management\n├── notifications.tsx        # Notification settings\n├── permissions.tsx          # Permission configuration\n└── settings.tsx             # Dataroom settings\n```\n\n## Core Pages\n\n### Documents Pages\n\nThe documents pages display the folder tree and document list within a dataroom.\n\n**Root Documents Page** (`documents/index.tsx`)\n\n- Renders the top-level folder contents using `useDataroomItems({ root: true })`\n- Displays the folder sidebar via `SidebarFolderTree`\n- Shows document and folder counts in the header area\n\n**Nested Documents Page** (`documents/[...name].tsx`)\n\n- Uses the catch-all route `[...name]` to handle arbitrary folder paths\n- Fetches items for the specific path via `useDataroomItems({ name })`\n- Reuses the same layout and components as the root page\n\n**Shared Components Used**\n\n| Component | Purpose |\n|-----------|---------|\n| `SidebarFolderTree` | Left navigation showing folder hierarchy |\n| `DataroomItemsList` | Renders documents and folders in a grid/list |\n| `DataroomSortableList` | Drag-and-drop reordering interface |\n| `DataroomSearchResults` | Search results display |\n| `SearchBoxPersisted` | Search input with URL persistence |\n| `AddDocumentDropdown` | Upload/create document actions |\n| `GenerateIndexButton` | Triggers AI-powered document indexing |\n| `RebuildIndexButton` | Re-indexes existing documents |\n| `DownloadDataroomButton` | Bulk download all documents |\n\n**State Management**\n\nThe page tracks `isReordering` state locally. When true, it swaps `DataroomItemsList` for `DataroomSortableList` to enable drag-and-drop reordering. Search is activated by the `search` query parameter, which populates results from `useDataroomSearch`.\n\n---\n\n### Document Detail Page\n\n**Route**: `document/[documentId].tsx`\n\nDisplays analytics and visitor information for a specific document within the dataroom context.\n\n```mermaid\ngraph LR\n    A[Document Page] --> B[useDataroomDocumentOverview]\n    A --> C[StatsComponent]\n    A --> D[VideoAnalytics]\n    A --> E[VisitorsTable]\n    C -->|non-video| Page stats\n    D -->|video type| Video metrics\n    E -->|viewScope: dataroom| Room visitors\n```\n\n**Key Behaviors**\n\n- Uses `useDataroomDocumentOverview` to fetch the document and dataroom context\n- Conditionally renders `StatsComponent` (PDF/docs) or `VideoAnalytics` (videos)\n- `VisitorsTable` uses `viewScope=\"dataroom\"` to filter to room-only visits\n- Full team members see a count of direct-link visits with a link to the team-wide document page\n- Data room scoped members only see room visits (no direct-link data)\n- Actions include preview button, link status indicator, and Notion accessibility status\n\n**Lazy Loading**\n\nHeavy components are dynamically imported with skeleton loading states:\n\n- `StatsComponent` — document analytics\n- `VideoAnalytics` — video engagement metrics\n- `VisitorsTable` — visitor breakdown\n\n---\n\n### Analytics Pages\n\n**Analytics Overview** (`analytics/index.tsx`)\n\nDisplays engagement metrics across the dataroom. Shows a stats card summary, then either:\n\n- **With access**: Full `DataroomAnalyticsOverview` component and `DocumentAnalyticsTree` for drill-down\n- **Without access**: `FeaturePreview` gate showing `MockAnalyticsTable` preview\n\nThe page uses `usePlan()` to check `isDatarooms`, `isDataroomsPlus`, or `isTrial` for access.\n\n**Audit Log** (`analytics/audit-log.tsx`)\n\nRenders `DataroomVisitorsTable` to show all visitor activity for the dataroom. Links from a `TabMenu` for mobile navigation between Analytics and Audit Log.\n\n---\n\n### Branding Page\n\n**Route**: `branding/index.tsx`\n\nThe most complex page in the module. Provides comprehensive dataroom customization with two tabs: **Branding** and **Layouts**.\n\n```mermaid\ngraph TB\n    A[Branding Page] --> B[Branding Tab]\n    A --> C[Layouts Tab]\n    B --> B1[Logo Upload]\n    B --> B2[Banner Upload]\n    B --> B3[Color Pickers]\n    B --> B4[Auto-fill from URL]\n    B --> B5[Welcome Message]\n    B --> B6[CTA Configuration]\n    B --> B7[Link Preview]\n    B --> B8[Visitor Language]\n    C --> C1[Layout Presets]\n    C --> C2[Card Layout Options]\n    C --> C3[Folder Tree Toggle]\n    C --> C4[Viewer Header Style]\n```\n\n**Data Inheritance Model**\n\nThe page implements a tiered inheritance system:\n\n1. **Dataroom-specific** — If `dataroomBrand` exists, use those values\n2. **Team global** — Fall back to `globalBrand` if no dataroom row exists\n3. **Defaults** — Apply hardcoded defaults (e.g., `#000000` for brand color)\n\nThis prevents UI flashing when switching between datarooms or after resetting branding.\n\n**State Initialization** (`useEffect` on `[dataroomBrand, globalBrand]`)\n\n```typescript\n// Simplified flow\nif (dataroomBrand) {\n  // Use dataroom-specific values\n} else if (globalBrand) {\n  // Mirror team brand (no flash)\n} else {\n  // Apply hardcoded defaults\n}\n```\n\n**Plan-Gated Features**\n\n| Feature | Required Plan |\n|---------|---------------|\n| Layout customization | DataRooms or higher |\n| Welcome message | Business or higher |\n| CTA button | Business or higher |\n| Visitor language | DataRoomsPlus or higher |\n\n**Upgrade Gate Logic**\n\nThe page tracks unsaved changes using refs:\n\n- `initialLayoutSnapshotRef` — layout state at last load\n- `initialLanguageRef` — visitor language at last load\n\nWhen `blocksSave` is true (layout/language changed without appropriate plan), the save button becomes an `UpgradeButton` instead of a standard `Button`.\n\n**Preset Layouts**\n\nFour predefined layouts via `applyLayoutPreset()`:\n\n| Preset | Banner | Card Layout | Folder Tree | Header Style |\n|--------|--------|-------------|-------------|--------------|\n| Standard | Visible | List | Shown | Default |\n| Strict | Hidden | Compact | Hidden | Default |\n| Modern | Visible | Compact | Hidden | Split |\n| Notion | Visible | Grid | Hidden | Notion |\n\n**Auto-fill Feature**\n\nThe `handleAutoFill()` function POSTs to `/api/branding/auto-fill` with a URL, then applies any extracted brand data (logo, banner, colors) to local state.\n\n**Preview System**\n\nThree iframe-based previews render in real-time as settings change:\n\n1. **Dataroom View** — `/room_ppreview_demo` with all layout params\n2. **Document View** — `/nav_ppreview_demo` with brand colors\n3. **Access/Front Page** — `/entrance_ppreview_demo` with welcome message\n\nPreview URLs are rebuilt via `buildPreviewQuery()` whenever debounced state changes.\n\n**Image Handling**\n\nLocal uploads are converted to blob URLs for preview, then uploaded to Vercel Blob storage on save via `uploadImage()`. The `useEffect` cleanup revokes blob URLs to prevent memory leaks.\n\n---\n\n### Conversations Pages\n\nDelegates entirely to `@/ee/features/conversations` components:\n\n| Route | Exports From |\n|-------|-------------|\n| `conversations/index.tsx` | `conversation-overview` |\n| `conversations/faqs/index.tsx` | `faq-overview` |\n| `conversations/[conversationId]/index.tsx` | `conversation-detail` |\n\nThis follows a pattern where complex features (conversations, FAQ management) are housed in the `/ee/features` module and simply mounted at these routes.\n\n---\n\n### Links & Permissions\n\n**Links Page** (`links.tsx`)\n\nManages shared links for the dataroom. Uses `BulkImportLinksModal` for batch link creation.\n\n**Permissions Page** (`permissions/index.tsx`)\n\nConfigures access permissions with similar structure to links.\n\n---\n\n### Groups Page\n\n**Route**: `groups/index.tsx`\n\nManages viewer groups for the dataroom. Integrates `ButtonComponent` which triggers `UpgradePlanModal` for plan-gated group features.\n\n---\n\n### Settings Page\n\n**Route**: `settings/index.tsx`\n\nDataroom configuration (name, notifications, etc.). Uses `useSelfMembership` to scope permissions appropriately.\n\n---\n\n## Data Fetching Patterns\n\n### SWR Hooks Used\n\n| Hook | Purpose |\n|------|---------|\n| `useDataroom` | Fetches the current dataroom by ID from URL |\n| `useDataroomItems` | Fetches documents and folders for a path |\n| `useDataroomSearch` | Full-text search within the dataroom |\n| `useDataroomBrand` | Fetches dataroom-specific branding |\n| `useBrand` | Fetches team-level branding |\n| `usePlan` | Checks current plan tier and trial status |\n| `useSelfMembership` | Determines user role within dataroom context |\n| `useTeam` | Team context for API calls |\n\n### URL Parameter Patterns\n\n- **Dataroom ID**: Derived from `router.query.id` via `useDataroom`\n- **Document ID**: `router.query.documentId` in nested routes\n- **Folder Path**: `router.query.name` as string array (`[...name]`)\n- **Search**: `router.query.search` persisted in URL\n\n---\n\n## AppLayout Wrapper\n\nEvery page wraps content in `AppLayout`, which provides:\n\n- Consistent navigation header\n- Team context provider\n- Dataroom context (when available)\n\nThe layout handles loading states with `<LoadingSpinner />` or skeleton fallbacks.\n\n---\n\n## Upgrade Gates\n\nThe module uses `FeaturePreview` and `UpgradePlanModal` components to gate advanced features. Common patterns:\n\n```typescript\n// Check access\nconst { isDatarooms, isDataroomsPlus, isTrial } = usePlan();\n\n// Conditional rendering\n{hasAccess ? <Feature /> : <FeaturePreview />}\n\n// Blocked save\nif (blocksSave) {\n  setUpgradeModalOpen(true);\n  return;\n}\n```\n\n---\n\n## Performance Considerations\n\n1. **Lazy Loading**: Document detail page dynamically imports `StatsComponent`, `VideoAnalytics`, and `VisitorsTable`\n2. **Blob URL Cleanup**: Branding page revokes object URLs in `useEffect` cleanup\n3. **Debounced Updates**: Color pickers and welcome message use `useDebounce` to reduce preview re-renders\n4. **Scrollable Sections**: Branding settings use `lg:max-h-[calc(100vh-440px)]` with overflow scroll for long content","pages-documents":"# pages — documents\n\n# Documents Module\n\nThe documents module handles document listing, creation, viewing, and management across the application. It consists of five Next.js page components that work together to provide a complete document management experience.\n\n## Overview\n\nThis module covers the document lifecycle:\n\n- **List documents** at `/documents`\n- **Create documents** at `/documents/new`\n- **View individual documents** at `/documents/[id]`\n- **Browse folders** at `/documents/tree/[...name]`\n- **Manage hidden documents** at `/documents/hidden`\n\n```mermaid\nflowchart TD\n    Documents[\"documents/index.tsx<br/>/documents\"]\n    DocumentNew[\"documents/new.tsx<br/>/documents/new\"]\n    DocumentPage[\"documents/[id]/index.tsx<br/>/documents/:id\"]\n    Tree[\"documents/tree/[...name].tsx<br/>/documents/tree/:path\"]\n    Hidden[\"documents/hidden.tsx<br/>/documents/hidden\"]\n    \n    Documents --> DocumentNew\n    Documents --> Tree\n    Documents --> Hidden\n    Documents --> DocumentPage\n    \n    Documents -->|\"useDocuments\"| SWR[\"lib/swr/use-documents.ts\"]\n    DocumentPage -->|\"useDocumentOverview\"| SWRO[\"lib/swr/use-document-overview.ts\"]\n    DocumentPage -->|\"useDocumentLinks\"| SWRL[\"lib/swr/use-document.ts\"]\n    \n    SWR --> API[\"Backend API\"]\n    SWRO --> API\n    SWRL --> API\n```\n\n## Key Data Hooks\n\nThe module relies on SWR hooks from `lib/swr/` for data fetching:\n\n| Hook | File | Purpose |\n|------|------|---------|\n| `useDocuments()` | `use-documents.ts` | Fetch paginated documents with search/filter |\n| `useRootFolders()` | `use-documents.ts` | Fetch root-level folders |\n| `useHiddenDocuments()` | `use-documents.ts` | Fetch hidden documents and folders |\n| `useFolder()` | `use-documents.ts` | Fetch subfolders for a path |\n| `useFolderDocuments()` | `use-documents.ts` | Fetch documents within a folder path |\n| `useDocumentOverview()` | `use-document-overview.ts` | Fetch single document details |\n| `useDocumentLinks()` | `use-document.ts` | Fetch links for a document |\n\n## Pages\n\n### Documents List (`/documents`)\n\n**File:** `pages/documents/index.tsx`\n\nThe main entry point for document management. Displays all documents with search, sorting, and pagination.\n\n**Key features:**\n\n- **Invitation handling** — Processes `?invitation=accepted|teamMember` query params via `handleInvitationStatus()` to handle team invitations\n- **Search** — Uses `SearchBoxPersisted` for persistent search state\n- **Sort** — `SortButton` component for list ordering\n- **Hidden items indicator** — Shows `EyeOffIcon` button linking to `/documents/hidden` when hidden items exist\n- **Pagination** — Supports URL-based pagination (`?page=1&limit=10`)\n\n**Component flow:**\n\n```\nDocuments\n├── AddDocumentDropdown (create new)\n├── SearchBoxPersisted\n├── SortButton\n└── DocumentsList (documents + folders)\n    └── Pagination (when filtered)\n```\n\n### Hidden Documents (`/documents/hidden`)\n\n**File:** `pages/documents/hidden.tsx`\n\nDisplays documents and folders that have been hidden from the main list. Allows users to unhide items.\n\n**Data source:** `useHiddenDocuments()` returns `folders` and `documents` arrays\n\n### Document Creation (`/documents/new`)\n\n**File:** `pages/documents/new.tsx`\n\nLanding page for document upload. Uses `AnimatePresence` for smooth transitions between steps.\n\n**Behavior:**\n\n- Without `?type` query param → shows `DeckGeneratorUpload` (AI-powered deck generation)\n- With `?type` query param → shows step-by-step upload flow with `Upload` component\n- \"Skip to dashboard\" link navigates to `/documents`\n\n### Document Detail (`/documents/[id]`)\n\n**File:** `pages/documents/[id]/index.tsx`\n\nThe most complex page in the module. Shows document statistics, links, and visitor analytics.\n\n**Data fetching:**\n\n```typescript\nconst { data: overview, document: prismaDocument, primaryVersion, limits, team, ... } = useDocumentOverview();\nconst { links, ... } = useDocumentLinks();\n```\n\n**Lazy-loaded components** (dynamic imports with loading states):\n\n| Component | File | Loading Placeholder |\n|-----------|------|---------------------|\n| `StatsComponent` | `components/documents/stats` | `DocumentStatsPlaceholder` |\n| `VideoAnalytics` | `components/documents/video-analytics` | `VideoStatsPlaceholder` |\n| `VisitorsTable` | `components/visitors/visitors-table` | Skeleton |\n| `BulkImportLinksModal` | `components/links/bulk-import-modal` | — |\n\n**Conditional rendering based on document type:**\n\n- `primaryVersion.type !== \"video\"` → Document stats\n- `primaryVersion.type === \"video\"` → Video analytics\n\n**Header actions:**\n\nThe `DocumentHeader` receives an `actions` array containing:\n\n1. `NotionAccessibilityIndicator` — Shows Notion connection status\n2. `LinkDocumentIndicator` — Shows link status\n3. `DocumentPreviewButton` — Opens document preview\n4. `AddLinkButton` — Creates new link (or shows upgrade modal if limits exceeded)\n\n**AddLinkButton logic:**\n\n```typescript\nif (!limits?.canAddLinks) {\n  // Show upgrade modal for plan-gated link creation\n  <UpgradePlanModal clickedPlan={team?.isTrial ? Business : Pro}>\n    <Button>Upgrade to Create Link<\/Button>\n  <\/UpgradePlanModal>\n} else {\n  <Button onClick={() => setIsLinkSheetOpen(true)}>Create Link<\/Button>\n}\n```\n\n**Modals:**\n\n- `LinkSheet` — Create individual links\n- `BulkImportLinksModal` — Bulk import links for the document\n\n### Folder Tree (`/documents/tree/[...name]`)\n\n**File:** `pages/documents/tree/[...name].tsx`\n\nDisplays documents within a specific folder path. Uses catch-all route `[...name]` to support nested folders.\n\n**Data fetching:**\n\n```typescript\nconst { folders, loading } = useFolder({ name });      // Subfolders\nconst { documents, loading } = useFolderDocuments({ name });  // Documents in folder\n```\n\n**Usage example:** `/documents/tree/marketing/reports` shows documents in the `marketing/reports` folder path.\n\n## Shared Components\n\n| Component | Location | Purpose |\n|-----------|----------|---------|\n| `AppLayout` | `components/layouts/app` | Page wrapper with navigation |\n| `DocumentsList` | `components/documents/documents-list` | Renders document/folder list |\n| `HiddenDocumentsList` | `components/documents/hidden-documents-list` | Renders hidden items |\n| `AddDocumentDropdown` | `components/documents/add-document-dropdown` | Create new document/folder |\n| `Pagination` | `components/documents/pagination` | Pagination controls |\n| `Separator` | `components/ui/separator` | Visual divider |\n\n## Mutations\n\nWhen document data changes, the module uses a combined mutation function:\n\n```typescript\nconst mutateDocument = () => {\n  mutateOverview();  // Re-fetch document overview\n  mutateLinks();     // Re-fetch document links\n};\n```\n\nThis ensures both the overview stats and links list stay in sync after operations like creating/deleting links.\n\n## Error Handling\n\n- **400 errors** from `useDocumentOverview` render the Next.js error page\n- Loading states use `LoadingSpinner` and skeleton components\n- The document detail page shows full-page loading spinner on initial load, then renders components progressively","pages-pages":"# pages — pages\n\n# Pages Module\n\nThe `pages/` directory contains the core Next.js page components and global app configuration. This module serves as the entry point for the Papermark application, handling document branding, analytics dashboards, notification preferences, and preview demonstrations.\n\n## Architecture Overview\n\n```mermaid\ngraph TD\n    A[pages/_app.tsx] --> B[pages/_document.tsx]\n    A --> C[pages/404.tsx]\n    A --> D[pages/branding.tsx]\n    A --> E[pages/dashboard.tsx]\n    A --> F[pages/notification-preferences.tsx]\n    \n    G[Provider Chain] --> A\n    G --> H[SessionProvider]\n    G --> I[ThemeProvider]\n    G --> J[TeamProvider]\n    G --> K[UploadProgressProvider]\n    \n    L[Preview Demos] --> M[entrance_ppreview_demo]\n    L --> N[nav_ppreview_demo]\n    L --> O[room_ppreview_demo]\n    \n    D --> L\n```\n\n## Core Files\n\n### `_document.tsx`\n\nCustomizes the HTML document structure for the entire application.\n\n**Key responsibilities:**\n- Sets the `lang` attribute to `\"en\"`\n- Adds `bg-background` class to the `<html>` element for base styling\n- Configures viewport meta tag via `<Head>` for responsive behavior\n- Enables `viewport-fit=cover` for safe area handling on iOS devices\n\n```tsx\nexport default function Document() {\n  return (\n    <Html lang=\"en\" className=\"bg-background\" suppressHydrationWarning>\n      <Head>\n        <meta name=\"viewport\" content=\"width=device-width, initial-scale=1, viewport-fit=cover\" />\n      <\/Head>\n      <body className=\"\">\n        <Main />\n        <NextScript />\n      <\/body>\n    <\/Html>\n  );\n}\n```\n\n### `_app.tsx`\n\nThe root application component that wraps every page. This is where the provider hierarchy is established.\n\n**Provider Chain (outermost to innermost):**\n\n1. **SessionProvider** - Provides NextAuth.js session context\n2. **PostHogCustomProvider** - Analytics tracking provider\n3. **ThemeProvider** - Dark/light mode management (`attribute=\"class\"`, `defaultTheme=\"light\"`)\n4. **NuqsAdapter** - URL state management for query parameters\n5. **TooltipProvider** - Global tooltip configuration (`delayDuration={100}`)\n6. **TeamProvider** - Current team context (only for non-excluded paths)\n7. **PostHogGroupSync** - Syncs team context to PostHog analytics groups\n8. **UploadProgressProvider** - Upload progress tracking\n\n**Conditional Rendering:**\n\nThe `TeamProvider`, `PostHogGroupSync`, and `UploadProgressProvider` are only mounted when the current route is not in `EXCLUDED_PATHS`. Public pages like the notification preferences and preview demos are excluded from team context.\n\n**Global Head Configuration:**\n- Sets Open Graph and Twitter Card meta tags\n- Configures favicon\n- Sets default title and description for Papermark\n\n### `404.tsx`\n\nCustom 404 error page displayed when routes are not found.\n\n**Props:**\n- `message?: string` - Optional custom error message\n\n**Features:**\n- Centered layout with responsive padding\n- Displays \"404 error\" badge and \"Page not found.\" heading\n- \"Go back home\" link pointing to `/`\n- Full-height layout using `min-h-screen`\n\n## Feature Pages\n\n### `branding.tsx` — Global Branding Settings\n\nA comprehensive settings page for configuring team-level branding that applies to all documents and data rooms.\n\n**State Management:**\n\nThe component manages extensive local state for all branding options:\n\n| State | Type | Purpose |\n|-------|------|---------|\n| `brandColor` | `string` | Primary brand color (hex) |\n| `accentColor` | `string` | Background/front-page color |\n| `accentButtonColor` | `string` | CTA button color |\n| `logo` | `string \\| null` | Logo image (data URL or uploaded URL) |\n| `banner` | `string \\| null` | Banner image for data rooms |\n| `welcomeMessage` | `string` | Front-page welcome text |\n| `ctaEnabled` | `boolean` | Call-to-action toggle |\n| `ctaLabel` | `string` | CTA button text |\n| `ctaUrl` | `string` | CTA link URL |\n| `cardLayout` | `DataroomCardLayout` | Document card display style |\n| `showFolderTree` | `boolean` | Navigation tree visibility |\n| `viewerHeaderStyle` | `DataroomViewerHeaderStyle` | Header layout variant |\n\n**Plan-Based Feature Gating:**\n\nFeatures are gated based on the user's plan tier:\n\n```typescript\n// Business messaging features (CTA, welcome message, link preview)\nconst hasBusinessMessagingAccess = isBusiness || isDatarooms || isDataroomsPlus || isTrial;\n\n// Data room features (banner)\nconst hasDataroomAccess = isBusiness || isDatarooms || isDataroomsPlus || isTrial;\n\n// Layout visibility (show tab)\nconst hasLayoutVisibility = isBusiness || isDatarooms || isDataroomsPlus || isTrial;\n\n// Layout persistence (save changes)\nconst hasLayoutSaveAccess = isDatarooms || isDataroomsPlus || isTrial;\n```\n\n**Layout Presets:**\n\nThe component defines four layout presets that users can apply:\n\n| Preset ID | cardLayout | showFolderTree | viewerHeaderStyle | hideFolderIconsInMain |\n|-----------|------------|----------------|-------------------|----------------------|\n| STANDARD | LIST | true | DEFAULT | false |\n| STRICT | COMPACT | false | DEFAULT | true |\n| MODERN | COMPACT | false | SPLIT | true |\n| NOTION | GRID | false | NOTION | false |\n\n**Debounced Updates:**\n\nColor changes and text inputs use debouncing to avoid excessive re-renders during live preview updates:\n\n- Brand/accent colors: 300ms debounce\n- Welcome message: 500ms debounce\n- CTA label/URL: 400ms debounce\n\n**Preview System:**\n\nThe page renders three preview tabs that display live updates as users modify settings:\n\n1. **Document View** - Shows the document viewer with navigation controls\n2. **Dataroom View** - Shows the data room with folder tree and card layout\n3. **Front Page** - Shows the access screen with welcome message\n\nPreviews use iframes with query parameters to render demo content without affecting actual data.\n\n**Save Logic:**\n\nThe `saveBranding` function:\n1. Validates welcome message length (max 80 characters)\n2. Uploads data URL images as blobs via `uploadImage()`\n3. Conditionally includes fields based on plan access\n4. Calls `PUT` for existing brands or `POST` for new brands\n5. Mutates the SWR cache to refresh brand data\n\n**Upgrade Flow:**\n\nWhen users without save access try to modify gated features, upgrade modals open:\n- Layout save → Opens DataRooms upgrade modal highlighting \"dataroom-viewer-layouts\"\n- Messaging save → Opens Business upgrade modal highlighting messaging features\n\n### `dashboard.tsx` — Analytics Dashboard\n\nDisplays aggregate analytics for document views, links, visitors, and engagement metrics.\n\n**Data Fetching:**\n\nUses SWR to fetch overview data from `/api/analytics`:\n\n```typescript\nconst { data: overview } = useSWR<OverviewData>(\n  teamInfo?.currentTeam?.id\n    ? `/api/analytics?type=overview&interval=${interval}&teamId=${teamInfo.currentTeam.id}...`\n    : null,\n  fetcher,\n  { keepPreviousData: true, revalidateOnFocus: false }\n);\n```\n\n**Query Parameters:**\n\n| Parameter | Type | Description |\n|-----------|------|-------------|\n| `interval` | `TimeRange` | Time range for analytics (7d, 14d, 30d, custom) |\n| `type` | `string` | Active tab (links, documents, visitors, views) |\n| `start` | `string` | Custom range start date (ISO string) |\n| `end` | `string` | Custom range end date (ISO string) |\n\n**Tab Types:**\n\n- **Links** - Shows `LinksTable` with link-specific metrics\n- **Documents** - Shows `DocumentsTable` with document performance\n- **Visitors** - Shows `VisitorsTable` with visitor information\n- **Views** - Shows `ViewsTable` with individual view events\n\n**Empty States:**\n\nThe dashboard shows contextual empty states:\n- **No activity, no links** - Shows prompt to create links\n- **No activity, has links** - Shows prompt to share links\n- **Has activity** - Normal table display\n\n**Premium Features:**\n\nThe `isPremium` flag (`plan !== \"free\" || trial`) determines whether custom date ranges beyond 30 days are accessible.\n\n### `notification-preferences.tsx` — Server-Rendered Preferences Page\n\nA standalone page for managing dataroom notification frequency without authentication.\n\n**Server-Side Rendering:**\n\nUses `getServerSideProps` to fetch viewer and dataroom data:\n\n```typescript\nexport async function getServerSideProps(context: GetServerSidePropsContext) {\n  const token = context.query.token as string;\n  const payload = verifyUnsubscribeToken(token);\n  \n  // Validate token, check expiration, fetch data\n  return { props: { token, data: { dataroomName, currentFrequency } } };\n}\n```\n\n**Token Verification:**\n\nThe token is verified using `verifyUnsubscribeToken()` which extracts:\n- `viewerId` - The viewer's database ID\n- `dataroomId` - The target dataroom ID\n- `teamId` - The team ID for authorization\n- `exp` - Token expiration timestamp\n\n**Frequency Options:**\n\n| Value | Label | Description |\n|-------|-------|-------------|\n| `instant` | Every update | Immediate notification for new documents |\n| `daily` | Daily digest | Summary at 9 AM UTC daily |\n| `weekly` | Weekly digest | Summary every Monday at 9 AM UTC |\n| `disabled` | Unsubscribed | No notifications |\n\n**Client-Side State:**\n\nThe page manages `selected` state for the current frequency selection and `status` for save confirmation (`idle`, `success`, `error`).\n\n## Preview Demo Pages\n\nThese pages render within iframes on the branding settings page to provide live previews.\n\n### `entrance_ppreview_demo.tsx` — Access Screen Preview\n\nRenders the access screen with:\n- Dynamic background color from `accentColor` query param\n- Welcome message display\n- Adaptive color palette generation using `createAdaptiveSurfacePalette()`\n- Email input placeholder with themed styling\n\n### `nav_ppreview_demo.tsx` — Document Viewer Preview\n\nRenders a simplified document viewer with:\n- Navigation header showing logo, CTA button, and page counter\n- Previous/Next navigation controls\n- Brand color applied to header\n- CTA button with `accentButtonColor`\n\n### `room_ppreview_demo.tsx` — Data Room Preview\n\nA more complex preview (referenced in call graph) that demonstrates:\n- Folder tree navigation\n- Document card layouts (LIST, COMPACT, GRID)\n- Viewer header styles (DEFAULT, SPLIT, NOTION)\n- Banner media display\n\n## Key Dependencies\n\n**Context Providers:**\n- `TeamProvider` - Current team context from `@/context/team-context`\n- `UploadProgressProvider` - Upload tracking from `@/context/upload-progress-context`\n- `SessionProvider` - NextAuth session from `next-auth/react`\n\n**SWR Hooks:**\n- `useBrand()` - Fetches team branding settings\n- `usePlan()` - Returns plan tier and trial status\n\n**Utilities:**\n- `cn()` - Tailwind class name merging\n- `uploadImage()` - Uploads blob images\n- `convertDataUrlToFile()` - Converts data URLs to Blob objects\n- `fetcher()` - Standard fetch wrapper for SWR\n\n**UI Components:**\n- `AppLayout` - Application shell with navigation\n- `Tabs` / `TabsContent` - Tabbed interface\n- `Card` / `CardContent` / `CardFooter` - Card containers\n- `Button`, `Input`, `Switch`, `Checkbox` - Form controls\n\n## Integration Points\n\n**Branding Page → Preview Demos:**\nThe branding page passes settings as query parameters to iframe sources:\n```\n/nav_ppreview_demo?brandColor=...&accentColor=...&brandLogo=...\n/room_ppreview_demo?cardLayout=...&showFolderTree=...\n/entrance_ppreview_demo?welcomeMessage=...\n```\n\n**App → Analytics:**\nDashboard fetches data from `/api/analytics` using team context.\n\n**Branding → API:**\nBranding saves to `/api/teams/${teamId}/branding` endpoint.\n\n**Notification Preferences → API:**\nPreferences save to `/api/notification-preferences/dataroom?token=${token}`.","pages-settings":"# pages — settings\n\n# Settings Module\n\nThe `pages/settings/` module provides a comprehensive set of configuration interfaces for team management, billing, security, and document sharing features. All pages use the `AppLayout` component as a common wrapper and follow a consistent visual layout with the `SettingsHeader` component.\n\n## Module Structure\n\n```\npages/settings/\n├── agreements.tsx        # NDA agreement management\n├── ai.tsx               # AI agents configuration\n├── billing.tsx          # Subscription management\n├── billing/\n│   └── invoices.tsx    # Invoice history\n├── domains.tsx          # Custom domain management\n├── general.tsx          # Core team settings\n├── incoming-webhooks.tsx # External data ingestion\n├── notifications.tsx    # Email notification preferences\n├── people.tsx           # Team member management\n├── presets/\n│   ├── index.tsx       # Presets list\n│   ├── new.tsx         # Create preset\n│   └── [id].tsx        # Edit preset\n├── security.tsx         # Team security settings\n└── tags.tsx            # Tag management\n```\n\n## Key Pages\n\n### Agreements (`agreements.tsx`)\n\nManages one-click NDA agreements for document sharing and data rooms. Displays a list of active agreements using `AgreementCard` components, with an `AgreementSheet` drawer for creating or editing agreements. The **Create agreement** button is gated behind plan requirements (Business or higher), showing an upgrade button for other plans.\n\n```typescript\nconst activeAgreements = useMemo(() => {\n  return agreements?.filter((agreement) => !agreement.deletedAt) || [];\n}, [agreements]);\n```\n\nKey interactions:\n- **Create**: Opens `AgreementSheet` with `null` editing state\n- **Edit**: Opens `AgreementSheet` with the selected agreement\n- **Delete**: Mutates the SWR cache to remove the agreement from the list\n\n### AI Settings (`ai.tsx`)\n\nControls AI-powered chat features at the team level. Requires the `ai` feature flag to be enabled. Displays a toggle for `agentsEnabled` with a PATCH request to `/api/teams/{teamId}/ai-settings`. Non-admins see the toggle disabled with an explanation. Includes privacy information about OpenAI data usage.\n\n```typescript\nconst handleToggleAI = async (enabled: boolean) => {\n  const response = await fetch(`/api/teams/${teamId}/ai-settings`, {\n    method: \"PATCH\",\n    headers: { \"Content-Type\": \"application/json\" },\n    body: JSON.stringify({ agentsEnabled: enabled }),\n  });\n};\n```\n\n### Billing (`billing.tsx` and `billing/invoices.tsx`)\n\nThe billing page handles subscription management with tab navigation between **Subscription** and **Invoices** views. It captures Stripe checkout callbacks via query parameters (`?success`, `?cancel`) and reports events to analytics and Google Tag Manager.\n\nThe invoices page fetches invoice data from `useInvoices()` and displays them in a table with:\n- Description (Papermark Subscription with invoice number)\n- Date formatted with `Intl.NumberFormat`\n- Amount in user's currency\n- Actions for viewing (hosted URL) and downloading (PDF)\n\n### Team Members (`people.tsx`)\n\nA comprehensive team management interface with the following features:\n\n**Member List**: Displays all team members with their roles, document counts, and status badges (e.g., \"Blocked (Trial Expired)\").\n\n**Role Management**: The `ChangeRoleDialog` component handles role changes with a `RadioGroup` for role selection. When changing to `DATAROOM_MEMBER`, a checkbox list allows assigning specific data rooms.\n\n```typescript\nconst ASSIGNABLE_ROLES: TeamRole[] = [\n  \"ADMIN\", \"MANAGER\", \"MEMBER\", \"DATAROOM_MEMBER\"\n];\n```\n\n**Invitation Handling**: Pending invitations appear in the list with status indicators (Pending/Expired) and actions for resending or revoking.\n\n**Seat Management**: Checks `canAddUsers` from `useLimits()` to determine if invitations are allowed, with options to purchase additional seats.\n\n### Notifications (`notifications.tsx`)\n\nConfigures email notification preferences using a categorized interface:\n\n```typescript\nconst NOTIFICATION_CATEGORIES = [\n  { label: \"Documents\", items: [{ type: \"DOCUMENT_VIEW\", ... }] },\n  { label: \"Data rooms\", items: [\n    { type: \"DATAROOM_VIEW\", ... },\n    { type: \"DATAROOM_UPLOAD\", ... },\n    { type: \"CONVERSATION_MESSAGE\", ... },\n    { type: \"DATAROOM_TASK\", ... }\n  ]},\n  { label: \"Security\", items: [{ type: \"BLOCKED_ACCESS\", ... }] }\n];\n```\n\nEach notification has:\n- A toggle switch for enabling/disabling\n- A scope selector (visible to admins/managers) for `ALL` or `MINE_ONLY`\n\n### Link Presets (`presets/`)\n\nReusable link configurations stored in the database. Three pages handle preset management:\n\n**List Page** (`presets/index.tsx`): Grid display of all presets with creation date, link to edit page.\n\n**Create Page** (`presets/new.tsx`): Form using `DEFAULT_LINK_PROPS` with sections:\n- Link Preview Cards (OG metadata)\n- Basic Settings (email protection, authentication, notifications, download, expiration)\n- Access Control (password, allow/deny lists)\n- Additional Security (watermark, screenshot protection, confidential view, agreements, custom fields)\n- Branding (pro banner)\n\n**Edit Page** (`presets/[id].tsx`): Same form with loaded preset data, includes delete functionality with confirmation alert.\n\n```typescript\nconst handleSubmit = async (e: FormEvent) => {\n  const response = await fetch(`/api/teams/${teamId}/presets/${presetId}`, {\n    method: \"PUT\",\n    body: JSON.stringify({ /* preset data */ }),\n  });\n};\n```\n\n### General Settings (`general.tsx`)\n\nCore team configuration with multiple form sections:\n- **Team Name**: Sanitizes input via `validateContent()` before saving\n- **Excel Advanced Mode**: Toggle with Business plan requirement prompt\n- **Replicate Dataroom Folders**: Toggle for folder structure replication\n- **Timezone Selector**: Configures team's timezone\n- **Ignored Domains**: Blocks domains from accessing links\n- **Global Block List**: Prevents specific emails from accessing content\n- **Survey Settings**: Configures post-viewing surveys\n- **Delete Team**: Destructive action for team removal\n\n### Custom Domains (`domains.tsx`)\n\nManages custom domains for sharing documents. Uses `AddDomainModal` for domain creation and `DomainCard` for display. Requires Business or Datarooms plan for adding domains.\n\n### Incoming Webhooks (`incoming-webhooks.tsx`)\n\nCreates webhook endpoints for receiving data from external services. Feature-flag gated (`incomingWebhooks`). Each webhook gets a unique URL at `${process.env.NEXT_PUBLIC_WEBHOOK_BASE_URL}/services/{webhookId}`.\n\n## Common Patterns\n\n### Plan Gating\n\nMost advanced features check the current plan before allowing access:\n\n```typescript\nconst { isTrial, isBusiness, isDatarooms, isDataroomsPlus } = usePlan();\n\n// Show upgrade button for non-qualifying plans\n{isTrial || isBusiness || isDatarooms || isDataroomsPlus ? (\n  <Button onClick={handleCreate}>Create<\/Button>\n) : (\n  <UpgradeButton text=\"Upgrade\" clickedPlan={PlanEnum.Business} />\n)}\n```\n\n### Upgrade Modal Flow\n\nFeatures requiring a plan upgrade use a shared pattern:\n\n1. Check plan eligibility\n2. If ineligible, trigger `UpgradePlanModal` with appropriate plan and highlight items\n3. Modal handles Stripe checkout flow\n\n### State Management\n\nSettings pages use SWR for server state with optimistic updates:\n\n```typescript\nmutate(`/api/teams/${teamId}`, /* optimistic update */, false);\n```\n\n### Data Fetching\n\nAll pages follow consistent patterns for data fetching:\n- Use custom hooks (`useAgreements`, `useInvoices`, `useDomains`)\n- Display loading states with spinners\n- Show error states with retry options\n- Handle empty states with helpful CTAs\n\n## Component Dependencies\n\n```mermaid\ngraph TD\n    subgraph \"Settings Pages\"\n        AG[agreements.tsx]\n        AI[ai.tsx]\n        BILL[billing.tsx]\n        INV[invoices.tsx]\n        DOM[domains.tsx]\n        GEN[general.tsx]\n        NOT[notifications.tsx]\n        PPL[people.tsx]\n        PRE[presets/*]\n        SEC[security.tsx]\n    end\n\n    subgraph \"Shared Components\"\n        SH[SettingsHeader]\n        AL[AppLayout]\n        UP[UpgradePlanModal]\n    end\n\n    subgraph \"Feature Components\"\n        AC[AgreementCard]\n        AS[AgreementSheet]\n        DC[DomainCard]\n        CR[ChangeRoleDialog]\n        PV[Preview]\n    end\n\n    subgraph \"Data Hooks\"\n        UA[useAgreements]\n        UI[useInvoices]\n        UD[useDomains]\n        UP2[usePlan]\n        UL[useLimits]\n    end\n\n    AG --> AC & AS\n    DOM --> DC\n    PPL --> CR\n    PRE --> PV\n    GEN --> UP\n    AI --> UP\n    ALL --> SH & AL\n    ALL --> UA & UP2\n```\n\n## API Endpoints\n\nSettings pages interact with these API routes:\n\n| Endpoint | Methods | Purpose |\n|----------|---------|---------|\n| `/api/teams/{id}` | GET, PATCH | Team info and settings |\n| `/api/teams/{id}/agreements` | GET | List agreements |\n| `/api/teams/{id}/ai-settings` | GET, PATCH | AI feature toggle |\n| `/api/teams/{id}/domains` | GET, POST, DELETE | Domain management |\n| `/api/teams/{id}/presets` | GET, POST | Preset CRUD |\n| `/api/teams/{id}/presets/{presetId}` | GET, PUT, DELETE | Single preset operations |\n| `/api/teams/{id}/incoming-webhooks` | GET, POST, DELETE | Webhook management |\n| `/api/teams/{id}/change-role` | PUT | Role assignment |\n| `/api/teams/{id}/remove-teammate` | DELETE | Member removal |\n| `/api/teams/{id}/invitations` | GET, DELETE | Invitation management |\n| `/api/teams/{id}/invitations/resend` | PUT | Resend invitation |\n| `/api/feature-flags` | GET | Feature availability |\n| `/api/teams/{id}/update-name` | PATCH | Team name change |\n| `/api/teams/{id}/update-advanced-mode` | PATCH | Excel mode toggle |","pages-view":"# pages — view\n\n# pages/view Module\n\nThe `pages/view` module handles all public-facing view pages for shared links in Papermark. It provides dynamic rendering for three link types — documents, data rooms, and workflows — through two route patterns: standard link IDs and custom domain slugs.\n\n## Route Structure\n\n```\npages/view/\n├── [linkId]/\n│   ├── index.tsx           # Main view: document, dataroom, or workflow\n│   ├── d/[documentId].tsx # Single document view within a dataroom\n│   ├── downloads.tsx       # Downloads panel for dataroom links\n│   └── embed.tsx           # Iframe-embeddable version of the view\n└── domains/\n    └── [domain]/[slug]/\n        ├── index.tsx       # Custom domain view (document or dataroom)\n        ├── d/[documentId].tsx # Custom domain dataroom document view\n        └── downloads.tsx   # Custom domain downloads panel\n```\n\n## Link Types\n\nThe module routes to different components based on the `linkType` returned from the link data fetch:\n\n| Link Type | Description | View Component |\n|-----------|-------------|----------------|\n| `DOCUMENT_LINK` | Single document | `DocumentView` |\n| `DATAROOM_LINK` | Collection of documents | `DataroomView` / `DataroomDocumentView` |\n| `WORKFLOW_LINK` | Workflow entry point | `WorkflowAccessView` |\n\n## Data Flow\n\n```mermaid\nflowchart TD\n    A[Request: /view/[linkId] or /view/domains/[domain]/[slug]] --> B[getStaticProps / getServerSideProps]\n    B --> C{Link Type?}\n    C -->|DOCUMENT_LINK| D[Fetch Notion recordMap if needed]\n    C -->|DATAROOM_LINK| E[Process dataroom documents]\n    C -->|WORKFLOW_LINK| F[Return minimal props]\n    D --> G[fetchMissingPageReferences]\n    G --> H[normalizeRecordMap]\n    H --> I[addSignedUrls]\n    E --> J[buildViewerI18nPageProps]\n    I --> J\n    F --> J\n    J --> K[Props to client component]\n    K --> L{linkType?}\n    L -->|DOCUMENT| M[DocumentView]\n    L -->|DATAROOM| N[DataroomView / DataroomDocumentView]\n    L -->|WORKFLOW| O[WorkflowAccessView]\n```\n\n## Key Components\n\n### `ViewPage` (`[linkId]/index.tsx`)\n\nThe main view handler. Reusable `ViewPageInner` component renders different views based on `linkType`, with a wrapper that provides i18n context.\n\n**Route parameters:**\n- `linkId` — Valid CUID identifying the link\n\n**Key features:**\n- Fetches link data via `fetchLinkDataById`\n- For Notion documents: parses page ID, fetches record map, resolves missing references, and signs URLs\n- Resolves feature flags (`annotationsEnabled`, `textSelectionEnabled`, `dataroomIndexEnabled`)\n- Handles link expiration and archive status\n- Supports query parameters: `email` (verified email), `d` (disable email editing), `previewToken`, `preview`\n\n### `DataroomDocumentViewPage` (`[linkId]/d/[documentId].tsx`)\n\nRenders a single document within a dataroom context.\n\n**Route parameters:**\n- `linkId` — Dataroom link CUID\n- `documentId` — Specific document CUID\n\n**Key differences from main view:**\n- Fetches link data specifically for the dataroom document via `fetchLinkDataById({ linkId, dataroomDocumentId })`\n- Only handles `DATAROOM_LINK` type\n- Passes `notionData` to `DataroomDocumentView` for document rendering\n\n### `ViewDownloadsPage` (`[linkId]/downloads.tsx`)\n\nProvides a downloads panel for dataroom links. Uses `getServerSideProps` (not static) because it needs the brand's default language at request time.\n\n**Route parameters:**\n- `linkId` — Dataroom link CUID\n\nRenders `DownloadsPanel` with the resolved `linkId`.\n\n### `EmbedPage` (`[linkId]/embed.tsx`)\n\nEmbeddable version that blocks direct access. Only renders content when detected inside an iframe.\n\n**Security check:**\n- Compares `window !== window.parent` to detect iframe context\n- Returns 404 for direct browser access\n- Tracks embed load events with analytics (captures `embedSource` from referrer hostname)\n\nReuses `getStaticProps` and `getStaticPaths` from `ViewPage` — the underlying data fetching is identical, only the rendering differs.\n\n### Domain Routes (`domains/[domain]/[slug]/`)\n\nMirror the standard routes but use custom domain slugs instead of link IDs:\n\n| File | Standard Equivalent |\n|------|---------------------|\n| `index.tsx` | `[linkId]/index.tsx` |\n| `d/[documentId].tsx` | `[linkId]/d/[documentId].tsx` |\n| `downloads.tsx` | `[linkId]/downloads.tsx` |\n\n**Key differences:**\n- Fetches via `fetchLinkDataByDomainSlug({ domain, slug, ... })`\n- URL param validation uses regex patterns: domain must be a valid FQDN, slug must be alphanumeric with hyphens/underscores\n- For workflow links, includes `domain` and `slug` in props for downstream routing\n\n## Authentication & Access Flow\n\n```mermaid\nsequenceDiagram\n    participant User\n    participant Page as ViewPage\n    participant Cookie as Cookies\n    participant Session as useSession\n    participant View as DocumentView/DataroomView\n\n    User->>Page: Load /view/[linkId]\n    Page->>Cookie: Read pm_vft, pm_drs_flag_[linkId]\n    Page->>Cookie: Read papermark.email from localStorage\n    Page->>Session: Check authenticated session\n    Page->>User: Render View with userEmail = verifiedEmail ?? storedEmail ?? sessionEmail\n    View->>View: Check isProtected flag\n    alt isProtected && no verifiedEmail\n        View->>User: Show access form\n    end\n```\n\n**Email resolution priority:**\n1. `email` query parameter (verified email from email protection flow)\n2. `storedEmail` from localStorage\n3. `session.user.email` from NextAuth session\n\n**Token storage:**\n- `pm_vft` cookie — general view flag token\n- `pm_drs_flag_[linkId]` cookie — dataroom-specific flag token\n\n## Notion Document Processing\n\nFor documents with `type === \"notion\"`, the following pipeline runs in `getStaticProps`:\n\n```typescript\n// 1. Parse page ID from file URL\nconst notionPageId = parsePageId(file, { uuid: false });\n\n// 2. Fetch the Notion page record map\nrecordMap = await notion.getPage(pageId, { signFileUrls: false });\n\n// 3. Fetch any missing page references (e.g., links in table cells)\nawait fetchMissingPageReferences(recordMap);\n\n// 4. Normalize double-nested block structures\nnormalizeRecordMap(recordMap);\n\n// 5. Sign URLs for file access\nawait addSignedUrls({ recordMap });\n```\n\nThe theme (light/dark mode for Notion) is extracted from the URL query parameter: `new URL(file).searchParams.get(\"mode\")`.\n\n## Feature Flags\n\nFeature flags are resolved server-side via `getFeatureFlags({ teamId })` and passed as props:\n\n| Flag | Purpose |\n|------|---------|\n| `textSelectionEnabled` | Allow selecting text in documents |\n| `annotationsEnabled` | Enable annotation/highlighting features |\n| `dataroomIndexEnabled` | Show dataroom index/navigation |\n| `annotations` | (Document links only) |\n\nThe `useCustomAccessForm` and `logoOnAccessForm` flags are currently hardcoded for specific team IDs rather than fetched from the database.\n\n## I18n Setup\n\nAll pages wrap their inner component in `ViewerI18nProvider`:\n\n```typescript\n<ViewerI18nProvider locale={locale} resources={resources}>\n  <ViewPageInner {...props} />\n<\/ViewerI18nProvider>\n```\n\nThe locale and resources come from `buildViewerI18nPageProps(brand)`, which respects the brand's `defaultLanguage` setting. If `getStaticProps` exits early (e.g., frozen or error state), the wrapper defaults to English.\n\n## Error Handling\n\n| Condition | Response |\n|-----------|----------|\n| Link not found | `notFound: true` |\n| Link frozen (dataroom closed) | Renders 404 with \"data room has been closed\" |\n| Link expired | Renders 404 with \"link is expired\" |\n| Link archived | Renders 404 with \"link is archived\" |\n| Notion API error | `notionError: true`, revalidates every 30s |\n| Unknown error | `error: true`, revalidates every 30s |\n\n## Revalidation Strategy\n\n```typescript\nrevalidate: brand || recordMap ? 10 : 60\n```\n\nPages with custom branding or Notion content revalidate every 10 seconds. Static content without branding waits 60 seconds.\n\n## Props Shape\n\nAll view pages share a common props structure via `ViewPageProps`:\n\n```typescript\ntype ViewPageProps = {\n  linkData: DocumentLinkData | DataroomLinkData | WorkflowLinkData;\n  notionData: {\n    rootNotionPageId: string | null;\n    recordMap: ExtendedRecordMap | null;\n    theme: NotionTheme | null;\n  };\n  meta: {\n    enableCustomMetatag: boolean;\n    metaTitle: string | null;\n    metaDescription: string | null;\n    metaImage: string | null;\n    metaFavicon: string | null;\n    metaUrl: string | null;\n  };\n  showPoweredByBanner: boolean;\n  showAccountCreationSlide: boolean;\n  useAdvancedExcelViewer: boolean;\n  useCustomAccessForm: boolean;\n  logoOnAccessForm: boolean;\n  // ... dataroom-specific or document-specific flags\n};\n```\n\n## Dependencies\n\n**Internal lib functions:**\n- `fetchLinkDataById` — Fetch link by CUID\n- `fetchLinkDataByDomainSlug` — Fetch link by domain/slug\n- `getFeatureFlags` — Resolve feature toggles\n- `buildViewerI18nPageProps` — Build i18n context\n- `notion.getPage` — Fetch Notion record map\n- `fetchMissingPageReferences`, `normalizeRecordMap`, `addSignedUrls` — Notion processing\n\n**Internal components:**\n- `DocumentView` — Document renderer\n- `DataroomView` — Dataroom index view\n- `DataroomDocumentView` — Single dataroom document\n- `WorkflowAccessView` — Workflow entry form\n- `DownloadsPanel` — Download tracking UI\n- `CustomMetaTag` — SEO meta tags\n- `ViewerI18nProvider` — I18n context provider\n- `LoadingSpinner` — Loading state","pages-visitors":"# pages — visitors\n\n# Visitors Module\n\nThe visitors module provides two Next.js page components for managing and viewing visitors: a list view showing all visitors with filtering capabilities, and a detail view showing individual visitor information and their document activity.\n\n## Overview\n\n```mermaid\ngraph TD\n    A[\"/visitors\"] --> B[\"Visitors Page\"]\n    A --> C[\"Visitors Tab\"]\n    A --> D[\"Visitor Groups Tab\"]\n    E[\"/visitors/[id]\"] --> F[\"VisitorDetailPage\"]\n    \n    C --> G[\"ContactsTable\"]\n    D --> H[\"VisitorGroupsSection\"]\n    F --> I[\"VisitorAvatar\"]\n    F --> J[\"ContactsDocumentsTable\"]\n    \n    K[\"useViewers\"] -->|fetches| C\n    L[\"useViewer\"] -->|fetches| F\n    M[\"usePlan\"] -->|access control| A\n    M -->|access control| E\n```\n\n## Pages\n\n### `/visitors` — Visitor List Page\n\nThe main visitors page displays all visitors with a tabbed interface separating visitor records from visitor groups.\n\n**Route:** `pages/visitors/index.tsx`\n\n**Key features:**\n\n- **Tabbed navigation** — Switches between \"Visitors\" (individual records) and \"Visitor Groups\" (organized collections)\n- **URL-synced tabs** — The active tab persists in the URL query string (`?tab=visitors` or `?tab=groups`)\n- **Search** — `SearchBoxPersisted` component allows searching visitors by email or name\n- **Pagination & Sorting** — Full controls for navigating large visitor lists\n- **Access control** — Redirects free (non-trial) users to `/documents`\n\n**Data fetching:**\n\n```typescript\nconst { viewers, pagination, isValidating } = useViewers(\n  currentPage,\n  pageSize,\n  sortBy,\n  sortOrder,\n);\n```\n\nThe `useViewers` hook fetches paginated visitor data. Sorting defaults to `lastViewed` descending.\n\n**State management:**\n\n| State | Initial Value | Purpose |\n|-------|---------------|---------|\n| `currentPage` | `1` | Current pagination page |\n| `pageSize` | `10` | Items per page |\n| `sortBy` | `\"lastViewed\"` | Sort field |\n| `sortOrder` | `\"desc\"` | Sort direction |\n| `activeTab` | URL param or `\"visitors\"` | Active tab selection |\n\n### `/visitors/[id]` — Visitor Detail Page\n\nDisplays detailed information for a single visitor, including their avatar, email, and a table of documents they've viewed.\n\n**Route:** `pages/visitors/[id]/index.tsx`\n\n**Key features:**\n\n- **Visitor header** — Shows avatar and email address\n- **Document views table** — Lists documents the visitor has accessed with viewing durations\n- **Breadcrumb navigation** — Back link to \"All Visitors\" (visible in loading skeleton)\n- **Same access control** — Redirects free users away\n\n**Data fetching:**\n\n```typescript\nconst { viewer, durations, loadingDurations, error } = useViewer(\n  currentPage,\n  pageSize,\n  sortBy,\n  sortOrder,\n);\n```\n\nThe `useViewer` hook fetches data for the specific visitor identified by the route parameter. The `durations` field tracks how long the visitor spent on each document.\n\n**Error handling:**\n\n```typescript\nif (error) {\n  return <ErrorPage statusCode={404} />;\n}\n```\n\nIf the visitor cannot be found, the page renders a 404 error page.\n\n## Shared Patterns\n\nBoth pages follow consistent patterns for cross-cutting concerns:\n\n### Plan-Based Access Control\n\nBoth pages check the user's plan and redirect non-trial free users:\n\n```typescript\nuseEffect(() => {\n  if (isFree && !isTrial) router.push(\"/documents\");\n}, [isTrial, isFree]);\n```\n\nThis ensures free users cannot access visitor analytics, likely a premium feature.\n\n### Pagination & Sorting Handlers\n\nBoth pages implement identical handler patterns for table controls:\n\n```typescript\nconst handlePageChange = (page: number) => setCurrentPage(page);\nconst handlePageSizeChange = (size: number) => {\n  setPageSize(size);\n  setCurrentPage(1); // Reset to first page\n};\nconst handleSortChange = (newSortBy: string, newSortOrder: string) => {\n  setSortBy(newSortBy);\n  setSortOrder(newSortOrder);\n  setCurrentPage(1); // Reset to first page\n};\n```\n\n### Loading States\n\n`VisitorDetailPage` includes a dedicated skeleton component for loading states:\n\n```typescript\nconst VisitorDetailHeaderSkeleton = () => { ... }\n```\n\nThis provides visual feedback while the viewer data loads, with a placeholder avatar and text that matches the final layout dimensions.\n\n## Component Dependencies\n\n### Outgoing Dependencies\n\n| Component | Purpose |\n|-----------|---------|\n| `AppLayout` | Page wrapper providing consistent layout structure |\n| `ContactsTable` | Renders paginated visitor list with sorting |\n| `ContactsDocumentsTable` | Renders visitor's document views |\n| `VisitorGroupsSection` | Container for visitor groups management |\n| `SearchBoxPersisted` | Search input with URL persistence |\n| `Tabs`, `TabsList`, `TabsTrigger`, `TabsContent` | Tabbed navigation UI |\n| `VisitorAvatar` | Displays visitor avatar with tooltip |\n| `Separator`, `Skeleton` | UI utilities |\n| `Breadcrumb*` | Navigation breadcrumb components |\n\n### Data Hooks\n\n| Hook | Source | Purpose |\n|------|--------|---------|\n| `useViewers` | `lib/swr/use-viewers.ts` | Fetch visitor list |\n| `useViewer` | `lib/swr/use-viewer.ts` | Fetch single visitor |\n| `usePlan` | `lib/swr/use-billing.ts` | Check subscription tier |\n\n### Internal Execution Flow\n\nThe pages flow through the team context for authentication:\n\n```mermaid\nsequenceDiagram\n    participant Page\n    participant usePlan\n    participant useTeam\n    participant DataStore\n    \n    Page->>usePlan: Check subscription\n    usePlan->>useTeam: Fetch current team\n    useTeam->>DataStore: Get plan details\n    DataStore-->>useTeam: Plan info\n    useTeam-->>usePlan: Team context\n    usePlan-->>Page: isFree, isTrial flags\n```\n\n## Layout Structure\n\n
